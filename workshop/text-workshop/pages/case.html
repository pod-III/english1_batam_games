<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Case Converter - KlassKit</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'pink': '#ff4785',
                        'orange': '#ff7e33',
                        'green': '#00d063',
                        'blue': '#1ea7fd',
                        'dark': '#0f172a',
                        'chalk': '#f8fafc',
                    },
                    fontFamily: {
                        heading: ['Fredoka', 'sans-serif'],
                        body: ['Nunito', 'sans-serif'],
                    },
                    boxShadow: {
                        'hard': '4px 4px 0px 0px #0f172a',
                        'hard-hover': '8px 8px 0px 0px #0f172a',
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #f8fafc;
            background-image: 
                linear-gradient(#cbd5e1 1px, transparent 1px),
                linear-gradient(90deg, #cbd5e1 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .dark body {
            background-color: #020617;
            background-image: 
                linear-gradient(#0f172a 1px, transparent 1px),
                linear-gradient(90deg, #0f172a 1px, transparent 1px);
        }

        .btn-chunky {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-chunky:hover:not(:disabled) {
            transform: translateY(-4px);
            box-shadow: 8px 8px 0px 0px #0f172a;
        }
        .btn-chunky:active:not(:disabled) {
            transform: translateY(4px);
            box-shadow: 0px 0px 0px 0px #0f172a;
        }
    </style>
</head>

<body class="font-body text-dark dark:text-chalk min-h-screen p-4 md:p-8">

    <main class="max-w-7xl mx-auto">
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div class="flex items-center gap-4">
                <a href="../index.html" class="bg-white dark:bg-slate-800 border-4 border-dark dark:border-slate-500 p-3 rounded-2xl shadow-hard btn-chunky">
                    <i data-lucide="arrow-left" class="w-6 h-6"></i>
                </a>
                <div>
                    <h1 class="font-heading font-bold text-3xl md:text-4xl">CASE <span class="text-pink">CONVERTER</span></h1>
                    <p class="text-slate-500 dark:text-slate-400 font-bold text-sm">Switch between Title, Upper, and Lower case</p>
                </div>
            </div>
            
            <button id="themeToggle" class="bg-white dark:bg-slate-800 border-4 border-dark dark:border-slate-500 p-3 rounded-2xl shadow-hard btn-chunky">
                <i data-lucide="sun" class="w-6 h-6 hidden dark:block"></i>
                <i data-lucide="moon" class="w-6 h-6 block dark:hidden"></i>
            </button>
        </header>

        <!-- Main Grid -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            
            <!-- Input Area -->
            <div class="flex flex-col gap-4">
                <div class="flex justify-between items-end px-2">
                    <label class="font-heading font-bold text-xl flex items-center gap-2">
                        <i data-lucide="type" class="text-pink"></i> INPUT TEXT
                    </label>
                    <button onclick="clearText()" class="text-xs font-black uppercase text-slate-400 hover:text-orange transition-colors">Clear</button>
                </div>
                <div class="bg-white dark:bg-slate-900 border-4 border-dark dark:border-slate-500 rounded-[2rem] shadow-hard flex flex-col overflow-hidden h-[500px]">
                    <textarea id="inputText" 
                        class="w-full flex-grow p-8 font-body text-xl outline-none resize-none bg-transparent placeholder-slate-400 leading-relaxed"
                        placeholder="Type or paste your text here..."></textarea>
                </div>
            </div>

            <!-- Conversion Controls & Output -->
            <div class="flex flex-col gap-8">
                
                <!-- Quick Actions Card -->
                <div class="bg-white dark:bg-slate-900 border-4 border-dark dark:border-slate-500 rounded-[2rem] p-8 shadow-hard">
                    <h3 class="font-heading font-bold text-xl mb-6 flex items-center gap-2">
                        <i data-lucide="zap" class="text-orange"></i> QUICK CONVERT
                    </h3>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <button onclick="convert('sentence')" class="btn-chunky bg-slate-50 dark:bg-slate-800 border-4 border-dark dark:border-slate-500 rounded-2xl py-4 font-heading font-bold text-lg hover:bg-pink/10 transition-colors">Sentence case.</button>
                        <button onclick="convert('lower')" class="btn-chunky bg-slate-50 dark:bg-slate-800 border-4 border-dark dark:border-slate-500 rounded-2xl py-4 font-heading font-bold text-lg hover:bg-blue/10 transition-colors">lower case</button>
                        <button onclick="convert('upper')" class="btn-chunky bg-slate-50 dark:bg-slate-800 border-4 border-dark dark:border-slate-500 rounded-2xl py-4 font-heading font-bold text-lg hover:bg-orange/10 transition-colors">UPPER CASE</button>
                        <button onclick="convert('title')" class="btn-chunky bg-slate-50 dark:bg-slate-800 border-4 border-dark dark:border-slate-500 rounded-2xl py-4 font-heading font-bold text-lg hover:bg-green/10 transition-colors">Title Case</button>
                    </div>
                </div>

                <!-- Export Area -->
                <div class="flex flex-col gap-4">
                    <label class="font-heading font-bold text-xl flex items-center gap-2 px-2">
                        <i data-lucide="share" class="text-blue"></i> EXPORT
                    </label>
                    <div class="bg-white dark:bg-slate-900 border-4 border-dark dark:border-slate-500 rounded-[2rem] p-6 shadow-hard flex flex-col gap-4">
                        <button id="copyBtn" onclick="copyOutput()" class="btn-chunky w-full bg-blue text-white font-heading font-bold text-xl py-5 rounded-2xl border-4 border-dark shadow-hard flex items-center justify-center gap-2">
                            <i data-lucide="copy"></i> COPY TO CLIPBOARD
                        </button>
                        <button onclick="downloadText()" class="btn-chunky w-full bg-green text-dark font-heading font-bold text-xl py-5 rounded-2xl border-4 border-dark shadow-hard flex items-center justify-center gap-2">
                            <i data-lucide="download"></i> SAVE AS .TXT
                        </button>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();

        // Theme Handling
        const themeToggle = document.getElementById('themeToggle');
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
        themeToggle.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            localStorage.theme = document.documentElement.classList.contains('dark') ? 'dark' : 'light';
        });

        const inputEl = document.getElementById('inputText');
        const copyBtn = document.getElementById('copyBtn');

        function convert(type) {
            let text = inputEl.value;
            if (!text) return;

            if (type === 'lower') text = text.toLowerCase();
            else if (type === 'upper') text = text.toUpperCase();
            else if (type === 'sentence') {
                text = text.toLowerCase().replace(/(^\s*\w|[.!?]\s*\w)/g, c => c.toUpperCase());
            } else if (type === 'title') {
                text = text.toLowerCase().split(' ').map(s => s.charAt(0).toUpperCase() + s.substring(1)).join(' ');
            }

            inputEl.value = text;
            
            // Animation feedback on text area
            inputEl.classList.add('ring-4', 'ring-pink/50');
            setTimeout(() => inputEl.classList.remove('ring-4', 'ring-pink/50'), 300);
        }

        function clearText() {
            inputEl.value = '';
            inputEl.focus();
        }

        function copyOutput() {
            if (!inputEl.value) return;
            inputEl.select();
            document.execCommand('copy');
            
            const originalHTML = copyBtn.innerHTML;
            copyBtn.innerHTML = `<i data-lucide="check"></i> COPIED!`;
            copyBtn.classList.replace('bg-blue', 'bg-green');
            copyBtn.classList.replace('text-white', 'text-dark');
            lucide.createIcons();
            
            setTimeout(() => {
                copyBtn.innerHTML = originalHTML;
                copyBtn.classList.replace('bg-green', 'bg-blue');
                copyBtn.classList.replace('text-dark', 'text-white');
                lucide.createIcons();
            }, 2000);
        }

        function downloadText() {
            const text = inputEl.value;
            if (!text) return;
            const blob = new Blob([text], { type: "text/plain" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = "klasskit-converted-text.txt";
            a.click();
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
