<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocab Analyzer - KlassKit</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/supabase.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'pink': '#ff4785',
                        'orange': '#ff7e33',
                        'green': '#00d063',
                        'blue': '#1ea7fd',
                        'dark': '#0f172a',
                        'chalk': '#f8fafc',
                    },
                    fontFamily: {
                        heading: ['Fredoka', 'sans-serif'],
                        body: ['Nunito', 'sans-serif'],
                    },
                    boxShadow: {
                        'hard': '4px 4px 0px 0px #0f172a',
                        'hard-hover': '8px 8px 0px 0px #0f172a',
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #f8fafc;
            background-image: 
                linear-gradient(#cbd5e1 1px, transparent 1px),
                linear-gradient(90deg, #cbd5e1 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .dark body {
            background-color: #020617;
            background-image: 
                linear-gradient(#0f172a 1px, transparent 1px),
                linear-gradient(90deg, #0f172a 1px, transparent 1px);
        }

        .btn-chunky {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-chunky:hover:not(:disabled) {
            transform: translateY(-4px);
            box-shadow: 8px 8px 0px 0px #0f172a;
        }
        .btn-chunky:active:not(:disabled) {
            transform: translateY(4px);
            box-shadow: 0px 0px 0px 0px #0f172a;
        }

        .stat-card {
            transition: all 0.3s ease;
        }
        .stat-card:hover {
            transform: translateY(-2px);
        }

        .letter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
            gap: 8px;
        }

        /* Hide scrollbar for cleaner look */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .animate-pop {
            animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        
        @keyframes pop {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>

<body class="font-body text-dark dark:text-chalk min-h-screen p-4 md:p-8">

    <main class="max-w-7xl mx-auto">
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div class="flex items-center gap-4">
                <a href="../index.html" class="bg-white dark:bg-slate-800 border-4 border-dark dark:border-slate-500 p-3 rounded-2xl shadow-hard btn-chunky">
                    <i data-lucide="arrow-left" class="w-6 h-6"></i>
                </a>
                <div>
                    <h1 class="font-heading font-bold text-3xl md:text-4xl uppercase">VOCAB <span class="text-orange underline decoration-4 underline-offset-4">ANALYZER</span></h1>
                    <p class="text-slate-500 dark:text-slate-400 font-bold text-sm">Deep insights into your text composition</p>
                </div>
            </div>
            
            <button id="themeToggle" class="bg-white dark:bg-slate-800 border-4 border-dark dark:border-slate-500 p-3 rounded-2xl shadow-hard btn-chunky">
                <i data-lucide="sun" class="w-6 h-6 hidden dark:block text-orange"></i>
                <i data-lucide="moon" class="w-6 h-6 block dark:hidden text-blue"></i>
            </button>
        </header>

        <!-- Main Workspace -->
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- Input Section -->
            <div class="lg:col-span-5 flex flex-col gap-4">
                <div class="flex justify-between items-end px-2">
                    <label class="font-heading font-bold text-xl flex items-center gap-2 uppercase">
                        <i data-lucide="text-quote" class="text-blue"></i> Source Text
                    </label>
                    <button onclick="clearAll()" class="text-xs font-black uppercase text-slate-400 hover:text-pink transition-colors">Clear</button>
                </div>
                <div class="bg-white dark:bg-slate-900 border-4 border-dark dark:border-slate-500 rounded-[2rem] shadow-hard flex flex-col overflow-hidden h-[600px]">
                    <textarea id="inputText" 
                        class="w-full flex-grow p-6 font-body text-lg outline-none resize-none bg-transparent placeholder-slate-400"
                        placeholder="Paste your text here to analyze..."></textarea>
                    
                    <div class="bg-slate-50 dark:bg-slate-800 border-t-4 border-dark dark:border-slate-700 px-4 py-3 flex justify-between items-center text-[10px] font-black uppercase tracking-widest text-slate-400">
                        <span id="charCount">0 Characters</span>
                        <span id="wordCount">0 Words</span>
                    </div>
                </div>
            </div>

            <!-- Analysis Section -->
            <div class="lg:col-span-7 flex flex-col gap-6">
                <!-- Top Stats -->
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <div class="bg-white dark:bg-slate-900 border-4 border-dark dark:border-slate-500 rounded-2xl p-4 shadow-hard stat-card">
                        <span class="block text-[10px] font-black uppercase text-slate-400 mb-1">Sentences</span>
                        <span id="sentenceCount" class="text-3xl font-heading font-bold text-blue">0</span>
                    </div>
                    <div class="bg-white dark:bg-slate-900 border-4 border-dark dark:border-slate-500 rounded-2xl p-4 shadow-hard stat-card">
                        <span class="block text-[10px] font-black uppercase text-slate-400 mb-1">Avg Word Length</span>
                        <span id="avgWordLength" class="text-3xl font-heading font-bold text-pink">0</span>
                    </div>
                    <div class="bg-white dark:bg-slate-900 border-4 border-dark dark:border-slate-500 rounded-2xl p-4 shadow-hard stat-card">
                        <span class="block text-[10px] font-black uppercase text-slate-400 mb-1">Read Time</span>
                        <span id="readTime" class="text-3xl font-heading font-bold text-green">0m</span>
                    </div>
                    <div class="bg-white dark:bg-slate-900 border-4 border-dark dark:border-slate-500 rounded-2xl p-4 shadow-hard stat-card">
                        <span class="block text-[10px] font-black uppercase text-slate-400 mb-1">Difficulty</span>
                        <span id="difficulty" class="text-xl font-heading font-bold text-orange">N/A</span>
                    </div>
                </div>

                <!-- Word Frequency -->
                <div class="bg-white dark:bg-slate-900 border-4 border-dark dark:border-slate-500 rounded-[2rem] p-6 shadow-hard flex flex-col min-h-[250px]">
                    <h3 class="font-heading font-bold text-xl mb-4 flex items-center gap-2 uppercase">
                        <i data-lucide="trending-up" class="text-pink"></i> Top Vocabulary
                    </h3>
                    <div id="wordFrequency" class="flex flex-wrap gap-2">
                        <p class="text-slate-400 italic text-sm">Analysis results will appear as you type...</p>
                    </div>
                </div>

                <!-- Letter Frequency (The legacy feature, upgraded) -->
                <div class="bg-white dark:bg-slate-900 border-4 border-dark dark:border-slate-500 rounded-[2rem] p-6 shadow-hard">
                    <h3 class="font-heading font-bold text-xl mb-4 flex items-center gap-2 uppercase">
                        <i data-lucide="bar-chart-horizontal" class="text-green"></i> Letter Distribution
                    </h3>
                    <div id="letterFrequency" class="letter-grid">
                        <!-- Letters A-Z will be injected here -->
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();

        const inputText = document.getElementById('inputText');
        const charCountEl = document.getElementById('charCount');
        const wordCountEl = document.getElementById('wordCount');
        const sentenceCountEl = document.getElementById('sentenceCount');
        const avgWordLengthEl = document.getElementById('avgWordLength');
        const readTimeEl = document.getElementById('readTime');
        const difficultyEl = document.getElementById('difficulty');
        const wordFreqEl = document.getElementById('wordFrequency');
        const letterFreqEl = document.getElementById('letterFrequency');

        // --- PERSISTENCE ---
        const TOOL_ID = 'workshop_analyzer';
        let saveTimeout;

        async function initPersistence() {
            // Load Theme
            const savedTheme = localStorage.getItem('theme_workshop_analyzer') || 'light';
            if (savedTheme === 'dark') document.documentElement.classList.add('dark');
            updateThemeIcon();

            // Load Progress
            const progress = await loadProgress(TOOL_ID);
            if (progress && progress.text) {
                inputText.value = progress.text;
                inputText.dispatchEvent(new Event('input'));
            }
        }

        function triggerSave() {
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(() => {
                saveProgress(TOOL_ID, { text: inputText.value });
            }, 1000);
        }


        // Theme Handling
        const themeToggle = document.getElementById('themeToggle');
        
        function updateThemeIcon() {
            const isDark = document.documentElement.classList.contains('dark');
            themeToggle.innerHTML = isDark 
                ? '<i data-lucide="sun" class="w-6 h-6 text-orange"></i>' 
                : '<i data-lucide="moon" class="w-6 h-6 text-blue"></i>';
            lucide.createIcons();
        }

        themeToggle.addEventListener('click', () => {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme_workshop_analyzer', isDark ? 'dark' : 'light');
            updateThemeIcon();
        });

        // Init Letter Grid
        function initLetterGrid() {
            letterFreqEl.innerHTML = '';
            const alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
            alphabet.forEach(letter => {
                const card = document.createElement('div');
                card.id = `letter-${letter.toLowerCase()}`;
                card.className = 'bg-slate-50 dark:bg-slate-800 border-2 border-dark dark:border-slate-700 rounded-xl p-2 text-center transition-all';
                card.innerHTML = `
                    <div class="text-[10px] font-black text-slate-400 leading-none mb-1">${letter}</div>
                    <div class="font-heading font-bold text-dark dark:text-white count">0</div>
                `;
                letterFreqEl.appendChild(card);
            });
        }

        initLetterGrid();

        // Analyzer Logic
        inputText.addEventListener('input', () => {
            triggerSave();
            const text = inputText.value;
            const words = text.trim() ? text.trim().split(/\s+/) : [];
            const sentences = text.trim() ? text.split(/[.!?]+/).filter(s => s.trim().length > 0) : [];
            const chars = text.length;

            // Basic Counts
            charCountEl.textContent = `${chars} Characters`;
            wordCountEl.textContent = `${words.length} Words`;
            sentenceCountEl.textContent = sentences.length;

            // Average Word Length
            if (words.length > 0) {
                const totalLength = words.reduce((acc, word) => acc + word.replace(/[^a-zA-Z]/g, '').length, 0);
                avgWordLengthEl.textContent = (totalLength / words.length).toFixed(1);
            } else {
                avgWordLengthEl.textContent = '0';
            }

            // Read Time (Avg 200 wpm)
            const minutes = Math.ceil(words.length / 200);
            readTimeEl.textContent = words.length > 0 ? `${minutes}m` : '0m';

            // Difficulty (Simplified ARI - Automated Readability Index)
            if (words.length > 5 && sentences.length > 0) {
                const score = 4.71 * (chars / words.length) + 0.5 * (words.length / sentences.length) - 21.43;
                let level = 'Easy';
                if (score > 14) level = 'Expert';
                else if (score > 10) level = 'Hard';
                else if (score > 6) level = 'Medium';
                difficultyEl.textContent = level;
            } else {
                difficultyEl.textContent = 'N/A';
            }

            // Word Frequency
            updateWordFrequency(words);

            // Letter Frequency
            updateLetterFrequency(text);
        });

        function updateWordFrequency(words) {
            if (words.length === 0) {
                wordFreqEl.innerHTML = '<p class="text-slate-400 italic text-sm">Analysis results will appear as you type...</p>';
                return;
            }

            const freq = {};
            const commonStopWords = ['the', 'a', 'an', 'and', 'or', 'but', 'is', 'are', 'was', 'were', 'to', 'in', 'of', 'for', 'with', 'on', 'at', 'by'];
            
            words.forEach(word => {
                const clean = word.toLowerCase().replace(/[^a-z]/g, '');
                if (clean && !commonStopWords.includes(clean)) {
                    freq[clean] = (freq[clean] || 0) + 1;
                }
            });

            const sorted = Object.entries(freq).sort((a, b) => b[1] - a[1]).slice(0, 15);

            wordFreqEl.innerHTML = '';
            sorted.forEach(([word, count]) => {
                const badge = document.createElement('div');
                badge.className = 'bg-white dark:bg-slate-800 border-2 border-dark dark:border-slate-500 rounded-full px-4 py-1 flex items-center gap-2 shadow-sm animate-pop';
                badge.innerHTML = `
                    <span class="font-bold text-dark dark:text-white">${word}</span>
                    <span class="bg-dark dark:bg-slate-600 text-white text-[10px] px-2 py-0.5 rounded-full font-black">${count}</span>
                `;
                wordFreqEl.appendChild(badge);
            });
        }

        function updateLetterFrequency(text) {
            const counts = {};
            const cleanText = text.toLowerCase().replace(/[^a-z]/g, '');
            
            for (let char of cleanText) {
                counts[char] = (counts[char] || 0) + 1;
            }

            const alphabet = 'abcdefghijklmnopqrstuvwxyz'.split('');
            alphabet.forEach(letter => {
                const el = document.getElementById(`letter-${letter}`);
                const countEl = el.querySelector('.count');
                const count = counts[letter] || 0;
                
                countEl.textContent = count;
                
                // Highlight active letters
                if (count > 0) {
                    el.classList.add('bg-orange/10', 'border-orange');
                    el.classList.remove('bg-slate-50', 'dark:bg-slate-800', 'border-dark');
                } else {
                    el.classList.remove('bg-orange/10', 'border-orange');
                    el.classList.add('bg-slate-50', 'dark:bg-slate-800', 'border-dark');
                }
            });
        }

        function clearAll() {
            inputText.value = '';
            inputText.dispatchEvent(new Event('input'));
        }

        // Persistence
        window.onload = async () => {
            if (typeof requireAuth === 'function') await requireAuth();
            await initPersistence();
            lucide.createIcons();
        };
    </script>
</body>
</html>
