<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>MultiSplitter.io - English 1 Batam</title>

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@400;600;700&display=swap"
            rel="stylesheet"
        />

        <script src="https://cdn.tailwindcss.com"></script>
        <script src="https://unpkg.com/lucide@latest"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

        <script>
            tailwind.config = {
                darkMode: "class",
                theme: {
                    extend: {
                        colors: {
                            "e1-pink": "#FF6B95",
                            "e1-orange": "#FF7E33",
                            "e1-green": "#00D063",
                            "e1-blue": "#1EA7FD",
                            "e1-dark": "#1E293B",
                            "e1-chalk": "#F8FAFC",
                        },
                        fontFamily: {
                            headings: ["Fredoka", "sans-serif"],
                            body: ["Nunito", "sans-serif"],
                        },
                        boxShadow: {
                            neo: "4px 4px 0px 0px rgba(30, 41, 59, 1)",
                            "neo-sm": "2px 2px 0px 0px rgba(30, 41, 59, 1)",
                            "neo-pressed": "inset 2px 2px 0px 0px rgba(30, 41, 59, 1)",
                        },
                        borderWidth: { 3: "3px" },
                    },
                },
            };
        </script>

        <style>
            body {
                background-color: #f8fafc;
                background-image:
                    linear-gradient(rgba(30, 41, 59, 0.05) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(30, 41, 59, 0.05) 1px, transparent 1px);
                background-size: 20px 20px;
            }
            .dark body {
                background-color: #020617;
                background-image:
                    linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            }

            .mode-active {
                background-color: #1e293b !important;
                color: #00d063 !important;
                box-shadow: inset 2px 2px 0px 0px rgba(0, 0, 0, 0.5) !important;
                transform: translate(1px, 1px);
            }

            .cut-handle {
                position: absolute;
                width: 32px;
                height: 32px;
                background-color: white;
                border: 3px solid #1e293b;
                border-radius: 10px;
                font-size: 12px;
                font-weight: 900;
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 50;
                transform: translate(-50%, -50%);
                box-shadow: 3px 3px 0px 0px rgba(30, 41, 59, 1);
                cursor: grab;
                pointer-events: auto;
                transition: transform 0.1s, box-shadow 0.1s;
                user-select: none;
            }
            .cut-handle:hover {
                transform: translate(-50%, -50%) scale(1.1);
            }
            .cut-handle:active {
                cursor: grabbing;
                transform: translate(-50%, -50%) scale(0.95);
                box-shadow: 1px 1px 0px 0px rgba(30, 41, 59, 1);
            }

            .cut-line {
                position: absolute;
                pointer-events: none;
                z-index: 40;
                box-shadow: 0 0 10px rgba(0,0,0,0.1);
            }
            
            .cut-line.active {
                opacity: 1;
                filter: brightness(1.2);
                z-index: 45;
            }

            .grid-overlay-container {
                position: absolute;
                inset: 0;
                pointer-events: none;
                z-index: 30;
            }

            .grid-overlay-container.interactive {
                pointer-events: auto;
            }
        </style>
    </head>

    <body class="font-body text-e1-dark flex flex-col min-h-screen transition-colors duration-200">
        <nav class="w-full bg-white dark:bg-slate-900 border-b-4 border-e1-dark p-4 sticky top-0 z-50">
            <div class="max-w-6xl mx-auto flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <a href="../index.html" class="bg-e1-dark text-white p-2 rounded-xl border-2 border-e1-dark shadow-neo-sm hover:translate-y-[-2px] transition-transform active:translate-y-[2px] active:shadow-none" title="Back to Workshop">
                        <i data-lucide="arrow-left" class="w-5 h-5"></i>
                    </a>
                    <div class="flex items-center gap-3">
                        <div class="bg-e1-pink p-2 rounded-xl border-2 border-e1-dark shadow-neo-sm">
                            <i data-lucide="scissors" class="text-white w-6 h-6"></i>
                        </div>
                        <h1 class="font-headings text-2xl font-bold tracking-wide dark:text-white">
                            MultiSplitter<span class="text-e1-blue">.io</span>
                        </h1>
                    </div>
                </div>

                <button onclick="toggleDarkMode()" class="bg-e1-dark text-white p-2 rounded-xl border-2 border-e1-dark shadow-neo-sm hover:translate-y-[-1px] transition-transform" title="Toggle Dark Mode">
                    <i data-lucide="moon" class="w-5 h-5 hidden dark:block" id="moon-icon"></i>
                    <i data-lucide="sun" class="w-5 h-5 block dark:hidden" id="sun-icon"></i>
                </button>
            </div>
        </nav>

        <main class="flex-grow max-w-6xl mx-auto w-full p-4 lg:p-8 flex flex-col lg:flex-row gap-8">
            <aside class="w-full lg:w-1/3 flex flex-col gap-6">
                <!-- STEP 1: UPLOAD -->
                <div class="bg-white dark:bg-slate-900 p-6 rounded-2xl border-4 border-e1-dark shadow-neo relative overflow-hidden">
                    <div class="absolute top-0 right-0 bg-e1-orange text-white text-xs font-bold px-3 py-1 border-l-2 border-b-2 border-e1-dark rounded-bl-xl font-headings">STEP 1</div>
                    <h2 class="font-headings text-xl font-bold mb-4 flex items-center gap-2 dark:text-white">
                        <i data-lucide="upload-cloud" class="w-5 h-5 text-e1-orange"></i> Upload
                    </h2>
                    <label class="block border-3 border-dashed border-slate-300 dark:border-slate-700 rounded-xl bg-slate-50 dark:bg-slate-800/50 h-24 flex flex-col items-center justify-center cursor-pointer hover:bg-blue-50 dark:hover:bg-slate-800 transition-colors group relative">
                        <input type="file" id="fileInput" accept="image/*" class="hidden" />
                        <div class="flex items-center gap-2 group-hover:scale-105 transition-transform">
                            <i data-lucide="image-plus" class="w-6 h-6 text-e1-blue"></i>
                            <span class="font-bold text-slate-500 dark:text-slate-400 text-sm">Select Image</span>
                        </div>
                    </label>
                </div>

                <!-- STEP 2: SETTINGS -->
                <div class="bg-white dark:bg-slate-900 p-6 rounded-2xl border-4 border-e1-dark shadow-neo relative opacity-50 pointer-events-none transition-all duration-300" id="configCard">
                    <div class="absolute top-0 right-0 bg-e1-blue text-white text-xs font-bold px-3 py-1 border-l-2 border-b-2 border-e1-dark rounded-bl-xl font-headings">STEP 2</div>
                    <h2 class="font-headings text-xl font-bold mb-4 flex items-center gap-2 dark:text-white">
                        <i data-lucide="sliders" class="w-5 h-5 text-e1-green"></i> Settings
                    </h2>

                    <div class="bg-slate-100 dark:bg-slate-800 p-1 rounded-xl border-2 border-e1-dark flex mb-6 shadow-inner">
                        <button onclick="setAppMode('equal')" id="mode-equal" class="flex-1 py-2 rounded-lg font-bold text-sm transition-all mode-active">Equal Grid</button>
                        <button onclick="setAppMode('custom')" id="mode-custom" class="flex-1 py-2 rounded-lg font-bold text-sm transition-all text-slate-500 dark:text-slate-400 hover:bg-white dark:hover:bg-slate-700">Custom Multi</button>
                    </div>

                    <div id="equalControls" class="space-y-4">
                        <div class="flex items-center gap-2 mb-2">
                            <span class="w-2 h-2 rounded-full bg-e1-pink"></span>
                            <p class="text-xs text-slate-500 font-bold uppercase tracking-tighter">Auto-Divide Grid</p>
                        </div>
                        <div class="space-y-4">
                            <div>
                                <div class="flex justify-between mb-1">
                                    <label class="font-bold text-sm dark:text-slate-300 text-slate-600">Rows</label>
                                    <span id="eqRowsVal" class="font-headings font-bold bg-e1-dark text-white px-2 rounded text-sm">2</span>
                                </div>
                                <input type="range" id="eqRowsInput" min="1" max="10" value="2" class="w-full accent-e1-blue" />
                            </div>
                            <div>
                                <div class="flex justify-between mb-1">
                                    <label class="font-bold text-sm dark:text-slate-300 text-slate-600">Columns</label>
                                    <span id="eqColsVal" class="font-headings font-bold bg-e1-dark text-white px-2 rounded text-sm">2</span>
                                </div>
                                <input type="range" id="eqColsInput" min="1" max="10" value="2" class="w-full accent-e1-pink" />
                            </div>
                        </div>
                    </div>

                    <div id="customControls" class="space-y-6 hidden">
                        <div class="flex items-center gap-2 mb-2">
                            <span class="w-2 h-2 rounded-full bg-e1-orange"></span>
                            <p class="text-xs text-slate-500 font-bold uppercase tracking-tighter">Manual Cut Lines</p>
                        </div>
                        
                        <div class="space-y-4">
                            <!-- Rows Control -->
                            <div class="bg-blue-50/30 dark:bg-blue-900/10 p-3 rounded-xl border-2 border-e1-blue/20">
                                <div class="flex items-center justify-between mb-2">
                                    <label class="font-bold text-sm text-e1-blue flex items-center gap-2">
                                        <i data-lucide="rows" class="w-4 h-4"></i> Row Count
                                    </label>
                                    <div class="flex items-center gap-1">
                                        <button onclick="adjustCustomCount('row', -1)" class="w-8 h-8 bg-white dark:bg-slate-700 border-2 border-e1-dark rounded-lg hover:bg-slate-100 dark:hover:bg-slate-600 font-black">-</button>
                                        <span id="custRowCount" class="font-headings font-bold text-lg w-8 text-center dark:text-white">2</span>
                                        <button onclick="adjustCustomCount('row', 1)" class="w-8 h-8 bg-white dark:bg-slate-700 border-2 border-e1-dark rounded-lg hover:bg-slate-100 dark:hover:bg-slate-600 font-black">+</button>
                                    </div>
                                </div>
                                <p class="text-[10px] text-slate-400 font-bold uppercase">Drag the BLUE lines on the image</p>
                            </div>

                            <!-- Cols Control -->
                            <div class="bg-pink-50/30 dark:bg-pink-900/10 p-3 rounded-xl border-2 border-e1-pink/20">
                                <div class="flex items-center justify-between mb-2">
                                    <label class="font-bold text-sm text-e1-pink flex items-center gap-2">
                                        <i data-lucide="columns" class="w-4 h-4"></i> Column Count
                                    </label>
                                    <div class="flex items-center gap-1">
                                        <button onclick="adjustCustomCount('col', -1)" class="w-8 h-8 bg-white dark:bg-slate-700 border-2 border-e1-dark rounded-lg hover:bg-slate-100 dark:hover:bg-slate-600 font-black">-</button>
                                        <span id="custColCount" class="font-headings font-bold text-lg w-8 text-center dark:text-white">2</span>
                                        <button onclick="adjustCustomCount('col', 1)" class="w-8 h-8 bg-white dark:bg-slate-700 border-2 border-e1-dark rounded-lg hover:bg-slate-100 dark:hover:bg-slate-600 font-black">+</button>
                                    </div>
                                </div>
                                <p class="text-[10px] text-slate-400 font-bold uppercase">Drag the PINK lines on the image</p>
                            </div>
                        </div>
                    </div>

                    <button id="downloadBtn" class="w-full mt-8 bg-e1-green text-e1-dark font-headings font-bold text-lg py-4 px-4 rounded-2xl border-4 border-e1-dark shadow-neo hover:translate-y-[-4px] active:translate-y-[4px] active:shadow-none transition-all flex items-center justify-center gap-2 group">
                        <i data-lucide="download" class="group-hover:animate-bounce"></i> Download ZIP
                    </button>
                    <p id="statusMsg" class="text-center text-xs font-bold text-e1-blue mt-2 h-4 uppercase tracking-widest"></p>
                </div>
            </aside>

            <section class="w-full lg:w-2/3">
                <div class="bg-white dark:bg-slate-900 p-2 rounded-[2rem] border-4 border-e1-dark shadow-neo h-full min-h-[600px] flex flex-col relative overflow-hidden">
                    <div class="absolute top-6 left-6 z-10 bg-white/90 dark:bg-slate-800/90 backdrop-blur border-3 border-e1-dark px-4 py-2 rounded-2xl shadow-neo-sm">
                        <h2 class="font-headings text-sm font-bold flex items-center gap-2 dark:text-white">
                            <i data-lucide="eye" class="text-e1-blue w-5 h-5"></i> Live Preview
                        </h2>
                    </div>

                    <div class="flex-grow bg-slate-100 dark:bg-slate-800 rounded-[1.5rem] border-2 border-dashed border-slate-300 dark:border-slate-700 flex items-center justify-center overflow-hidden relative m-1 p-8" id="previewContainer">
                        <div id="emptyState" class="text-center p-6 animate-pulse">
                            <div class="inline-block bg-white dark:bg-slate-700 p-6 rounded-[2rem] border-4 border-e1-dark shadow-neo mb-6">
                                <i data-lucide="layout-grid" class="w-16 h-16 text-slate-300"></i>
                            </div>
                            <p class="text-slate-400 font-bold font-headings text-xl">Waiting for image...</p>
                        </div>

                        <div class="relative inline-block" id="interactionWrapper">
                            <canvas id="mainCanvas" class="hidden shadow-2xl border-4 border-e1-dark relative z-10 rounded-lg"></canvas>
                            <div id="gridOverlay" class="grid-overlay-container"></div>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <script>
            lucide.createIcons();

            // --- GLOBAL STATE ---
            const state = {
                currentImage: null,
                mode: "equal", // 'equal' | 'custom'
                customCounts: { row: 2, col: 2 },
                customCuts: {
                    rows: [], // Percentages
                    cols: []
                },
                dragging: null // { type: 'row'|'col', index: number }
            };

            const elements = {
                fileInput: document.getElementById("fileInput"),
                configCard: document.getElementById("configCard"),
                emptyState: document.getElementById("emptyState"),
                mainCanvas: document.getElementById("mainCanvas"),
                gridOverlay: document.getElementById("gridOverlay"),
                previewContainer: document.getElementById("previewContainer"),
                statusMsg: document.getElementById("statusMsg"),
                downloadBtn: document.getElementById("downloadBtn"),
                modeEqualBtn: document.getElementById("mode-equal"),
                modeCustomBtn: document.getElementById("mode-custom"),
                equalControls: document.getElementById("equalControls"),
                customControls: document.getElementById("customControls"),
                eqRowsInput: document.getElementById("eqRowsInput"),
                eqColsInput: document.getElementById("eqColsInput"),
                eqRowsVal: document.getElementById("eqRowsVal"),
                eqColsVal: document.getElementById("eqColsVal"),
                custRowCount: document.getElementById("custRowCount"),
                custColCount: document.getElementById("custColCount"),
                interactionWrapper: document.getElementById("interactionWrapper")
            };

            const ctx = elements.mainCanvas.getContext("2d");

            // --- EVENT LISTENERS ---
            elements.fileInput.addEventListener("change", handleUpload);
            elements.downloadBtn.addEventListener("click", generateZip);
            elements.eqRowsInput.addEventListener("input", (e) => {
                elements.eqRowsVal.innerText = e.target.value;
                renderPreview();
            });
            elements.eqColsInput.addEventListener("input", (e) => {
                elements.eqColsVal.innerText = e.target.value;
                renderPreview();
            });
            window.addEventListener("resize", () => { if (state.currentImage) renderPreview(); });

            // Dragging events
            document.addEventListener("mousemove", handleDragMove);
            document.addEventListener("mouseup", handleDragEnd);
            document.addEventListener("touchmove", (e) => handleDragMove(e.touches[0]), { passive: false });
            document.addEventListener("touchend", handleDragEnd);

            function handleUpload(e) {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (evt) => {
                    const img = new Image();
                    img.onload = () => {
                        state.currentImage = img;
                        elements.configCard.classList.remove("opacity-50", "pointer-events-none");
                        elements.emptyState.classList.add("hidden");
                        elements.mainCanvas.classList.remove("hidden");
                        initCustomCuts();
                        renderPreview();
                    };
                    img.src = evt.target.result;
                };
                reader.readAsDataURL(file);
            }

            function initCustomCuts() {
                state.customCuts.rows = [];
                state.customCuts.cols = [];
                for (let i = 1; i < state.customCounts.row; i++) {
                    state.customCuts.rows.push(Math.round((i / state.customCounts.row) * 100));
                }
                for (let i = 1; i < state.customCounts.col; i++) {
                    state.customCuts.cols.push(Math.round((i / state.customCounts.col) * 100));
                }
            }

            window.setAppMode = function (mode) {
                state.mode = mode;
                elements.modeEqualBtn.classList.toggle("mode-active", mode === "equal");
                elements.modeCustomBtn.classList.toggle("mode-active", mode === "custom");
                elements.equalControls.classList.toggle("hidden", mode !== "equal");
                elements.customControls.classList.toggle("hidden", mode !== "custom");
                elements.gridOverlay.classList.toggle("interactive", mode === "custom");
                renderPreview();
            };

            window.adjustCustomCount = function (type, delta) {
                const key = type === 'row' ? 'row' : 'col';
                state.customCounts[key] = Math.max(1, Math.min(10, state.customCounts[key] + delta));
                
                if (type === 'row') {
                    elements.custRowCount.innerText = state.customCounts.row;
                    syncCuts(state.customCuts.rows, state.customCounts.row);
                } else {
                    elements.custColCount.innerText = state.customCounts.col;
                    syncCuts(state.customCuts.cols, state.customCounts.col);
                }
                renderPreview();
            };

            function syncCuts(arr, targetCount) {
                const targetCuts = targetCount - 1;
                while (arr.length < targetCuts) {
                    const lastVal = arr.length > 0 ? arr[arr.length - 1] : 0;
                    arr.push(Math.min(99, lastVal + 10));
                }
                while (arr.length > targetCuts) arr.pop();
                arr.sort((a, b) => a - b);
            }

            function renderPreview() {
                if (!state.currentImage) return;
                const boxW = elements.previewContainer.clientWidth - 80;
                const boxH = elements.previewContainer.clientHeight - 80;
                const img = state.currentImage;
                const scale = Math.min(boxW / img.width, boxH / img.height);
                const dispW = img.width * scale;
                const dispH = img.height * scale;

                elements.mainCanvas.width = dispW;
                elements.mainCanvas.height = dispH;
                ctx.drawImage(img, 0, 0, dispW, dispH);

                const overlay = elements.gridOverlay;
                overlay.style.width = `${dispW}px`;
                overlay.style.height = `${dispH}px`;
                overlay.innerHTML = "";

                if (state.mode === "equal") {
                    drawEqualGrid(dispW, dispH);
                } else {
                    drawCustomGrid(dispW, dispH);
                }
            }

            function drawEqualGrid(w, h) {
                const rows = parseInt(elements.eqRowsInput.value);
                const cols = parseInt(elements.eqColsInput.value);
                for (let i = 1; i < cols; i++) createLine(i * (w / cols), 0, 3, h, "#FF6B95", false);
                for (let i = 1; i < rows; i++) createLine(0, i * (h / rows), w, 3, "#FF6B95", false);
            }

            function drawCustomGrid(w, h) {
                state.customCuts.rows.forEach((pct, idx) => {
                    createLine(0, (pct / 100) * h, w, 4, "#1EA7FD", true, 'row', idx);
                });
                state.customCuts.cols.forEach((pct, idx) => {
                    createLine((pct / 100) * w, 0, 4, h, "#FF6B95", true, 'col', idx);
                });
            }

            function createLine(x, y, w, h, color, interactive, type, index) {
                const line = document.createElement("div");
                line.className = "cut-line";
                if (state.dragging && state.dragging.type === type && state.dragging.index === index) {
                    line.classList.add('active');
                }
                line.style.backgroundColor = color;
                line.style.left = `${x}px`;
                line.style.top = `${y}px`;
                line.style.width = `${w}px`;
                line.style.height = `${h}px`;
                elements.gridOverlay.appendChild(line);

                if (interactive) {
                    const handle = document.createElement("div");
                    handle.className = "cut-handle";
                    handle.style.left = w > h ? "50%" : `${x}px`;
                    handle.style.top = h > w ? "50%" : `${y}px`;
                    handle.style.borderColor = color;
                    handle.style.color = color;
                    handle.innerText = index + 1;
                    
                    const startDrag = (e) => {
                        e.preventDefault();
                        e.stopPropagation();
                        state.dragging = { type, index };
                        renderPreview();
                    };
                    
                    handle.addEventListener("mousedown", startDrag);
                    handle.addEventListener("touchstart", (e) => startDrag(e.touches[0]), { passive: false });
                    
                    elements.gridOverlay.appendChild(handle);
                }
            }

            function handleDragMove(e) {
                if (!state.dragging || !state.currentImage) return;

                const rect = elements.gridOverlay.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;

                if (state.dragging.type === 'row') {
                    let pct = Math.round((y / rect.height) * 100);
                    state.customCuts.rows[state.dragging.index] = Math.max(1, Math.min(99, pct));
                } else {
                    let pct = Math.round((x / rect.width) * 100);
                    state.customCuts.cols[state.dragging.index] = Math.max(1, Math.min(99, pct));
                }
                
                // Sorting to prevent line overlapping issues
                state.customCuts.rows.sort((a, b) => a - b);
                state.customCuts.cols.sort((a, b) => a - b);
                
                renderPreview();
            }

            function handleDragEnd() {
                if (state.dragging) {
                    state.dragging = null;
                    renderPreview();
                }
            }

            async function generateZip() {
                if (!state.currentImage) return;
                elements.statusMsg.innerText = "SLICING...";
                elements.downloadBtn.disabled = true;

                const zip = new JSZip();
                const img = state.currentImage;
                const w = img.width, h = img.height;
                let yStops = [], xStops = [];

                if (state.mode === "equal") {
                    const r = parseInt(elements.eqRowsInput.value), c = parseInt(elements.eqColsInput.value);
                    for (let i = 0; i <= r; i++) yStops.push((i / r) * h);
                    for (let i = 0; i <= c; i++) xStops.push((i / c) * w);
                } else {
                    yStops = [0, ...state.customCuts.rows.map(p => (p / 100) * h), h];
                    xStops = [0, ...state.customCuts.cols.map(p => (p / 100) * w), w];
                }

                const canvas = document.createElement("canvas");
                const ctxS = canvas.getContext("2d");

                for (let r = 0; r < yStops.length - 1; r++) {
                    for (let c = 0; c < xStops.length - 1; c++) {
                        const y = yStops[r], height = yStops[r + 1] - y;
                        const x = xStops[c], width = xStops[c + 1] - x;
                        if (width < 1 || height < 1) continue;
                        canvas.width = width; canvas.height = height;
                        ctxS.drawImage(img, x, y, width, height, 0, 0, width, height);
                        const blob = await new Promise(res => canvas.toBlob(res, "image/png"));
                        zip.file(`slice_r${r+1}_c${c+1}.png`, blob);
                    }
                }

                const content = await zip.generateAsync({ type: "blob" });
                saveAs(content, "multisplitter_images.zip");
                elements.statusMsg.innerText = "DONE!";
                elements.downloadBtn.disabled = false;
                setTimeout(() => elements.statusMsg.innerText = "", 3000);
            }

            window.toggleDarkMode = function () {
                document.documentElement.classList.toggle("dark");
                localStorage.theme = document.documentElement.classList.contains("dark") ? "dark" : "light";
            };
            
            if (localStorage.theme === "dark" || (!("theme" in localStorage) && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
                document.documentElement.classList.add("dark");
            }
        </script>
    </body>
</html>
