<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>MultiSplitter.io - KlassKit</title>

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@400;600;700;800&display=swap"
            rel="stylesheet"
        />

        <script src="https://cdn.tailwindcss.com"></script>
        <script src="https://unpkg.com/lucide@latest"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

        <script>
            tailwind.config = {
                darkMode: "class",
                theme: {
                    extend: {
                        colors: {
                            'pink': '#ff4785',
                            'orange': '#ff7e33',
                            'green': '#00d063',
                            'blue': '#1ea7fd',
                            'dark': '#0f172a',
                            'chalk': '#f8fafc',
                        },
                        fontFamily: {
                            heading: ["Fredoka", "sans-serif"],
                            body: ["Nunito", "sans-serif"],
                        },
                        boxShadow: {
                            'hard': '4px 4px 0px 0px #0f172a',
                            'hard-hover': '8px 8px 0px 0px #0f172a',
                        },
                        borderWidth: { 3: "3px" },
                    },
                },
            };
        </script>

        <style>
            body {
                background-color: #f8fafc;
                background-image:
                    linear-gradient(#cbd5e1 1px, transparent 1px),
                    linear-gradient(90deg, #cbd5e1 1px, transparent 1px);
                background-size: 30px 30px;
            }
            .dark body {
                background-color: #020617;
                background-image:
                    linear-gradient(#0f172a 1px, transparent 1px),
                    linear-gradient(90deg, #0f172a 1px, transparent 1px);
            }

            .mode-active {
                background-color: #0f172a !important;
                color: #00d063 !important;
                box-shadow: inset 2px 2px 0px 0px rgba(0, 0, 0, 0.5) !important;
                transform: translate(1px, 1px);
            }

            .btn-chunky {
                transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            }
            .btn-chunky:hover:not(:disabled) {
                transform: translateY(-4px);
                box-shadow: 8px 8px 0px 0px #0f172a;
            }
            .btn-chunky:active:not(:disabled) {
                transform: translateY(4px);
                box-shadow: 0px 0px 0px 0px #0f172a;
            }

            .cut-handle {
                position: absolute;
                width: 44px;
                height: 44px;
                background-color: white;
                border: 3px solid #0f172a;
                border-radius: 12px;
                font-size: 14px;
                font-weight: 900;
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 50;
                transform: translate(-50%, -50%);
                box-shadow: 4px 4px 0px 0px #0f172a;
                cursor: grab;
                pointer-events: auto;
                transition: transform 0.15s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.15s;
                user-select: none;
                touch-action: none;
            }
            .cut-handle:hover { transform: translate(-50%, -50%) scale(1.1); }
            .cut-handle.dragging {
                cursor: grabbing;
                transform: translate(-50%, -50%) scale(1.3);
                box-shadow: 8px 8px 0px 0px #0f172a;
                z-index: 60;
                background-color: #f8fafc;
            }
            .cut-handle:active {
                transform: translate(-50%, -50%) scale(0.95);
                box-shadow: 1px 1px 0px 0px #0f172a;
            }

            .cut-line {
                position: absolute;
                pointer-events: none;
                z-index: 40;
                box-shadow: 0 0 10px rgba(0,0,0,0.1);
            }
            .cut-line.active { opacity: 1; filter: brightness(1.2); z-index: 45; }

            .grid-overlay-container { position: absolute; inset: 0; pointer-events: none; z-index: 30; }
            .grid-overlay-container.interactive { pointer-events: auto; }
        </style>
    </head>

    <body class="font-body text-dark dark:text-chalk min-h-screen p-4 md:p-8">
        <main class="max-w-7xl mx-auto">
            <!-- Header -->
            <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
                <div class="flex items-center gap-4">
                    <a href="../index.html" class="bg-white dark:bg-slate-800 border-4 border-dark dark:border-slate-500 p-3 rounded-2xl shadow-hard btn-chunky">
                        <i data-lucide="arrow-left" class="w-6 h-6"></i>
                    </a>
                    <div>
                        <h1 class="font-heading font-bold text-3xl md:text-4xl">MULTI <span class="text-pink">SPLITTER</span></h1>
                        <p class="text-slate-500 dark:text-slate-400 font-bold text-sm">Slice images into classroom grids</p>
                    </div>
                </div>
                
                <button id="themeToggle" class="bg-white dark:bg-slate-800 border-4 border-dark dark:border-slate-500 p-3 rounded-2xl shadow-hard btn-chunky">
                    <i data-lucide="sun" class="w-6 h-6 hidden dark:block"></i>
                    <i data-lucide="moon" class="w-6 h-6 block dark:hidden"></i>
                </button>
            </header>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                <aside class="lg:col-span-4 flex flex-col gap-6">
                    <!-- Step 1: Upload -->
                    <div class="bg-white dark:bg-slate-900 border-4 border-dark dark:border-slate-500 rounded-[2rem] p-6 shadow-hard relative overflow-hidden group">
                        <div class="absolute top-0 right-0 bg-orange text-dark font-heading font-bold px-4 py-1 border-b-4 border-l-4 border-dark rounded-bl-2xl">STEP 1</div>
                        <h2 class="font-heading font-bold text-xl mb-4 flex items-center gap-2">
                            <i data-lucide="upload-cloud" class="text-blue"></i> UPLOAD
                        </h2>
                        <label class="block cursor-pointer">
                            <input type="file" id="fileInput" accept="image/*" class="hidden" />
                            <div class="border-4 border-dashed border-slate-200 dark:border-slate-700 rounded-2xl p-8 text-center hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors">
                                <i data-lucide="image-plus" class="w-10 h-10 mx-auto mb-3 text-slate-300"></i>
                                <p class="font-bold text-slate-500 text-sm">Select Image</p>
                            </div>
                        </label>
                    </div>

                    <!-- Step 2: Settings -->
                    <div class="bg-white dark:bg-slate-900 border-4 border-dark dark:border-slate-500 rounded-[2rem] p-6 shadow-hard relative opacity-50 pointer-events-none transition-all duration-300" id="configCard">
                        <div class="absolute top-0 right-0 bg-blue text-white font-heading font-bold px-4 py-1 border-b-4 border-l-4 border-dark rounded-bl-2xl">STEP 2</div>
                        <h2 class="font-heading font-bold text-xl mb-4 flex items-center gap-2">
                            <i data-lucide="sliders" class="text-green"></i> SETTINGS
                        </h2>

                        <div class="bg-slate-100 dark:bg-slate-800 p-1 rounded-xl border-2 border-dark flex mb-6 shadow-inner">
                            <button onclick="setAppMode('equal')" id="mode-equal" class="flex-1 py-2 rounded-lg font-bold text-sm transition-all mode-active">Equal Grid</button>
                            <button onclick="setAppMode('custom')" id="mode-custom" class="flex-1 py-2 rounded-lg font-bold text-sm transition-all text-slate-500 dark:text-slate-400 hover:bg-white dark:hover:bg-slate-700">Custom Multi</button>
                        </div>

                        <div id="equalControls" class="space-y-6">
                            <div>
                                <div class="flex justify-between mb-1">
                                    <label class="font-bold text-sm text-slate-500 uppercase tracking-widest">Rows</label>
                                    <span id="eqRowsVal" class="font-heading font-bold bg-dark text-white px-2 rounded text-sm">2</span>
                                </div>
                                <input type="range" id="eqRowsInput" min="1" max="10" value="2" class="w-full" />
                            </div>
                            <div>
                                <div class="flex justify-between mb-1">
                                    <label class="font-bold text-sm text-slate-500 uppercase tracking-widest">Columns</label>
                                    <span id="eqColsVal" class="font-heading font-bold bg-dark text-white px-2 rounded text-sm">2</span>
                                </div>
                                <input type="range" id="eqColsInput" min="1" max="10" value="2" class="w-full" />
                            </div>
                        </div>

                        <div id="customControls" class="space-y-6 hidden">
                            <div class="bg-slate-50 dark:bg-slate-800 p-4 rounded-2xl border-2 border-dark">
                                <div class="flex items-center justify-between mb-3">
                                    <label class="font-bold text-sm flex items-center gap-2"><i data-lucide="rows" class="w-4 h-4 text-blue"></i> Row Count</label>
                                    <div class="flex items-center gap-1">
                                        <button onclick="adjustCustomCount('row', -1)" class="w-8 h-8 bg-white dark:bg-slate-700 border-2 border-dark rounded-lg font-black">-</button>
                                        <span id="custRowCount" class="font-heading font-bold text-lg w-8 text-center">2</span>
                                        <button onclick="adjustCustomCount('row', 1)" class="w-8 h-8 bg-white dark:bg-slate-700 border-2 border-dark rounded-lg font-black">+</button>
                                    </div>
                                </div>
                                <div class="flex items-center justify-between">
                                    <label class="font-bold text-sm flex items-center gap-2"><i data-lucide="columns" class="w-4 h-4 text-pink"></i> Col Count</label>
                                    <div class="flex items-center gap-1">
                                        <button onclick="adjustCustomCount('col', -1)" class="w-8 h-8 bg-white dark:bg-slate-700 border-2 border-dark rounded-lg font-black">-</button>
                                        <span id="custColCount" class="font-heading font-bold text-lg w-8 text-center">2</span>
                                        <button onclick="adjustCustomCount('col', 1)" class="w-8 h-8 bg-white dark:bg-slate-700 border-2 border-dark rounded-lg font-black">+</button>
                                    </div>
                                </div>
                            </div>
                            <p class="text-[10px] text-slate-400 font-black uppercase text-center tracking-widest">Drag lines on the image</p>
                        </div>

                        <button id="downloadBtn" class="w-full mt-8 bg-green text-dark font-heading font-bold text-xl py-5 rounded-2xl border-4 border-dark shadow-hard btn-chunky flex items-center justify-center gap-2 group">
                            <i data-lucide="download" class="group-hover:animate-bounce"></i> DOWNLOAD ZIP
                        </button>
                        <p id="statusMsg" class="text-center text-xs font-black text-blue mt-3 uppercase tracking-widest h-4"></p>
                    </div>
                </aside>

                <section class="lg:col-span-8">
                    <div class="bg-white dark:bg-slate-900 border-4 border-dark dark:border-slate-500 rounded-[2rem] p-2 shadow-hard h-full min-h-[600px] flex flex-col relative overflow-hidden">
                        <div class="absolute top-6 left-6 z-10 bg-white/90 dark:bg-slate-800/90 backdrop-blur border-3 border-dark px-4 py-2 rounded-2xl shadow-hard">
                            <h2 class="font-heading text-sm font-bold flex items-center gap-2">
                                <i data-lucide="eye" class="text-blue w-5 h-5"></i> Live Preview
                            </h2>
                        </div>

                        <div class="flex-grow bg-slate-100 dark:bg-slate-800 rounded-[1.5rem] border-2 border-dashed border-slate-300 dark:border-slate-700 flex items-center justify-center overflow-hidden relative m-1 p-8" id="previewContainer">
                            <div id="emptyState" class="text-center animate-pulse">
                                <div class="inline-block bg-white dark:bg-slate-700 p-6 rounded-[2rem] border-4 border-dark shadow-hard mb-6">
                                    <i data-lucide="layout-grid" class="w-16 h-16 text-slate-300"></i>
                                </div>
                                <p class="text-slate-400 font-bold font-heading text-xl">Waiting for image...</p>
                            </div>

                            <div class="relative inline-block touch-none" id="interactionWrapper">
                                <canvas id="mainCanvas" class="hidden shadow-2xl border-4 border-dark relative z-10 rounded-lg"></canvas>
                                <div id="gridOverlay" class="grid-overlay-container"></div>
                            </div>
                        </div>
                    </div>
                </section>
            </div>
        </main>

        <script>
            lucide.createIcons();

            const state = {
                currentImage: null,
                mode: "equal",
                customCounts: { row: 2, col: 2 },
                customCuts: { rows: [], cols: [] },
                dragging: null
            };

            const elements = {
                fileInput: document.getElementById("fileInput"),
                configCard: document.getElementById("configCard"),
                emptyState: document.getElementById("emptyState"),
                mainCanvas: document.getElementById("mainCanvas"),
                gridOverlay: document.getElementById("gridOverlay"),
                previewContainer: document.getElementById("previewContainer"),
                statusMsg: document.getElementById("statusMsg"),
                downloadBtn: document.getElementById("downloadBtn"),
                modeEqualBtn: document.getElementById("mode-equal"),
                modeCustomBtn: document.getElementById("mode-custom"),
                equalControls: document.getElementById("equalControls"),
                customControls: document.getElementById("customControls"),
                eqRowsInput: document.getElementById("eqRowsInput"),
                eqColsInput: document.getElementById("eqColsInput"),
                eqRowsVal: document.getElementById("eqRowsVal"),
                eqColsVal: document.getElementById("eqColsVal"),
                custRowCount: document.getElementById("custRowCount"),
                custColCount: document.getElementById("custColCount"),
                interactionWrapper: document.getElementById("interactionWrapper")
            };

            const ctx = elements.mainCanvas.getContext("2d");

            // Theme Handling
            const themeToggle = document.getElementById('themeToggle');
            if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            }
            themeToggle.addEventListener('click', () => {
                document.documentElement.classList.toggle('dark');
                localStorage.theme = document.documentElement.classList.contains('dark') ? 'dark' : 'light';
            });

            elements.fileInput.addEventListener("change", handleUpload);
            elements.downloadBtn.addEventListener("click", generateZip);
            elements.eqRowsInput.addEventListener("input", (e) => { elements.eqRowsVal.innerText = e.target.value; renderPreview(); });
            elements.eqColsInput.addEventListener("input", (e) => { elements.eqColsVal.innerText = e.target.value; renderPreview(); });
            window.addEventListener("resize", () => { if (state.currentImage) renderPreview(); });

            // Pointer Events for unified Mouse & Touch support
            document.addEventListener("pointermove", handleDragMove);
            document.addEventListener("pointerup", handleDragEnd);
            document.addEventListener("pointercancel", handleDragEnd);

            function handleUpload(e) {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (evt) => {
                    const img = new Image();
                    img.onload = () => {
                        state.currentImage = img;
                        elements.configCard.classList.remove("opacity-50", "pointer-events-none");
                        elements.emptyState.classList.add("hidden");
                        elements.mainCanvas.classList.remove("hidden");
                        initCustomCuts();
                        renderPreview();
                    };
                    img.src = evt.target.result;
                };
                reader.readAsDataURL(file);
            }

            function initCustomCuts() {
                state.customCuts.rows = []; state.customCuts.cols = [];
                for (let i = 1; i < state.customCounts.row; i++) state.customCuts.rows.push(Math.round((i / state.customCounts.row) * 100));
                for (let i = 1; i < state.customCounts.col; i++) state.customCuts.cols.push(Math.round((i / state.customCounts.col) * 100));
            }

            window.setAppMode = function (mode) {
                state.mode = mode;
                elements.modeEqualBtn.classList.toggle("mode-active", mode === "equal");
                elements.modeCustomBtn.classList.toggle("mode-active", mode === "custom");
                elements.equalControls.classList.toggle("hidden", mode !== "equal");
                elements.customControls.classList.toggle("hidden", mode !== "custom");
                elements.gridOverlay.classList.toggle("interactive", mode === "custom");
                renderPreview();
            };

            window.adjustCustomCount = function (type, delta) {
                const key = type === 'row' ? 'row' : 'col';
                state.customCounts[key] = Math.max(1, Math.min(10, state.customCounts[key] + delta));
                if (type === 'row') { elements.custRowCount.innerText = state.customCounts.row; syncCuts(state.customCuts.rows, state.customCounts.row); } 
                else { elements.custColCount.innerText = state.customCounts.col; syncCuts(state.customCuts.cols, state.customCounts.col); }
                renderPreview();
            };

            function syncCuts(arr, targetCount) {
                const targetCuts = targetCount - 1;
                while (arr.length < targetCuts) { const lastVal = arr.length > 0 ? arr[arr.length - 1] : 0; arr.push(Math.min(99, lastVal + 10)); }
                while (arr.length > targetCuts) arr.pop();
                arr.sort((a, b) => a - b);
            }

            function renderPreview() {
                if (!state.currentImage) return;
                const boxW = elements.previewContainer.clientWidth - 80;
                const boxH = elements.previewContainer.clientHeight - 80;
                const img = state.currentImage;
                const scale = Math.min(boxW / img.width, boxH / img.height);
                const dispW = img.width * scale, dispH = img.height * scale;
                elements.mainCanvas.width = dispW; elements.mainCanvas.height = dispH;
                ctx.drawImage(img, 0, 0, dispW, dispH);
                const overlay = elements.gridOverlay;
                overlay.style.width = `${dispW}px`; overlay.style.height = `${dispH}px`;
                overlay.innerHTML = "";
                if (state.mode === "equal") drawEqualGrid(dispW, dispH); else drawCustomGrid(dispW, dispH);
            }

            function drawEqualGrid(w, h) {
                const rows = parseInt(elements.eqRowsInput.value), cols = parseInt(elements.eqColsInput.value);
                for (let i = 1; i < cols; i++) createLine(i * (w / cols), 0, 3, h, "#ff4785", false);
                for (let i = 1; i < rows; i++) createLine(0, i * (h / rows), w, 3, "#ff4785", false);
            }

            function drawCustomGrid(w, h) {
                state.customCuts.rows.forEach((pct, idx) => createLine(0, (pct / 100) * h, w, 4, "#1ea7fd", true, 'row', idx));
                state.customCuts.cols.forEach((pct, idx) => createLine((pct / 100) * w, 0, 4, h, "#ff4785", true, 'col', idx));
            }

            function createLine(x, y, w, h, color, interactive, type, index) {
                const line = document.createElement("div"); line.className = "cut-line";
                if (state.dragging && state.dragging.type === type && state.dragging.index === index) line.classList.add('active');
                line.style.backgroundColor = color; line.style.left = `${x}px`; line.style.top = `${y}px`; line.style.width = `${w}px`; line.style.height = `${h}px`;
                elements.gridOverlay.appendChild(line);
                if (interactive) {
                    const handle = document.createElement("div");
                    handle.className = "cut-handle";
                    if (state.dragging && state.dragging.type === type && state.dragging.index === index) {
                        handle.classList.add('dragging');
                    }
                    handle.style.left = w > h ? "50%" : `${x}px`;
                    handle.style.top = h > w ? "50%" : `${y}px`;
                    handle.style.borderColor = color;
                    handle.style.color = color;
                    handle.innerText = index + 1;
                    
                    const startDrag = (e) => {
                        e.preventDefault();
                        e.stopPropagation();
                        // Capture pointer to track movement even outside the handle
                        e.target.setPointerCapture(e.pointerId);
                        state.dragging = { type, index };
                        if (navigator.vibrate) navigator.vibrate(10);
                        renderPreview();
                    };
                    
                    handle.addEventListener("pointerdown", startDrag);
                    
                    elements.gridOverlay.appendChild(handle);
                }
            }

            let lastDragTime = 0;
            function handleDragMove(e) {
                if (!state.dragging || !state.currentImage) return;

                // Throttle for performance
                const now = Date.now();
                if (now - lastDragTime < 16) return; 
                lastDragTime = now;

                const rect = elements.gridOverlay.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                if (state.dragging.type === 'row') { state.customCuts.rows[state.dragging.index] = Math.max(1, Math.min(99, Math.round((y / rect.height) * 100))); } 
                else { state.customCuts.cols[state.dragging.index] = Math.max(1, Math.min(99, Math.round((x / rect.width) * 100))); }
                state.customCuts.rows.sort((a, b) => a - b); state.customCuts.cols.sort((a, b) => a - b);
                renderPreview();
            }

            function handleDragEnd() { if (state.dragging) { state.dragging = null; renderPreview(); } }

            async function generateZip() {
                if (!state.currentImage) return;
                elements.statusMsg.innerText = "SLICING...";
                elements.downloadBtn.disabled = true;
                const zip = new JSZip(), img = state.currentImage, w = img.width, h = img.height;
                let yStops = [], xStops = [];
                if (state.mode === "equal") {
                    const r = parseInt(elements.eqRowsInput.value), c = parseInt(elements.eqColsInput.value);
                    for (let i = 0; i <= r; i++) yStops.push((i / r) * h);
                    for (let i = 0; i <= c; i++) xStops.push((i / c) * w);
                } else {
                    yStops = [0, ...state.customCuts.rows.map(p => (p / 100) * h), h];
                    xStops = [0, ...state.customCuts.cols.map(p => (p / 100) * w), w];
                }
                const canvas = document.createElement("canvas"), ctxS = canvas.getContext("2d");
                for (let r = 0; r < yStops.length - 1; r++) {
                    for (let c = 0; c < xStops.length - 1; c++) {
                        const y = yStops[r], height = yStops[r + 1] - y, x = xStops[c], width = xStops[c + 1] - x;
                        if (width < 1 || height < 1) continue;
                        canvas.width = width; canvas.height = height; ctxS.drawImage(img, x, y, width, height, 0, 0, width, height);
                        const blob = await new Promise(res => canvas.toBlob(res, "image/png"));
                        zip.file(`slice_r${r+1}_c${c+1}.png`, blob);
                    }
                }
                const content = await zip.generateAsync({ type: "blob" });
                saveAs(content, "multisplitter_images.zip");
                elements.statusMsg.innerText = "DONE!"; elements.downloadBtn.disabled = false;
                setTimeout(() => elements.statusMsg.innerText = "", 3000);
            }
        </script>
    </body>
</html>
