<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klasskit Background Remover</title>
    
    <script src="https://unpkg.com/@imgly/background-removal@1.4.3/dist/browser/bundle.js"></script>
    
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            text-align: center;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 40px 20px;
        }
        .container {
            max-width: 900px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .controls {
            margin: 20px 0;
        }
        .image-preview {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 20px;
            margin-top: 20px;
        }
        .img-box {
            flex: 1;
            min-width: 300px;
            border: 2px dashed #ccc;
            border-radius: 8px;
            padding: 10px;
            min-height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            background-image: linear-gradient(45deg, #eee 25%, transparent 25%, transparent 75%, #eee 75%, #eee), 
                              linear-gradient(45deg, #eee 25%, transparent 25%, transparent 75%, #eee 75%, #eee);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
        }
        img {
            max-width: 100%;
            max-height: 400px;
            border-radius: 4px;
        }
        button, .btn {
            padding: 10px 20px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            background: #0056b3;
            color: white;
            border: none;
            border-radius: 5px;
            text-decoration: none;
            display: inline-block;
        }
        button:disabled {
            background: #cccccc;
            cursor: not-allowed;
        }
        input[type="file"] {
            font-size: 16px;
        }
        #loading {
            display: none;
            margin-top: 15px;
            font-weight: bold;
            color: #d9534f;
        }
    </style>
</head>
<body>

    <div class="container">
        <div style="text-align: left; margin-bottom: 20px;">
            <a href="../index.html" class="btn" style="background: #1e293b;">
                &larr; Back to Workshop
            </a>
        </div>
        <h1>Klasskit.fun Background Remover</h1>
        <p>Upload an image to automatically remove its background.</p>

        <div class="controls">
            <input type="file" id="imageInput" accept="image/*">
            <button id="processBtn" disabled>Remove Background</button>
            <div id="loading">Processing... The AI models are loading (this may take a minute on the first run).</div>
        </div>

        <div class="image-preview">
            <div class="img-box">
                <h3 style="background: white; padding: 2px 10px; border-radius: 4px;">Original</h3>
                <img id="originalImage" src="" alt="Original Image" style="display:none;">
            </div>
            
            <div class="img-box">
                <h3 style="background: white; padding: 2px 10px; border-radius: 4px;">Result</h3>
                <img id="resultImage" src="" alt="Result Image" style="display:none;">
                <a id="downloadBtn" class="btn" style="display:none; margin-top:15px;" download="klasskit-nobg.png">Download Image</a>
            </div>
        </div>
    </div>

    <script>
        const imageInput = document.getElementById('imageInput');
        const originalImage = document.getElementById('originalImage');
        const resultImage = document.getElementById('resultImage');
        const processBtn = document.getElementById('processBtn');
        const loading = document.getElementById('loading');
        const downloadBtn = document.getElementById('downloadBtn');

        let currentFile = null;

        // Handle image selection
        imageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                currentFile = file;
                originalImage.src = URL.createObjectURL(file);
                originalImage.style.display = 'block';
                processBtn.disabled = false;
                
                // Reset result side
                resultImage.style.display = 'none';
                downloadBtn.style.display = 'none';
            }
        });

        // Handle background removal
        processBtn.addEventListener('click', async () => {
            if (!currentFile) return;

            // UI State updates
            processBtn.disabled = true;
            loading.style.display = 'block';
            resultImage.style.display = 'none';
            downloadBtn.style.display = 'none';

            try {
                // imglyRemoveBackground is globally available via the CDN script
                const imageBlob = await imglyRemoveBackground(currentFile, {
                    // Optional: Monitor download progress of the AI models in the console
                    progress: (key, current, total) => {
                        console.log(`Downloading ${key}: ${current} of ${total}`);
                    }
                });

                // Display result
                const url = URL.createObjectURL(imageBlob);
                resultImage.src = url;
                resultImage.style.display = 'block';

                // Setup download button
                downloadBtn.href = url;
                downloadBtn.style.display = 'inline-block';
                
            } catch (error) {
                console.error('Error removing background:', error);
                alert('An error occurred. Check the console for details.');
            } finally {
                processBtn.disabled = false;
                loading.style.display = 'none';
            }
        });
    </script>

</body>
</html>
