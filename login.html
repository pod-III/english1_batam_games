<!DOCTYPE html>
<html lang="en">
<head>
  <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="/supabase.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — KlassKit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            pink: '#FF6B95',
            orange: '#FF8C42',
            green: '#00E676',
            blue: '#2979FF',
            dark: '#1e293b',
            chalk: '#f8fafc',
          },
          fontFamily: {
            heading: ['Fredoka', 'sans-serif'],
            body: ['Nunito', 'sans-serif'],
          },
          boxShadow: {
            'hard': '4px 4px 0px 0px rgba(30, 41, 59, 1)',
            'hard-sm': '2px 2px 0px 0px rgba(30, 41, 59, 1)',
          },
          keyframes: {
            'pop-in': {
              '0%': { opacity: '0', transform: 'scale(0.9) translateY(20px)' },
              '100%': { opacity: '1', transform: 'scale(1) translateY(0)' },
            },
            'float': {
              '0%, 100%': { transform: 'translateY(0) rotate(0deg)' },
              '50%': { transform: 'translateY(-12px) rotate(3deg)' },
            },
            'float-slow': {
              '0%, 100%': { transform: 'translateY(0) rotate(0deg)' },
              '50%': { transform: 'translateY(-8px) rotate(-2deg)' },
            },
          },
          animation: {
            'pop-in': 'pop-in 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
            'float': 'float 6s ease-in-out infinite',
            'float-slow': 'float-slow 8s ease-in-out infinite',
          },
        }
      }
    }
  </script>
  <style>
    /* Grid overlay background – matches base.css */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(148, 163, 184, 0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(148, 163, 184, 0.06) 1px, transparent 1px);
      background-size: 28px 28px;
    }

    .dark body::before {
      background-image:
        linear-gradient(rgba(100, 116, 139, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(100, 116, 139, 0.08) 1px, transparent 1px);
    }

    /* Glass card */
    .glass-card {
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      background: rgba(255, 255, 255, 0.85);
      border: 3px solid #1e293b;
    }

    .dark .glass-card {
      background: rgba(30, 41, 59, 0.85);
      border-color: rgb(100, 116, 139);
    }

    /* Input styling */
    .auth-input {
      border: 3px solid #1e293b;
      border-radius: 1rem;
      padding: 0.75rem 1rem;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
      outline: none;
      background: #f8fafc;
      width: 100%;
      color: #1e293b;
      transition: border-color 0.2s;
    }

    .dark .auth-input {
      background: #0f172a;
      border-color: rgb(100, 116, 139);
      color: #f1f5f9;
    }

    .auth-input:focus {
      border-color: #2979FF;
      box-shadow: 0 0 0 3px rgba(41, 121, 255, 0.15);
    }

    .auth-input::placeholder {
      color: #94a3b8;
      font-weight: 600;
    }

    /* Chunky buttons */
    .btn-chunky {
      border: 3px solid #1e293b;
      border-radius: 1rem;
      padding: 0.75rem 1.5rem;
      font-family: 'Fredoka', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, background 0.2s;
      box-shadow: 0 4px 0 #1e293b;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .dark .btn-chunky {
      border-color: rgb(100, 116, 139);
      box-shadow: 0 4px 0 rgb(100, 116, 139);
    }

    .btn-chunky:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 0 #1e293b;
    }

    .dark .btn-chunky:hover {
      box-shadow: 0 6px 0 rgb(100, 116, 139);
    }

    .btn-chunky:active {
      transform: translateY(4px);
      box-shadow: 0 0px 0 #1e293b;
    }

    .dark .btn-chunky:active {
      box-shadow: 0 0px 0 rgb(100, 116, 139);
    }

    .btn-chunky:focus-visible {
      outline: 3px solid #2979FF;
      outline-offset: 2px;
    }

    /* Message toast */
    .auth-message {
      border-radius: 0.75rem;
      padding: 0.75rem 1rem;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      border: 3px solid #1e293b;
      background: #f8fafc;
      cursor: pointer;
      transition: all 0.2s;
    }
    .dark .tab-btn {
      border-color: #334155;
      background: #0f172a;
      color: #94a3b8;
    }
    .tab-btn:first-child {
      border-radius: 12px 0 0 12px;
      border-right: none;
    }
    .tab-btn:last-child {
      border-radius: 0 12px 12px 0;
    }
    .tab-btn.active {
      background: #2979FF;
      color: white;
    }
    .dark .tab-btn.active {
      background: #2979FF;
      color: white;
    }
    .tab-content {
      display: none;
    }
    .tab-content.active {
      display: block;
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center text-dark dark:text-slate-200">
  <div class="neo-card w-full max-w-md mx-4 p-8">
    <!-- Logo -->
    <div class="text-center mb-6">
      <div class="w-16 h-16 bg-pink rounded-2xl border-[3px] border-dark dark:border-slate-600 flex items-center justify-center mx-auto mb-4" style="box-shadow: 4px 4px 0px 0px #1e293b;">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.7 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></svg>
      </div>
      <h1 class="font-heading font-bold text-3xl">KlassKit</h1>
      <p class="text-slate-500 dark:text-slate-400 text-sm mt-1">Sign in to access your activities</p>
    </div>

    <!-- Tabs -->
    <div class="flex mb-6">
      <button type="button" id="tab-signin" class="tab-btn active" onclick="switchTab('signin')">Sign In</button>
      <button type="button" id="tab-signup" class="tab-btn" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <!-- Sign In Form -->
    <div id="content-signin" class="tab-content active">
      <form class="space-y-4" onsubmit="return false;">
        <div>
          <label class="block text-sm font-bold mb-1 ml-1">Email</label>
          <input type="email" id="signin-email" class="neo-input" placeholder="you@school.edu" required>
        </div>
        <div>
          <label class="block text-sm font-bold mb-1 ml-1">Password</label>
          <input type="password" id="signin-password" class="neo-input" placeholder="••••••••" required minlength="6">
        </div>
        <div id="signin-message" class="hidden text-sm font-bold text-center py-2 rounded-lg"></div>
        <button type="button" onclick="handleSignIn()" class="neo-btn w-full bg-blue text-white">Sign In</button>
      </form>
    </div>

    <!-- Sign Up Form -->
    <div id="content-signup" class="tab-content">
      <form class="space-y-4" onsubmit="return false;">
        <div>
          <label class="block text-sm font-bold mb-1 ml-1">Email</label>
          <input type="email" id="signup-email" class="neo-input" placeholder="you@school.edu" required>
        </div>
        <div>
          <label class="block text-sm font-bold mb-1 ml-1">Password</label>
          <input type="password" id="signup-password" class="neo-input" placeholder="••••••••" required minlength="6">
        </div>
        <div>
          <label class="block text-sm font-bold mb-1 ml-1">Display Name</label>
          <input type="text" id="signup-displayname" class="neo-input" placeholder="Your name" required>
        </div>
        <div id="signup-message" class="hidden text-sm font-bold text-center py-2 rounded-lg"></div>
        <button type="button" onclick="handleSignUp()" class="neo-btn w-full bg-green text-white">Create Account</button>
      </form>
    </div>

    <!-- Back link -->
    <div class="mt-6 text-center">
      <a href="/" class="text-sm font-bold text-slate-400 hover:text-blue transition-colors">← Back to KlassKit</a>
    </div>
  </div>

  <script>
    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');
      document.getElementById('content-' + tab).classList.add('active');
    }

    function showMessage(elementId, text, isError) {
      const el = document.getElementById(elementId);
      el.textContent = text;
      el.className = 'text-sm font-bold text-center py-2 rounded-lg ' + 
        (isError ? 'bg-red-100 text-red-700 dark:bg-red-900/30 dark:text-red-300' : 
                   'bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-300');
      el.classList.remove('hidden');
    }

    function setLoading(btn, loading) {
      btn.disabled = loading;
      btn.style.opacity = loading ? '0.6' : '1';
    }

    async function handleSignIn() {
      const email = document.getElementById('signin-email').value.trim();
      const pass = document.getElementById('signin-password').value;
      const btn = document.querySelector('#content-signin button');
      
      if (!email || !pass) return showMessage('signin-message', 'Please fill in all fields.', true);
      
      setLoading(btn, true);
      const { user, error } = await signIn(email, pass);
      setLoading(btn, false);
      
      if (error) return showMessage('signin-message', error.message, true);
      
      const dest = localStorage.getItem('after_login') || '/';
      localStorage.removeItem('after_login');
      window.location.href = dest;
    }

    async function handleSignUp() {
      const email = document.getElementById('signup-email').value.trim();
      const pass = document.getElementById('signup-password').value;
      const displayName = document.getElementById('signup-displayname').value.trim();
      const btn = document.querySelector('#content-signup button');
      
      if (!email || !pass || !displayName) return showMessage('signup-message', 'Please fill in all fields.', true);
      if (pass.length < 6) return showMessage('signup-message', 'Password must be at least 6 characters.', true);
      
      // Store display name for later
      localStorage.setItem('klasskit_pending_display_name', displayName);
      
      setLoading(btn, true);
      const { user, error } = await signUp(email, pass);
      setLoading(btn, false);
      
      if (error) return showMessage('signup-message', error.message, true);
      
      showMessage('signup-message', '✅ Check your email for a confirmation link!', false);
    }

    // Allow Enter key
    document.getElementById('signin-password').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleSignIn();
    });
    document.getElementById('signup-displayname').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleSignUp();
    });
  </script>
</body>
</html>
