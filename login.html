<!DOCTYPE html>
<html lang="en">

<head>
  <!-- Supabase Auth -->
  <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="/supabase.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — KlassKit</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            pink: '#FF6B95',
            orange: '#FF8C42',
            green: '#00E676',
            blue: '#2979FF',
            dark: '#1e293b',
            chalk: '#f8fafc',
          },
          fontFamily: {
            heading: ['Fredoka', 'sans-serif'],
            body: ['Nunito', 'sans-serif'],
          },
          boxShadow: {
            'hard': '4px 4px 0px 0px rgba(30, 41, 59, 1)',
            'hard-sm': '2px 2px 0px 0px rgba(30, 41, 59, 1)',
          },
          keyframes: {
            'pop-in': {
              '0%': { opacity: '0', transform: 'scale(0.9) translateY(20px)' },
              '100%': { opacity: '1', transform: 'scale(1) translateY(0)' },
            },
            'float': {
              '0%, 100%': { transform: 'translateY(0) rotate(0deg)' },
              '50%': { transform: 'translateY(-12px) rotate(3deg)' },
            },
            'float-slow': {
              '0%, 100%': { transform: 'translateY(0) rotate(0deg)' },
              '50%': { transform: 'translateY(-8px) rotate(-2deg)' },
            },
          },
          animation: {
            'pop-in': 'pop-in 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
            'float': 'float 6s ease-in-out infinite',
            'float-slow': 'float-slow 8s ease-in-out infinite',
          },
        }
      }
    }
  </script>

  <style>
    /* Grid overlay background – matches base.css */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(148, 163, 184, 0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(148, 163, 184, 0.06) 1px, transparent 1px);
      background-size: 28px 28px;
    }

    .dark body::before {
      background-image:
        linear-gradient(rgba(100, 116, 139, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(100, 116, 139, 0.08) 1px, transparent 1px);
    }

    /* Glass card */
    .glass-card {
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      background: rgba(255, 255, 255, 0.85);
      border: 3px solid #1e293b;
    }

    .dark .glass-card {
      background: rgba(30, 41, 59, 0.85);
      border-color: rgb(100, 116, 139);
    }

    /* Input styling */
    .auth-input {
      border: 3px solid #1e293b;
      border-radius: 1rem;
      padding: 0.75rem 1rem;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
      outline: none;
      background: #f8fafc;
      width: 100%;
      color: #1e293b;
    }

    .dark .auth-input {
      background: #0f172a;
      border-color: rgb(100, 116, 139);
      color: #f1f5f9;
    }

    .auth-input:focus {
      border-color: #2979FF;
      box-shadow: 0 0 0 3px rgba(41, 121, 255, 0.15);
    }

    .auth-input::placeholder {
      color: #94a3b8;
      font-weight: 600;
    }

    /* Chunky buttons */
    .btn-chunky {
      border: 3px solid #1e293b;
      border-radius: 1rem;
      padding: 0.75rem 1.5rem;
      font-family: 'Fredoka', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, background 0.2s;
      box-shadow: 0 4px 0 #1e293b;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .dark .btn-chunky {
      border-color: rgb(100, 116, 139);
      box-shadow: 0 4px 0 rgb(100, 116, 139);
    }

    .btn-chunky:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 0 #1e293b;
    }

    .dark .btn-chunky:hover {
      box-shadow: 0 6px 0 rgb(100, 116, 139);
    }

    .btn-chunky:active {
      transform: translateY(4px);
      box-shadow: 0 0px 0 #1e293b;
    }

    .dark .btn-chunky:active {
      box-shadow: 0 0px 0 rgb(100, 116, 139);
    }

    .btn-chunky:focus-visible {
      outline: 3px solid #2979FF;
      outline-offset: 2px;
    }

    /* Message toast */
    .auth-message {
      border-radius: 0.75rem;
      padding: 0.75rem 1rem;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      text-align: center;
      transition: opacity 0.3s, transform 0.3s;
    }

    /* Decorative shapes */
    .deco-shape {
      position: absolute;
      border-radius: 1rem;
      opacity: 0.12;
      pointer-events: none;
    }

    .dark .deco-shape { opacity: 0.08; }
  </style>
</head>

<body class="min-h-screen flex items-center justify-center font-body bg-chalk dark:bg-[#020617] text-dark dark:text-slate-200 relative overflow-hidden selection:bg-pink/30 selection:text-pink">

  <!-- Decorative floating shapes -->
  <div class="deco-shape bg-pink w-32 h-32 rounded-full animate-float" style="top: 8%; left: 6%;"></div>
  <div class="deco-shape bg-blue w-24 h-24 rounded-2xl rotate-12 animate-float-slow" style="top: 15%; right: 10%;"></div>
  <div class="deco-shape bg-green w-20 h-20 rounded-full animate-float" style="bottom: 12%; left: 12%;"></div>
  <div class="deco-shape bg-orange w-28 h-28 rounded-2xl -rotate-6 animate-float-slow" style="bottom: 18%; right: 8%;"></div>
  <div class="deco-shape bg-blue w-16 h-16 rounded-full animate-float" style="top: 55%; left: 3%;"></div>
  <div class="deco-shape bg-pink w-14 h-14 rounded-xl rotate-45 animate-float-slow" style="top: 40%; right: 4%;"></div>

  <!-- Login Card -->
  <div class="glass-card rounded-[2rem] shadow-hard w-full max-w-md mx-4 p-8 md:p-10 relative z-10 animate-pop-in">

    <!-- Branding -->
    <div class="flex flex-col items-center mb-8">
      <div class="w-16 h-16 bg-pink text-white rounded-2xl border-3 border-dark dark:border-slate-500 flex items-center justify-center shadow-hard mb-4" style="border-width: 3px;">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.7 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></svg>
      </div>
      <h1 class="font-heading font-bold text-3xl tracking-tight text-dark dark:text-white">KlassKit</h1>
      <p class="text-slate-500 dark:text-slate-400 font-semibold text-sm mt-1">Sign in to access your activities</p>
    </div>

    <!-- Form -->
    <form id="auth-form" class="space-y-4" onsubmit="return false;">
      <div>
        <label for="email" class="block text-sm font-extrabold text-slate-600 dark:text-slate-300 mb-1.5 ml-1">Email</label>
        <input type="email" id="email" class="auth-input" placeholder="you@school.edu" required autocomplete="email">
      </div>
      <div>
        <label for="password" class="block text-sm font-extrabold text-slate-600 dark:text-slate-300 mb-1.5 ml-1">Password</label>
        <input type="password" id="password" class="auth-input" placeholder="••••••••" required autocomplete="current-password" minlength="6">
      </div>

      <!-- Message area -->
      <div id="auth-message" class="auth-message hidden"></div>

      <!-- Buttons -->
      <div class="flex flex-col gap-3 pt-2">
        <button type="button" id="sign-in-btn" class="btn-chunky bg-blue text-white w-full">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" x2="3" y1="12" y2="12"/></svg>
          Sign In
        </button>
        <button type="button" id="sign-up-btn" class="btn-chunky bg-chalk dark:bg-slate-800 text-dark dark:text-white w-full">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" x2="19" y1="8" y2="14"/><line x1="22" x2="16" y1="11" y2="11"/></svg>
          Create Account
        </button>
      </div>
    </form>

    <!-- Back to home -->
    <div class="mt-6 text-center">
      <a href="/" class="text-sm font-bold text-slate-400 hover:text-blue dark:hover:text-blue transition-colors">
        ← Back to KlassKit
      </a>
    </div>
  </div>

  <!-- Auth Logic -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const emailInput    = document.getElementById('email');
      const passwordInput = document.getElementById('password');
      const signInBtn     = document.getElementById('sign-in-btn');
      const signUpBtn     = document.getElementById('sign-up-btn');
      const messageEl     = document.getElementById('auth-message');

      function showMessage(text, isError = false) {
        messageEl.textContent = text;
        messageEl.className = 'auth-message ' +
          (isError
            ? 'bg-red-100 dark:bg-red-900/30 text-red-700 dark:text-red-300 border-2 border-red-300 dark:border-red-700'
            : 'bg-green-100 dark:bg-green-900/30 text-green-700 dark:text-green-300 border-2 border-green-300 dark:border-green-700');
        messageEl.classList.remove('hidden');
      }

      function setLoading(btn, loading) {
        btn.disabled = loading;
        btn.style.opacity = loading ? '0.6' : '1';
        btn.style.pointerEvents = loading ? 'none' : 'auto';
      }

      signInBtn.addEventListener('click', async () => {
        const email = emailInput.value.trim();
        const pass  = passwordInput.value;
        if (!email || !pass) return showMessage('Please fill in both fields.', true);

        setLoading(signInBtn, true);
        const { user, error } = await signIn(email, pass);
        setLoading(signInBtn, false);

        if (error) return showMessage(error.message, true);

        // Redirect to the page the user came from, or home
        const dest = localStorage.getItem('after_login') || '/';
        localStorage.removeItem('after_login');
        window.location.href = dest;
      });

      signUpBtn.addEventListener('click', async () => {
        const email = emailInput.value.trim();
        const pass  = passwordInput.value;
        if (!email || !pass) return showMessage('Please fill in both fields.', true);
        if (pass.length < 6) return showMessage('Password must be at least 6 characters.', true);

        setLoading(signUpBtn, true);
        const { user, error } = await signUp(email, pass);
        setLoading(signUpBtn, false);

        if (error) return showMessage(error.message, true);

        showMessage('✅ Check your email for a confirmation link!', false);
      });

      // Allow Enter key to submit
      passwordInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') signInBtn.click();
      });
    });
  </script>
</body>

</html>
