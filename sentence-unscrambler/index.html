<!doctype html>
<html lang="en" class="light">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Sentence Builder: English 1 Edition</title>

        <!-- Dependencies -->
        <script src="https://unpkg.com/lucide@latest"></script>
        <script src="https://cdn.tailwindcss.com"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

        <!-- Tailwind Configuration -->
        <script>
            tailwind.config = {
                darkMode: "class",
                theme: {
                    extend: {
                        colors: {
                            pink: "#FF6B95",
                            orange: "#FF8C42",
                            green: "#00E676",
                            blue: "#2979FF",
                            dark: "#1e293b",
                            chalk: "#f8fafc",
                        },
                        fontFamily: {
                            heading: ["Fredoka", "sans-serif"],
                            body: ["Nunito", "sans-serif"],
                        },
                        animation: {
                            pop: "pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)",
                            shake: "shake 0.4s cubic-bezier(.36,.07,.19,.97) both",
                        },
                        keyframes: {
                            pop: {
                                "0%": { transform: "scale(0.8)", opacity: "0" },
                                "100%": { transform: "scale(1)", opacity: "1" },
                            },
                            shake: {
                                "10%, 90%": {
                                    transform: "translate3d(-1px, 0, 0)",
                                },
                                "20%, 80%": {
                                    transform: "translate3d(2px, 0, 0)",
                                },
                                "30%, 50%, 70%": {
                                    transform: "translate3d(-4px, 0, 0)",
                                },
                                "40%, 60%": {
                                    transform: "translate3d(4px, 0, 0)",
                                },
                            },
                        },
                    },
                },
            };
        </script>

        <!-- Google Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Nunito:wght@400;700;800&display=swap"
            rel="stylesheet"
        />

        <!-- Standard CSS (Crash-Proof) -->
        <style>
            body {
                font-family: "Nunito", sans-serif;
                background-color: #f8fafc; /* Chalk */
                color: #1e293b; /* Dark */
                /* Graph Paper Pattern - Light Mode */
                background-image:
                    linear-gradient(rgba(30, 41, 59, 0.1) 1px, transparent 1px),
                    linear-gradient(
                        90deg,
                        rgba(30, 41, 59, 0.1) 1px,
                        transparent 1px
                    );
                background-size: 20px 20px;
                overflow-x: hidden;
                transition: background-color 0.3s ease;
            }

            .dark body {
                background-color: #0f172a; /* Blackboard base */
                color: #f8fafc; /* Chalk text */
                /* Graph Paper Pattern - Dark Mode */
                background-image:
                    linear-gradient(
                        rgba(248, 250, 252, 0.05) 1px,
                        transparent 1px
                    ),
                    linear-gradient(
                        90deg,
                        rgba(248, 250, 252, 0.05) 1px,
                        transparent 1px
                    );
            }

            /* --- NEO-BRUTAL COMPONENTS --- */

            .border-neo {
                border: 4px solid #1e293b;
            }
            .dark .border-neo {
                border: 4px solid #94a3b8;
            }

            .shadow-neo {
                box-shadow: 4px 4px 0px 0px rgba(30, 41, 59, 1);
            }
            .dark .shadow-neo {
                box-shadow: 4px 4px 0px 0px rgba(148, 163, 184, 1);
            }

            .shadow-neo-sm {
                box-shadow: 2px 2px 0px 0px rgba(30, 41, 59, 1);
            }
            .dark .shadow-neo-sm {
                box-shadow: 2px 2px 0px 0px rgba(148, 163, 184, 1);
            }

            .card-neo {
                background-color: #ffffff;
                border: 4px solid #1e293b;
                box-shadow: 8px 8px 0px 0px rgba(30, 41, 59, 1);
                border-radius: 1rem;
            }
            .dark .card-neo {
                background-color: #1e293b;
                border: 4px solid #94a3b8;
                box-shadow: 8px 8px 0px 0px rgba(148, 163, 184, 1);
            }

            .btn-neo {
                border: 3px solid #1e293b;
                box-shadow: 4px 4px 0px 0px rgba(30, 41, 59, 1);
                transition: all 0.1s;
                transform: translate(0, 0);
            }
            .btn-neo:hover {
                transform: translate(-1px, -1px);
                box-shadow: 5px 5px 0px 0px rgba(30, 41, 59, 1);
            }
            .btn-neo:active {
                transform: translate(4px, 4px);
                box-shadow: 0px 0px 0px 0px rgba(30, 41, 59, 1);
            }
            .dark .btn-neo {
                border: 3px solid #94a3b8;
                box-shadow: 4px 4px 0px 0px rgba(148, 163, 184, 1);
            }
            .dark .btn-neo:hover {
                box-shadow: 5px 5px 0px 0px rgba(148, 163, 184, 1);
            }
            .dark .btn-neo:active {
                box-shadow: 0px 0px 0px 0px rgba(148, 163, 184, 1);
            }

            /* --- WORD CARDS & DRAGGING --- */

            .word-card {
                cursor: grab;
                touch-action: none;
                user-select: none;
                font-family: "Nunito", sans-serif;
                font-weight: 800;

                /* Use relative positioning for the hover lift instead of transform to avoid SortableJS teleporting bugs */
                position: relative;
                top: 0;
                left: 0;

                /* Removed 'transform' from transition! Only transitioning layout and colors now */
                transition:
                    top 0.2s cubic-bezier(0.34, 1.56, 0.64, 1),
                    left 0.2s cubic-bezier(0.34, 1.56, 0.64, 1),
                    box-shadow 0.2s cubic-bezier(0.34, 1.56, 0.64, 1),
                    background-color 0.2s,
                    color 0.2s;
            }

            /* Physical button hover effect using top/left */
            .word-card:hover {
                top: -2px;
                left: -2px;
                box-shadow: 4px 4px 0px 0px rgba(30, 41, 59, 1);
            }
            .dark .word-card:hover {
                box-shadow: 4px 4px 0px 0px rgba(148, 163, 184, 1);
            }

            .word-card:active {
                cursor: grabbing;
                top: 2px;
                left: 2px;
                box-shadow: 0px 0px 0px 0px rgba(30, 41, 59, 1) !important;
            }
            .dark .word-card:active {
                box-shadow: 0px 0px 0px 0px rgba(148, 163, 184, 1) !important;
            }

            /* Classes added by SortableJS during drag */
            .word-card.sortable-ghost {
                opacity: 0.2;
                border-style: dashed;
                background: #e2e8f0;
            }
            .dark .word-card.sortable-ghost {
                background: #334155;
            }
            .word-card.sortable-drag {
                background: #2979ff !important;
                color: white !important;
                z-index: 50;
                box-shadow: 8px 8px 0px 0px rgba(30, 41, 59, 1) !important;
                border-color: #1e293b !important;
            }
            .dark .word-card.sortable-drag {
                box-shadow: 8px 8px 0px 0px rgba(148, 163, 184, 1) !important;
                border-color: #94a3b8 !important;
            }

            #word-container {
                min-height: 140px;
            }

            /* Custom Scrollbar */
            ::-webkit-scrollbar {
                width: 12px;
            }
            ::-webkit-scrollbar-track {
                background: #f1f5f9;
                border-left: 2px solid #1e293b;
            }
            .dark ::-webkit-scrollbar-track {
                background: #1e293b;
                border-left: 2px solid #94a3b8;
            }
            ::-webkit-scrollbar-thumb {
                background: #cbd5e1;
                border: 2px solid #1e293b;
                border-radius: 6px;
            }
            .dark ::-webkit-scrollbar-thumb {
                background: #475569;
                border: 2px solid #94a3b8;
            }
            ::-webkit-scrollbar-thumb:hover {
                background: #94a3b8;
            }
            .dark ::-webkit-scrollbar-thumb:hover {
                background: #64748b;
            }
        </style>
    </head>
    <body class="flex flex-col min-h-screen">
        <!-- HEADER -->
        <header
            class="w-full bg-white dark:bg-slate-900 border-b-4 border-dark dark:border-slate-400 sticky top-0 z-50 transition-colors duration-300"
        >
            <div
                class="max-w-7xl mx-auto px-4 sm:px-6 h-20 flex items-center justify-between"
            >
                <div class="flex items-center gap-3">
                    <div
                        class="bg-blue w-12 h-12 rounded-xl border-neo flex items-center justify-center text-white text-2xl shadow-neo-sm"
                    >
                        <i data-lucide="puzzle" class="w-7 h-7"></i>
                    </div>
                    <div>
                        <h1
                            class="text-2xl sm:text-3xl font-heading text-dark dark:text-chalk leading-none mt-1"
                        >
                            SENTENCE BUILDER
                        </h1>
                        <div
                            class="text-[10px] sm:text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest"
                        >
                            English 1 Batam
                        </div>
                    </div>
                </div>

                <div class="flex items-center gap-2 sm:gap-4">
                    <button
                        id="theme-toggle"
                        class="p-2 rounded-xl border-2 border-transparent hover:border-dark dark:hover:border-slate-400 hover:bg-chalk dark:hover:bg-slate-800 transition-all text-dark dark:text-chalk"
                        title="Toggle Blackboard Mode"
                    >
                        <i
                            data-lucide="moon"
                            id="theme-icon"
                            class="w-6 h-6"
                        ></i>
                    </button>
                    <button
                        id="sound-toggle"
                        class="p-2 rounded-xl border-2 border-transparent hover:border-dark dark:hover:border-slate-400 hover:bg-chalk dark:hover:bg-slate-800 transition-all text-dark dark:text-chalk"
                        title="Toggle Sound"
                    >
                        <i data-lucide="volume-2" class="w-6 h-6"></i>
                    </button>
                    <button
                        id="setup-btn"
                        class="btn-neo bg-pink text-dark px-4 sm:px-6 py-2 rounded-xl font-heading text-base sm:text-lg tracking-wide"
                    >
                        SETUP
                    </button>
                </div>
            </div>
        </header>

        <!-- MAIN CONTENT -->
        <main
            class="flex-grow flex flex-col items-center justify-center p-4 w-full max-w-5xl mx-auto"
        >
            <!-- GAME AREA -->
            <div
                id="game-area"
                class="w-full hidden flex-col items-center animate-pop"
            >
                <div class="w-full max-w-3xl mb-8">
                    <div
                        class="flex items-center justify-between text-dark dark:text-chalk font-heading text-xl mb-2"
                    >
                        <span
                            >Round
                            <span
                                id="current-round"
                                class="text-blue dark:text-pink"
                                >1</span
                            >
                            / <span id="total-rounds">5</span></span
                        >
                    </div>
                    <div
                        class="w-full h-6 bg-white dark:bg-slate-800 border-neo rounded-full overflow-hidden shadow-neo-sm"
                    >
                        <div
                            id="progress-bar"
                            class="h-full bg-green border-r-4 border-dark dark:border-slate-400 w-0 transition-all duration-500"
                        ></div>
                    </div>
                </div>

                <div
                    class="w-full max-w-4xl card-neo p-8 md:p-12 mb-8 relative"
                >
                    <div
                        id="instruction-label"
                        class="absolute -top-5 left-4 sm:left-8 bg-orange text-dark border-neo px-4 py-1 rounded-lg text-xs sm:text-sm font-bold uppercase tracking-wider shadow-neo-sm rotate-[-2deg]"
                    >
                        Drag words to order
                    </div>

                    <div
                        id="word-container"
                        class="flex flex-wrap gap-4 justify-center items-center"
                    >
                        <!-- Words injected here -->
                    </div>
                </div>

                <div
                    id="feedback-msg"
                    class="h-16 mb-4 flex items-center justify-center text-2xl font-bold font-heading tracking-wide"
                ></div>

                <div class="flex flex-wrap justify-center gap-4">
                    <button
                        id="reveal-btn"
                        class="btn-neo bg-pink text-dark px-6 sm:px-8 py-4 rounded-xl font-heading text-xl sm:text-2xl flex items-center gap-3"
                    >
                        <i data-lucide="eye" class="w-6 h-6 sm:w-7 sm:h-7"></i>
                        REVEAL
                    </button>
                    <button
                        id="check-btn"
                        class="btn-neo bg-green text-dark px-8 sm:px-12 py-4 rounded-xl font-heading text-xl sm:text-2xl flex items-center gap-3"
                    >
                        <i
                            data-lucide="check-circle"
                            class="w-6 h-6 sm:w-7 sm:h-7"
                        ></i>
                        CHECK
                    </button>
                    <button
                        id="next-btn"
                        class="hidden btn-neo bg-blue text-white px-8 sm:px-10 py-4 rounded-xl font-heading text-xl sm:text-2xl flex items-center gap-3 dark:text-dark"
                    >
                        NEXT
                        <i
                            data-lucide="arrow-right"
                            class="w-6 h-6 sm:w-7 sm:h-7"
                        ></i>
                    </button>
                </div>
            </div>

            <!-- EMPTY STATE -->
            <div id="empty-state" class="text-center py-20 animate-pop">
                <div
                    class="w-24 h-24 bg-pink border-4 border-dark dark:border-slate-400 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-neo"
                >
                    <i data-lucide="puzzle" class="w-12 h-12 text-dark"></i>
                </div>
                <h2
                    class="text-4xl font-heading text-dark dark:text-chalk mb-2"
                >
                    Ready to Teach?
                </h2>
                <p
                    class="text-slate-600 dark:text-slate-400 font-bold mb-8 text-lg"
                >
                    Load your sentences to begin the lesson.
                </p>
                <button
                    onclick="document.getElementById('setup-btn').click()"
                    class="btn-neo bg-orange text-dark px-8 py-4 rounded-xl font-heading text-xl"
                >
                    CREATE LESSON
                </button>
            </div>
        </main>

        <!-- SETUP MODAL -->
        <div
            id="setup-modal"
            class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm animate-pop"
        >
            <div
                class="card-neo w-full max-w-2xl flex flex-col max-h-[90vh] overflow-hidden !rounded-2xl"
            >
                <div
                    class="p-4 sm:p-6 border-b-4 border-dark dark:border-slate-400 flex justify-between items-center bg-chalk dark:bg-slate-900"
                >
                    <h2
                        class="text-2xl sm:text-3xl font-heading text-dark dark:text-chalk tracking-wide"
                    >
                        LESSON SETUP
                    </h2>
                    <button
                        id="close-setup"
                        class="text-dark dark:text-chalk hover:bg-slate-200 dark:hover:bg-slate-800 p-2 rounded-lg border-2 border-transparent hover:border-dark dark:hover:border-slate-400 transition"
                    >
                        <i data-lucide="x" class="w-6 h-6"></i>
                    </button>
                </div>

                <div
                    class="p-4 sm:p-6 overflow-y-auto space-y-6 bg-white dark:bg-slate-800 flex-grow"
                >
                    <div class="space-y-3">
                        <label
                            class="flex items-center gap-2 text-sm font-bold text-blue dark:text-pink uppercase tracking-widest"
                        >
                            <i data-lucide="zap" class="w-4 h-4"></i> Quick
                            Presets
                        </label>
                        <div class="flex flex-wrap gap-2 sm:gap-3">
                            <button
                                class="preset-btn px-4 py-2 bg-chalk dark:bg-slate-700 dark:text-chalk hover:bg-blue hover:text-white border-2 border-dark dark:border-slate-400 rounded-lg text-sm font-bold transition shadow-neo-sm active:shadow-none active:translate-x-[2px] active:translate-y-[2px]"
                                data-text="The cat sat on the mat.; I like to eat apples.; The sun is very hot.; She has a new phone; We work together"
                            >
                                Simple Present
                            </button>

                            <button
                                class="preset-btn px-4 py-2 bg-chalk dark:bg-slate-700 dark:text-chalk hover:bg-blue hover:text-white border-2 border-dark dark:border-slate-400 rounded-lg text-sm font-bold transition shadow-neo-sm active:shadow-none active:translate-x-[2px] active:translate-y-[2px]"
                                data-text="She is reading a book.; They are playing soccer.; We are going to the park.; They are eating lunch; I am doing homework"
                            >
                                Present Continuous
                            </button>

                            <button
                                class="preset-btn px-4 py-2 bg-chalk dark:bg-slate-700 dark:text-chalk hover:bg-blue hover:text-white border-2 border-dark dark:border-slate-400 rounded-lg text-sm font-bold transition shadow-neo-sm active:shadow-none active:translate-x-[2px] active:translate-y-[2px]"
                                data-text="What time is it?; Where are you going?; How do you do?; When is your birthday?"
                            >
                                Questions
                            </button>
                        </div>
                    </div>

                    <div class="space-y-3">
                        <label
                            class="flex items-center gap-2 text-sm font-bold text-orange uppercase tracking-widest"
                        >
                            <i data-lucide="type" class="w-4 h-4"></i> Sentences
                            (Auto-Saved)
                        </label>
                        <textarea
                            id="sentence-input"
                            class="w-full h-48 bg-slate-50 dark:bg-slate-900 border-neo rounded-xl p-4 text-dark dark:text-chalk focus:ring-4 focus:ring-blue/20 dark:focus:ring-pink/20 outline-none resize-none font-body font-bold text-lg shadow-inner leading-relaxed"
                            placeholder="e.g.&#10;The quick brown fox jumps.&#10;She sells sea shells."
                        ></textarea>
                        <p
                            class="text-xs text-slate-500 dark:text-slate-400 font-bold"
                        >
                            Separate sentences with a new line or semicolon (;)
                        </p>
                    </div>
                </div>

                <div
                    class="p-4 sm:p-6 border-t-4 border-dark dark:border-slate-400 bg-chalk dark:bg-slate-900"
                >
                    <button
                        id="start-game-btn"
                        class="w-full btn-neo bg-green text-dark px-8 py-4 rounded-xl font-heading text-xl"
                    >
                        START ACTIVITY
                    </button>
                </div>
            </div>
        </div>

        <!-- WIN MODAL -->
        <div
            id="win-modal"
            class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 bg-slate-900/80 backdrop-blur-sm"
        >
            <div
                class="card-neo w-full max-w-md p-8 text-center animate-pop relative overflow-hidden bg-white dark:bg-slate-800"
            >
                <div
                    class="absolute top-0 left-0 w-full h-4 bg-pink border-b-4 border-dark dark:border-slate-400"
                ></div>

                <div class="relative z-10 pt-4 flex flex-col items-center">
                    <div
                        class="bg-blue w-20 h-20 rounded-2xl border-4 border-dark dark:border-slate-400 shadow-neo flex items-center justify-center text-white mb-6 animate-bounce"
                    >
                        <i data-lucide="puzzle" class="w-10 h-10"></i>
                    </div>
                    <h2
                        class="text-5xl font-heading text-dark dark:text-chalk mb-2"
                    >
                        GREAT JOB!
                    </h2>
                    <p
                        class="text-slate-600 dark:text-slate-300 font-bold mb-8 text-lg"
                    >
                        You've completed the lesson.
                    </p>
                    <div class="flex flex-col gap-4 w-full">
                        <button
                            id="play-again-btn"
                            class="btn-neo bg-blue text-white dark:text-dark py-3 rounded-xl font-heading text-xl"
                        >
                            PLAY AGAIN
                        </button>
                        <button
                            onclick="
                                document.getElementById('setup-btn').click();
                                document
                                    .getElementById('win-modal')
                                    .classList.add('hidden');
                            "
                            class="py-3 text-slate-500 dark:text-slate-400 hover:text-dark dark:hover:text-chalk font-bold text-sm border-2 border-transparent hover:border-slate-300 dark:hover:border-slate-600 rounded-xl transition-colors"
                        >
                            NEW SENTENCES
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <script>
            // --- CONSTANTS ---
            const LS_KEY_SENTENCES = "sentenceBuilderSentences_v2";
            const LS_KEY_THEME = "sentenceBuilderTheme";

            // --- AUDIO ENGINE ---
            let audioEnabled = true;
            let audioInitialized = false;

            const AudioEngine = {
                init: async () => {
                    if (!audioInitialized) {
                        await Tone.start();
                        audioInitialized = true;
                    }
                },
                playClick: () => {
                    if (!audioEnabled || !audioInitialized) return;
                    const synth = new Tone.MembraneSynth().toDestination();
                    synth.triggerAttackRelease("C2", "32n", Tone.now(), 0.1);
                },
                playError: () => {
                    if (!audioEnabled || !audioInitialized) return;
                    const synth = new Tone.PluckSynth().toDestination();
                    synth.triggerAttackRelease("Eb2", "16n");
                },
                playSuccess: () => {
                    if (!audioEnabled || !audioInitialized) return;
                    const synth = new Tone.PolySynth().toDestination();
                    synth.triggerAttackRelease(["C4", "E4", "G4"], "16n");
                },
                playWin: () => {
                    if (!audioEnabled || !audioInitialized) return;
                    const synth = new Tone.PolySynth(
                        Tone.Synth,
                    ).toDestination();
                    const now = Tone.now();
                    synth.triggerAttackRelease(
                        ["C4", "E4", "G4", "C5"],
                        "8n",
                        now,
                    );
                    synth.triggerAttackRelease(
                        ["G4", "B4", "D5", "G5"],
                        "4n",
                        now + 0.3,
                    );
                },
            };

            // --- STATE ---
            let sentences = [];
            let currentIndex = 0;
            let sortable = null;

            // --- DOM ELEMENTS ---
            const wordContainer = document.getElementById("word-container");
            const checkBtn = document.getElementById("check-btn");
            const nextBtn = document.getElementById("next-btn");
            const revealBtn = document.getElementById("reveal-btn");
            const instructionLabel =
                document.getElementById("instruction-label");
            const feedbackMsg = document.getElementById("feedback-msg");
            const progressBar = document.getElementById("progress-bar");
            const setupModal = document.getElementById("setup-modal");
            const sentenceInput = document.getElementById("sentence-input");

            // --- PERSISTENCE ---
            function saveSentences(text) {
                try {
                    localStorage.setItem(LS_KEY_SENTENCES, text);
                } catch (e) {
                    console.error("Could not save to local storage", e);
                }
            }

            function loadSentences() {
                try {
                    const savedSentences =
                        localStorage.getItem(LS_KEY_SENTENCES);
                    if (savedSentences) {
                        sentenceInput.value = savedSentences;
                    }
                } catch (e) {
                    console.error("Could not load from local storage", e);
                }
            }

            // --- THEME MANAGEMENT ---
            function toggleTheme() {
                const html = document.documentElement;
                const icon = document.getElementById("theme-icon");
                if (html.classList.contains("dark")) {
                    html.classList.remove("dark");
                    html.classList.add("light");
                    localStorage.setItem(LS_KEY_THEME, "light");
                    icon.setAttribute("data-lucide", "moon");
                } else {
                    html.classList.remove("light");
                    html.classList.add("dark");
                    localStorage.setItem(LS_KEY_THEME, "dark");
                    icon.setAttribute("data-lucide", "sun");
                }
                initIcons();
            }

            function initTheme() {
                const savedTheme = localStorage.getItem(LS_KEY_THEME);
                const html = document.documentElement;
                const icon = document.getElementById("theme-icon");

                if (
                    savedTheme === "dark" ||
                    (!savedTheme &&
                        window.matchMedia("(prefers-color-scheme: dark)")
                            .matches)
                ) {
                    html.classList.add("dark");
                    html.classList.remove("light");
                    icon.setAttribute("data-lucide", "sun");
                } else {
                    html.classList.remove("dark");
                    html.classList.add("light");
                    icon.setAttribute("data-lucide", "moon");
                }
            }

            // --- FUNCTIONS ---
            function initIcons() {
                lucide.createIcons({
                    attrs: {
                        "stroke-width": 2.75,
                    },
                });
            }

            function shuffleArray(array) {
                for (let i = array.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [array[i], array[j]] = [array[j], array[i]];
                }
                return array;
            }

            async function startGame() {
                // Must initialize Audio Engine on a user click to satisfy browser policies
                await AudioEngine.init();

                const raw = sentenceInput.value;
                sentences = raw
                    .split(/[\n;]+/)
                    .map((s) => s.trim())
                    .filter((s) => s.length > 0);

                if (sentences.length === 0) return;

                saveSentences(raw);

                setupModal.classList.add("hidden");
                document.getElementById("empty-state").classList.add("hidden");
                document.getElementById("game-area").classList.remove("hidden");
                document.getElementById("game-area").classList.add("flex");

                const totalRounds = sentences.length;
                document.getElementById("total-rounds").innerText = totalRounds;

                currentIndex = 0;
                loadSentence();
            }

            function loadSentence() {
                const sentence = sentences[currentIndex];
                let itemsToOrder = sentence.split(/\s+/);

                instructionLabel.innerText = "Drag words to order";
                instructionLabel.className =
                    "absolute -top-5 left-4 sm:left-8 bg-orange text-dark border-neo px-4 py-1 rounded-lg text-xs sm:text-sm font-bold uppercase tracking-wider shadow-neo-sm rotate-[-2deg] z-10";

                let shuffled = shuffleArray([...itemsToOrder]);

                // Ensure it's actually shuffled if possible
                let attempts = 0;
                while (
                    shuffled.join(" ") === itemsToOrder.join(" ") &&
                    itemsToOrder.length > 1 &&
                    attempts < 10
                ) {
                    shuffled = shuffleArray([...shuffled]);
                    attempts++;
                }

                wordContainer.innerHTML = "";
                feedbackMsg.innerText = "";
                feedbackMsg.className =
                    "h-16 mb-4 flex items-center justify-center text-xl sm:text-2xl font-bold font-heading tracking-wide";

                checkBtn.classList.remove("hidden");
                revealBtn.classList.remove("hidden");
                nextBtn.classList.add("hidden");

                // Render Words (NEO BRUTAL STYLE)
                shuffled.forEach((item) => {
                    const div = document.createElement("div");
                    div.className =
                        "word-card bg-white dark:bg-slate-700 border-2 border-dark dark:border-slate-400 text-dark dark:text-chalk px-4 sm:px-6 py-2 sm:py-3 rounded-xl text-lg sm:text-2xl shadow-neo-sm";
                    div.innerText = item;
                    wordContainer.appendChild(div);
                });

                const totalRounds = sentences.length;
                document.getElementById("current-round").innerText =
                    currentIndex + 1;
                const pct = (currentIndex / totalRounds) * 100;
                progressBar.style.width = `${pct}%`;

                if (sortable) sortable.destroy();
                sortable = new Sortable(wordContainer, {
                    animation: 350,
                    easing: "cubic-bezier(0.25, 1, 0.5, 1)",
                    forceFallback: true, // Forces custom dragging, much smoother shifting
                    fallbackClass: "sortable-fallback",
                    ghostClass: "sortable-ghost",
                    dragClass: "sortable-drag",
                    onStart: () => AudioEngine.playClick(),
                });
            }

            function revealAnswer() {
                sortable.option("disabled", true);
                checkBtn.classList.add("hidden");
                revealBtn.classList.add("hidden");

                const sentence = sentences[currentIndex];
                const targetWords = sentence.split(/\s+/);
                const currentNodes = Array.from(wordContainer.children);

                // Match current DOM nodes to target words handling potential duplicate words
                let availableNodes = [...currentNodes];
                let targetNodes = [];
                for (let word of targetWords) {
                    const idx = availableNodes.findIndex(
                        (n) => n.innerText === word,
                    );
                    if (idx !== -1) {
                        targetNodes.push(availableNodes.splice(idx, 1)[0]);
                    }
                }

                // FLIP Animation Algorithm (First, Last, Invert, Play)

                // 1. First: Record initial positions
                const firstPositions = targetNodes.map((node) => {
                    const rect = node.getBoundingClientRect();
                    return { left: rect.left, top: rect.top };
                });

                // 2. Last: Reorder seamlessly in the DOM
                targetNodes.forEach((node) => wordContainer.appendChild(node));

                // 3. Invert: Record target positions and push elements back to start virtually
                targetNodes.forEach((node, i) => {
                    const lastRect = node.getBoundingClientRect();
                    const dx = firstPositions[i].left - lastRect.left;
                    const dy = firstPositions[i].top - lastRect.top;

                    node.style.transition = "none";
                    node.style.transform = `translate(${dx}px, ${dy}px)`;
                });

                // 4. Force browser reflow to acknowledge starting positions
                void wordContainer.offsetWidth;

                // 5. Play: Enable transitions and snap to natural flexbox positions
                targetNodes.forEach((node) => {
                    node.style.transition =
                        "transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), background-color 0.3s, color 0.3s";
                    node.style.transform = "translate(0, 0)";

                    // Animate into the "Revealed" Orange style
                    node.classList.remove(
                        "bg-white",
                        "dark:bg-slate-700",
                        "dark:border-slate-400",
                        "dark:text-chalk",
                    );
                    node.classList.add("bg-orange", "border-dark", "text-dark");
                });

                feedbackMsg.innerHTML = `<span class="text-orange flex items-center gap-2 drop-shadow-sm"><i data-lucide="eye" class="stroke-[4] w-6 h-6 sm:w-8 sm:h-8"></i> REVEALED</span>`;
                initIcons();

                // 6. Finish up & Cleanup inline styles after animation completes
                setTimeout(() => {
                    targetNodes.forEach((node) => {
                        node.style.transition = "";
                        node.style.transform = "";
                    });

                    const totalRounds = sentences.length;
                    if (currentIndex < totalRounds - 1) {
                        nextBtn.classList.remove("hidden");
                    } else {
                        setTimeout(finishGame, 1000);
                    }
                }, 500); // 500ms matches transform transition
            }

            function checkAnswer() {
                const currentItems = Array.from(wordContainer.children).map(
                    (el) => el.innerText,
                );
                const userString = currentItems.join(" ");
                const targetString = sentences[currentIndex];

                // Normalize spacing for comparison
                const normalize = (str) => str.replace(/\s+/g, " ").trim();

                if (normalize(userString) === normalize(targetString)) {
                    AudioEngine.playSuccess();
                    feedbackMsg.innerHTML = `<span class="text-green flex items-center gap-2 drop-shadow-sm"><i data-lucide="check" class="stroke-[4] w-6 h-6 sm:w-8 sm:h-8"></i> CORRECT!</span>`;
                    wordContainer
                        .querySelectorAll(".word-card")
                        .forEach((card) => {
                            card.classList.remove(
                                "bg-white",
                                "dark:bg-slate-700",
                                "border-dark",
                                "dark:border-slate-400",
                            );
                            card.classList.add(
                                "bg-green",
                                "border-dark",
                                "text-dark",
                            );
                        });

                    sortable.option("disabled", true);
                    checkBtn.classList.add("hidden");
                    revealBtn.classList.add("hidden");

                    const totalRounds = sentences.length;
                    if (currentIndex < totalRounds - 1) {
                        nextBtn.classList.remove("hidden");
                    } else {
                        setTimeout(finishGame, 1000);
                    }
                    initIcons();
                } else {
                    AudioEngine.playError();
                    feedbackMsg.innerHTML = `<span class="text-pink flex items-center gap-2 drop-shadow-sm"><i data-lucide="x" class="stroke-[4] w-6 h-6 sm:w-8 sm:h-8"></i> TRY AGAIN</span>`;
                    document
                        .getElementById("game-area")
                        .classList.add("animate-shake");
                    setTimeout(
                        () =>
                            document
                                .getElementById("game-area")
                                .classList.remove("animate-shake"),
                        500,
                    );
                    initIcons();
                }
            }

            function nextRound() {
                currentIndex++;
                loadSentence();
            }

            function finishGame() {
                AudioEngine.playWin();
                confetti({
                    particleCount: 150,
                    spread: 70,
                    origin: { y: 0.6 },
                    colors: ["#FF6B95", "#FF8C42", "#00E676", "#2979FF"],
                });
                progressBar.style.width = "100%";
                document.getElementById("win-modal").classList.remove("hidden");
            }

            async function restartGame() {
                await AudioEngine.init();
                document.getElementById("win-modal").classList.add("hidden");
                currentIndex = 0;
                loadSentence();
            }

            // --- EVENT LISTENERS ---
            document
                .getElementById("setup-btn")
                .addEventListener("click", () =>
                    setupModal.classList.remove("hidden"),
                );
            document
                .getElementById("close-setup")
                .addEventListener("click", () =>
                    setupModal.classList.add("hidden"),
                );
            document
                .getElementById("start-game-btn")
                .addEventListener("click", startGame);
            document
                .getElementById("check-btn")
                .addEventListener("click", checkAnswer);
            document
                .getElementById("reveal-btn")
                .addEventListener("click", revealAnswer);
            document
                .getElementById("next-btn")
                .addEventListener("click", nextRound);
            document
                .getElementById("play-again-btn")
                .addEventListener("click", restartGame);
            document
                .getElementById("theme-toggle")
                .addEventListener("click", toggleTheme);

            document.querySelectorAll(".preset-btn").forEach((btn) => {
                btn.addEventListener("click", (e) => {
                    const text = e.target.dataset.text.replace(/; /g, "\n");
                    sentenceInput.value = text;
                    saveSentences(text);
                });
            });

            document
                .getElementById("sound-toggle")
                .addEventListener("click", (e) => {
                    audioEnabled = !audioEnabled;
                    const icon = audioEnabled ? "volume-2" : "volume-x";
                    e.currentTarget.innerHTML = `<i data-lucide="${icon}" class="w-6 h-6"></i>`;
                    initIcons();
                });

            // --- INITIALIZATION ---
            function initializeApplication() {
                initTheme();
                loadSentences();
                sentenceInput.addEventListener("input", (e) =>
                    saveSentences(e.target.value),
                );
                document.getElementById("setup-btn").click();
                initIcons();
                sentenceInput.focus();
            }

            window.onload = initializeApplication;
        </script>
    </body>
</html>
