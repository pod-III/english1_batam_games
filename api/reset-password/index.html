<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | KlassKit</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .neo-brutalism-card {
            border: 4px solid #0F172A;
            box-shadow: 8px 8px 0px #0F172A;
        }
        .neo-brutalism-btn {
            border: 3px solid #0F172A;
            box-shadow: 4px 4px 0px #0F172A;
            transition: all 0.1s ease;
        }
        .neo-brutalism-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px #0F172A;
        }
    </style>
</head>
<body class="bg-[#F8FAFC] flex items-center justify-center min-h-screen p-4">

    <div class="neo-brutalism-card bg-white w-full max-w-md p-8">
        <h1 class="text-3xl font-black text-[#4F46E5] uppercase mb-2">New Password</h1>
        <p class="text-slate-600 mb-6">Enter a new password for your KlassKit account.</p>

        <form id="resetForm" class="space-y-4">
            <div>
                <label class="block font-bold text-[#0F172A] mb-1">New Password</label>
                <input type="password" id="newPassword" required 
                    class="w-full p-3 border-3 border-[#0F172A] focus:outline-none focus:ring-2 focus:ring-[#4F46E5] text-lg font-medium"
                    style="border: 3px solid #0F172A;">
            </div>
            
            <button type="submit" 
                class="neo-brutalism-btn w-full py-4 bg-[#F59E0B] text-[#0F172A] font-black text-xl uppercase">
                Update Password
            </button>
        </form>

        <div id="message" class="mt-6 hidden p-4 font-bold border-2 border-[#0F172A]"></div>
    </div>

    <script>
        const resetForm = document.getElementById('resetForm');
        const messageBox = document.getElementById('message');

        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPassword = document.getElementById('newPassword').value;

            const { data, error } = await updatePassword(newPassword);

            messageBox.classList.remove('hidden');
            if (error) {
                messageBox.style.backgroundColor = '#FECACA'; // Red
                messageBox.innerText = "Error: " + error.message;
            } else {
                messageBox.style.backgroundColor = '#CCFBF1'; // Teal
                messageBox.innerText = "Success! Password updated. Redirecting to login...";
                
                // Send them back to login after a short delay
                setTimeout(() => {
                    window.location.href = '/login.html';
                }, 2000);
            }
        });

        // Safety: Ensure user is actually coming from a recovery link
        window.addEventListener('load', async () => {
            const user = await getUser();
            if (!user && !window.location.hash.includes('type=recovery')) {
                window.location.href = '/login.html';
            }
        });
    </script>
</body>
</html>
