<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | KlassKit</title>
    <link rel="icon" type="image/x-icon" href="../media/icon.ico" />
    <link rel="icon" type="image/webp" href="../media/icon.webp" />
    <link rel="apple-touch-icon" href="../media/icon-180.png" />
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#1ea7fd">
    
    <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="../supabase.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@700&family=Nunito:wght@400;600;700;800&display=swap"
        rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../css/base.css">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        pink: '#ff4785',
                        orange: '#ff7e33',
                        green: '#00d063',
                        blue: '#1ea7fd',
                        dark: '#111827',
                    },
                    fontFamily: {
                        heading: ['Fredoka', 'sans-serif'],
                        body: ['Nunito', 'sans-serif'],
                    },
                    boxShadow: {
                        'hard': '4px 4px 0px 0px #111827',
                    }
                }
            }
        }
    </script>
    <style>
        /* Glassmorphism Card */
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 4px solid var(--border-primary);
            box-shadow: 8px 8px 0px var(--border-primary);
        }

        .dark .glass-card {
            background: rgba(15, 23, 42, 0.8);
            border-color: #334155;
            box-shadow: 8px 8px 0px #000000;
        }

        /* Chunky Buttons */
        .btn-chunky {
            position: relative;
            background: white;
            border: 4px solid var(--border-primary);
            box-shadow: 0 4px 0 var(--border-primary);
            transition: all 0.15s cubic-bezier(0.2, 0.8, 0.2, 1);
            cursor: pointer;
        }

        .btn-chunky:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 0 var(--border-primary);
        }

        .btn-chunky:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 var(--border-primary);
        }

        .dark .btn-chunky {
            border-color: #334155;
            box-shadow: 0 4px 0 #000000;
        }

        .dark .btn-chunky:hover {
            box-shadow: 0 6px 0 #000000;
        }

        .dark .btn-chunky:active {
            box-shadow: 0 0px 0 #000000;
        }

        /* Auth Inputs */
        .auth-input {
            background: white;
            border: 4px solid var(--border-primary);
            border-radius: 1rem;
            padding: 0.75rem 1rem;
            font-weight: 700;
            transition: all 0.2s;
            outline: none;
            width: 100%;
        }

        .dark .auth-input {
            background: #0f172a;
            color: white;
            border-color: #334155;
        }

        .auth-input:focus {
            border-color: #1ea7fd;
            transform: translateY(-1px);
            box-shadow: 0 4px 0 rgba(30, 167, 253, 0.2);
        }

        /* Animations */
        @keyframes pop-in {
            0% {
                opacity: 0;
                transform: scale(0.9) translateY(10px);
            }

            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .animate-pop-in {
            animation: pop-in 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4 bg-[#f8fafc] dark:bg-[#020617]">

    <div class="glass-card w-full max-w-md p-8 rounded-3xl animate-pop-in">
        <div class="text-center mb-8">
            <div
                class="w-16 h-16 bg-orange rounded-2xl border-4 border-dark dark:border-slate-500 flex items-center justify-center mx-auto mb-4 -rotate-3 shadow-hard">
                <i data-lucide="key" class="w-8 h-8 text-white"></i>
            </div>
            <h1 class="font-heading text-3xl font-black text-dark dark:text-white uppercase tracking-tight">New Password</h1>
            <p class="text-slate-500 dark:text-slate-400 font-bold mt-2">Secure your KlassKit account</p>
        </div>

        <form id="resetForm" class="space-y-5">
            <div class="space-y-1.5">
                <label class="block text-sm font-extrabold text-dark dark:text-slate-300 ml-1 uppercase tracking-wider">New Password</label>
                <div class="relative">
                    <i data-lucide="lock" class="absolute left-3.5 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400"></i>
                    <input type="password" id="newPassword" required
                        class="auth-input pl-11" placeholder="••••••••">
                </div>
            </div>

            <div class="space-y-1.5">
                <label class="block text-sm font-extrabold text-dark dark:text-slate-300 ml-1 uppercase tracking-wider">Confirm Password</label>
                <div class="relative">
                    <i data-lucide="shield-check" class="absolute left-3.5 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400"></i>
                    <input type="password" id="confirmPassword" required
                        class="auth-input pl-11" placeholder="••••••••">
                </div>
            </div>

            <button type="submit"
                class="btn-chunky w-full py-3.5 mt-4 rounded-2xl bg-orange text-white font-heading text-lg uppercase tracking-wide flex items-center justify-center gap-2">
                <span>Update Password</span> <i data-lucide="arrow-right" class="w-5 h-5"></i>
            </button>
        </form>

        <div id="message" class="hidden mt-6 p-4 rounded-xl border-4 border-dark text-sm font-bold text-center"></div>

        <div class="mt-8 text-center pt-min">
             <a href="../login.html" class="inline-flex items-center text-xs font-black text-slate-400 hover:text-dark dark:hover:text-white uppercase tracking-tighter transition-colors">
                <i data-lucide="arrow-left" class="w-3 h-3 mr-1"></i> Back to Login
             </a>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // Theme sync with system/localStorage
        window.addEventListener('DOMContentLoaded', () => {
            const saved = localStorage.getItem('theme_hub');
            if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            }
        });

        const resetForm = document.getElementById('resetForm');
        const messageBox = document.getElementById('message');

        function showFeedback(text, isError) {
            messageBox.innerText = text;
            messageBox.classList.remove('hidden');
            if (isError) {
                messageBox.className = 'mt-6 p-3 rounded-xl border-4 border-dark dark:border-slate-500 bg-pink/10 text-pink text-sm font-bold text-center';
            } else {
                messageBox.className = 'mt-6 p-3 rounded-xl border-4 border-dark dark:border-slate-500 bg-green/10 text-green text-sm font-bold text-center';
            }
        }

        // ── On load: parse the hash and set the session ──────────────────────
        window.addEventListener('load', async () => {
            if (!window.db) return; 
            
            const hash = new URLSearchParams(window.location.hash.substring(1));
            const accessToken = hash.get('access_token');
            const refreshToken = hash.get('refresh_token');
            const type = hash.get('type');

            if (type === 'recovery' && accessToken) {
                const { error } = await db.auth.setSession({
                    access_token: accessToken,
                    refresh_token: refreshToken
                });

                if (error) {
                    showFeedback("Invalid or expired link. Please request a new one.", true);
                    resetForm.style.display = 'none';
                }
            } else {
                setTimeout(() => {
                    // Safety timeout if missing or wrong token types
                }, 500); 
            }
        });

        // ── On submit: update the password ───────────────────────────────────
        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const btnSpan = resetForm.querySelector('button span');
            
            messageBox.classList.add('hidden');

            if (newPassword !== confirmPassword) {
                showFeedback("Passwords do not match. Please try again.", true);
                return;
            }
            if (newPassword.length < 6) {
                showFeedback("Password must be at least 6 characters.", true);
                return;
            }

            btnSpan.innerText = 'Updating...';
            resetForm.querySelector('button').disabled = true;

            const { data, error } = await updatePassword(newPassword);

            if (error) {
                btnSpan.innerText = 'Update Password';
                resetForm.querySelector('button').disabled = false;
                showFeedback("Error: " + error.message, true);
            } else {
                showFeedback("✅ Password updated! Redirecting to login...", false);
                setTimeout(() => { window.location.href = '../login.html'; }, 2000);
            }
        });

        // Register Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('../sw.js')
                    .then(reg => console.log('SW Registered!', reg))
                    .catch(err => console.log('SW Reg error:', err));
            });
        }
    </script>
</body>

</html>
