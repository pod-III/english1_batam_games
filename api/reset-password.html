<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | KlassKit</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../supabase.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .neo-brutalism-card {
            border: 4px solid #0F172A;
            box-shadow: 8px 8px 0px #0F172A;
        }

        .neo-brutalism-btn {
            border: 3px solid #0F172A;
            box-shadow: 4px 4px 0px #0F172A;
            transition: all 0.1s ease;
        }

        .neo-brutalism-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px #0F172A;
        }

        .input-field {
            border: 3px solid #0F172A;
        }
    </style>
</head>

<body class="bg-[#F8FAFC] flex items-center justify-center min-h-screen p-4">

    <div class="neo-brutalism-card bg-white w-full max-w-md p-8">
        <h1 class="text-3xl font-black text-[#4F46E5] uppercase mb-2">New Password</h1>
        <p class="text-slate-600 mb-6">Please enter and confirm your new password for KlassKit.</p>

        <form id="resetForm" class="space-y-5">
            <div>
                <label class="block font-bold text-[#0F172A] mb-1">New Password</label>
                <input type="password" id="newPassword" required
                    class="input-field w-full p-3 focus:outline-none focus:ring-2 focus:ring-[#4F46E5] text-lg font-medium">
            </div>

            <div>
                <label class="block font-bold text-[#0F172A] mb-1">Confirm New Password</label>
                <input type="password" id="confirmPassword" required
                    class="input-field w-full p-3 focus:outline-none focus:ring-2 focus:ring-[#4F46E5] text-lg font-medium">
            </div>

            <button type="submit"
                class="neo-brutalism-btn w-full py-4 bg-[#F59E0B] text-[#0F172A] font-black text-xl uppercase mt-4">
                Update Password
            </button>
        </form>

        <div id="message" class="mt-6 hidden p-4 font-bold border-2 border-[#0F172A]"></div>
    </div>

    <script>
        const resetForm = document.getElementById('resetForm');
        const messageBox = document.getElementById('message');

        // ── On load: parse the hash and set the session ──────────────────────
        window.addEventListener('load', async () => {
            const hash = new URLSearchParams(window.location.hash.substring(1));
            const accessToken = hash.get('access_token');
            const refreshToken = hash.get('refresh_token');
            const type = hash.get('type');

            if (type === 'recovery' && accessToken) {
                // This is the critical missing step — feed the token to Supabase
                const { error } = await db.auth.setSession({
                    access_token: accessToken,
                    refresh_token: refreshToken
                });

                if (error) {
                    showFeedback("Invalid or expired link. Please request a new one.", "#FECACA");
                    resetForm.style.display = 'none';
                }
            } else {
                // No valid recovery token — kick them out
                window.location.href = '/login.html';
            }
        });

        // ── On submit: update the password ───────────────────────────────────
        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            messageBox.classList.add('hidden');

            if (newPassword !== confirmPassword) {
                showFeedback("Passwords do not match. Please try again.", "#FECACA");
                return;
            }

            const { data, error } = await updatePassword(newPassword);

            if (error) {
                showFeedback("Error: " + error.message, "#FECACA");
            } else {
                showFeedback("✅ Password updated! Redirecting to login...", "#CCFBF1");
                setTimeout(() => { window.location.href = '/login.html'; }, 2000);
            }
        });

        function showFeedback(text, bgColor) {
            messageBox.innerText = text;
            messageBox.style.backgroundColor = bgColor;
            messageBox.classList.remove('hidden');
        }
    </script>
</body>

</html>
