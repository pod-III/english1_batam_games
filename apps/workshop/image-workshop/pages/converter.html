<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Converter - KlassKit</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.105.4"></script>
    <script src="/supabase.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@1.16.0"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'pink': '#ff4785',
                        'orange': '#ff7e33',
                        'green': '#00d063',
                        'blue': '#1ea7fd',
                        'dark': '#0f172a',
                        'chalk': '#f8fafc',
                    },
                    fontFamily: {
                        heading: ['Fredoka', 'sans-serif'],
                        body: ['Nunito', 'sans-serif'],
                    },
                    boxShadow: {
                        'hard': '4px 4px 0px 0px #0f172a',
                        'hard-hover': '8px 8px 0px 0px #0f172a',
                        'hard-blue': '4px 4px 0px 0px #1ea7fd',
                        'hard-orange': '4px 4px 0px 0px #ff7e33',
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #f8fafc;
            background-image: 
                linear-gradient(#cbd5e1 1px, transparent 1px),
                linear-gradient(90deg, #cbd5e1 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .dark body {
            background-color: #020617;
            background-image: 
                linear-gradient(#0f172a 1px, transparent 1px),
                linear-gradient(90deg, #0f172a 1px, transparent 1px);
        }

        .btn-chunky {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-chunky:hover:not(:disabled) {
            transform: translateY(-4px);
            box-shadow: 8px 8px 0px 0px #0f172a;
        }
        .btn-chunky:active:not(:disabled) {
            transform: translateY(4px);
            box-shadow: 0px 0px 0px 0px #0f172a;
        }

        .glass {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .dark .glass {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .tab-btn {
            transition: all 0.2s ease;
        }
        .tab-btn.active {
            background: #ff7e33;
            color: white;
            box-shadow: 4px 4px 0px 0px #0f172a;
            transform: translateY(-2px);
        }

        .checkerboard {
            background-image: linear-gradient(45deg, #e2e8f0 25%, transparent 25%), 
                              linear-gradient(-45deg, #e2e8f0 25%, transparent 25%), 
                              linear-gradient(45deg, transparent 75%, #e2e8f0 75%), 
                              linear-gradient(-45deg, transparent 75%, #e2e8f0 75%);
            background-size: 10px 10px;
            background-position: 0 0, 0 5px, 5px -5px, -5px 0px;
        }

        .dark .checkerboard {
            background-image: linear-gradient(45deg, #1e293b 25%, transparent 25%), 
                              linear-gradient(-45deg, #1e293b 25%, transparent 25%), 
                              linear-gradient(45deg, transparent 75%, #1e293b 75%), 
                              linear-gradient(-45deg, transparent 75%, #1e293b 75%);
        }
    </style>
</head>

<body class="font-body text-dark dark:text-chalk min-h-screen p-4 md:p-8">

    <main class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div class="flex items-center gap-4">
                <a href="../index.html" class="bg-white dark:bg-slate-800 border-4 border-dark dark:border-slate-500 p-3 rounded-2xl shadow-hard btn-chunky">
                    <i data-lucide="arrow-left" class="w-6 h-6"></i>
                </a>
                <div>
                    <h1 class="font-heading font-bold text-3xl md:text-4xl uppercase">FILE <span class="text-orange">CONVERTER</span></h1>
                    <p class="text-slate-500 dark:text-slate-400 font-bold text-sm uppercase tracking-widest">PDF & Image Processing</p>
                </div>
            </div>
            
            <button id="themeToggle" class="bg-white dark:bg-slate-800 border-4 border-dark dark:border-slate-500 p-3 rounded-2xl shadow-hard btn-chunky">
                <i data-lucide="sun" class="w-6 h-6 hidden dark:block"></i>
                <i data-lucide="moon" class="w-6 h-6 block dark:hidden"></i>
            </button>
        </header>

        <!-- Tabs -->
        <div class="flex gap-4 mb-8">
            <button data-tab="pdf2img" class="tab-btn active px-6 py-3 font-heading font-bold rounded-xl border-4 border-dark dark:border-slate-500 bg-white dark:bg-slate-800 flex items-center gap-2">
                <i data-lucide="file-image"></i>
                PDF → IMAGE
            </button>
            <button data-tab="img2pdf" class="tab-btn px-6 py-3 font-heading font-bold rounded-xl border-4 border-dark dark:border-slate-500 bg-white dark:bg-slate-800 flex items-center gap-2">
                <i data-lucide="file-plus"></i>
                IMAGE → PDF
            </button>
        </div>

        <!-- PDF to Image Panel -->
        <div id="pdf2img" class="tab-panel grid grid-cols-1 lg:grid-cols-12 gap-8">
            <aside class="lg:col-span-4 flex flex-col gap-6">
                <!-- Upload Card -->
                <div class="bg-white dark:bg-slate-900 border-4 border-dark dark:border-slate-500 rounded-[2rem] p-6 shadow-hard relative overflow-hidden group">
                    <div class="absolute top-0 right-0 w-24 h-24 bg-orange/10 rounded-bl-full -mr-4 -mt-4 transition-transform group-hover:scale-150"></div>
                    <h2 class="font-heading font-bold text-xl mb-4 flex items-center gap-2 uppercase">
                        <i data-lucide="upload" class="text-orange"></i>
                        PDF File
                    </h2>
                    <label class="block cursor-pointer">
                        <input type="file" id="pdfInput" accept="application/pdf" class="hidden">
                        <div id="pdfDrop" class="border-4 border-dashed border-slate-200 dark:border-slate-700 rounded-2xl p-8 text-center hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors">
                            <i data-lucide="file-text" class="w-12 h-12 mx-auto mb-3 text-slate-400"></i>
                            <p class="font-bold text-slate-500">Drop PDF here or click</p>
                        </div>
                    </label>
                    <div id="pdfFileList" class="mt-4"></div>
                </div>

                <!-- Settings Card -->
                <div class="bg-white dark:bg-slate-900 border-4 border-dark dark:border-slate-500 rounded-[2rem] p-6 shadow-hard">
                    <h2 class="font-heading font-bold text-xl mb-4 flex items-center gap-2 uppercase">
                        <i data-lucide="settings" class="text-blue"></i>
                        Settings
                    </h2>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs font-black uppercase mb-1 text-slate-400">Output Format</label>
                            <select id="imgFormat" class="w-full bg-slate-50 dark:bg-slate-800 border-2 border-dark dark:border-slate-600 rounded-xl p-3 font-bold">
                                <option value="image/png">PNG</option>
                                <option value="image/jpeg">JPEG</option>
                                <option value="image/webp">WebP</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-black uppercase mb-1 text-slate-400">Quality / Scale</label>
                            <select id="imgScale" class="w-full bg-slate-50 dark:bg-slate-800 border-2 border-dark dark:border-slate-600 rounded-xl p-3 font-bold">
                                <option value="1">1x - Standard (72 DPI)</option>
                                <option value="2" selected>2x - High (144 DPI)</option>
                                <option value="3">3x - Ultra (216 DPI)</option>
                            </select>
                        </div>
                    </div>
                </div>

                <button id="convertPdfBtn" disabled class="w-full bg-orange text-white font-heading font-bold text-xl py-4 rounded-2xl border-4 border-dark shadow-hard btn-chunky disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2">
                    <i data-lucide="refresh-cw"></i>
                    CONVERT PAGES
                </button>
            </aside>

            <section class="lg:col-span-8">
                <div class="bg-white dark:bg-slate-900 border-4 border-dark dark:border-slate-500 rounded-[2rem] p-6 shadow-hard h-full min-h-[500px] flex flex-col relative overflow-hidden">
                    <div class="flex justify-between items-center mb-4">
                        <h2 id="pdfResultsLabel" class="font-heading font-bold text-xl uppercase">Preview</h2>
                        <div id="pdfActions" class="hidden flex gap-2">
                            <button id="downloadAllImgs" class="bg-green text-dark px-4 py-2 rounded-xl font-bold text-sm border-2 border-dark shadow-hard btn-chunky flex items-center gap-2">
                                <i data-lucide="download"></i> ALL
                            </button>
                            <button id="clearPdfBtn" class="bg-slate-100 dark:bg-slate-800 px-4 py-2 rounded-xl font-bold text-sm border-2 border-dark shadow-hard btn-chunky">
                                CLEAR
                            </button>
                        </div>
                    </div>

                    <div id="pdfProgress" class="hidden mb-4">
                        <div class="flex items-center justify-between mb-2">
                            <span id="pdfProgressText" class="text-xs font-bold uppercase tracking-widest text-slate-400">Processing...</span>
                            <span id="pdfProgressPct" class="text-xs font-black text-orange">0%</span>
                        </div>
                        <div class="w-full h-4 bg-slate-100 dark:bg-slate-800 rounded-full border-2 border-dark overflow-hidden">
                            <div id="pdfProgressFill" class="h-full bg-orange transition-all duration-300" style="width: 0%"></div>
                        </div>
                    </div>

                    <div id="pdfStatus" class="hidden p-4 rounded-xl border-2 mb-4 font-bold text-sm"></div>

                    <div id="pdfImgGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4 overflow-y-auto max-h-[600px] p-2">
                        <!-- Preview images will go here -->
                        <div id="pdfEmptyState" class="col-span-full py-20 text-center">
                            <i data-lucide="file-image" class="w-16 h-16 mx-auto mb-4 text-slate-200"></i>
                            <p class="font-bold text-slate-400">No PDF processed yet</p>
                        </div>
                    </div>
                </div>
            </section>
        </div>

        <!-- Image to PDF Panel -->
        <div id="img2pdf" class="tab-panel hidden grid grid-cols-1 lg:grid-cols-12 gap-8">
            <aside class="lg:col-span-4 flex flex-col gap-6">
                <div class="bg-white dark:bg-slate-900 border-4 border-dark dark:border-slate-500 rounded-[2rem] p-6 shadow-hard relative overflow-hidden group">
                    <div class="absolute top-0 right-0 w-24 h-24 bg-blue/10 rounded-bl-full -mr-4 -mt-4 transition-transform group-hover:scale-150"></div>
                    <h2 class="font-heading font-bold text-xl mb-4 flex items-center gap-2 uppercase">
                        <i data-lucide="images" class="text-blue"></i>
                        Images
                    </h2>
                    <label class="block cursor-pointer">
                        <input type="file" id="imgInput" accept="image/*" multiple class="hidden">
                        <div id="imgDrop" class="border-4 border-dashed border-slate-200 dark:border-slate-700 rounded-2xl p-8 text-center hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors">
                            <i data-lucide="image-plus" class="w-12 h-12 mx-auto mb-3 text-slate-400"></i>
                            <p class="font-bold text-slate-500">Drop images here</p>
                        </div>
                    </label>
                </div>

                <div class="bg-white dark:bg-slate-900 border-4 border-dark dark:border-slate-500 rounded-[2rem] p-6 shadow-hard">
                    <h2 class="font-heading font-bold text-xl mb-4 flex items-center gap-2 uppercase">
                        <i data-lucide="file-text" class="text-green"></i>
                        PDF Layout
                    </h2>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs font-black uppercase mb-1 text-slate-400">Page Size</label>
                            <select id="pageSize" class="w-full bg-slate-50 dark:bg-slate-800 border-2 border-dark dark:border-slate-600 rounded-xl p-3 font-bold">
                                <option value="a4">A4</option>
                                <option value="letter">Letter</option>
                                <option value="fit">Fit Image</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-black uppercase mb-1 text-slate-400">Orientation</label>
                            <select id="pageOrient" class="w-full bg-slate-50 dark:bg-slate-800 border-2 border-dark dark:border-slate-600 rounded-xl p-3 font-bold">
                                <option value="auto">Auto</option>
                                <option value="portrait">Portrait</option>
                                <option value="landscape">Landscape</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-black uppercase mb-1 text-slate-400">Quality</label>
                            <select id="pdfQuality" class="w-full bg-slate-50 dark:bg-slate-800 border-2 border-dark dark:border-slate-600 rounded-xl p-3 font-bold">
                                <option value="0.75">75% (Small)</option>
                                <option value="0.92" selected>92% (High)</option>
                                <option value="1">100% (Original)</option>
                            </select>
                        </div>
                    </div>
                </div>

                <button id="convertImgBtn" disabled class="w-full bg-blue text-white font-heading font-bold text-xl py-4 rounded-2xl border-4 border-dark shadow-hard btn-chunky disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2">
                    <i data-lucide="file-output"></i>
                    GENERATE PDF
                </button>
            </aside>

            <section class="lg:col-span-8">
                <div class="bg-white dark:bg-slate-900 border-4 border-dark dark:border-slate-500 rounded-[2rem] p-6 shadow-hard h-full min-h-[500px] flex flex-col relative overflow-hidden">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="font-heading font-bold text-xl uppercase">Selected Images</h2>
                        <button id="clearImgBtn" class="hidden bg-slate-100 dark:bg-slate-800 px-4 py-2 rounded-xl font-bold text-sm border-2 border-dark shadow-hard btn-chunky">
                            CLEAR ALL
                        </button>
                    </div>

                    <div id="imgProgress" class="hidden mb-4">
                        <div class="flex items-center justify-between mb-2">
                            <span id="imgProgressText" class="text-xs font-bold uppercase tracking-widest text-slate-400">Preparing...</span>
                            <span id="imgProgressPct" class="text-xs font-black text-blue">0%</span>
                        </div>
                        <div class="w-full h-4 bg-slate-100 dark:bg-slate-800 rounded-full border-2 border-dark overflow-hidden">
                            <div id="imgProgressFill" class="h-full bg-blue transition-all duration-300" style="width: 0%"></div>
                        </div>
                    </div>

                    <div id="imgStatus" class="hidden p-4 rounded-xl border-2 mb-4 font-bold text-sm"></div>

                    <!-- PDF Result Display -->
                    <div id="imgResults" class="hidden mb-6 bg-green/10 dark:bg-green/5 border-4 border-green rounded-2xl p-6 flex flex-col md:flex-row items-center gap-6 shadow-hard">
                        <div class="w-16 h-16 bg-green text-white rounded-xl flex items-center justify-center shadow-hard-orange">
                            <i data-lucide="file-check" class="w-10 h-10"></i>
                        </div>
                        <div class="flex-grow text-center md:text-left">
                            <div id="outPdfName" class="font-heading font-bold text-xl">output.pdf</div>
                            <div id="outPdfMeta" class="text-sm font-bold text-slate-500">Ready for download</div>
                        </div>
                        <button id="downloadPdfBtn" class="w-full md:w-auto bg-green text-dark font-heading font-bold px-8 py-3 rounded-xl border-4 border-dark shadow-hard btn-chunky flex items-center justify-center gap-2">
                            <i data-lucide="download"></i> DOWNLOAD PDF
                        </button>
                    </div>

                    <div id="imgFileList" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4 overflow-y-auto max-h-[600px] p-2">
                        <div id="imgEmptyState" class="col-span-full py-20 text-center">
                            <i data-lucide="images" class="w-16 h-16 mx-auto mb-4 text-slate-200"></i>
                            <p class="font-bold text-slate-400">No images selected</p>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <footer class="mt-8 text-center text-slate-400 text-xs font-bold uppercase tracking-widest pb-8">
        KlassKit Converter • Client-Side Only • No Uploads
    </footer>

    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <script>
        // --- THEME & SETUP ---
        lucide.createIcons();
        const themeToggle = document.getElementById('themeToggle');
        
        function updateThemeIcon() {
            const isDark = document.documentElement.classList.contains('dark');
            themeToggle.innerHTML = isDark 
                ? '<i data-lucide="sun" class="w-6 h-6 text-orange"></i>' 
                : '<i data-lucide="moon" class="w-6 h-6 text-blue"></i>';
            lucide.createIcons();
        }

        async function initTheme() {
            await requireAuth();
            const savedTheme = localStorage.getItem('theme_image_converter') || 'light';
            if (savedTheme === 'dark') document.documentElement.classList.add('dark');
            updateThemeIcon();
        }

        themeToggle.addEventListener('click', () => {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme_image_converter', isDark ? 'dark' : 'light');
            updateThemeIcon();
        });

        initTheme();

        // --- TAB SWITCHING ---
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-panel').forEach(p => p.classList.add('hidden'));
                btn.classList.add('active');
                document.getElementById(btn.dataset.tab).classList.remove('hidden');
            });
        });

        // --- CORE LOGIC ---
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        function fmtSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1048576) return (bytes/1024).toFixed(1) + ' KB';
            return (bytes/1048576).toFixed(2) + ' MB';
        }
        function ext(fmt) {
            return fmt === 'image/jpeg' ? 'jpg' : fmt === 'image/webp' ? 'webp' : 'png';
        }
        function showStatus(el, msg, type) {
            el.textContent = msg;
            el.classList.remove('hidden', 'bg-green/10', 'border-green', 'text-green', 'bg-pink/10', 'border-pink', 'text-pink');
            el.classList.add('block');
            if (type === 'success') {
                el.classList.add('bg-green/10', 'border-green', 'text-green-600');
            } else {
                el.classList.add('bg-pink/10', 'border-pink', 'text-pink-600');
            }
        }
        function setProgress(fill, pct, label, pctEl, text) {
            fill.style.width = pct + '%';
            if (pctEl) pctEl.textContent = Math.round(pct) + '%';
            if (label && text) label.textContent = text;
        }
        function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

        // --- PDF TO IMAGE ---
        let pdfFile = null;
        let pdfRenderedBlobs = [];

        const pdfInput = document.getElementById('pdfInput');
        const pdfDrop = document.getElementById('pdfDrop');
        const pdfFileList = document.getElementById('pdfFileList');
        const convertPdfBtn = document.getElementById('convertPdfBtn');
        const pdfProgressWrap = document.getElementById('pdfProgress');
        const pdfProgressFill = document.getElementById('pdfProgressFill');
        const pdfProgressTxt = document.getElementById('pdfProgressText');
        const pdfProgressPct = document.getElementById('pdfProgressPct');
        const pdfStatus = document.getElementById('pdfStatus');
        const pdfImgGrid = document.getElementById('pdfImgGrid');
        const pdfEmptyState = document.getElementById('pdfEmptyState');
        const pdfActions = document.getElementById('pdfActions');
        const downloadAllBtn = document.getElementById('downloadAllImgs');
        const clearPdfBtn = document.getElementById('clearPdfBtn');

        function setPdfFile(file) {
            if (!file || file.type !== 'application/pdf') {
                showStatus(pdfStatus, '✖ Please select a valid PDF file.', 'error');
                return;
            }
            pdfFile = file;
            pdfFileList.innerHTML = `
                <div class="flex items-center gap-3 p-3 bg-slate-50 dark:bg-slate-800 rounded-xl border-2 border-dark mt-4 font-bold text-sm">
                    <i data-lucide="file-text" class="text-orange"></i>
                    <span class="truncate flex-grow">${file.name}</span>
                    <button class="text-pink hover:scale-110 transition-transform" id="removePdf"><i data-lucide="x-circle"></i></button>
                </div>
            `;
            lucide.createIcons();
            document.getElementById('removePdf').onclick = () => {
                pdfFile = null;
                pdfFileList.innerHTML = '';
                convertPdfBtn.disabled = true;
                pdfStatus.classList.add('hidden');
            };
            convertPdfBtn.disabled = false;
            pdfStatus.classList.add('hidden');
        }

        pdfInput.addEventListener('change', () => setPdfFile(pdfInput.files[0]));
        pdfDrop.addEventListener('dragover', e => { e.preventDefault(); pdfDrop.classList.add('bg-orange/5', 'border-orange'); });
        pdfDrop.addEventListener('dragleave', () => pdfDrop.classList.remove('bg-orange/5', 'border-orange'));
        pdfDrop.addEventListener('drop', e => {
            e.preventDefault();
            pdfDrop.classList.remove('bg-orange/5', 'border-orange');
            setPdfFile(e.dataTransfer.files[0]);
        });

        convertPdfBtn.addEventListener('click', async () => {
            if (!pdfFile) return;
            pdfImgGrid.innerHTML = '';
            pdfRenderedBlobs = [];
            convertPdfBtn.disabled = true;
            pdfStatus.classList.add('hidden');
            pdfEmptyState.classList.add('hidden');
            pdfActions.classList.add('hidden');

            const format = document.getElementById('imgFormat').value;
            const scale = parseFloat(document.getElementById('imgScale').value);

            pdfProgressWrap.classList.remove('hidden');
            setProgress(pdfProgressFill, 0, pdfProgressTxt, pdfProgressPct, 'Loading PDF...');

            try {
                const arrayBuffer = await pdfFile.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                const total = pdf.numPages;

                for (let i = 1; i <= total; i++) {
                    const page = await pdf.getPage(i);
                    const viewport = page.getViewport({ scale });
                    const canvas = document.createElement('canvas');
                    canvas.width = viewport.width;
                    canvas.height = viewport.height;
                    const ctx = canvas.getContext('2d');
                    await page.render({ canvasContext: ctx, viewport }).promise;

                    const blob = await new Promise(res => canvas.toBlob(res, format, 0.92));
                    pdfRenderedBlobs.push({ blob, name: `page-${String(i).padStart(3,'0')}.${ext(format)}` });

                    const card = document.createElement('div');
                    card.className = 'group relative aspect-[3/4] bg-white dark:bg-slate-800 rounded-xl border-2 border-dark overflow-hidden shadow-hard hover:scale-105 transition-all';
                    card.innerHTML = `
                        <div class="checkerboard w-full h-full">
                            <img src="${URL.createObjectURL(blob)}" class="w-full h-full object-contain">
                        </div>
                        <div class="absolute inset-0 bg-dark/60 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center p-2">
                            <button class="bg-white text-dark p-2 rounded-lg font-bold text-xs border-2 border-dark shadow-hard active:translate-y-1 active:shadow-none transition-all dl-page">
                                DOWNLOAD
                            </button>
                        </div>
                        <div class="absolute bottom-1 right-1 bg-white/90 dark:bg-dark/90 px-2 py-0.5 rounded-lg border border-dark text-[10px] font-black">
                            PG ${i}
                        </div>
                    `;
                    card.querySelector('.dl-page').onclick = () => downloadBlob(blob, `page-${String(i).padStart(3,'0')}.${ext(format)}`);
                    pdfImgGrid.appendChild(card);

                    const pct = (i / total) * 100;
                    setProgress(pdfProgressFill, pct, pdfProgressTxt, pdfProgressPct, `Rendering page ${i} of ${total}...`);
                    await sleep(0);
                }

                setProgress(pdfProgressFill, 100, pdfProgressTxt, pdfProgressPct, 'Done!');
                showStatus(pdfStatus, `✔ ${total} page${total>1?'s':''} converted.`, 'success');
                pdfActions.classList.remove('hidden');
            } catch (err) {
                console.error(err);
                showStatus(pdfStatus, '✖ Error: ' + err.message, 'error');
            } finally {
                convertPdfBtn.disabled = false;
            }
        });

        downloadAllBtn.addEventListener('click', async () => {
            for (const { blob, name } of pdfRenderedBlobs) {
                downloadBlob(blob, name);
                await sleep(150);
            }
        });

        clearPdfBtn.addEventListener('click', () => {
            pdfImgGrid.innerHTML = '';
            pdfEmptyState.classList.remove('hidden');
            pdfActions.classList.add('hidden');
            pdfProgressWrap.classList.add('hidden');
            pdfStatus.classList.add('hidden');
        });

        // --- IMAGE TO PDF ---
        let imgFiles = [];
        let outPdfBlob = null;

        const imgInput = document.getElementById('imgInput');
        const imgDrop = document.getElementById('imgDrop');
        const imgFileList = document.getElementById('imgFileList');
        const convertImgBtn = document.getElementById('convertImgBtn');
        const imgProgressWrap = document.getElementById('imgProgress');
        const imgProgressFill = document.getElementById('imgProgressFill');
        const imgProgressTxt = document.getElementById('imgProgressText');
        const imgProgressPct = document.getElementById('imgProgressPct');
        const imgStatus = document.getElementById('imgStatus');
        const imgResults = document.getElementById('imgResults');
        const imgEmptyState = document.getElementById('imgEmptyState');
        const clearImgBtn = document.getElementById('clearImgBtn');
        const downloadPdfBtn = document.getElementById('downloadPdfBtn');
        const outPdfName = document.getElementById('outPdfName');
        const outPdfMeta = document.getElementById('outPdfMeta');

        function renderImgFileList() {
            imgFileList.innerHTML = '';
            if (imgFiles.length === 0) {
                imgEmptyState.classList.remove('hidden');
                imgFileList.appendChild(imgEmptyState);
                clearImgBtn.classList.add('hidden');
                convertImgBtn.disabled = true;
                return;
            }
            
            imgEmptyState.classList.add('hidden');
            clearImgBtn.classList.remove('hidden');
            convertImgBtn.disabled = false;

            imgFiles.forEach((file, idx) => {
                const card = document.createElement('div');
                card.className = 'relative aspect-square bg-slate-50 dark:bg-slate-800 rounded-xl border-2 border-dark overflow-hidden shadow-hard group';
                
                const url = URL.createObjectURL(file);
                card.innerHTML = `
                    <img src="${url}" class="w-full h-full object-cover">
                    <button class="absolute top-1 right-1 bg-pink text-white w-6 h-6 rounded-lg border border-dark shadow-hard flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity" onclick="removeImg(${idx})">
                        <i data-lucide="x" class="w-4 h-4"></i>
                    </button>
                    <div class="absolute bottom-0 left-0 right-0 bg-white/90 dark:bg-dark/90 p-1 border-t border-dark truncate text-[10px] font-bold">
                        ${file.name}
                    </div>
                `;
                imgFileList.appendChild(card);
                lucide.createIcons();
            });
        }

        window.removeImg = (idx) => {
            imgFiles.splice(idx, 1);
            renderImgFileList();
            imgResults.classList.add('hidden');
        };

        function addImgFiles(files) {
            const allowed = ['image/png','image/jpeg','image/webp','image/gif','image/bmp'];
            Array.from(files).forEach(f => {
                if (allowed.includes(f.type)) imgFiles.push(f);
            });
            renderImgFileList();
            imgStatus.classList.add('hidden');
            imgResults.classList.add('hidden');
        }

        imgInput.addEventListener('change', () => addImgFiles(imgInput.files));
        imgDrop.addEventListener('dragover', e => { e.preventDefault(); imgDrop.classList.add('bg-blue/5', 'border-blue'); });
        imgDrop.addEventListener('dragleave', () => imgDrop.classList.remove('bg-blue/5', 'border-blue'));
        imgDrop.addEventListener('drop', e => {
            e.preventDefault();
            imgDrop.classList.remove('bg-blue/5', 'border-blue');
            addImgFiles(e.dataTransfer.files);
        });

        function loadImage(file) {
            return new Promise((res, rej) => {
                const img = new Image();
                const url = URL.createObjectURL(file);
                img.onload = () => { URL.revokeObjectURL(url); res(img); };
                img.onerror = () => { URL.revokeObjectURL(url); rej(new Error('Failed to load ' + file.name)); };
                img.src = url;
            });
        }

        convertImgBtn.addEventListener('click', async () => {
            if (!imgFiles.length) return;
            convertImgBtn.disabled = true;
            imgStatus.classList.add('hidden');
            imgProgressWrap.classList.remove('hidden');
            imgResults.classList.add('hidden');
            setProgress(imgProgressFill, 0, imgProgressTxt, imgProgressPct, 'Initializing...');

            try {
                const { jsPDF } = window.jspdf;
                const pageSize = document.getElementById('pageSize').value;
                const orient = document.getElementById('pageOrient').value;
                const quality = parseFloat(document.getElementById('pdfQuality').value);

                const PAGE_SIZES = {
                    a4: [595.28, 841.89],
                    letter: [612, 792]
                };

                let pdf = null;

                for (let i = 0; i < imgFiles.length; i++) {
                    const file = imgFiles[i];
                    setProgress(imgProgressFill, (i/imgFiles.length)*90, imgProgressTxt, imgProgressPct, `Adding image ${i+1}...`);
                    await sleep(0);

                    const img = await loadImage(file);
                    const iw = img.naturalWidth;
                    const ih = img.naturalHeight;

                    let pw, ph, o;
                    if (pageSize === 'fit') {
                        pw = iw; ph = ih;
                        o = iw >= ih ? 'landscape' : 'portrait';
                    } else {
                        const base = PAGE_SIZES[pageSize];
                        const isLandscape = orient === 'landscape' || (orient === 'auto' && iw > ih);
                        o = isLandscape ? 'landscape' : 'portrait';
                        [pw, ph] = isLandscape ? [base[1], base[0]] : base;
                    }

                    if (!pdf) {
                        pdf = new jsPDF({
                            orientation: o,
                            unit: pageSize === 'fit' ? 'px' : 'pt',
                            format: pageSize === 'fit' ? [pw, ph] : pageSize
                        });
                    } else {
                        pdf.addPage(pageSize === 'fit' ? [pw, ph] : pageSize, o);
                    }

                    const pdfW = pdf.internal.pageSize.getWidth();
                    const pdfH = pdf.internal.pageSize.getHeight();
                    const ratio = Math.min(pdfW / iw, pdfH / ih);
                    const drawW = iw * ratio;
                    const drawH = ih * ratio;
                    const x = (pdfW - drawW) / 2;
                    const y = (pdfH - drawH) / 2;

                    const canvas = document.createElement('canvas');
                    canvas.width = iw; canvas.height = ih;
                    canvas.getContext('2d').drawImage(img, 0, 0);
                    const dataUrl = canvas.toDataURL('image/jpeg', quality);

                    pdf.addImage(dataUrl, 'JPEG', x, y, drawW, drawH);
                }

                setProgress(imgProgressFill, 95, imgProgressTxt, imgProgressPct, 'Generating PDF...');
                await sleep(50);

                const fileName = imgFiles[0].name.replace(/\.[^.]+$/, '') + (imgFiles.length > 1 ? `_+${imgFiles.length-1}` : '') + '.pdf';
                outPdfBlob = pdf.output('blob');

                setProgress(imgProgressFill, 100, imgProgressTxt, imgProgressPct, 'Done!');
                outPdfName.textContent = fileName;
                outPdfMeta.textContent = `${imgFiles.length} image${imgFiles.length>1?'s':''} • ${fmtSize(outPdfBlob.size)}`;
                imgResults.classList.remove('hidden');
                showStatus(imgStatus, `✔ PDF generated successfully.`, 'success');

                downloadPdfBtn.onclick = () => downloadBlob(outPdfBlob, fileName);
            } catch (err) {
                console.error(err);
                showStatus(imgStatus, '✖ Error: ' + err.message, 'error');
            } finally {
                convertImgBtn.disabled = false;
            }
        });

        clearImgBtn.addEventListener('click', () => {
            imgFiles = [];
            renderImgFileList();
            imgResults.classList.add('hidden');
            imgProgressWrap.classList.add('hidden');
            imgStatus.classList.add('hidden');
        });

        function downloadBlob(blob, name) {
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = name;
            a.click();
            setTimeout(() => URL.revokeObjectURL(a.href), 5000);
        }
    </script>
</body>

</html>
