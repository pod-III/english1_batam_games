<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lesson Extractor — English 1</title>
    
    <!-- Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@1.16.0"></script>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>

    <!-- Custom Styles -->
    <link rel="stylesheet" href="style.css">

    <script>
        // Inline tailwind config for fonts
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { heading: ['Fredoka', 'sans-serif'], body: ['Nunito', 'sans-serif'] },
                }
            }
        }
    </script>
</head>

<body>

    <header>
        <div class="max-w-[1440px] mx-auto px-6 py-4 flex items-center justify-between gap-3">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-pink-500 rounded-2xl border-4 border-slate-900 flex items-center justify-center shadow-[4px_4px_0_#1e293b]" style="background:var(--color-pink);">
                    <i data-lucide="book-open" class="w-7 h-7 text-white"></i>
                </div>
                <div>
                    <h1 class="text-2xl leading-none" id="doc-title">Lesson Extractor</h1>
                    <p class="text-xs font-bold uppercase opacity-40 mt-1.5 tracking-wider">English 1 Teacher Notes</p>
                </div>
            </div>
            <div class="flex items-center gap-3">

                <button onclick="toggleDark()" class="btn-chunky btn-chalk !p-2.5 !rounded-2xl" title="Toggle Mode">
                    <i data-lucide="moon" class="w-6 h-6" id="dark-icon"></i>
                </button>
                <button onclick="clearData()" class="btn-chunky btn-chalk !p-2.5 !rounded-2xl" title="Clear All">
                    <i data-lucide="trash-2" class="w-6 h-6"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-[1440px] mx-auto px-6 py-8">
        <div class="grid grid-cols-1 lg:grid-cols-[450px_1fr] gap-10 items-start">
            
            <!-- Left Pane: Inputs (Metadata + Quick Paste) -->
            <aside class="flex flex-col gap-8 lg:sticky lg:top-28">
                
                <div class="seg-track w-full">
                    <button class="seg-btn active" id="tab-paste" onclick="switchTab('paste')">✏️ Paste Text</button>
                    <button class="seg-btn" id="tab-overview" onclick="switchTab('overview')">📊 Overview View</button>
                </div>

                <!-- Unit Metadata -->
                <div id="unit-metadata" class="card p-6 flex flex-col gap-6 bg-slate-50 dark:bg-slate-900/50">
                    <div class="flex flex-col gap-2">
                        <label class="font-heading text-xs uppercase tracking-widest opacity-50">Unit Title</label>
                        <input type="text" id="unit-title-input" oninput="updateUnitMetadata()"
                            class="bg-white dark:bg-slate-900 border-3 border-slate-900 dark:border-slate-700 rounded-xl px-4 py-3 text-lg focus:outline-none focus:border-blue-500 transition-colors"
                            placeholder="e.g. Book 1, Unit 5">
                    </div>
                    <div class="flex flex-col gap-2">
                        <label class="font-heading text-xs uppercase tracking-widest opacity-50">Unit Aims / Objectives</label>
                        <textarea id="unit-aims-input" oninput="updateUnitMetadata()"
                            class="bg-white dark:bg-slate-900 border-3 border-slate-900 dark:border-slate-700 rounded-xl px-4 py-3 h-28 resize-none focus:outline-none focus:border-blue-500 transition-colors"
                            placeholder="What should students achieve?"></textarea>
                    </div>
                </div>

                <!-- Paste Section (Inside Aside on Desktop) -->
                <div id="view-paste-container" class="flex flex-col gap-6">
                    <div class="card overflow-visible">
                        <div class="relative z-20 p-4 border-b-3 border-slate-900 dark:border-slate-700 flex items-center justify-between text-white" style="background:var(--color-blue);">
                            <div class="flex items-center gap-3">
                                <i data-lucide="clipboard-paste" class="w-6 h-6"></i>
                                <h3 class="font-heading text-lg">Input Notes</h3>
                            </div>
                        </div>

                        <!-- Extract Button Above Editor -->
                        <div class="p-4 bg-slate-50 dark:bg-slate-800 border-b-3 border-slate-900 dark:border-slate-700 flex justify-end">
                            <button onclick="processPastedText()" class="btn-chunky btn-green w-full">
                                <i data-lucide="sparkles" class="w-5 h-5"></i> Extract Data
                            </button>
                        </div>
                        
                        <!-- Quill Editor Container -->
                        <div class="bg-white dark:bg-slate-900">
                            <div id="editor-container"></div>
                        </div>
                    </div>
                </div>


            </aside>

            <!-- Right Pane: Results (Modules or Overview) -->
            <section class="flex flex-col gap-8 min-w-0">
                <!-- Overview View -->
                <div id="view-overview" class="hidden">
                    <div id="overview-content"></div>
                </div>

                <!-- Modules Display -->
                <div class="flex flex-col gap-8" id="modules-container"></div>
            </section>

        </div>
    </main>

    <div id="toast-container"></div>

    <!-- Main Logic -->
    <script src="script.js"></script>
</body>

</html>
