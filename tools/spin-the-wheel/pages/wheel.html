<!doctype html>
<html lang="en" class="light">
    <head>
    <!-- Supabase Auth -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/supabase.js"></script>
    <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
        />
        <title>Multi-Spin Picker - KlassKit</title>

        <!-- External Libraries -->
        <script src="https://unpkg.com/lucide@latest"></script>
        <script src="https://cdn.tailwindcss.com"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

        <!-- Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@400;700;900&family=JetBrains+Mono:wght@500;700&display=swap"
            rel="stylesheet"
        />

        <!-- Theme Configuration -->
        <script>
            tailwind.config = {
                darkMode: "class",
                theme: {
                    extend: {
                        colors: {
                            pink: "#FF6B95",
                            orange: "#FF8C42",
                            green: "#00E676",
                            blue: "#2979FF",
                            purple: "#7C4DFF",
                            dark: "#0F172A",
                            surface: "#FFFFFF",
                            border: "#cbd5e1",
                        },
                        fontFamily: {
                            heading: ["Fredoka", "sans-serif"],
                            body: ["Nunito", "sans-serif"],
                            mono: ["JetBrains Mono", "monospace"],
                        },
                        boxShadow: {
                            neo: "4px 4px 0px 0px rgba(51, 65, 85, 0.15)",
                            "neo-sm": "2px 2px 0px 0px rgba(51, 65, 85, 0.15)",
                            "neo-lg": "8px 8px 0px 0px rgba(51, 65, 85, 0.15)",
                            hard: "4px 4px 0px 0px #0F172A",
                            "hard-sm": "2px 2px 0px 0px #0F172A",
                            "hard-lg": "8px 8px 0px 0px #0F172A",
                        },
                    },
                },
            };
        </script>

        <style>
            * {
                box-sizing: border-box;
            }

            html,
            body {
                margin: 0;
                padding: 0;
                height: 100vh;
                width: 100vw;
                overflow: hidden;
            }

            body {
                font-family: "Nunito", sans-serif;
                background-color: #f8fafc;
                background-image:
                    linear-gradient(#e2e8f0 1.5px, transparent 1.5px),
                    linear-gradient(90deg, #e2e8f0 1.5px, transparent 1.5px);
                background-size: 30px 30px;
                color: #1e293b;
                user-select: none;
                -webkit-tap-highlight-color: transparent;
                transition:
                    background-color 0.3s,
                    color 0.3s;
            }

            html.dark body {
                background-color: #020617;
                background-image:
                    linear-gradient(#0f172a 1.5px, transparent 1.5px),
                    linear-gradient(90deg, #0f172a 1.5px, transparent 1.5px);
                color: #e2e8f0;
            }

            .glass-panel {
                background: rgba(255, 255, 255, 0.85);
                backdrop-filter: blur(24px);
                -webkit-backdrop-filter: blur(24px);
            }

            html.dark .glass-panel {
                background: rgba(15, 23, 42, 0.8);
                border-color: rgba(255, 255, 255, 0.1);
            }

            .console-frame {
                background: rgba(255, 255, 255, 0.6);
                backdrop-filter: blur(24px);
                -webkit-backdrop-filter: blur(24px);
                border: 1px solid rgba(203, 213, 225, 0.6);
                border-radius: 1.5rem;
                box-shadow: 8px 8px 0px rgba(51, 65, 85, 0.15);
                overflow: hidden;
                transition: all 0.3s ease;
            }

            html.dark .console-frame {
                background: rgba(15, 23, 42, 0.8);
                border-color: rgba(255, 255, 255, 0.1);
                box-shadow: 8px 8px 0px rgba(0, 0, 0, 0.4);
            }

            .btn-chunky {
                transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
                transform: translateY(0);
                position: relative;
                border: 1px solid rgba(203, 213, 225, 0.6);
                box-shadow: 4px 4px 0 rgba(51, 65, 85, 0.15);
                font-family: "Fredoka", sans-serif;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.05em;
            }

            html.dark .btn-chunky {
                border-color: rgba(255, 255, 255, 0.1);
                box-shadow: 4px 4px 0 rgba(0, 0, 0, 0.4);
                background-color: rgba(30, 41, 59, 0.8);
                color: #e2e8f0;
            }

            .btn-chunky:hover:not(:disabled) {
                transform: translate(-2px, -2px);
                box-shadow: 6px 6px 0 rgba(51, 65, 85, 0.15);
                filter: brightness(105%);
            }

            html.dark .btn-chunky:hover:not(:disabled) {
                box-shadow: 6px 6px 0 rgba(0, 0, 0, 0.4);
            }

            .btn-chunky:active:not(:disabled) {
                transform: translate(2px, 2px);
                box-shadow: 2px 2px 0 rgba(51, 65, 85, 0.15) !important;
            }

            html.dark .btn-chunky:active:not(:disabled) {
                box-shadow: 2px 2px 0 rgba(0, 0, 0, 0.4) !important;
            }

            .btn-chunky:disabled {
                opacity: 0.5;
                cursor: not-allowed;
                transform: translateY(2px);
                box-shadow: 0 0 0 rgba(51, 65, 85, 0.15);
                filter: grayscale(100%);
            }

            .btn-chunky.active {
                background: #2979ff !important;
                color: white !important;
                border-color: #2979ff !important;
            }

            .custom-scrollbar::-webkit-scrollbar {
                width: 8px;
                height: 8px;
            }

            .custom-scrollbar::-webkit-scrollbar-track {
                background: transparent;
            }

            .custom-scrollbar::-webkit-scrollbar-thumb {
                background: rgba(203, 213, 225, 0.6);
                border-radius: 10px;
                border: 2px solid transparent;
                background-clip: content-box;
            }

            html.dark .custom-scrollbar::-webkit-scrollbar-thumb {
                background: rgba(255, 255, 255, 0.2);
            }

            input[type="range"] {
                -webkit-appearance: none;
                background: transparent;
            }

            input[type="range"]::-webkit-slider-thumb {
                -webkit-appearance: none;
                height: 24px;
                width: 24px;
                border-radius: 50%;
                background: white;
                border: 2px solid #2979ff;
                margin-top: -8px;
                cursor: pointer;
                box-shadow: 2px 2px 0px rgba(51, 65, 85, 0.15);
                transition: transform 0.1s;
            }

            html.dark input[type="range"]::-webkit-slider-thumb {
                background: #0f172a;
                border-color: #2979ff;
                box-shadow: 2px 2px 0px rgba(0, 0, 0, 0.4);
            }

            input[type="range"]::-webkit-slider-thumb:hover {
                transform: scale(1.1);
            }

            input[type="range"]::-webkit-slider-runnable-track {
                width: 100%;
                height: 8px;
                background: rgba(203, 213, 225, 0.6);
                border: 1px solid rgba(203, 213, 225, 0.8);
                border-radius: 99px;
            }

            html.dark input[type="range"]::-webkit-slider-runnable-track {
                background: rgba(30, 41, 59, 0.8);
                border-color: rgba(255, 255, 255, 0.1);
            }

            .wheel-canvas {
                border-radius: 50%;
                box-shadow: 8px 8px 0px rgba(51, 65, 85, 0.2);
                transition: transform 0.1s;
            }

            html.dark .wheel-canvas {
                box-shadow: 8px 8px 0px rgba(0, 0, 0, 0.5);
            }

            .wheel-pointer {
                width: 0;
                height: 0;
                border-left: 12px solid transparent;
                border-right: 12px solid transparent;
                border-top: 24px solid #0f172a;
                position: absolute;
                top: 8px;
                left: 50%;
                transform: translateX(-50%);
                z-index: 20;
                filter: drop-shadow(0px 2px 0px rgba(255, 255, 255, 0.5));
            }

            html.dark .wheel-pointer {
                border-top-color: #e2e8f0;
                filter: drop-shadow(0px 2px 0px rgba(0, 0, 0, 0.5));
            }

            .wheel-container {
                position: relative;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
            }

            .wheel-label {
                margin-top: 0.5rem;
                font-family: "Fredoka", sans-serif;
                font-weight: 700;
                font-size: 0.875rem;
                color: #64748b;
                text-transform: uppercase;
                letter-spacing: 0.05em;
            }

            .wheel-count-selector {
                transition: all 0.2s ease;
            }

            .wheel-count-selector.active {
                background: #2979ff;
                color: white;
                border-color: #2979ff;
            }

            .winner-modal {
                background: rgba(15, 23, 42, 0.5);
                backdrop-filter: blur(4px);
                transition: opacity 0.3s;
            }

            .winner-card {
                background: #ffffff;
                border: 4px solid #0f172a;
                box-shadow: 16px 16px 0px #0f172a;
                transform: scale(0.9);
                opacity: 0;
                transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            }

            html.dark .winner-card {
                background: rgba(15, 23, 42, 0.95);
                border-color: rgba(255, 255, 255, 0.2);
            }

            .winner-modal.active .winner-card {
                transform: scale(1);
                opacity: 1;
            }

            .result-item {
                animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            }

            @keyframes popIn {
                0% {
                    transform: scale(0);
                    opacity: 0;
                }
                100% {
                    transform: scale(1);
                    opacity: 1;
                }
            }

            /* Toggle Switch */
            .switch {
                position: relative;
                display: inline-block;
                width: 48px;
                height: 24px;
            }

            .switch input {
                opacity: 0;
                width: 0;
                height: 0;
            }

            .slider {
                position: absolute;
                cursor: pointer;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background-color: rgba(203, 213, 225, 0.6);
                border: 1px solid rgba(203, 213, 225, 0.8);
                transition: 0.3s;
                border-radius: 34px;
            }

            html.dark .slider {
                background-color: rgba(30, 41, 59, 0.8);
                border-color: rgba(255, 255, 255, 0.1);
            }

            .slider:before {
                position: absolute;
                content: "";
                height: 16px;
                width: 16px;
                left: 3px;
                bottom: 3px;
                background-color: white;
                box-shadow: 2px 2px 0px rgba(51, 65, 85, 0.15);
                transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
                border-radius: 50%;
            }

            html.dark .slider:before {
                background-color: #94a3b8;
                box-shadow: 2px 2px 0px rgba(0, 0, 0, 0.4);
            }

            input:checked + .slider {
                background-color: rgba(0, 230, 118, 0.3);
                border-color: #00e676;
            }

            html.dark input:checked + .slider {
                background-color: rgba(0, 230, 118, 0.2);
                border-color: #00e676;
            }

            input:checked + .slider:before {
                transform: translateX(24px);
                background-color: #00e676;
            }

            .hidden-panel-mobile {
                transform: translateY(100%);
            }

            @media (min-width: 768px) {
                .hidden-panel-desktop {
                    margin-left: -24rem;
                }
            }

            /* Panel animations */
            #controls {
                transition:
                    transform 0.3s cubic-bezier(0.4, 0, 0.2, 1),
                    width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            }

            #controls.collapsed {
                transform: translateX(-100%);
                width: 0;
                min-width: 0;
                padding: 0;
                margin: 0;
                border: none;
                overflow: hidden;
            }

            @media (max-width: 768px) {
                #controls {
                    position: fixed;
                    top: 0;
                    left: 0;
                    height: 100vh;
                    z-index: 100;
                    transform: translateX(-100%);
                }

                #controls.mobile-open {
                    transform: translateX(0);
                }

                #controls.collapsed {
                    transform: translateX(-100%);
                    width: 85%;
                    min-width: 300px;
                }
            }

            /* Dynamic wheel sizing */
            .wheels-grid {
                display: flex;
                flex-wrap: wrap;
                align-items: center;
                justify-content: center;
                gap: 1rem;
                width: 100%;
                height: 100%;
                padding: 1rem;
            }

            .wheels-grid.count-1 {
                flex-direction: column;
            }

            .wheels-grid.count-1 .wheel-wrapper {
                width: min(85vmin, 600px);
                height: min(85vmin, 600px);
            }

            .wheels-grid.count-2 {
                flex-direction: row;
            }

            .wheels-grid.count-2 .wheel-wrapper {
                width: min(45vmin, 450px);
                height: min(45vmin, 450px);
            }

            .wheels-grid.count-3 {
                flex-direction: row;
            }

            .wheels-grid.count-3 .wheel-wrapper {
                width: min(32vmin, 350px);
                height: min(32vmin, 350px);
            }

            @media (max-width: 768px) {
                .wheels-grid.count-2 {
                    flex-direction: column;
                }

                .wheels-grid.count-2 .wheel-wrapper {
                    width: min(70vmin, 350px);
                    height: min(70vmin, 350px);
                }

                .wheels-grid.count-3 {
                    flex-direction: column;
                }

                .wheels-grid.count-3 .wheel-wrapper {
                    width: min(55vmin, 280px);
                    height: min(55vmin, 280px);
                }
            }

            .wheel-wrapper {
                position: relative;
                flex-shrink: 0;
            }
        </style>
    </head>
    <body class="h-screen w-screen overflow-hidden">
        <div
            id="toast-container"
            class="fixed top-4 left-1/2 -translate-x-1/2 z-[100] flex flex-col gap-2 pointer-events-none"
        ></div>

        <div
            class="console-frame w-full h-full relative flex z-10 rounded-none md:rounded-2xl"
        >
            <!-- LEFT PANEL: CONTROLS -->
            <aside
                id="controls"
                class="w-80 glass-panel border-r-[1px] border-slate-300 dark:border-white/10 flex flex-col z-50 h-full shrink-0"
            >
                <!-- Header -->
                <div
                    class="p-4 border-b-[1px] border-slate-300 dark:border-white/10 bg-slate-50/50 dark:bg-slate-800/50 flex justify-between items-center shrink-0"
                >
                    <div class="flex items-center gap-3 flex-1 min-w-0">
                        <a href="../index.html" class="p-2 bg-white dark:bg-slate-700 border-[1px] border-slate-300 dark:border-white/10 rounded-lg text-slate-400 hover:text-blue transition-colors shadow-sm" title="Back to Home">
                            <i data-lucide="home" class="w-4 h-4"></i>
                        </a>
                        <div class="flex-1 min-w-0">
                            <h1
                                class="text-xl font-heading text-dark dark:text-slate-100 tracking-wide leading-none truncate"
                            >
                                MULTI<span class="text-pink">SPIN</span>
                            </h1>
                            <div class="flex items-center gap-2 mt-1">
                                <button
                                    onclick="toggleTheme()"
                                    class="px-2 py-1 bg-slate-200 dark:bg-slate-700 text-slate-700 dark:text-slate-200 text-[10px] font-bold rounded flex items-center gap-1 hover:bg-slate-300 dark:hover:bg-slate-600 transition-colors"
                                >
                                    <i
                                        data-lucide="moon"
                                        class="w-3 h-3 hidden dark:block"
                                    ></i>
                                    <i
                                        data-lucide="sun"
                                        class="w-3 h-3 block dark:hidden"
                                    ></i>
                                </button>
                                <span
                                    class="text-[10px] text-slate-400 font-bold uppercase tracking-widest"
                                    >Group Picker</span
                                >
                            </div>
                        </div>
                    </div>
                    <button
                        onclick="togglePanel()"
                        class="md:hidden p-2 bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 rounded-lg hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors"
                    >
                        <i data-lucide="x" class="w-5 h-5"></i>
                    </button>
                </div>

                <!-- Content -->
                <div
                    class="flex-1 p-4 overflow-y-auto custom-scrollbar space-y-4 bg-transparent relative"
                >
                    <!-- WHEEL COUNT SELECTOR -->
                    <div
                        class="p-3 bg-slate-50/50 dark:bg-slate-800/50 border-[1px] border-slate-300 dark:border-white/10 rounded-xl shadow-sm"
                    >
                        <div
                            class="flex justify-between items-center border-b-[1px] border-slate-200 dark:border-white/10 pb-2 mb-2"
                        >
                            <label
                                class="text-xs font-black text-slate-400 uppercase tracking-widest flex items-center gap-2"
                            >
                                <i
                                    data-lucide="layers"
                                    class="w-4 h-4 text-blue"
                                ></i>
                                Wheels to Spin
                            </label>
                        </div>
                        <div class="flex gap-2">
                            <button
                                onclick="setWheelCount(1)"
                                id="count-1"
                                class="wheel-count-selector flex-1 btn-chunky py-2 rounded-xl text-xs font-bold"
                            >
                                <i
                                    data-lucide="circle"
                                    class="w-4 h-4 inline mr-1"
                                ></i>
                                1
                            </button>
                            <button
                                onclick="setWheelCount(2)"
                                id="count-2"
                                class="wheel-count-selector active flex-1 btn-chunky py-2 rounded-xl text-xs font-bold"
                            >
                                <i
                                    data-lucide="circle-2"
                                    class="w-4 h-4 inline mr-1"
                                ></i>
                                2
                            </button>
                            <button
                                onclick="setWheelCount(3)"
                                id="count-3"
                                class="wheel-count-selector flex-1 btn-chunky py-2 rounded-xl text-xs font-bold"
                            >
                                <i
                                    data-lucide="circle-3"
                                    class="w-4 h-4 inline mr-1"
                                ></i>
                                3
                            </button>
                        </div>
                    </div>

                    <!-- BIG SPIN BUTTON -->
                    <button
                        id="spinBtn"
                        onclick="spinAll()"
                        class="w-full btn-chunky bg-gradient-to-r from-pink to-orange text-white dark:text-white py-5 rounded-xl text-lg tracking-widest flex items-center justify-center gap-3 hover:brightness-110 shadow-neo-lg group"
                    >
                        <i
                            data-lucide="dices"
                            class="w-6 h-6 group-hover:rotate-180 transition-transform duration-500"
                        ></i>
                        SPIN
                    </button>

                    <!-- SETTINGS -->
                    <div
                        class="p-3 bg-slate-50/50 dark:bg-slate-800/50 border-[1px] border-slate-300 dark:border-white/10 rounded-xl shadow-sm space-y-3"
                    >
                        <div
                            class="flex justify-between items-center border-b-[1px] border-slate-200 dark:border-white/10 pb-2"
                        >
                            <label
                                class="text-xs font-black text-slate-400 uppercase tracking-widest flex items-center gap-2"
                            >
                                <i
                                    data-lucide="settings"
                                    class="w-4 h-4 text-orange"
                                ></i>
                                Settings
                            </label>
                        </div>

                        <div class="space-y-1">
                            <div class="flex justify-between">
                                <span
                                    class="text-sm font-bold text-dark dark:text-slate-200"
                                    >Duration</span
                                >
                                <span
                                    id="duration-display"
                                    class="text-xs font-mono font-bold text-blue bg-blue/10 px-2 py-0.5 rounded"
                                    >5s</span
                                >
                            </div>
                            <input
                                type="range"
                                id="duration-slider"
                                min="2"
                                max="10"
                                step="0.5"
                                value="5"
                                oninput="updateDuration(this.value)"
                                class="w-full accent-blue"
                            />
                        </div>

                        <div class="flex items-center justify-between">
                            <span
                                class="text-sm font-bold text-dark dark:text-slate-200"
                                >Sound</span
                            >
                            <label class="switch">
                                <input
                                    type="checkbox"
                                    id="sound-toggle"
                                    checked
                                />
                                <span class="slider"></span>
                            </label>
                        </div>
                    </div>

                    <!-- WHEEL CONFIGURATION -->
                    <div
                        class="p-3 bg-slate-50/50 dark:bg-slate-800/50 border-[1px] border-slate-300 dark:border-white/10 rounded-xl shadow-sm"
                    >
                        <div
                            class="flex justify-between items-center border-b-[1px] border-slate-200 dark:border-white/10 pb-2 mb-2"
                        >
                            <label
                                class="text-xs font-black text-slate-400 uppercase tracking-widest flex items-center gap-2"
                            >
                                <i
                                    data-lucide="sliders"
                                    class="w-4 h-4 text-green"
                                ></i>
                                Configure Wheels
                            </label>
                        </div>

                        <!-- Wheel Tabs -->
                        <div class="flex gap-1 mb-3" id="config-tabs">
                            <button
                                onclick="switchConfigWheel(0)"
                                id="config-tab-0"
                                class="flex-1 btn-chunky bg-blue text-white py-2 rounded-lg text-xs font-bold"
                            >
                                Wheel A
                            </button>
                            <button
                                onclick="switchConfigWheel(1)"
                                id="config-tab-1"
                                class="flex-1 btn-chunky bg-white dark:bg-slate-700 text-dark dark:text-slate-200 py-2 rounded-lg text-xs font-bold"
                            >
                                Wheel B
                            </button>
                            <button
                                onclick="switchConfigWheel(2)"
                                id="config-tab-2"
                                class="flex-1 btn-chunky bg-white dark:bg-slate-700 text-dark dark:text-slate-200 py-2 rounded-lg text-xs font-bold hidden"
                            >
                                Wheel C
                            </button>
                        </div>

                        <!-- Current Wheel Info -->
                        <div
                            class="mb-2 p-2 bg-white/50 dark:bg-slate-900/50 rounded-lg"
                        >
                            <div class="flex justify-between items-center">
                                <span class="text-xs text-slate-500 font-bold"
                                    >Items</span
                                >
                                <span
                                    id="current-wheel-count"
                                    class="font-mono font-bold text-blue"
                                    >0</span
                                >
                            </div>
                        </div>

                        <!-- Add Item -->
                        <div class="flex gap-2 mb-2">
                            <input
                                type="text"
                                id="option-input"
                                placeholder="Add item..."
                                class="flex-1 border-[1px] border-slate-300 dark:border-white/10 rounded-lg px-3 py-2 font-bold text-dark dark:text-slate-200 text-sm bg-white/50 dark:bg-slate-900/50 focus:outline-none focus:border-blue focus:ring-1 focus:ring-blue"
                            />
                            <button
                                onclick="addOption()"
                                class="btn-chunky bg-green text-dark dark:text-dark px-3 rounded-lg"
                            >
                                <i data-lucide="plus" class="w-4 h-4"></i>
                            </button>
                        </div>

                        <!-- Batch Edit -->
                        <button
                            onclick="toggleBatch()"
                            class="text-xs text-blue font-bold hover:underline mb-2"
                        >
                            Batch Edit
                        </button>

                        <div id="batch-container" class="hidden mb-2">
                            <textarea
                                id="batch-input"
                                rows="3"
                                class="w-full p-2 bg-white/50 dark:bg-slate-900/50 text-dark dark:text-slate-200 font-mono text-xs border-[1px] border-slate-300 dark:border-white/10 rounded-lg resize-none mb-2"
                                placeholder="One item per line..."
                            ></textarea>
                            <button
                                onclick="saveBatch()"
                                class="w-full btn-chunky bg-dark text-white py-2 rounded-lg text-xs"
                            >
                                Update Wheel
                            </button>
                        </div>

                        <!-- Items List -->
                        <div
                            id="items-list"
                            class="flex flex-wrap gap-1 max-h-32 overflow-y-auto custom-scrollbar"
                        >
                            <!-- Populated by JS -->
                        </div>
                    </div>
                </div>

                <!-- Footer -->
                <div
                    class="p-3 border-t-[1px] border-slate-300 dark:border-white/10 bg-slate-50/50 dark:bg-slate-800/50 flex justify-between items-center shrink-0"
                >
                    <div class="flex items-center gap-2">
                        <button
                            onclick="clearCurrentWheel()"
                            class="p-2 bg-white dark:bg-slate-700 border-[1px] border-slate-300 dark:border-white/10 rounded-lg text-slate-400 hover:text-pink transition-colors"
                        >
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    </div>
                    <div
                        class="font-heading font-black text-slate-400 text-xs uppercase tracking-wider"
                    >
                        TOTAL: <span id="total-items" class="text-blue">0</span>
                    </div>
                </div>
            </aside>

            <!-- MAIN DISPLAY AREA -->
            <main
                id="main-area"
                class="flex-1 relative h-full bg-slate-50/50 dark:bg-slate-900/50 flex flex-col overflow-hidden transition-colors duration-300"
            >
                <!-- Toggle Panel Button -->
                <button
                    id="panel-toggle"
                    onclick="togglePanel()"
                    class="absolute top-4 left-4 z-30 p-2 glass-panel border-[1px] border-slate-300 dark:border-white/10 rounded-xl shadow-neo-sm hover:translate-y-[-2px] transition-transform text-slate-500 hover:text-dark dark:hover:text-slate-200"
                >
                    <i data-lucide="panel-left-close" class="w-5 h-5"></i>
                </button>

                <!-- Show Panel Button (when collapsed) -->
                <button
                    id="show-panel-btn"
                    onclick="togglePanel()"
                    class="hidden absolute top-4 left-4 z-30 p-2 glass-panel border-[1px] border-slate-300 dark:border-white/10 rounded-xl shadow-neo-sm hover:translate-y-[-2px] transition-transform text-slate-500 hover:text-dark dark:hover:text-slate-200"
                >
                    <i data-lucide="panel-left-open" class="w-5 h-5"></i>
                </button>

                <!-- Wheels Display - Dynamic sizing -->
                <div class="flex-1 flex items-center justify-center p-4 md:p-8">
                    <div id="wheels-container" class="wheels-grid count-2">
                        <!-- Wheels generated by JS -->
                    </div>
                </div>
            </main>

            <!-- WINNER MODAL -->
            <div
                id="winner-modal"
                class="winner-modal fixed inset-0 z-[100] hidden flex items-center justify-center p-4"
            >
                <div
                    class="winner-card w-full max-w-lg p-6 md:p-8 rounded-3xl text-center relative"
                >
                    <button
                        onclick="closeWinnerModal()"
                        class="absolute top-4 right-4 text-slate-400 hover:text-dark dark:hover:text-slate-200"
                    >
                        <i data-lucide="x" class="w-6 h-6"></i>
                    </button>

                    <div class="mb-4 flex justify-center">
                        <div
                            class="w-16 h-16 md:w-20 md:h-20 bg-green/10 rounded-full flex items-center justify-center border-4 border-green text-green animate-bounce"
                        >
                            <i
                                data-lucide="trophy"
                                class="w-8 h-8 md:w-10 md:h-10"
                            ></i>
                        </div>
                    </div>

                    <h2
                        class="text-xs font-black text-slate-400 uppercase tracking-widest mb-4"
                    >
                        Results
                    </h2>

                    <div id="results-container" class="space-y-3 mb-6">
                        <!-- Results populated by JS -->
                    </div>

                    <div class="flex gap-3">
                        <button
                            onclick="closeWinnerModal()"
                            class="flex-1 btn-chunky bg-blue text-white py-3 rounded-xl font-bold"
                        >
                            Spin Again
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <script>
            // Theme
            function toggleTheme() {
                const isDark = document.documentElement.classList.toggle("dark");
                localStorage.setItem("theme_spin-the-wheel", isDark ? "dark" : "light");
                lucide.createIcons();
            }

            function loadTheme() {
                const saved = localStorage.getItem("theme_spin-the-wheel");
                if (saved === "dark" || (!saved && window.matchMedia("(prefers-color-scheme: dark)").matches))
                    document.documentElement.classList.add("dark");
            }

            // Toast
            function showToast(message, type = "info") {
                const container = document.getElementById("toast-container");
                const toast = document.createElement("div");

                const colors = {
                    success: "bg-green text-dark border-green",
                    error: "bg-pink text-white border-pink",
                    info: "bg-blue text-white border-blue",
                    warning: "bg-orange text-dark border-orange",
                };

                toast.className = `${colors[type]} px-4 py-3 rounded-xl shadow-neo border-[1px] font-bold text-sm flex items-center gap-2 pointer-events-auto transform transition-all duration-300 translate-y-[-20px] opacity-0`;
                toast.innerHTML = `<i data-lucide="${type === "success" ? "check-circle" : type === "error" ? "x-circle" : "info"}" class="w-4 h-4"></i> ${message}`;

                container.appendChild(toast);
                lucide.createIcons();

                requestAnimationFrame(() =>
                    toast.classList.remove("translate-y-[-20px]", "opacity-0"),
                );
                setTimeout(() => {
                    toast.classList.add("translate-y-[-20px]", "opacity-0");
                    setTimeout(() => toast.remove(), 300);
                }, 2500);
            }

            // Panel Toggle
            let panelOpen = true;

            function togglePanel() {
                const controls = document.getElementById("controls");
                const panelToggle = document.getElementById("panel-toggle");
                const showPanelBtn = document.getElementById("show-panel-btn");
                const isMobile = window.innerWidth < 768;

                panelOpen = !panelOpen;

                if (isMobile) {
                    controls.classList.toggle("mobile-open", panelOpen);
                } else {
                    controls.classList.toggle("collapsed", !panelOpen);

                    if (panelOpen) {
                        panelToggle.classList.remove("hidden");
                        showPanelBtn.classList.add("hidden");
                    } else {
                        panelToggle.classList.add("hidden");
                        showPanelBtn.classList.remove("hidden");
                    }
                }
            }

            // Game State
            const PALETTE = [
                "#FF6B95",
                "#FF8C42",
                "#00E676",
                "#2979FF",
                "#7C4DFF",
                "#FFB300",
            ];

            let wheels = [
                {
                    id: 0,
                    name: "Wheel A",
                    label: "Group",
                    options: ["Team 1", "Team 2", "Team 3", "Team 4"],
                },
                {
                    id: 1,
                    name: "Wheel B",
                    label: "Task",
                    options: ["Present", "Write", "Discuss", "Research"],
                },
                {
                    id: 2,
                    name: "Wheel C",
                    label: "Topic",
                    options: ["Science", "Math", "History", "Art"],
                },
            ];

            let wheelCount = 2;
            let currentConfigWheel = 0;

            let wheelStates = [
                { startAngle: 0, isSpinning: false, arc: 0 },
                { startAngle: 0, isSpinning: false, arc: 0 },
                { startAngle: 0, isSpinning: false, arc: 0 },
            ];

            let spinDuration = 5;
            let isMuted = false;
            let audioInitialized = false;
            let synth, winSynth;

            // Initialize
            function init() {
                loadTheme();
                loadData();
                setWheelCount(2);
                switchConfigWheel(0);
                lucide.createIcons();

                if (window.innerWidth < 768) {
                    panelOpen = false;
                    document
                        .getElementById("controls")
                        .classList.remove("mobile-open");
                }
            }

            // Wheel Count
            function setWheelCount(count) {
                wheelCount = count;

                // Update buttons
                for (let i = 1; i <= 3; i++) {
                    const btn = document.getElementById(`count-${i}`);
                    btn.classList.toggle("active", i === count);
                }

                // Update config tabs visibility
                document
                    .getElementById("config-tab-2")
                    .classList.toggle("hidden", count < 3);

                // Update wheels container class for sizing
                const container = document.getElementById("wheels-container");
                container.className = `wheels-grid count-${count}`;

                renderWheels();
                lucide.createIcons();
            }

            // Render Wheels
            function renderWheels() {
                const container = document.getElementById("wheels-container");
                container.innerHTML = "";

                for (let i = 0; i < wheelCount; i++) {
                    const wheelDiv = document.createElement("div");
                    wheelDiv.className = "wheel-wrapper";
                    wheelDiv.innerHTML = `
                    <div class="wheel-container w-full h-full">
                        <div class="wheel-pointer"></div>
                        <canvas id="wheel-canvas-${i}" width="600" height="600" class="wheel-canvas w-full h-full"></canvas>
                        <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-10 h-10 md:w-12 md:h-12 bg-white dark:bg-slate-800 border-[1px] border-slate-300 dark:border-white/10 rounded-full shadow-neo flex items-center justify-center z-10">
                            <span class="font-heading font-bold text-dark dark:text-white text-xs md:text-sm">${String.fromCharCode(65 + i)}</span>
                        </div>
                    </div>
                    <div class="wheel-label">${wheels[i].label}</div>
                `;
                    container.appendChild(wheelDiv);

                    setTimeout(() => drawWheel(i), 0);
                }
            }

            // Draw single wheel
            function drawWheel(index) {
                const canvas = document.getElementById(`wheel-canvas-${index}`);
                if (!canvas) return;

                const ctx = canvas.getContext("2d");
                const options = wheels[index].options;
                const state = wheelStates[index];

                ctx.clearRect(0, 0, 600, 600);

                const cx = 300;
                const cy = 300;
                const outsideRadius = 280;
                const textRadius = 190;

                state.arc = (Math.PI * 2) / (options.length || 1);

                if (options.length === 0) {
                    ctx.beginPath();
                    ctx.arc(cx, cy, outsideRadius, 0, 2 * Math.PI);
                    ctx.fillStyle = "#F1F5F9";
                    ctx.fill();
                    ctx.font = '700 24px "Fredoka"';
                    ctx.fillStyle = "#94A3B8";
                    ctx.textAlign = "center";
                    ctx.fillText("EMPTY", cx, cy);
                    return;
                }

                for (let i = 0; i < options.length; i++) {
                    const angle = state.startAngle + i * state.arc;

                    ctx.fillStyle = PALETTE[i % PALETTE.length];
                    ctx.beginPath();
                    ctx.moveTo(cx, cy);
                    ctx.arc(
                        cx,
                        cy,
                        outsideRadius,
                        angle,
                        angle + state.arc,
                        false,
                    );
                    ctx.lineTo(cx, cy);
                    ctx.fill();

                    ctx.lineWidth = 3;
                    ctx.strokeStyle = "#0F172A";
                    ctx.stroke();

                    ctx.save();
                    ctx.fillStyle = "#FFFFFF";
                    ctx.shadowColor = "#0F172A";
                    ctx.shadowBlur = 0;
                    ctx.shadowOffsetX = 2;
                    ctx.shadowOffsetY = 2;

                    ctx.translate(
                        cx + Math.cos(angle + state.arc / 2) * textRadius,
                        cy + Math.sin(angle + state.arc / 2) * textRadius,
                    );
                    ctx.rotate(angle + state.arc / 2);

                    const text = options[i];
                    // Dynamic font sizing based on text length
                    if (text.length > 15) ctx.font = '700 18px "Nunito"';
                    else if (text.length > 10) ctx.font = '700 24px "Nunito"';
                    else if (text.length > 6) ctx.font = '700 32px "Nunito"';
                    else ctx.font = '700 40px "Nunito"';

                    ctx.textAlign = "right";
                    ctx.fillText(text, 50, 10);
                    ctx.restore();
                }
            }

            // Spin All Wheels
            async function spinAll() {
                if (wheelStates.some((s) => s.isSpinning)) return;

                for (let i = 0; i < wheelCount; i++) {
                    if (wheels[i].options.length < 2) {
                        showToast(
                            `Wheel ${String.fromCharCode(65 + i)} needs at least 2 items!`,
                            "error",
                        );
                        return;
                    }
                }

                initAudio();

                const btn = document.getElementById("spinBtn");
                btn.disabled = true;
                btn.innerHTML = `<i data-lucide="loader-2" class="w-6 h-6 animate-spin"></i> SPINNING...`;
                lucide.createIcons();

                const spinPromises = [];
                for (let i = 0; i < wheelCount; i++) {
                    wheelStates[i].isSpinning = true;
                    spinPromises.push(spinWheel(i));
                }

                await Promise.all(spinPromises);

                showResults();

                btn.disabled = false;
                btn.innerHTML = `<i data-lucide="dices" class="w-6 h-6"></i> SPIN`;
                lucide.createIcons();
            }

            function spinWheel(index) {
                return new Promise((resolve) => {
                    const state = wheelStates[index];
                    const durationMs = spinDuration * 1000;
                    const extraSpins = 3 + Math.random() * 3;
                    const randomAngle = Math.random() * 360;
                    const totalDegrees = extraSpins * 360 + randomAngle;

                    const startTime = performance.now();

                    function animate(currentTime) {
                        const elapsed = currentTime - startTime;

                        if (elapsed >= durationMs) {
                            state.isSpinning = false;
                            resolve();
                            return;
                        }

                        const spinAngle =
                            extraSpins *
                            360 *
                            easeOut(elapsed, 0, 1, durationMs);
                        state.startAngle =
                            ((spinAngle + randomAngle) * Math.PI) / 180;

                        drawWheel(index);

                        const degrees = (state.startAngle * 180) / Math.PI + 90;
                        const currentIndex = Math.floor(
                            (360 - (degrees % 360)) /
                                ((state.arc * 180) / Math.PI),
                        );
                        if (currentIndex !== state.lastTickIndex) {
                            playTick();
                            state.lastTickIndex = currentIndex;
                        }

                        requestAnimationFrame(animate);
                    }

                    state.lastTickIndex = -1;
                    requestAnimationFrame(animate);
                });
            }

            function easeOut(t, b, c, d) {
                const ts = (t /= d) * t;
                const tc = ts * t;
                return b + c * (tc + -3 * ts + 3 * t);
            }

            // Get Winners
            function getWinners() {
                const winners = [];

                for (let i = 0; i < wheelCount; i++) {
                    const state = wheelStates[i];
                    const degrees = (state.startAngle * 180) / Math.PI + 90;
                    const arcd = (state.arc * 180) / Math.PI;
                    const index =
                        Math.floor((360 - (degrees % 360)) / arcd) %
                        wheels[i].options.length;

                    winners.push({
                        wheelIndex: i,
                        wheelName: wheels[i].name,
                        wheelLabel: wheels[i].label,
                        item: wheels[i].options[index],
                        color: PALETTE[index % PALETTE.length],
                    });
                }

                return winners;
            }

            // Show Results
            function showResults() {
                const winners = getWinners();

                playWinSound();
                confetti({
                    particleCount: 200,
                    spread: 70,
                    origin: { y: 0.6 },
                    colors: PALETTE,
                });

                const container = document.getElementById("results-container");
                container.innerHTML = winners
                    .map(
                        (w, i) => `
                <div class="result-item flex items-center gap-3 p-3 bg-slate-50 dark:bg-slate-800 rounded-xl border-[1px] border-slate-200 dark:border-white/10" style="animation-delay: ${i * 0.1}s">
                    <div class="w-10 h-10 rounded-full flex items-center justify-center text-white font-bold shadow-neo flex-shrink-0" style="background-color: ${w.color}">
                        ${String.fromCharCode(65 + w.wheelIndex)}
                    </div>
                    <div class="flex-1 text-left">
                        <p class="text-xs text-slate-400 font-bold uppercase">${w.wheelLabel}</p>
                        <p class="text-lg font-heading font-bold text-dark dark:text-white">${w.item}</p>
                    </div>
                </div>
            `,
                    )
                    .join("");

                const modal = document.getElementById("winner-modal");
                modal.classList.remove("hidden");
                requestAnimationFrame(() => modal.classList.add("active"));
            }

            function closeWinnerModal() {
                const modal = document.getElementById("winner-modal");
                modal.classList.remove("active");
                setTimeout(() => modal.classList.add("hidden"), 300);
            }

            // Audio
            async function initAudio() {
                if (audioInitialized || isMuted) return;
                await Tone.start();

                synth = new Tone.MembraneSynth({
                    pitchDecay: 0.05,
                    octaves: 2,
                    oscillator: { type: "sine" },
                    envelope: {
                        attack: 0.001,
                        decay: 0.05,
                        sustain: 0,
                        release: 0.01,
                    },
                    volume: -10,
                }).toDestination();

                winSynth = new Tone.PolySynth(Tone.Synth, {
                    volume: -5,
                    oscillator: { type: "triangle" },
                    envelope: {
                        attack: 0.01,
                        decay: 0.1,
                        sustain: 0.1,
                        release: 1,
                    },
                }).toDestination();

                audioInitialized = true;
            }

            function playTick() {
                if (!isMuted && synth) {
                    try {
                        synth.triggerAttackRelease("C2", "32n", Tone.now());
                    } catch (e) {}
                }
            }

            function playWinSound() {
                if (!isMuted && winSynth) {
                    const now = Tone.now();
                    winSynth.triggerAttackRelease(
                        ["C4", "E4", "G4"],
                        "8n",
                        now,
                    );
                    winSynth.triggerAttackRelease(
                        ["E4", "G4", "C5"],
                        "8n",
                        now + 0.1,
                    );
                    winSynth.triggerAttackRelease(
                        ["G4", "C5", "E5"],
                        "2n",
                        now + 0.2,
                    );
                }
            }

            // Wheel Configuration
            function switchConfigWheel(index) {
                currentConfigWheel = index;

                for (let i = 0; i < 3; i++) {
                    const tab = document.getElementById(`config-tab-${i}`);
                    if (i === index) {
                        tab.classList.add("bg-blue", "text-white");
                        tab.classList.remove(
                            "bg-white",
                            "dark:bg-slate-700",
                            "text-dark",
                            "dark:text-slate-200",
                        );
                    } else {
                        tab.classList.remove("bg-blue", "text-white");
                        tab.classList.add(
                            "bg-white",
                            "dark:bg-slate-700",
                            "text-dark",
                            "dark:text-slate-200",
                        );
                    }
                }

                renderItemsList();
            }

            function renderItemsList() {
                const list = document.getElementById("items-list");
                const options = wheels[currentConfigWheel].options;

                document.getElementById("current-wheel-count").textContent =
                    options.length;
                updateTotalItems();

                list.innerHTML = options
                    .map((opt, i) => {
                        const color = PALETTE[i % PALETTE.length];
                        return `
                    <div class="flex items-center gap-1 bg-white dark:bg-slate-800 border-[1px] border-slate-300 dark:border-white/10 rounded px-2 py-1 text-xs font-bold text-dark dark:text-slate-200 shadow-neo-sm">
                        <div class="w-2 h-2 rounded-full" style="background-color: ${color}"></div>
                        <span class="truncate max-w-[80px]">${opt}</span>
                        <button onclick="removeOption(${i})" class="ml-1 text-slate-400 hover:text-pink">
                            <i data-lucide="x" class="w-3 h-3"></i>
                        </button>
                    </div>
                `;
                    })
                    .join("");

                lucide.createIcons();
            }

            function updateTotalItems() {
                const total = wheels.reduce(
                    (sum, w) => sum + w.options.length,
                    0,
                );
                document.getElementById("total-items").textContent = total;
            }

            function addOption() {
                const input = document.getElementById("option-input");
                const val = input.value.trim();
                if (!val) return;

                wheels[currentConfigWheel].options.push(val);
                input.value = "";
                saveData();
                renderItemsList();
                drawWheel(currentConfigWheel);
            }

            function removeOption(index) {
                wheels[currentConfigWheel].options.splice(index, 1);
                saveData();
                renderItemsList();
                drawWheel(currentConfigWheel);
            }

            function clearCurrentWheel() {
                if (
                    !confirm(
                        `Clear all items from ${wheels[currentConfigWheel].name}?`,
                    )
                )
                    return;
                wheels[currentConfigWheel].options = [];
                saveData();
                renderItemsList();
                drawWheel(currentConfigWheel);
            }

            function toggleBatch() {
                const container = document.getElementById("batch-container");
                const input = document.getElementById("batch-input");

                if (container.classList.contains("hidden")) {
                    input.value = wheels[currentConfigWheel].options.join("\n");
                    container.classList.remove("hidden");
                } else {
                    container.classList.add("hidden");
                }
            }

            function saveBatch() {
                const input = document.getElementById("batch-input");
                wheels[currentConfigWheel].options = input.value
                    .split(/[\n,]+/)
                    .map((s) => s.trim())
                    .filter((s) => s.length > 0);
                saveData();
                toggleBatch();
                renderItemsList();
                drawWheel(currentConfigWheel);
            }

            function updateDuration(val) {
                spinDuration = parseFloat(val);
                document.getElementById("duration-display").textContent =
                    spinDuration + "s";
            }

            // Data Persistence
            async function saveData() {
                const data = {
                    wheels: wheels,
                    wheelCount: wheelCount,
                    updatedAt: Date.now()
                };
                localStorage.setItem("multispin-data", JSON.stringify(data));
                await saveToCloud(data);
            }

            async function saveToCloud(data) {
                try {
                    await saveProgress('multispin_wheel_data', data);
                } catch (e) {
                    console.error("Cloud save failed", e);
                }
            }

            async function loadFromCloud() {
                try {
                    const data = await loadProgress('multispin_wheel_data');
                    if (data) {
                        wheels = data.wheels || wheels;
                        wheelCount = data.wheelCount || wheelCount;
                        saveData();
                        renderItemsList();
                        for (let i = 0; i < wheelCount; i++) {
                            drawWheel(i);
                        }
                    }
                } catch (e) {
                    console.error("Cloud load failed", e);
                }
            }

            function loadData() {
                const raw = localStorage.getItem("multispin-data");
                if (raw) {
                    const data = JSON.parse(raw);
                    wheels = data.wheels || wheels;
                    wheelCount = data.wheelCount || 2;
                }
            }

            // Event Listeners
            document
                .getElementById("option-input")
                .addEventListener("keydown", (e) => {
                    if (e.key === "Enter") addOption();
                });

            document
                .getElementById("sound-toggle")
                .addEventListener("change", (e) => {
                    isMuted = !e.target.checked;
                    if (!isMuted && !audioInitialized) initAudio();
                });

            // Resize
            window.addEventListener("resize", () => {
                const controls = document.getElementById("controls");
                if (window.innerWidth >= 768) {
                    controls.classList.remove("hidden-panel-mobile");
                } else {
                    controls.classList.remove("hidden-panel-desktop");
                }

                // Redraw wheels with new sizes
                for (let i = 0; i < wheelCount; i++) {
                    drawWheel(i);
                }
            });

            // Start
            window.onload = async () => {
                await requireAuth();
                await init();
                await loadFromCloud();
            };
        </script>
    </body>
</html>
