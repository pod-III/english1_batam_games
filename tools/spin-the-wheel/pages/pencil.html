<!doctype html>
<html lang="en">

<head>
    <!-- Supabase Auth -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/supabase.js"></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Classroom Spinner - KlassKit</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@400;600;800&family=JetBrains+Mono:wght@500;700&display=swap"
        rel="stylesheet" />

    <!-- External Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Theme Configuration -->
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        pink: "#FF6B95",
                        orange: "#FF8C42",
                        green: "#00E676",
                        blue: "#2979FF",
                        purple: "#7C4DFF",
                        dark: "#0f172a",
                        chalk: "#f8fafc",
                        surface: "rgba(255, 255, 255, 0.85)",
                        border: "rgba(203, 213, 225, 0.6)",
                    },
                    fontFamily: {
                        heading: ["Fredoka", "sans-serif"],
                        body: ["Nunito", "sans-serif"],
                        mono: ["JetBrains Mono", "monospace"],
                    },
                    boxShadow: {
                        neo: "4px 4px 0px 0px rgba(51, 65, 85, 0.15)",
                        "neo-sm": "2px 2px 0px 0px rgba(51, 65, 85, 0.15)",
                        "neo-lg": "8px 8px 0px 0px rgba(51, 65, 85, 0.15)",
                    },
                    animation: {
                        pop: "pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275)",
                        "bounce-in":
                            "bounceIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55)",
                    },
                    keyframes: {
                        pop: {
                            "0%": { transform: "scale(0)" },
                            "80%": { transform: "scale(1.1)" },
                            "100%": { transform: "scale(1)" },
                        },
                        bounceIn: {
                            "0%": { transform: "scale(0.3)", opacity: "0" },
                            "50%": { transform: "scale(1.05)" },
                            "70%": { transform: "scale(0.9)" },
                            "100%": { transform: "scale(1)", opacity: "1" },
                        },
                    },
                },
            },
        };
    </script>

    <!-- Shared CSS -->
    <link rel="stylesheet" href="../../../css/base.css" />
    <link rel="stylesheet" href="../../../css/components.css" />

    <!-- Vercel Web Analytics -->
    <script>
        window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>

    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        body {
            font-family: "Nunito", sans-serif;
            background-color: #f8fafc;
            background-image:
                linear-gradient(#e2e8f0 1.5px, transparent 1.5px),
                linear-gradient(90deg, #e2e8f0 1.5px, transparent 1.5px);
            background-size: 30px 30px;
            color: #1e293b;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior: none;
            transition:
                background-color 0.3s,
                color 0.3s;
        }

        html.dark body {
            background-color: #020617;
            background-image:
                linear-gradient(#0f172a 1.5px, transparent 1.5px),
                linear-gradient(90deg, #0f172a 1.5px, transparent 1.5px);
            color: #e2e8f0;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }

        html.dark .glass-panel {
            background: rgba(15, 23, 42, 0.8);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .console-frame {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(203, 213, 225, 0.6);
            border-radius: 1.5rem;
            box-shadow: 8px 8px 0px rgba(51, 65, 85, 0.15);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        html.dark .console-frame {
            background: rgba(15, 23, 42, 0.8);
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: 8px 8px 0px rgba(0, 0, 0, 0.4);
        }

        .btn-chunky {
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: translateY(0);
            position: relative;
            border: 1px solid rgba(203, 213, 225, 0.6);
            box-shadow: 4px 4px 0 rgba(51, 65, 85, 0.15);
            font-family: "Fredoka", sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        html.dark .btn-chunky {
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: 4px 4px 0 rgba(0, 0, 0, 0.4);
            background-color: rgba(30, 41, 59, 0.8);
            color: #e2e8f0;
        }

        .btn-chunky:hover:not(:disabled) {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0 rgba(51, 65, 85, 0.15);
            filter: brightness(105%);
        }

        html.dark .btn-chunky:hover:not(:disabled) {
            box-shadow: 6px 6px 0 rgba(0, 0, 0, 0.4);
        }

        .btn-chunky:active:not(:disabled) {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0 rgba(51, 65, 85, 0.15) !important;
        }

        html.dark .btn-chunky:active:not(:disabled) {
            box-shadow: 2px 2px 0 rgba(0, 0, 0, 0.4) !important;
        }

        .btn-chunky:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: translateY(2px);
            box-shadow: 0 0 0 rgba(51, 65, 85, 0.15);
            filter: grayscale(100%);
        }

        .custom-scrollbar::-webkit-scrollbar {
            height: 6px;
            width: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(203, 213, 225, 0.6);
            border-radius: 10px;
            border: 2px solid transparent;
            background-clip: content-box;
        }

        html.dark .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
        }

        #spinner-wrapper {
            transform-origin: center center;
            will-change: transform;
            filter: drop-shadow(8px 8px 0px rgba(51, 65, 85, 0.2));
        }

        html.dark #spinner-wrapper {
            filter: drop-shadow(8px 8px 0px rgba(0, 0, 0, 0.5));
        }

        .player-bubble {
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .player-bubble:hover {
            transform: scale(1.05);
        }

        .player-bubble.winner {
            animation: winnerPulse 1s infinite;
        }

        @keyframes winnerPulse {

            0%,
            100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(0, 230, 118, 0.4);
            }

            50% {
                transform: scale(1.1);
                box-shadow: 0 0 20px 10px rgba(0, 230, 118, 0);
            }
        }

        /* Toggle Switch */
        .switch {
            position: relative;
            display: inline-block;
            width: 48px;
            height: 24px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(203, 213, 225, 0.6);
            border: 1px solid rgba(203, 213, 225, 0.8);
            transition: 0.3s;
            border-radius: 34px;
        }

        html.dark .slider {
            background-color: rgba(30, 41, 59, 0.8);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            box-shadow: 2px 2px 0px rgba(51, 65, 85, 0.15);
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-radius: 50%;
        }

        html.dark .slider:before {
            background-color: #94a3b8;
            box-shadow: 2px 2px 0px rgba(0, 0, 0, 0.4);
        }

        input:checked+.slider {
            background-color: rgba(0, 230, 118, 0.3);
            border-color: #00e676;
        }

        html.dark input:checked+.slider {
            background-color: rgba(0, 230, 118, 0.2);
            border-color: #00e676;
        }

        input:checked+.slider:before {
            transform: translateX(24px);
            background-color: #00e676;
        }

        .history-item {
            transition: all 0.2s ease;
        }

        .history-item:hover {
            transform: translateX(4px);
        }

        /* Panel animations */
        #controls {
            transition:
                transform 0.3s cubic-bezier(0.4, 0, 0.2, 1),
                width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #controls.collapsed {
            transform: translateX(-100%);
            width: 0;
            min-width: 0;
            padding: 0;
            margin: 0;
            border: none;
            overflow: hidden;
        }

        @media (max-width: 768px) {
            #controls {
                position: fixed;
                top: 0;
                left: 0;
                height: 100vh;
                z-index: 100;
                transform: translateX(-100%);
            }

            #controls.mobile-open {
                transform: translateX(0);
            }

            #controls.collapsed {
                transform: translateX(-100%);
                width: 85%;
                min-width: 300px;
            }
        }

        /* History flex grow */
        .history-flex {
            flex: 1 1 auto;
            min-height: 0;
            display: flex;
            flex-direction: column;
        }

        .history-list-container {
            flex: 1 1 auto;
            min-height: 0;
            overflow-y: auto;
        }

        /* Spinner selector */
        .spinner-option {
            transition: all 0.2s ease;
        }

        .spinner-option.active {
            border-color: #2979ff;
            background: rgba(41, 121, 255, 0.1);
        }

        html.dark .spinner-option.active {
            border-color: #7c4dff;
            background: rgba(124, 77, 255, 0.1);
        }

        .spinner-preview {
            width: 60px;
            height: 60px;
        }

        /* Class selector */
        .class-item {
            transition: all 0.2s ease;
        }

        .class-item:hover {
            background: rgba(41, 121, 255, 0.1);
        }

        .class-item.active {
            background: rgba(41, 121, 255, 0.15);
            border-color: #2979ff;
        }

        html.dark .class-item.active {
            background: rgba(124, 77, 255, 0.15);
            border-color: #7c4dff;
        }
    </style>
</head>

<body class="h-screen w-screen overflow-hidden">
    <div id="toast-container"
        class="fixed top-4 left-1/2 -translate-x-1/2 z-[100] flex flex-col gap-2 pointer-events-none"></div>

    <div class="console-frame w-full h-full relative flex z-10 rounded-none md:rounded-2xl">
        <!-- LEFT PANEL: CONTROLS & HISTORY -->
        <aside id="controls"
            class="w-80 glass-panel border-r-[1px] border-slate-300 dark:border-white/10 flex flex-col z-50 h-full shrink-0">
            <!-- Header -->
            <div
                class="p-4 border-b-[1px] border-slate-300 dark:border-white/10 bg-slate-50/50 dark:bg-slate-800/50 flex justify-between items-center shrink-0">
                <div class="flex items-center gap-3 flex-1 min-w-0">
                    <a href="../index.html"
                        class="p-2 bg-white dark:bg-slate-700 border-[1px] border-slate-300 dark:border-white/10 rounded-lg text-slate-400 hover:text-blue transition-colors shadow-sm"
                        title="Back to Home">
                        <i data-lucide="home" class="w-4 h-4"></i>
                    </a>
                    <div class="flex-1 min-w-0">
                        <h1
                            class="text-xl font-heading text-dark dark:text-slate-100 tracking-wide leading-none truncate">
                            CLASS<span class="text-pink">SPIN</span><span class="text-blue">NER</span>
                        </h1>
                        <div class="flex items-center gap-2 mt-1">
                            <button onclick="toggleTheme()"
                                class="px-2 py-1 bg-slate-200 dark:bg-slate-700 text-slate-700 dark:text-slate-200 text-[10px] font-bold rounded flex items-center gap-1 hover:bg-slate-300 dark:hover:bg-slate-600 transition-colors">
                                <i data-lucide="moon" class="w-3 h-3 hidden dark:block"></i>
                                <i data-lucide="sun" class="w-3 h-3 block dark:hidden"></i>
                            </button>
                            <span
                                class="text-[10px] text-slate-400 font-bold uppercase tracking-widest truncate">Classroom
                                Tool</span>
                        </div>
                    </div>
                </div>
                <button onclick="togglePanel()"
                    class="p-2 bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 rounded-lg hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors md:hidden">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>

            <!-- Content -->
            <div class="flex-1 flex flex-col p-4 overflow-y-auto custom-scrollbar bg-transparent relative gap-4">
                <!-- SPINNER TYPE SELECTOR -->
                <div class="shrink-0 p-3 bg-slate-50/50 dark:bg-slate-800/50 border-[1px] border-slate-300 dark:border-white/10 rounded-xl shadow-sm">
                    <div class="flex justify-between items-center border-b-[1px] border-slate-200 dark:border-white/10 pb-2 mb-2">
                        <label class="text-xs font-black text-slate-400 uppercase tracking-widest flex items-center gap-2">
                            <i data-lucide="pen-tool" class="w-4 h-4 text-orange"></i>
                            Spinner Type
                        </label>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="setSpinnerType('pencil')" id="spinner-pencil"
                            class="spinner-option active flex-1 p-2 border-[1px] border-slate-300 dark:border-white/10 rounded-xl flex flex-col items-center gap-1">
                            <svg viewBox="0 0 400 400" class="spinner-preview">
                                <defs>
                                    <linearGradient id="pencilGrad" x1="0" y1="0" x2="1" y2="0">
                                        <stop offset="0%" stop-color="#FFB300" />
                                        <stop offset="50%" stop-color="#FFD54F" />
                                        <stop offset="100%" stop-color="#FFB300" />
                                    </linearGradient>
                                </defs>
                                <rect x="175" y="80" width="50" height="240" fill="url(#pencilGrad)" stroke="#1E293B" stroke-width="3" />
                                <path d="M175 80 L200 30 L225 80 Z" fill="#D7CCC8" stroke="#1E293B" stroke-width="3" />
                                <rect x="173" y="300" width="54" height="40" fill="#90A4AE" stroke="#1E293B" stroke-width="3" />
                                <path d="M175 340 H225 V360 C225 375 175 375 175 360 V340 Z" fill="#FF6B95" stroke="#1E293B" stroke-width="3" />
                            </svg>
                            <span class="text-[10px] font-bold">Pencil</span>
                        </button>
                        <button onclick="setSpinnerType('marker')" id="spinner-marker"
                            class="spinner-option flex-1 p-2 border-[1px] border-slate-300 dark:border-white/10 rounded-xl flex flex-col items-center gap-1">
                            <svg viewBox="0 0 400 400" class="spinner-preview">
                                <defs>
                                    <linearGradient id="markerGrad" x1="0" y1="0" x2="1" y2="0">
                                        <stop offset="0%" stop-color="#2979FF" />
                                        <stop offset="50%" stop-color="#64B5F6" />
                                        <stop offset="100%" stop-color="#2979FF" />
                                    </linearGradient>
                                </defs>
                                <rect x="170" y="60" width="60" height="280" rx="8" fill="url(#markerGrad)" stroke="#1E293B" stroke-width="3" />
                                <rect x="175" y="340" width="50" height="40" rx="4" fill="#37474F" stroke="#1E293B" stroke-width="3" />
                            </svg>
                            <span class="text-[10px] font-bold">Marker</span>
                        </button>
                        <button onclick="setSpinnerType('ruler')" id="spinner-ruler"
                            class="spinner-option flex-1 p-2 border-[1px] border-slate-300 dark:border-white/10 rounded-xl flex flex-col items-center gap-1">
                            <svg viewBox="0 0 400 400" class="spinner-preview">
                                <defs>
                                    <linearGradient id="rulerGrad" x1="0" y1="0" x2="0" y2="1">
                                        <stop offset="0%" stop-color="#ECEFF1" />
                                        <stop offset="100%" stop-color="#CFD8DC" />
                                    </linearGradient>
                                </defs>
                                <rect x="120" y="100" width="160" height="200" fill="url(#rulerGrad)" stroke="#1E293B" stroke-width="3" />
                                <circle cx="200" cy="200" r="12" fill="none" stroke="#1E293B" stroke-width="2" />
                            </svg>
                            <span class="text-[10px] font-bold">Ruler</span>
                        </button>
                    </div>
                </div>

                <!-- SAVED CLASSES -->
                <div class="shrink-0 p-3 bg-slate-50/50 dark:bg-slate-800/50 border-[1px] border-slate-300 dark:border-white/10 rounded-xl shadow-sm">
                    <div class="flex justify-between items-center border-b-[1px] border-slate-200 dark:border-white/10 pb-2 mb-2">
                        <label class="text-xs font-black text-slate-400 uppercase tracking-widest flex items-center gap-2">
                            <i data-lucide="folder-open" class="w-4 h-4 text-blue"></i>
                            Saved Lists
                        </label>
                        <button onclick="openClassModal()" class="text-xs text-blue font-bold hover:underline">
                            + New
                        </button>
                    </div>

                    <!-- Class List -->
                    <div id="class-list" class="space-y-1 max-h-24 overflow-y-auto custom-scrollbar mb-2">
                        <!-- Classes populated by JS -->
                    </div>

                    <!-- Current List Actions -->
                    <div class="flex gap-2 pt-2 border-t-[1px] border-slate-200 dark:border-white/10">
                        <button onclick="saveCurrentClass()"
                            class="flex-1 btn-chunky bg-green text-dark dark:text-dark py-2 rounded-lg text-xs font-bold">
                            <i data-lucide="save" class="w-3 h-3 inline mr-1"></i>
                            SAVE
                        </button>
                        <button onclick="deleteCurrentClass()"
                            class="btn-chunky bg-white dark:bg-slate-700 !text-pink dark:!text-pink py-2 px-3 rounded-lg text-xs font-bold">
                            <i data-lucide="trash-2" class="w-3 h-3"></i>
                        </button>
                    </div>
                </div>

                <!-- EDIT ITEMS -->
                <div class="p-3 bg-slate-50/50 dark:bg-slate-800/50 border-[1px] border-slate-300 dark:border-white/10 rounded-xl shadow-sm space-y-2">
                    <div class="flex justify-between items-center border-b-[1px] border-slate-200 dark:border-white/10 pb-2">
                        <label class="text-xs font-black text-slate-400 uppercase tracking-widest flex items-center gap-2">
                            <i data-lucide="users" class="w-4 h-4 text-purple"></i>
                            Edit Items
                        </label>
                        <button onclick="toggleBatch()" class="text-xs text-blue font-bold hover:underline">
                            Batch
                        </button>
                    </div>

                    <div class="flex gap-2">
                        <input type="text" id="player-input-inline" placeholder="Name or word..."
                            class="flex-1 border-[1px] border-slate-300 dark:border-white/10 rounded-lg px-3 py-2 font-bold text-dark dark:text-slate-200 text-sm bg-white/50 dark:bg-slate-900/50 focus:outline-none focus:border-blue focus:ring-1 focus:ring-blue"
                            onkeydown="if (event.key === 'Enter') addPlayer();" />
                        <button onclick="addPlayer()" class="btn-chunky bg-pink text-white dark:text-white px-3 rounded-lg">
                            <i data-lucide="plus" class="w-4 h-4"></i>
                        </button>
                    </div>

                    <!-- Batch Input -->
                    <div id="batch-container" class="hidden">
                        <textarea id="batch-input" rows="3"
                            class="w-full p-2 bg-white/50 dark:bg-slate-900/50 text-dark dark:text-slate-200 font-mono text-xs border-[1px] border-slate-300 dark:border-white/10 rounded-lg resize-none mb-2"
                            placeholder="One item per line..."></textarea>
                        <button onclick="saveBatch()" class="w-full btn-chunky bg-dark text-white py-2 rounded-lg text-xs">
                            Update List
                        </button>
                    </div>

                    <!-- Player List -->
                    <div id="player-list-chips" class="flex flex-wrap gap-1 max-h-32 overflow-y-auto custom-scrollbar pt-1">
                        <!-- Populated by JS -->
                    </div>
                </div>

                <!-- SPIN SETTINGS -->
                <div class="shrink-0 p-3 bg-slate-50/50 dark:bg-slate-800/50 border-[1px] border-slate-300 dark:border-white/10 rounded-xl shadow-sm space-y-2">
                    <div class="flex justify-between items-center border-b-[1px] border-slate-200 dark:border-white/10 pb-2">
                        <label class="text-xs font-black text-slate-400 uppercase tracking-widest flex items-center gap-2">
                            <i data-lucide="settings" class="w-4 h-4 text-orange"></i>
                            Settings
                        </label>
                    </div>
                    <div class="space-y-1">
                        <div class="flex justify-between">
                            <span class="text-sm font-bold text-dark dark:text-slate-200">Duration</span>
                            <span id="duration-display" class="text-xs font-mono font-bold text-blue bg-blue/10 px-2 py-0.5 rounded">4s</span>
                        </div>
                        <input type="range" id="duration-slider" min="2" max="8" step="0.5" value="4" oninput="updateDuration(this.value)" class="w-full accent-blue h-2 bg-slate-200 dark:bg-slate-700 rounded-lg appearance-none cursor-pointer" />
                    </div>
                    <div class="flex items-center justify-between">
                        <span class="text-sm font-bold text-dark dark:text-slate-200">Sound</span>
                        <label class="switch">
                            <input type="checkbox" id="sound-toggle" checked />
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div class="flex items-center justify-between">
                        <span class="text-sm font-bold text-dark dark:text-slate-200">Remove Winner</span>
                        <label class="switch">
                            <input type="checkbox" id="remove-winner-toggle" />
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>

                <!-- SPIN HISTORY -->
                <div class="p-3 bg-slate-50/50 dark:bg-slate-800/50 border-[1px] border-slate-300 dark:border-white/10 rounded-xl shadow-sm flex flex-col min-h-0 flex-1">
                    <div class="flex justify-between items-center border-b-[1px] border-slate-200 dark:border-white/10 pb-2 mb-2 shrink-0">
                        <label class="text-xs font-black text-slate-400 uppercase tracking-widest flex items-center gap-2">
                            <i data-lucide="history" class="w-4 h-4 text-purple"></i>
                            History
                        </label>

    <script>
        // IndexedDB Setup
        const DB_NAME = "ClassSpinnerDB_v3";
        const DB_VERSION = 1;
        let dataBase = null;

        async function initDB() {
            await requireAuth();
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onerror = () => reject(request.error);
                request.onsuccess = async () => {
                    dataBase = request.result;
                    await loadFromCloud();
                    resolve(dataBase);
                };
                request.onupgradeneeded = (event) => {
                    const database = event.target.result;

                    // Classes store
                    if (!database.objectStoreNames.contains("classes")) {
                        const classesStore = database.createObjectStore(
                            "classes",
                            { keyPath: "id", autoIncrement: true },
                        );
                        classesStore.createIndex("name", "name", {
                            unique: false,
                        });
                        classesStore.createIndex("updatedAt", "updatedAt", {
                            unique: false,
                        });
                    }

                    // Settings store
                    if (!database.objectStoreNames.contains("settings")) {
                        database.createObjectStore("settings", {
                            keyPath: "key",
                        });
                    }
                };
            });
        }

        // DB Operations
        async function getAllClasses() {
            return new Promise((resolve, reject) => {
                const tx = dataBase.transaction("classes", "readonly");
                const store = tx.objectStore("classes");
                const index = store.index("updatedAt");
                const request = index.getAll();
                request.onsuccess = () => resolve(request.result.reverse());
                request.onerror = () => reject(request.error);
            });
        }

        async function saveClass(classData) {
            return new Promise((resolve, reject) => {
                const tx = dataBase.transaction("classes", "readwrite");
                const store = tx.objectStore("classes");
                classData.updatedAt = Date.now();
                const request = classData.id
                    ? store.put(classData)
                    : store.add(classData);
                request.onsuccess = async () => {
                    await saveToCloud();
                    resolve(request.result);
                };
                request.onerror = () => reject(request.error);
            });
        }

        async function deleteClass(id) {
            return new Promise((resolve, reject) => {
                const tx = dataBase.transaction("classes", "readwrite");
                const store = tx.objectStore("classes");
                const request = store.delete(id);
                request.onsuccess = async () => {
                    await saveToCloud();
                    resolve();
                };
                request.onerror = () => reject(request.error);
            });
        }

        async function saveToCloud() {
            try {
                const allClasses = await getAllClasses();
                await saveProgress('class_spinner_data', { classes: allClasses, updatedAt: Date.now() });
            } catch (e) {
                console.error("Cloud save failed", e);
            }
        }

        async function loadFromCloud() {
            try {
                const data = await loadProgress('class_spinner_data');
                if (data && data.classes) {
                    const tx = dataBase.transaction("classes", "readwrite");
                    const store = tx.objectStore("classes");
                    for (const cls of data.classes) {
                        store.put(cls);
                    }
                }
            } catch (e) {
                console.error("Cloud load failed", e);
            }
        }

        async function getSetting(key) {
            return new Promise((resolve, reject) => {
                const tx = dataBase.transaction("settings", "readonly");
                const store = tx.objectStore("settings");
                const request = store.get(key);
                request.onsuccess = () => resolve(request.result?.value);
                request.onerror = () => reject(request.error);
            });
        }

        async function saveSetting(key, value) {
            return new Promise((resolve, reject) => {
                const tx = dataBase.transaction("settings", "readwrite");
                const store = tx.objectStore("settings");
                const request = store.put({ key, value });
                request.onsuccess = () => resolve();
                request.onerror = () => reject(request.error);
            });
        }

        // Theme
        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle("dark");
            localStorage.setItem("theme_spin-the-wheel", isDark ? "dark" : "light");
            lucide.createIcons();
        }

        function loadTheme() {
            const saved = localStorage.getItem("theme_spin-the-wheel");
            if (saved === "dark" || (!saved && window.matchMedia("(prefers-color-scheme: dark)").matches))
                document.documentElement.classList.add("dark");
        }

        // Toast
        function showToast(message, type = "info") {
            const container = document.getElementById("toast-container");
            const toast = document.createElement("div");

            const colors = {
                success: "bg-green text-dark border-green",
                error: "bg-pink text-white border-pink",
                info: "bg-blue text-white border-blue",
                warning: "bg-orange text-dark border-orange",
            };

            toast.className = `${colors[type]} px-4 py-3 rounded-xl shadow-neo border-[1px] font-bold text-sm flex items-center gap-2 pointer-events-auto transform transition-all duration-300 translate-y-[-20px] opacity-0`;
            toast.innerHTML = `<i data-lucide="${type === "success" ? "check-circle" : type === "error" ? "x-circle" : "info"}" class="w-4 h-4"></i> ${message}`;

            container.appendChild(toast);
            lucide.createIcons();

            requestAnimationFrame(() =>
                toast.classList.remove("translate-y-[-20px]", "opacity-0"),
            );
            setTimeout(() => {
                toast.classList.add("translate-y-[-20px]", "opacity-0");
                setTimeout(() => toast.remove(), 300);
            }, 2500);
        }

        // Panel Toggle
        let panelOpen = true;

        function togglePanel() {
            const controls = document.getElementById("controls");
            const panelToggle = document.getElementById("panel-toggle");
            const showPanelBtn = document.getElementById("show-panel-btn");
            const isMobile = window.innerWidth < 768;

            panelOpen = !panelOpen;

            if (isMobile) {
                controls.classList.toggle("mobile-open", panelOpen);
            } else {
                controls.classList.toggle("collapsed", !panelOpen);

                if (panelOpen) {
                    panelToggle.classList.remove("hidden");
                    showPanelBtn.classList.add("hidden");
                } else {
                    panelToggle.classList.add("hidden");
                    showPanelBtn.classList.remove("hidden");
                }
            }

            setTimeout(renderPlayers, 350);
        }

        // Spinner Types
        const spinnerSVGs = {
            pencil: `<svg viewBox="0 0 400 400" class="w-[75%] h-[75%]">

                <path d="M175 340 H225 V360 C225 375 175 375 175 360 V340 Z" fill="#FF6B95" stroke="#1E293B" stroke-width="4"/>
                <rect x="173" y="310" width="54" height="30" fill="url(#metalGrad)" stroke="#1E293B" stroke-width="4"/>
                <path d="M175 320 H225" stroke="#1E293B" stroke-width="2" opacity="0.4"/>
                <path d="M175 330 H225" stroke="#1E293B" stroke-width="2" opacity="0.4"/>
                <rect x="175" y="90" width="50" height="220" fill="url(#barrelGrad)" stroke="#1E293B" stroke-width="4"/>
                <path d="M187 90 V310" stroke="#1E293B" stroke-width="2" opacity="0.2"/>
                <path d="M213 90 V310" stroke="#1E293B" stroke-width="2" opacity="0.2"/>
                <path d="M175 90 L200 40 L225 90 H175 Z" fill="url(#woodGrad)" stroke="#1E293B" stroke-width="4"/>
                <path d="M200 40 L192 56 H208 L200 40 Z" fill="#37474F"/>
                <circle cx="200" cy="200" r="8" fill="#CFD8DC" stroke="#1E293B" stroke-width="3"/>
                <circle cx="200" cy="200" r="3" fill="#90A4AE"/>
            </svg>`,

            marker: `<svg viewBox="0 0 400 400" class="w-[75%] h-[75%]">
                <defs>
                    <linearGradient id="markerBodyGrad" x1="0" y1="0" x2="1" y2="0">

                    <linearGradient id="markerCapGrad" x1="0" y1="0" x2="1" y2="0">
                        <stop offset="0%" stop-color="#1565C0"/>
                        <stop offset="50%" stop-color="#1976D2"/>
                        <stop offset="100%" stop-color="#1565C0"/>
                    </linearGradient>
                </defs>
                <!-- Cap -->
                <rect x="165" y="40" width="70" height="80" rx="8" fill="url(#markerCapGrad)" stroke="#1E293B" stroke-width="4"/>
                <!-- Body -->
                <rect x="170" y="115" width="60" height="245" rx="6" fill="url(#markerBodyGrad)" stroke="#1E293B" stroke-width="4"/>
                <!-- Highlight -->
                <rect x="180" y="125" width="15" height="200" rx="3" fill="rgba(255,255,255,0.3)"/>

                <rect x="175" y="355" width="50" height="15" rx="3" fill="#0D47A1" stroke="#1E293B" stroke-width="3"/>
                <!-- Center point -->
                <circle cx="200" cy="200" r="6" fill="#CFD8DC" stroke="#1E293B" stroke-width="2"/>
            </svg>`,

            ruler: `<svg viewBox="0 0 400 400" class="w-[75%] h-[75%]">
                <defs>
                    <linearGradient id="rulerGrad" x1="0" y1="0" x2="0" y2="1">

                    <!-- 0-10 cm marks -->

                    <line x1="220" y1="285" x2="220" y2="305"/>
                    <line x1="240" y1="280" x2="240" y2="305" stroke-width="3"/>
                    <line x1="260" y1="285" x2="260" y2="305"/>

                <text x="195" y="140" font-size="14" fill="#1E293B" font-weight="bold" font-family="Nunito">10</text>
                <text x="235" y="140" font-size="14" fill="#1E293B" font-weight="bold" font-family="Nunito">15</text>

                <!-- Center hole -->
                <circle cx="200" cy="200" r="15" fill="none" stroke="#1E293B" stroke-width="3"/>

        let currentSpinnerType = "pencil";

        function setSpinnerType(type) {
            currentSpinnerType = type;
            document.getElementById("spinner-wrapper").innerHTML =
                spinnerSVGs[type];

            // Update active state
            document
                .querySelectorAll(".spinner-option")
                .forEach((el) => el.classList.remove("active"));
            document
                .getElementById(`spinner-${type}`)
                .classList.add("active");

            saveSetting("spinnerType", type);
        }

        // Game State
        const palette = ["bg-pink", "bg-orange", "bg-green", "bg-blue"];
        let classes = [];
        let currentClassId = null;
        let players = [];
        let eliminatedIndices = new Set(); // Session-based elimination
        let currentRotation = 0;
        let isSpinning = false;
        let spinHistory = [];
        let totalSpins = 0;
        let lastWinner = null;

        let spinDuration = 4;

        // Elements
        const spinnerWrapper = document.getElementById("spinner-wrapper");
        const board = document.getElementById("game-board");
        const container = document.getElementById("players-container");

        // Initialize
        async function init() {
            await initDB();
            loadTheme();

            // Load saved spinner type
            const savedType = (await getSetting("spinnerType")) || "pencil";
            setSpinnerType(savedType);

            // Load classes
            await loadClasses();

            // Load current class
            const savedClassId = await getSetting("currentClassId");
            if (
                savedClassId &&
                classes.find((c) => c.id === savedClassId)
            ) {
                await switchClass(savedClassId);
            } else if (classes.length > 0) {
                await switchClass(classes[0].id);
            }

            renderPlayerChips();

            if (typeof lucide !== 'undefined') {
                lucide.createIcons();
            }

            if (window.innerWidth < 768) {
                panelOpen = false;
                document
                    .getElementById("controls")
                    .classList.remove("mobile-open");
            }
        }

        async function loadClasses() {
            classes = await getAllClasses();
            renderClassList();
        }

        function renderClassList() {
            const list = document.getElementById("class-list");

            if (classes.length === 0) {
                list.innerHTML =
                    '<p class="text-xs text-slate-400 text-center py-2">No classes yet</p>';
                return;
            }

            list.innerHTML = classes
                .map(
                    (c) => `
                <div class="class-item flex items-center gap-2 p-2 rounded-lg border-[1px] border-transparent cursor-pointer ${c.id === currentClassId ? "active" : ""}"
                     onclick="switchClass(${c.id})">
                    <div class="w-6 h-6 rounded-full ${palette[c.id % palette.length]} flex items-center justify-center text-white text-xs font-bold">
                        ${c.name.charAt(0)}
                    </div>
                    <span class="text-sm font-bold truncate flex-1">${c.name}</span>
                    <span class="text-xs text-slate-400">${c.players.length}</span>
                </div>
            `,
                )
                .join("");
        }

        async function switchClass(id) {
            const cls = classes.find((c) => c.id === id);
            if (!cls) return;

            currentClassId = id;
            players = [...(cls.players || cls.participants || cls.members || [])];
            eliminatedIndices.clear();

            renderPlayers();
            renderClassList();
            renderPlayerChips();
            await saveSetting("currentClassId", id);
            
            currentRotation = 0;
            spinnerWrapper.style.transition = "none";
            spinnerWrapper.style.transform = "rotate(0deg)";

            // Load class history
            spinHistory = cls.history || [];
            totalSpins = cls.totalSpins || 0;

            await saveSetting("currentClassId", id);
            renderClassList();
            renderPlayers();
            updateHistoryDisplay();
            updateStats();

            document.getElementById("edit-class-name").textContent =
                cls.name;
        }

        // Class Management
        function openClassModal() {
            document.getElementById("new-class-name").value = "";
            document.getElementById("new-class-players").value = "";
            document
                .getElementById("class-modal")
                .classList.remove("hidden");
            document.getElementById("class-modal").classList.add("flex");
        }

        function closeClassModal() {
            document.getElementById("class-modal").classList.add("hidden");
            document.getElementById("class-modal").classList.remove("flex");
        }

        async function saveNewClass() {
            const name = document
                .getElementById("new-class-name")
                .value.trim();
            const playersText =
                document.getElementById("new-class-players").value;

            if (!name) {
                showToast("Please enter a class name", "error");
                return;
            }

            const newPlayers = playersText
                .split(/[\n,]/)
                .map((s) => s.trim())
                .filter((s) => s.length > 0);
            if (newPlayers.length < 2) {
                showToast("Need at least 2 students", "error");
                return;
            }

            const newClass = {
                name,
                players: newPlayers,
                history: [],
                totalSpins: 0,
                updatedAt: Date.now(),
            };

            const id = await saveClass(newClass);
            newClass.id = id;
            classes.unshift(newClass);

            await switchClass(id);
            closeClassModal();
            showToast(`Created ${name}`, "success");
        }

        async function deleteCurrentClass() {
            if (!currentClassId) return;
            if (classes.length <= 1) {
                showToast("Cannot delete last class", "error");
                return;
            }

            if (!confirm("Delete this class?")) return;

            await deleteClass(currentClassId);
            classes = classes.filter((c) => c.id !== currentClassId);

            await switchClass(classes[0].id);
            showToast("Class deleted", "info");
        }

        // Player Management Inline
        let isBatchMode = false;

        function toggleBatch() {
            isBatchMode = !isBatchMode;
            document.getElementById("batch-container").classList.toggle("hidden", !isBatchMode);
            document.getElementById("player-input-inline").parentElement.classList.toggle("hidden", isBatchMode);
            if (isBatchMode) {
                document.getElementById("batch-input").value = players.join("\n");
            }
        }

        async function addPlayer() {
            const input = document.getElementById("player-input-inline");
            const name = input.value.trim();
            if (!name) return;

            players.push(name);
            input.value = "";
            renderPlayers();
            renderPlayerChips();
            showToast(`Added ${name}`, "info");
        }

        async function removePlayer(index) {
            const removed = players[index];
            players.splice(index, 1);
            renderPlayers();
            renderPlayerChips();
            showToast(`Removed ${removed}`, "info");
        }

        async function saveBatch() {
            const input = document.getElementById("batch-input").value;
            const newPlayers = input
                .split(/[\n,]/)
                .map((s) => s.trim())
                .filter((s) => s.length > 0);

            if (newPlayers.length < 2) {
                showToast("Need at least 2 items!", "error");
                return;
            }

            players = newPlayers;
            toggleBatch();
            renderPlayers();
            renderPlayerChips();
            showToast(`Updated ${players.length} items for this session`, "success");
        }

        async function autoSavePlayers() {
            const cls = classes.find((c) => c.id === currentClassId);
            if (cls) {
                cls.players = players;
                cls.updatedAt = Date.now();
                await saveClass(cls);
            }
        }

        function renderPlayerChips() {
            const list = document.getElementById("player-list-chips");
            list.innerHTML = players
                .map(
                    (p, i) => `
                <div class="flex items-center gap-1 bg-white dark:bg-slate-700 border-[1px] border-slate-300 dark:border-white/10 rounded-lg px-2 py-1 text-xs font-bold text-dark dark:text-slate-200 shadow-neo-sm">
                    ${p}
                    <button onclick="removePlayer(${i})" class="text-slate-400 hover:text-pink">
                        <i data-lucide="x" class="w-3 h-3"></i>
                    </button>
                </div>
            `,
                )
                .join("");
            lucide.createIcons();
        }

        // Legacy Support for saving (button in sidebar)
        async function saveCurrentClass() {
            await autoSavePlayers();
            showToast("List saved", "success");
        }

        function renderPlayers() {
            container.innerHTML = "";

            const activePlayers = players.map((p, i) => ({ name: p, originalIndex: i }))
                .filter(p => !eliminatedIndices.has(p.originalIndex));

            const count = activePlayers.length;
            if (count < 2) {
                container.innerHTML =
                    '<div class="absolute inset-0 flex items-center justify-center text-slate-400 font-bold text-sm md:text-base">Need at least 2 active students</div>';
                return;
            }

            const boardSize = board.clientWidth;
            const radius = (boardSize / 2) * 0.82;

            activePlayers.forEach((player, index) => {
                const angleDeg = (360 / count) * index;
                const angleRad = (angleDeg - 90) * (Math.PI / 180);
                const x = Math.cos(angleRad) * radius;
                const y = Math.sin(angleRad) * radius;
                const colorClass = palette[player.originalIndex % palette.length];

                const label = document.createElement("div");
                label.className = `player-bubble absolute flex flex-col items-center justify-center transform -translate-x-1/2 -translate-y-1/2`;
                label.style.left = `calc(50% + ${x}px)`;
                label.style.top = `calc(50% + ${y}px)`;
                label.dataset.index = player.originalIndex;

                const textSize =
                    window.innerWidth < 640
                        ? "text-xs px-2 py-1"
                        : "text-sm px-4 py-2";
                const maxWidth =
                    window.innerWidth < 640
                        ? "max-w-[90px]"
                        : "max-w-[140px]";

                label.innerHTML = `
                    <div class="${colorClass} ${textSize} ${maxWidth} text-white border-[1px] border-slate-300 dark:border-white/20 rounded-xl shadow-neo font-bold truncate">
                        ${player.name}
                    </div>
                    <div class="mt-1 w-2 h-2 rounded-full bg-slate-300 dark:bg-slate-600"></div>
                `;
                container.appendChild(label);
            });
        }

        function updateDuration(val) {
            spinDuration = parseFloat(val);
            document.getElementById("duration-display").textContent =
                spinDuration + "s";
        }

        // Sound
        const audioCtx = new (
            window.AudioContext || window.webkitAudioContext
        )();

        function playSound(type) {
            if (!document.getElementById("sound-toggle").checked) return;

            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            if (type === "spin") {
                oscillator.frequency.setValueAtTime(
                    200,
                    audioCtx.currentTime,
                );
                oscillator.frequency.exponentialRampToValueAtTime(
                    800,
                    audioCtx.currentTime + 0.1,
                );
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(
                    0.01,
                    audioCtx.currentTime + 0.1,
                );
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.1);
            } else if (type === "win") {
                [523.25, 659.25, 783.99, 1046.5].forEach((freq, i) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.frequency.value = freq;
                    gain.gain.setValueAtTime(
                        0.15,
                        audioCtx.currentTime + i * 0.1,
                    );
                    gain.gain.exponentialRampToValueAtTime(
                        0.01,
                        audioCtx.currentTime + i * 0.1 + 0.3,
                    );
                    osc.start(audioCtx.currentTime + i * 0.1);
                    osc.stop(audioCtx.currentTime + i * 0.1 + 0.3);
                });
            }
        }

        function spin() {
            const activePlayersCount = players.filter((_, i) => !eliminatedIndices.has(i)).length;
            if (isSpinning || activePlayersCount < 2) {
                if (activePlayersCount < 2)
                    showToast("Need at least 2 active students!", "error");
                return;
            }

            if (audioCtx.state === "suspended") audioCtx.resume();

            isSpinning = true;
            document.getElementById("spin-btn").disabled = true;
            document.getElementById("spin-btn").classList.add("opacity-50");
            closeWinnerModal();

            document
                .querySelectorAll(".player-bubble")
                .forEach((el) => el.classList.remove("winner"));

            const extraSpins = 3 + Math.floor(Math.random() * 3);
            const randomAngle = Math.random() * 360;
            const totalDegrees = extraSpins * 360 + randomAngle;

            currentRotation += totalDegrees;

            spinnerWrapper.style.transition = `transform ${spinDuration}s cubic-bezier(0.1, 0.7, 0.1, 1)`;
            spinnerWrapper.style.transform = `rotate(${currentRotation}deg)`;

            let tickCount = 0;
            const tickInterval = setInterval(() => {
                tickCount++;
                if (tickCount < spinDuration * 8) playSound("spin");
            }, 125);

            setTimeout(() => {
                clearInterval(tickInterval);
                determineWinner(currentRotation % 360);
                isSpinning = false;
                document.getElementById("spin-btn").disabled = false;
                document
                    .getElementById("spin-btn")
                    .classList.remove("opacity-50");
            }, spinDuration * 1000);
        }

        function determineWinner(angle) {
            const activePlayers = players.map((p, i) => ({ name: p, originalIndex: i }))
                .filter(p => !eliminatedIndices.has(p.originalIndex));
            const count = activePlayers.length;
            const segmentSize = 360 / count;
            let winningIndex = Math.round(angle / segmentSize) % count;

            const winner = activePlayers[winningIndex];
            lastWinner = {
                name: winner.name,
                index: winner.originalIndex,
                angle: angle,
                timestamp: new Date(),
            };

            const bubbles = document.querySelectorAll(".player-bubble");
            // Find visually matching bubble by data-index
            bubbles.forEach(b => {
                if (parseInt(b.dataset.index) === winner.originalIndex) {
                    b.classList.add("winner");
                }
            });

            totalSpins++;
            spinHistory.unshift(lastWinner);

            const cls = classes.find((c) => c.id === currentClassId);
            if (cls) {
                cls.history = spinHistory;
                cls.totalSpins = totalSpins;
                saveClass(cls);
            }

            updateHistoryDisplay();
            updateStats();
            playSound("win");

            setTimeout(() => showWinnerModal(lastWinner), 300);
        }

        function showWinnerModal(winner) {
            const modal = document.getElementById("winner-modal");
            const backdrop = document.getElementById("winner-backdrop");
            const cls = classes.find((c) => c.id === currentClassId);

            document.getElementById("winner-name").textContent =
                winner.name;
            document.getElementById("winner-avatar").textContent =
                winner.name.charAt(0).toUpperCase();
            document.getElementById("winner-class").textContent = cls
                ? cls.name
                : "";

            const removeBtn = document.getElementById("remove-btn");
            removeBtn.classList.toggle(
                "hidden",
                !document.getElementById("remove-winner-toggle").checked,
            );

            modal.classList.remove("hidden");
            modal.classList.add("flex");
            backdrop.classList.remove("opacity-0");
        }

        function closeWinnerModal() {
            const modal = document.getElementById("winner-modal");
            const backdrop = document.getElementById("winner-backdrop");

            backdrop.classList.add("opacity-0");
            setTimeout(() => {
                modal.classList.add("hidden");
                modal.classList.remove("flex");
            }, 300);

            document
                .querySelectorAll(".player-bubble")
                .forEach((el) => el.classList.remove("winner"));
        }

        function resetSession() {
            eliminatedIndices.clear();
            renderPlayers();
            showToast("Session reset", "info");
        }

        async function removeWinnerAndContinue() {
            if (lastWinner) {
                eliminatedIndices.add(lastWinner.index);
                renderPlayers();
                showToast(`Eliminated ${lastWinner.name}`, "info");
            }
            closeWinnerModal();
        }

        // History
        function updateHistoryDisplay() {
            const list = document.getElementById("history-list");
            document.getElementById("history-count").textContent =
                `${spinHistory.length} spin${spinHistory.length !== 1 ? "s" : ""}`;

            if (spinHistory.length === 0) {
                list.innerHTML =
                    '<p class="text-sm text-slate-400 text-center py-4 italic">No spins yet...</p>';
                return;
            }

            list.innerHTML = spinHistory
                .slice(0, 50)
                .map(
                    (item, i) => `
                <div class="history-item flex items-center gap-2 p-2 bg-white/50 dark:bg-slate-800/50 rounded-lg border-[1px] border-slate-200 dark:border-white/10">
                    <div class="w-6 h-6 rounded-full ${palette[item.index % palette.length]} text-white flex items-center justify-center text-xs font-bold shadow-neo-sm flex-shrink-0">
                        ${item.name.charAt(0)}
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="font-bold text-sm text-dark dark:text-slate-200 truncate">${item.name}</p>
                        <p class="text-xs text-slate-400">${new Date(item.timestamp).toLocaleTimeString()}</p>
                    </div>
                </div>
            `,
                )
                .join("");
        }

        function updateStats() {
            document.getElementById("total-spins").textContent = totalSpins;
        }

        async function clearHistory() {
            if (!confirm("Clear history for this class?")) return;

            spinHistory = [];
            totalSpins = 0;

            const cls = classes.find((c) => c.id === currentClassId);
            if (cls) {
                cls.history = [];
                cls.totalSpins = 0;
                await saveClass(cls);
            }

            updateHistoryDisplay();
            updateStats();
            showToast("History cleared", "info");
        }

        // Resize
        let resizeTimeout;
        window.addEventListener("resize", () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => {
                renderPlayers();

                const controls = document.getElementById("controls");
                const isMobile = window.innerWidth < 768;

                if (!isMobile) {
                    controls.classList.remove("mobile-open");
                    if (!panelOpen) {
                        controls.classList.add("collapsed");
                        document
                            .getElementById("panel-toggle")
                            .classList.add("hidden");
                        document
                            .getElementById("show-panel-btn")
                            .classList.remove("hidden");
                    }
                } else {
                    controls.classList.remove("collapsed");
                    document
                        .getElementById("panel-toggle")
                        .classList.remove("hidden");
                    document
                        .getElementById("show-panel-btn")
                        .classList.add("hidden");
                    if (!panelOpen) {
                        controls.classList.remove("mobile-open");
                    }
                }
            }, 100);
        });

        // Initialization
        window.onload = init;
    </script>
</body>

</html>
