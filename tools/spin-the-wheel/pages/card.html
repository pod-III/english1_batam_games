<!doctype html>
<html lang="en" class="light">

<head>
    <!-- Supabase Auth -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/supabase.js"></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Mystery Deck - KlassKit</title>

    <!-- External Libraries -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@400;700;900&family=JetBrains+Mono:wght@500;700&display=swap"
        rel="stylesheet" />

    <!-- Theme Configuration -->
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        pink: "#FF6B95",
                        orange: "#FF8C42",
                        green: "#00E676",
                        blue: "#2979FF",
                        purple: "#7C4DFF",
                        dark: "#0f172a",
                        chalk: "#f8fafc",
                        surface: "rgba(255, 255, 255, 0.85)",
                        border: "rgba(203, 213, 225, 0.6)",
                    },
                    fontFamily: {
                        heading: ["Fredoka", "sans-serif"],
                        body: ["Nunito", "sans-serif"],
                        mono: ["JetBrains Mono", "monospace"],
                    },
                    boxShadow: {
                        neo: "4px 4px 0px 0px rgba(51, 65, 85, 0.15)",
                        "neo-sm": "2px 2px 0px 0px rgba(51, 65, 85, 0.15)",
                        "neo-lg": "8px 8px 0px 0px rgba(51, 65, 85, 0.15)",
                    },
                },
            },
        };
    </script>

    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        body {
            font-family: "Nunito", sans-serif;
            background-color: #f8fafc;
            background-image:
                linear-gradient(#e2e8f0 1.5px, transparent 1.5px),
                linear-gradient(90deg, #e2e8f0 1.5px, transparent 1.5px);
            background-size: 30px 30px;
            color: #1e293b;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            transition:
                background-color 0.3s,
                color 0.3s;
        }

        html.dark body {
            background-color: #020617;
            background-image:
                linear-gradient(#0f172a 1.5px, transparent 1.5px),
                linear-gradient(90deg, #0f172a 1.5px, transparent 1.5px);
            color: #e2e8f0;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }

        html.dark .glass-panel {
            background: rgba(15, 23, 42, 0.8);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .console-frame {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(203, 213, 225, 0.6);
            border-radius: 1.5rem;
            box-shadow: 8px 8px 0px rgba(51, 65, 85, 0.15);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        html.dark .console-frame {
            background: rgba(15, 23, 42, 0.8);
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: 8px 8px 0px rgba(0, 0, 0, 0.4);
        }

        .btn-chunky {
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: translateY(0);
            position: relative;
            border: 1px solid rgba(203, 213, 225, 0.6);
            box-shadow: 4px 4px 0 rgba(51, 65, 85, 0.15);
            font-family: "Fredoka", sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        html.dark .btn-chunky {
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: 4px 4px 0 rgba(0, 0, 0, 0.4);
            background-color: rgba(30, 41, 59, 0.8);
            color: #e2e8f0;
        }

        .btn-chunky:hover:not(:disabled) {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0 rgba(51, 65, 85, 0.15);
            filter: brightness(105%);
        }

        html.dark .btn-chunky:hover:not(:disabled) {
            box-shadow: 6px 6px 0 rgba(0, 0, 0, 0.4);
        }

        .btn-chunky:active:not(:disabled) {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0 rgba(51, 65, 85, 0.15) !important;
        }

        html.dark .btn-chunky:active:not(:disabled) {
            box-shadow: 2px 2px 0 rgba(0, 0, 0, 0.4) !important;
        }

        .btn-chunky:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: translateY(2px);
            box-shadow: 0 0 0 rgba(51, 65, 85, 0.15);
            filter: grayscale(100%);
        }

        .btn-chunky.active {
            background: #2979ff !important;
            color: white !important;
            border-color: #2979ff !important;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(203, 213, 225, 0.6);
            border-radius: 10px;
            border: 2px solid transparent;
            background-clip: content-box;
        }

        html.dark .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Card Styles */
        .card-3d {
            perspective: 1000px;
            transform-style: preserve-3d;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
        }

        .card-3d.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            inset: 0;
            backface-visibility: hidden;
            border-radius: 1rem;
            border: 1px solid rgba(203, 213, 225, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        html.dark .card-face {
            border-color: rgba(255, 255, 255, 0.1);
        }

        .card-front {
            background: linear-gradient(135deg,
                    #2979ff 0%,
                    #ff6b95 50%,
                    #ff8c42 100%);
            z-index: 2;
        }

        .card-front::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image: repeating-linear-gradient(-45deg,
                    transparent,
                    transparent 10px,
                    rgba(255, 255, 255, 0.1) 10px,
                    rgba(255, 255, 255, 0.1) 20px);
        }

        .card-front::after {
            content: "?";
            font-family: "Fredoka", sans-serif;
            font-weight: 700;
            font-size: 2.5rem;
            color: #1e293b;
            background: white;
            width: 3.5rem;
            height: 3.5rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid rgba(203, 213, 225, 0.6);
            box-shadow: 4px 4px 0 rgba(51, 65, 85, 0.15);
            z-index: 1;
        }

        html.dark .card-front::after {
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: 4px 4px 0 rgba(0, 0, 0, 0.4);
        }

        .card-back {
            background: rgba(255, 255, 255, 0.95);
            transform: rotateY(180deg);
            padding: 1rem;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.05);
        }

        html.dark .card-back {
            background: rgba(30, 41, 59, 0.95);
        }

        /* Playing Card */
        .playing-card {
            position: absolute;
            width: 120px;
            height: 170px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .playing-card:hover:not(.flipped):not(.focused) {
            z-index: 100 !important;
            transform: translateY(-20px) scale(1.05) rotate(var(--rotation, 0deg)) !important;
        }

        .playing-card.focused {
            position: fixed !important;
            z-index: 9999 !important;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .playing-card.dimmed {
            opacity: 0.3;
            filter: grayscale(0.5);
        }

        .playing-card.removing {
            animation: cardRemove 0.4s forwards;
        }

        @keyframes cardRemove {
            to {
                transform: scale(0) rotate(360deg) !important;
                opacity: 0;
            }
        }

        /* Stack View */
        .stack-container {
            position: relative;
            width: 140px;
            height: 200px;
            cursor: pointer;
        }

        .stack-card {
            position: absolute;
            top: 0;
            left: 0;
            width: 140px;
            /* Explicit width instead of 100% */
            height: 200px;
            /* Explicit height instead of 100% */
            transition: all 0.3s ease;
        }

        .stack-card.focused {
            width: 140px;
            height: 200px;
        }

        .stack-card:nth-child(1) {
            transform: translate(0, 0) rotate(0deg);
            z-index: 5;
        }

        .stack-card:nth-child(2) {
            transform: translate(3px, 3px) rotate(1.5deg);
            z-index: 4;
        }

        .stack-card:nth-child(3) {
            transform: translate(6px, 6px) rotate(-1deg);
            z-index: 3;
        }

        .stack-card:nth-child(4) {
            transform: translate(9px, 9px) rotate(2deg);
            z-index: 2;
        }

        .stack-card:nth-child(5) {
            transform: translate(12px, 12px) rotate(-2deg);
            z-index: 1;
        }

        .stack-container:hover .stack-card:nth-child(1) {
            transform: translate(-2px, -5px) rotate(-3deg);
        }

        .stack-container:hover .stack-card:nth-child(2) {
            transform: translate(1px, -2px) rotate(-0.5deg);
        }

        .stack-container:hover .stack-card:nth-child(3) {
            transform: translate(4px, 1px) rotate(0.5deg);
        }

        .stack-container:hover .stack-card:nth-child(4) {
            transform: translate(7px, 4px) rotate(1.5deg);
        }

        .stack-container:hover .stack-card:nth-child(5) {
            transform: translate(10px, 7px) rotate(-1deg);
        }

        /* Draw hint */
        .draw-hint {
            position: absolute;
            bottom: -40px;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 0.6;
            }

            50% {
                opacity: 1;
            }
        }

        /* Deck/Set Selector */
        .deck-item {
            transition: all 0.2s ease;
        }

        .deck-item:hover {
            background: rgba(41, 121, 255, 0.1);
        }

        .deck-item.active {
            background: rgba(41, 121, 255, 0.15);
            border-color: #2979ff;
        }

        html.dark .deck-item.active {
            background: rgba(124, 77, 255, 0.15);
            border-color: #7c4dff;
        }

        /* Toggle Switch */
        .switch {
            position: relative;
            display: inline-block;
            width: 48px;
            height: 24px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(203, 213, 225, 0.6);
            border: 1px solid rgba(203, 213, 225, 0.8);
            transition: 0.3s;
            border-radius: 34px;
        }

        html.dark .slider {
            background-color: rgba(30, 41, 59, 0.8);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            box-shadow: 2px 2px 0px rgba(51, 65, 85, 0.15);
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-radius: 50%;
        }

        html.dark .slider:before {
            background-color: #94a3b8;
            box-shadow: 2px 2px 0px rgba(0, 0, 0, 0.4);
        }

        input:checked+.slider {
            background-color: rgba(0, 230, 118, 0.3);
            border-color: #00e676;
        }

        html.dark input:checked+.slider {
            background-color: rgba(0, 230, 118, 0.2);
            border-color: #00e676;
        }

        input:checked+.slider:before {
            transform: translateX(24px);
            background-color: #00e676;
        }

        /* Panel animations */
        #controls {
            transition:
                transform 0.3s cubic-bezier(0.4, 0, 0.2, 1),
                width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #controls.collapsed {
            transform: translateX(-100%);
            width: 0;
            min-width: 0;
            padding: 0;
            margin: 0;
            border: none;
            overflow: hidden;
        }

        @media (max-width: 768px) {
            #controls {
                position: fixed;
                top: 0;
                left: 0;
                height: 100vh;
                z-index: 100;
                transform: translateX(-100%);
            }

            #controls.mobile-open {
                transform: translateX(0);
            }

            #controls.collapsed {
                transform: translateX(-100%);
                width: 85%;
                min-width: 300px;
            }
        }

        /* Focus actions - no blur overlay */
        .focus-actions {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10000;
            display: flex;
            gap: 1rem;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
        }

        .focus-actions.visible {
            opacity: 1;
            pointer-events: auto;
        }

        /* Loading toast */
        .loading-toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10000;
            pointer-events: none;
        }

        .loading-toast-inner {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(8px);
            border-radius: 1rem;
            padding: 1.5rem 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
            color: white;
            opacity: 0;
            transform: scale(0.9);
            transition: all 0.3s ease;
        }

        .loading-toast.visible .loading-toast-inner {
            opacity: 1;
            transform: scale(1);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top-color: #00e676;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body class="h-screen w-screen overflow-hidden">
    <div id="toast-container"
        class="fixed top-4 left-1/2 -translate-x-1/2 z-[100] flex flex-col gap-2 pointer-events-none"></div>

    <!-- Loading Toast -->
    <div id="loading-toast" class="loading-toast">
        <div class="loading-toast-inner">
            <div class="spinner"></div>
            <span class="font-heading font-bold text-lg">Shuffling...</span>
        </div>
    </div>

    <!-- Focus Actions (no overlay) -->
    <div id="focus-actions" class="focus-actions">
        <button onclick="eliminateFocusedCard()"
            class="btn-chunky bg-white dark:bg-slate-700 text-dark dark:text-slate-200 border-[1px] border-slate-300 dark:border-white/10 py-3 px-6 rounded-xl font-bold flex items-center gap-2 hover:text-pink hover:border-pink">
            <i data-lucide="x-circle" class="w-5 h-5"></i> Eliminate
        </button>
        <button onclick="unfocusCard()"
            class="btn-chunky bg-blue text-white py-3 px-6 rounded-xl font-bold flex items-center gap-2">
            <i data-lucide="rotate-ccw" class="w-5 h-5"></i> Return
        </button>
    </div>

    <div class="console-frame w-full h-full relative flex z-10 rounded-none md:rounded-2xl">
        <!-- LEFT PANEL: CONTROLS -->
        <aside id="controls"
            class="w-80 glass-panel border-r-[1px] border-slate-300 dark:border-white/10 flex flex-col z-50 h-full shrink-0">
            <!-- Header -->
            <div
                class="p-4 border-b-[1px] border-slate-300 dark:border-white/10 bg-slate-50/50 dark:bg-slate-800/50 flex justify-between items-center shrink-0">
                <div class="flex items-center gap-3 flex-1 min-w-0">
                    <a href="../index.html"
                        class="p-2 bg-white dark:bg-slate-700 border-[1px] border-slate-300 dark:border-white/10 rounded-lg text-slate-400 hover:text-blue transition-colors shadow-sm"
                        title="Back to Home">
                        <i data-lucide="home" class="w-4 h-4"></i>
                    </a>
                    <div class="flex-1 min-w-0">
                        <h1
                            class="text-xl font-heading text-dark dark:text-slate-100 tracking-wide leading-none truncate">
                            MYSTERY<span class="text-pink">DECK</span>
                        </h1>
                        <div class="flex items-center gap-2 mt-1">
                            <button onclick="toggleTheme()"
                                class="px-2 py-1 bg-slate-200 dark:bg-slate-700 text-slate-700 dark:text-slate-200 text-[10px] font-bold rounded flex items-center gap-1 hover:bg-slate-300 dark:hover:bg-slate-600 transition-colors">
                                <i data-lucide="moon" class="w-3 h-3 hidden dark:block"></i>
                                <i data-lucide="sun" class="w-3 h-3 block dark:hidden"></i>
                            </button>
                            <span class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">List Flipper</span>
                        </div>
                    </div>
                </div>
                <button onclick="togglePanel()"
                    class="md:hidden p-2 bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 rounded-lg hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>

            <!-- Content -->
            <div class="flex-1 p-4 overflow-y-auto custom-scrollbar space-y-4 bg-transparent relative">
                <!-- VIEW MODE TOGGLE -->
                <div
                    class="p-3 bg-slate-50/50 dark:bg-slate-800/50 border-[1px] border-slate-300 dark:border-white/10 rounded-xl shadow-sm">
                    <div
                        class="flex justify-between items-center border-b-[1px] border-slate-200 dark:border-white/10 pb-2 mb-2">
                        <label
                            class="text-xs font-black text-slate-400 uppercase tracking-widest flex items-center gap-2">
                            <i data-lucide="layout" class="w-4 h-4 text-blue"></i>
                            View Mode
                        </label>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="setViewMode('spread')" id="mode-spread"
                            class="flex-1 btn-chunky active py-2 rounded-lg text-xs font-bold">
                            <i data-lucide="grid-3x3" class="w-4 h-4 inline mr-1"></i>
                            Spread
                        </button>
                        <button onclick="setViewMode('stack')" id="mode-stack"
                            class="flex-1 btn-chunky py-2 rounded-lg text-xs font-bold">
                            <i data-lucide="layers" class="w-4 h-4 inline mr-1"></i>
                            Stack
                        </button>
                    </div>
                </div>

                <!-- DECK SETS -->
                <div
                    class="p-3 bg-slate-50/50 dark:bg-slate-800/50 border-[1px] border-slate-300 dark:border-white/10 rounded-xl shadow-sm">
                    <div
                        class="flex justify-between items-center border-b-[1px] border-slate-200 dark:border-white/10 pb-2 mb-2">
                        <label
                            class="text-xs font-black text-slate-400 uppercase tracking-widest flex items-center gap-2">
                            <i data-lucide="folder-open" class="w-4 h-4 text-green"></i>
                            Saved Lists
                        </label>
                        <button onclick="openDeckModal()" class="text-xs text-blue font-bold hover:underline">
                            + New
                        </button>
                    </div>

                    <!-- Deck List -->
                    <div id="deck-list" class="space-y-1 max-h-24 overflow-y-auto custom-scrollbar mb-2">
                        <!-- Populated by JS -->
                    </div>

                    <!-- Current List Actions -->
                    <div class="flex gap-2 pt-2 border-t-[1px] border-slate-200 dark:border-white/10">
                        <button onclick="saveCurrentDeck()"
                            class="flex-1 btn-chunky bg-green text-dark dark:text-dark py-2 rounded-lg text-xs font-bold">
                            <i data-lucide="save" class="w-3 h-3 inline mr-1"></i>
                            SAVE
                        </button>
                        <button onclick="shuffleCards()"
                            class="flex-1 btn-chunky bg-blue text-white py-2 rounded-lg text-xs font-bold">
                            <i data-lucide="shuffle" class="w-3 h-3 inline mr-1"></i>
                            SHUFFLE
                        </button>
                        <button onclick="deleteCurrentDeck()"
                            class="btn-chunky bg-white dark:bg-slate-700 !text-pink dark:!text-pink py-2 px-3 rounded-lg text-xs font-bold">
                            <i data-lucide="trash-2" class="w-3 h-3"></i>
                        </button>
                    </div>
                </div>

                <!-- Session Reset -->
                <button onclick="resetSession()"
                    class="w-full btn-chunky bg-slate-100 dark:bg-slate-800 text-slate-500 py-2 rounded-lg text-xs font-bold">
                    <i data-lucide="rotate-ccw" class="w-3 h-3 inline mr-1"></i>
                    RESET SESSION
                </button>

                <!-- DRAW RANDOM (Stack Mode) -->
                <button id="draw-random-btn" onclick="drawRandomCard()"
                    class="hidden w-full btn-chunky bg-gradient-to-r from-pink to-orange text-white dark:text-white py-4 rounded-xl text-lg tracking-widest flex items-center justify-center gap-3 hover:brightness-110 shadow-neo-lg">
                    <i data-lucide="zap" class="w-6 h-6"></i>
                    DRAW RANDOM
                </button>

                <!-- ADD CARDS -->
                <div
                    class="p-3 bg-slate-50/50 dark:bg-slate-800/50 border-[1px] border-slate-300 dark:border-white/10 rounded-xl shadow-sm space-y-2">
                    <div
                        class="flex justify-between items-center border-b-[1px] border-slate-200 dark:border-white/10 pb-2">
                        <label class="text-xs font-black text-slate-400 uppercase tracking-widest">Edit Items</label>
                        <button onclick="toggleBatch()" class="text-xs text-blue font-bold hover:underline">
                            Batch
                        </button>
                    </div>

                    <div class="flex gap-2">
                        <input type="text" id="card-input" placeholder="Name or word..."
                            class="flex-1 border-[1px] border-slate-300 dark:border-white/10 rounded-lg px-3 py-2 font-bold text-dark dark:text-slate-200 text-sm bg-white/50 dark:bg-slate-900/50 focus:outline-none focus:border-blue focus:ring-1 focus:ring-blue"
                            onkeydown="
                                    if (event.key === 'Enter') addCard();
                                " />
                        <button onclick="addCard()"
                            class="btn-chunky bg-pink text-white dark:text-white px-3 rounded-lg">
                            <i data-lucide="plus" class="w-4 h-4"></i>
                        </button>
                    </div>

                    <!-- Batch Input -->
                    <div id="batch-container" class="hidden">
                        <textarea id="batch-input" rows="3"
                            class="w-full p-2 bg-white/50 dark:bg-slate-900/50 text-dark dark:text-slate-200 font-mono text-xs border-[1px] border-slate-300 dark:border-white/10 rounded-lg resize-none mb-2"
                            placeholder="One card per line..."></textarea>
                        <button onclick="saveBatch()" class="w-full btn-chunky bg-dark text-white py-2 rounded-lg text-xs">
                            Update List
                        </button>
                    </div>

                    <!-- Card List -->
                    <div id="card-list" class="flex flex-wrap gap-1 max-h-24 overflow-y-auto custom-scrollbar pt-1">
                        <!-- Populated by JS -->
                    </div>
                </div>
            </div>

            <!-- Footer -->
            <div
                class="p-3 border-t-[1px] border-slate-300 dark:border-white/10 bg-slate-50/50 dark:bg-slate-800/50 flex justify-between items-center shrink-0">
                <div class="flex items-center gap-2">
                    <button onclick="toggleMute()" id="mute-btn"
                        class="p-2 bg-white dark:bg-slate-700 border-[1px] border-slate-300 dark:border-white/10 rounded-lg text-slate-400 hover:text-dark dark:hover:text-slate-200 transition-colors">
                        <i id="mute-icon" data-lucide="volume-2" class="w-4 h-4"></i>
                    </button>
                    <button onclick="clearAll()"
                        class="p-2 bg-white dark:bg-slate-700 border-[1px] border-slate-300 dark:border-white/10 rounded-lg text-slate-400 hover:text-pink transition-colors">
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                    </button>
                </div>
                <div class="font-heading font-black text-slate-400 text-xs uppercase tracking-wider">
                    CARDS: <span id="total-cards" class="text-blue">0</span>
                </div>
            </div>
        </aside>

        <!-- MAIN CARD AREA -->
        <main id="main-area"
            class="flex-1 relative h-full bg-slate-50/50 dark:bg-slate-900/50 flex flex-col overflow-hidden transition-colors duration-300">
            <!-- Toggle Panel Button -->
            <button id="panel-toggle" onclick="togglePanel()"
                class="absolute top-4 left-4 z-30 p-2 glass-panel border-[1px] border-slate-300 dark:border-white/10 rounded-xl shadow-neo-sm hover:translate-y-[-2px] transition-transform text-slate-500 hover:text-dark dark:hover:text-slate-200">
                <i data-lucide="panel-left-close" class="w-5 h-5"></i>
            </button>

            <!-- Show Panel Button (when collapsed) -->
            <button id="show-panel-btn" onclick="togglePanel()"
                class="hidden absolute top-4 left-4 z-30 p-2 glass-panel border-[1px] border-slate-300 dark:border-white/10 rounded-xl shadow-neo-sm hover:translate-y-[-2px] transition-transform text-slate-500 hover:text-dark dark:hover:text-slate-200">
                <i data-lucide="panel-left-open" class="w-5 h-5"></i>
            </button>

            <!-- Cards Container -->
            <div id="cards-container" class="flex-1 relative overflow-hidden">
                <!-- Cards rendered here -->
            </div>

            <!-- Empty State -->
            <div id="empty-state"
                class="hidden absolute inset-0 flex flex-col items-center justify-center text-slate-400 pointer-events-none">
                <div
                    class="w-24 h-24 rounded-full bg-slate-200 dark:bg-slate-700 flex items-center justify-center mb-4">
                    <i data-lucide="layers" class="w-12 h-12"></i>
                </div>
                <p class="font-heading text-xl font-bold">Deck is Empty</p>
                <p class="text-sm">Add cards or select a saved deck</p>
            </div>
        </main>
    </div>

    <!-- New Deck Modal -->
    <div id="deck-modal"
        class="fixed inset-0 bg-slate-900/60 hidden items-center justify-center z-50 backdrop-blur-sm p-4">
        <div
            class="glass-panel w-full max-w-md border-[1px] border-slate-300 dark:border-white/10 rounded-3xl shadow-neo-lg p-6 relative">
            <div class="flex justify-between items-center mb-4">
                <h2 class="font-heading text-2xl font-bold text-dark dark:text-white">
                    Save New Deck
                </h2>
                <button onclick="closeDeckModal()"
                    class="p-2 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-xl transition-colors">
                    <i data-lucide="x" class="w-6 h-6 text-slate-500"></i>
                </button>
            </div>

            <input type="text" id="new-deck-name" placeholder="Deck name (e.g. Vocabulary Set 1)"
                class="w-full p-4 mb-4 bg-white/50 dark:bg-slate-900/50 text-dark dark:text-slate-200 font-heading text-lg font-bold border-[1px] border-slate-300 dark:border-white/10 rounded-xl focus:border-blue focus:ring-1 focus:ring-blue outline-none shadow-inner" />

            <div class="flex gap-3">
                <button onclick="closeDeckModal()"
                    class="flex-1 btn-chunky bg-white dark:bg-slate-700 text-dark dark:text-white py-3 rounded-xl font-bold">
                    Cancel
                </button>
                <button onclick="createNewDeck()"
                    class="flex-1 btn-chunky bg-green text-dark dark:text-dark py-3 rounded-xl font-bold">
                    Create Deck
                </button>
            </div>
        </div>
    </div>

    <script>
        // Theme
        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle("dark");
            localStorage.setItem("theme_spin-the-wheel", isDark ? "dark" : "light");
            lucide.createIcons();
        }

        function loadTheme() {
            const saved = localStorage.getItem("theme_spin-the-wheel");
            if (saved === "dark" || (!saved && window.matchMedia("(prefers-color-scheme: dark)").matches))
                document.documentElement.classList.add("dark");
        }

        // Toast
        function showToast(message, type = "info") {
            const container = document.getElementById("toast-container");
            const toast = document.createElement("div");

            const colors = {
                success: "bg-green text-dark border-green",
                error: "bg-pink text-white border-pink",
                info: "bg-blue text-white border-blue",
                warning: "bg-orange text-dark border-orange",
            };

            toast.className = `${colors[type]} px-4 py-3 rounded-xl shadow-neo border-[1px] font-bold text-sm flex items-center gap-2 pointer-events-auto transform transition-all duration-300 translate-y-[-20px] opacity-0`;
            toast.innerHTML = `<i data-lucide="${type === "success" ? "check-circle" : type === "error" ? "x-circle" : "info"}" class="w-4 h-4"></i> ${message}`;

            container.appendChild(toast);
            lucide.createIcons();

            requestAnimationFrame(() =>
                toast.classList.remove("translate-y-[-20px]", "opacity-0"),
            );
            setTimeout(() => {
                toast.classList.add("translate-y-[-20px]", "opacity-0");
                setTimeout(() => toast.remove(), 300);
            }, 2500);
        }

        // Panel Toggle
        let panelOpen = true;

        function togglePanel() {
            const controls = document.getElementById("controls");
            const panelToggle = document.getElementById("panel-toggle");
            const showPanelBtn = document.getElementById("show-panel-btn");
            const isMobile = window.innerWidth < 768;

            panelOpen = !panelOpen;

            if (isMobile) {
                controls.classList.toggle("mobile-open", panelOpen);
            } else {
                controls.classList.toggle("collapsed", !panelOpen);

                if (panelOpen) {
                    panelToggle.classList.remove("hidden");
                    showPanelBtn.classList.add("hidden");
                } else {
                    panelToggle.classList.add("hidden");
                    showPanelBtn.classList.remove("hidden");
                }
            }
        }

        // State
        let cards = [];
        let decks = [];
        let currentDeckId = null;
        let eliminatedIndices = new Set(); // Session-based elimination
        let viewMode = "spread"; // 'spread' or 'stack'
        let focusedCardIndex = -1;
        let isShuffling = false;
        let isMuted = false;
        let audioInitialized = false;
        let synth, noiseSynth, winSynth;

        // IndexedDB
        const DB_NAME = "MysteryDeckDB_v3";
        const DB_VERSION = 1;
        let dataBase = null;

        async function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onerror = () => reject(request.error);
                request.onsuccess = async () => {
                    dataBase = request.result;
                    await requireAuth();
                    await loadFromCloud();
                    resolve(dataBase);
                };
                request.onupgradeneeded = (event) => {
                    const database = event.target.result;
                    if (!database.objectStoreNames.contains("decks")) {
                        const decksStore = database.createObjectStore(
                            "decks",
                            { keyPath: "id", autoIncrement: true },
                        );
                        decksStore.createIndex("updatedAt", "updatedAt", {
                            unique: false,
                        });
                    }
                };
            });
        }

        async function saveToCloud() {
            const allDecks = await getAllDecks();
            await saveProgress('mystery_deck_data', { decks: allDecks });
        }

        async function loadFromCloud() {
            const data = await loadProgress('mystery_deck_data');
            if (data && data.decks) {
                const tx = dataBase.transaction("decks", "readwrite");
                const store = tx.objectStore("decks");
                store.clear();
                for (const deck of data.decks) {
                    store.add(deck);
                }
            }
        }

        async function getAllDecks() {
            return new Promise((resolve, reject) => {
                const tx = dataBase.transaction("decks", "readonly");
                const store = tx.objectStore("decks");
                const index = store.index("updatedAt");
                const request = index.getAll();
                request.onsuccess = () => resolve(request.result.reverse());
                request.onerror = () => reject(request.error);
            });
        }

        async function saveDeck(deckData) {
            return new Promise((resolve, reject) => {
                const tx = dataBase.transaction("decks", "readwrite");
                const store = tx.objectStore("decks");
                deckData.updatedAt = Date.now();
                const request = deckData.id
                    ? store.put(deckData)
                    : store.add(deckData);
                request.onsuccess = async () => {
                    await saveToCloud();
                    resolve(request.result);
                };
                request.onerror = () => reject(request.error);
            });
        }

        async function deleteDeck(id) {
            return new Promise((resolve, reject) => {
                const tx = dataBase.transaction("decks", "readwrite");
                const store = tx.objectStore("decks");
                const request = store.delete(id);
                request.onsuccess = async () => {
                    await saveToCloud();
                    resolve();
                };
                request.onerror = () => reject(request.error);
            });
        }

        // Audio
        async function initAudio() {
            if (audioInitialized || isMuted) return;
            await Tone.start();

            synth = new Tone.MembraneSynth({
                pitchDecay: 0.05,
                octaves: 2,
                oscillator: { type: "sine" },
                envelope: {
                    attack: 0.001,
                    decay: 0.05,
                    sustain: 0,
                    release: 0.01,
                },
                volume: -15,
            }).toDestination();

            noiseSynth = new Tone.NoiseSynth({
                noise: { type: "pink" },
                envelope: { attack: 0.005, decay: 0.1, sustain: 0 },
            }).toDestination();
            noiseSynth.volume.value = -20;

            winSynth = new Tone.PolySynth(Tone.Synth, {
                volume: -5,
                oscillator: { type: "triangle" },
                envelope: {
                    attack: 0.01,
                    decay: 0.1,
                    sustain: 0.1,
                    release: 1,
                },
            }).toDestination();

            audioInitialized = true;
        }

        function playSound(type) {
            if (isMuted || !audioInitialized) return;
            const now = Tone.now();

            if (type === "tick" && synth)
                synth.triggerAttackRelease("C2", "64n", now);
            if (type === "hover" && synth)
                synth.triggerAttackRelease("G2", "128n", now, 0.3);
            if (type === "flip" && synth)
                synth.triggerAttackRelease("C3", "32n", now);
            if (type === "riffle" && noiseSynth)
                noiseSynth.triggerAttackRelease("32n", now);
            if (type === "win" && winSynth) {
                winSynth.triggerAttackRelease(
                    ["C4", "E4", "G4"],
                    "8n",
                    now,
                );
                winSynth.triggerAttackRelease(
                    ["E4", "G4", "C5"],
                    "8n",
                    now + 0.1,
                );
                winSynth.triggerAttackRelease(
                    ["G4", "C5", "E5"],
                    "4n",
                    now + 0.2,
                );
            }
        }

        function toggleMute() {
            isMuted = !isMuted;
            const icon = document.getElementById("mute-icon");
            icon.setAttribute(
                "data-lucide",
                isMuted ? "volume-x" : "volume-2",
            );
            document
                .getElementById("mute-btn")
                .classList.toggle("text-pink", isMuted);
            if (!isMuted && !audioInitialized) initAudio();
            lucide.createIcons();
        }

        // View Mode
        function setViewMode(mode) {
            viewMode = mode;

            document
                .getElementById("mode-spread")
                .classList.toggle("active", mode === "spread");
            document
                .getElementById("mode-stack")
                .classList.toggle("active", mode === "stack");
            document
                .getElementById("draw-random-btn")
                .classList.toggle("hidden", mode === "spread");

            unfocusCard();
            renderCards();
        }

        // Deck Management
        async function loadDecks() {
            decks = await getAllDecks();
            renderDeckList();
        }

        function renderDeckList() {
            const list = document.getElementById("deck-list");

            if (decks.length === 0) {
                list.innerHTML =
                    '<p class="text-xs text-slate-400 text-center py-2">No saved decks</p>';
                return;
            }

            list.innerHTML = decks
                .map(
                    (d) => `
                <div class="deck-item flex items-center gap-2 p-2 rounded-lg border-[1px] border-transparent cursor-pointer ${d.id === currentDeckId ? "active" : ""}"
                     onclick="switchDeck(${d.id})">
                    <div class="w-6 h-6 rounded-full bg-gradient-to-br from-blue to-pink flex items-center justify-center text-white text-xs font-bold">
                        ${d.name.charAt(0)}
                    </div>
                    <span class="text-sm font-bold truncate flex-1">${d.name}</span>
                    <span class="text-xs text-slate-400">${d.cards?.length || 0}</span>
                </div>
            `,
                )
                .join("");
        }

        async function switchDeck(id) {
            const deck = decks.find((d) => d.id === id);
            if (!deck) return;

            currentDeckId = id;
            cards = [...(deck.cards || deck.items || deck.options || [])];
            eliminatedIndices.clear();

            unfocusCard();

            renderDeckList();
            renderCards();
            renderCardList();

            showToast(`Loaded "${deck.name}"`, "success");
        }

        async function saveCurrentDeck() {
            if (!currentDeckId) {
                openDeckModal();
                return;
            }

            const deck = decks.find((d) => d.id === currentDeckId);
            if (!deck) return;

            deck.cards = [...cards];
            await saveDeck(deck);
            await loadDecks();

            showToast(`Saved "${deck.name}"`, "success");
        }

        async function createNewDeck() {
            const name = document
                .getElementById("new-deck-name")
                .value.trim();
            if (!name) {
                showToast("Please enter a name", "error");
                return;
            }

            const newDeck = {
                name,
                cards: [...cards],
                updatedAt: Date.now(),
            };

            const id = await saveDeck(newDeck);
            await loadDecks();
            await switchDeck(id);
            closeDeckModal();

            showToast(`Created "${name}"`, "success");
        }

        async function deleteCurrentDeck() {
            if (!currentDeckId) {
                showToast("No deck selected", "error");
                return;
            }

            if (decks.length <= 1) {
                showToast("Cannot delete last deck", "error");
                return;
            }

            if (!confirm("Delete this deck?")) return;

            await deleteDeck(currentDeckId);
            decks = decks.filter((d) => d.id !== currentDeckId);

            if (decks.length > 0) {
                await switchDeck(decks[0].id);
            }

            await loadDecks();
            showToast("Deck deleted", "info");
        }

        // Deck Modal
        function openDeckModal() {
            document.getElementById("new-deck-name").value = "";
            document
                .getElementById("deck-modal")
                .classList.remove("hidden");
            document.getElementById("deck-modal").classList.add("flex");
        }

        function closeDeckModal() {
            document.getElementById("deck-modal").classList.add("hidden");
            document.getElementById("deck-modal").classList.remove("flex");
        }

        // Shuffle with loading toast
        async function shuffleCards() {
            if (isShuffling || cards.length < 2) return;

            isShuffling = true;
            await initAudio();

            // Show loading toast
            const loadingToast = document.getElementById("loading-toast");
            loadingToast.classList.add("visible");

            // Play shuffle sounds
            for (let i = 0; i < 8; i++) {
                setTimeout(() => playSound("riffle"), i * 100);
            }

            // Wait for animation
            await new Promise((r) => setTimeout(r, 800));

            // Actually shuffle
            for (let i = cards.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [cards[i], cards[j]] = [cards[j], cards[i]];
            }

            // Hide loading toast
            loadingToast.classList.remove("visible");

            isShuffling = false;
            renderCards();
            playSound("win");
            showToast("Deck shuffled!", "success");
        }

        // Draw Random (Stack Mode)
        async function drawRandomCard() {
            if (cards.length === 0 || isShuffling) return;

            await initAudio();

            // Pick random card
            const randomIndex = Math.floor(Math.random() * cards.length);

            // Animate stack bounce
            const stack = document.querySelector(".stack-container");
            if (stack) {
                stack.style.transform = "translateY(-10px)";
                await new Promise((r) => setTimeout(r, 150));
                stack.style.transform = "";
                await new Promise((r) => setTimeout(r, 100));
            }

            focusCard(randomIndex);
        }

        // Card Rendering
        function resetSession() {
            eliminatedIndices.clear();
            renderCards();
            showToast("Session reset", "info");
        }

        function eliminateFocusedCard() {
            if (focusedCardIndex !== -1) {
                eliminatedIndices.add(focusedCardIndex);
                unfocusCard();
                renderCards();
                showToast("Item eliminated", "info");
            }
        }

        function renderCards() {
            const container = document.getElementById("cards-container");
            const emptyState = document.getElementById("empty-state");

            container.innerHTML = "";

            if (cards.length === 0) {
                emptyState.classList.remove("hidden");
                updateCount();
                lucide.createIcons();
                return;
            }

            emptyState.classList.add("hidden");

            if (viewMode === "stack") {
                renderStackView(container);
            } else {
                renderSpreadView(container);
            }

            updateCount();
            lucide.createIcons();
        }

        // Random spread with collision avoidance
        function renderSpreadView(container) {
            const wrapper = document.createElement("div");
            wrapper.className = "absolute inset-0";

            const containerRect = container.getBoundingClientRect();
            const padding = 80;
            const cardWidth = 120;
            const cardHeight = 170;

            const usedPositions = [];

            cards.forEach((card, i) => {
                const cardEl = createCardElement(card, i);

                // Find non-overlapping position
                let position = findValidPosition(
                    containerRect.width - padding * 2,
                    containerRect.height - padding * 2,
                    cardWidth,
                    cardHeight,
                    usedPositions,
                    padding,
                );

                usedPositions.push(position);

                const rotation = (Math.random() - 0.5) * 20; // -10 to 10 degrees

                cardEl.style.left = position.x + "px";
                cardEl.style.top = position.y + "px";
                cardEl.style.setProperty("--rotation", `${rotation}deg`);
                cardEl.style.transform = `rotate(${rotation}deg)`;

                wrapper.appendChild(cardEl);
            });

            container.appendChild(wrapper);
        }

        function findValidPosition(
            width,
            height,
            cardW,
            cardH,
            used,
            padding,
        ) {
            const maxAttempts = 50;

            for (let attempt = 0; attempt < maxAttempts; attempt++) {
                const x = padding + Math.random() * (width - cardW);
                const y = padding + Math.random() * (height - cardH);

                const newPos = { x, y, w: cardW, h: cardH };

                // Check collision with used positions
                let collision = false;
                for (const pos of used) {
                    if (rectsOverlap(newPos, pos)) {
                        collision = true;
                        break;
                    }
                }

                if (!collision) return newPos;
            }

            // Fallback: grid placement
            const cols = Math.floor(width / (cardW + 20));
            const index = used.length;
            const col = index % cols;
            const row = Math.floor(index / cols);

            return {
                x: padding + col * (cardW + 20),
                y: padding + row * (cardH + 20),
                w: cardW,
                h: cardH,
            };
        }

        function rectsOverlap(a, b) {
            const margin = 10;
            return !(
                a.x + a.w + margin < b.x ||
                b.x + b.w + margin < a.x ||
                a.y + a.h + margin < b.y ||
                b.y + b.h + margin < a.y
            );
        }

        function renderStackView(container) {
            const wrapper = document.createElement("div");
            wrapper.className =
                "absolute inset-0 flex items-center justify-center";

            const stackContainer = document.createElement("div");
            stackContainer.className = "stack-container relative";

            // Show top 5 cards max
            const displayCount = Math.min(5, cards.length);

            for (let i = 0; i < displayCount; i++) {
                const cardIndex = cards.length - 1 - i; // Top of stack
                const cardEl = createCardElement(
                    cards[cardIndex],
                    cardIndex,
                );
                cardEl.classList.add("stack-card");
                cardEl.style.zIndex = displayCount - i;

                // Stack click draws
                if (i === 0) {
                    cardEl.onclick = (e) => {
                        e.stopPropagation();
                        drawRandomCard();
                    };
                }

                stackContainer.appendChild(cardEl);
            }

            // Draw hint
            if (cards.length > 0) {
                const hint = document.createElement("div");
                hint.className =
                    "draw-hint font-heading font-bold text-slate-400 text-sm";
                hint.textContent = "Click to draw";
                stackContainer.appendChild(hint);
            }

            wrapper.appendChild(stackContainer);
            container.appendChild(wrapper);
        }

        function createCardElement(cardText, index) {
            const wrapper = document.createElement("div");
            wrapper.id = `card-${index}`;
            const isEliminated = eliminatedIndices.has(index);
            wrapper.className = `playing-card card-3d ${isEliminated ? 'opacity-20 pointer-events-none' : ''}`;
            wrapper.dataset.index = index;

            const fontSize =
                cardText.length > 12
                    ? "text-sm"
                    : cardText.length > 8
                        ? "text-base"
                        : "text-lg";

            wrapper.innerHTML = `
                <div class="card-inner">
                    <div class="card-face card-front"></div>
                    <div class="card-face card-back">
                        <div class="text-center font-heading font-bold text-dark dark:text-white break-words w-full leading-tight ${fontSize}">
                            ${cardText}
                        </div>
                    </div>
                </div>
            `;

            // Hover sound
            wrapper.addEventListener("mouseenter", () => {
                if (focusedCardIndex === -1 && !isShuffling)
                    playSound("hover");
            });

            // Click to focus (spread mode only)
            wrapper.addEventListener("click", (e) => {
                e.stopPropagation();
                if (viewMode === "spread" && focusedCardIndex === -1) {
                    focusCard(index);
                }
            });

            return wrapper;
        }

        function renderCardList() {
            const list = document.getElementById("card-list");
            list.innerHTML = "";

            cards.forEach((card, i) => {
                const tag = document.createElement("div");
                tag.className =
                    "flex items-center gap-1 bg-white dark:bg-slate-700 border-[1px] border-slate-300 dark:border-white/10 rounded-lg px-2 py-1 text-xs font-bold text-dark dark:text-slate-200 shadow-neo-sm";
                tag.innerHTML = `
                    ${card}
                    <button onclick="event.stopPropagation(); removeCard(${i})" class="text-slate-400 hover:text-pink">
                        <i data-lucide="x" class="w-3 h-3"></i>
                    </button>
                `;
                list.appendChild(tag);
            });

            lucide.createIcons();
        }

        function updateCount() {
            document.getElementById("total-cards").textContent =
                cards.length;
        }

        // Card Interactions
        async function focusCard(index) {
            if (focusedCardIndex !== -1 || isShuffling) return;

            focusedCardIndex = index;
            await initAudio();
            playSound("flip");

            const cardEl = document.getElementById(`card-${index}`);
            const inner = cardEl.querySelector(".card-inner");

            // Add flipped class
            cardEl.classList.add("flipped", "focused");

            // Calculate center position
            const rect = cardEl.getBoundingClientRect();
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;

            const deltaX = centerX - rect.left - rect.width / 2;
            const deltaY = centerY - rect.top - rect.height / 2;

            // Animate to center
            // Use transform-origin: center to ensure scaling doesn't jump
            cardEl.style.transform = `translate(${deltaX}px, ${deltaY}px) scale(1.25)`;

            // Dim other cards
            document.querySelectorAll(".playing-card").forEach((c) => {
                if (c !== cardEl) c.classList.add("dimmed");
            });

            // Show actions
            document
                .getElementById("focus-actions")
                .classList.add("visible");

            // Confetti
            confetti({
                particleCount: 50,
                spread: 60,
                origin: { y: 0.6 },
                colors: ["#FF6B95", "#FF8C42", "#00E676", "#2979FF"],
            });
            playSound("win");
        }

        function unfocusCard() {
            if (focusedCardIndex === -1) return;

            playSound("flip");

            const cardEl = document.getElementById(
                `card-${focusedCardIndex}`,
            );

            // Remove focused state
            cardEl.classList.remove("focused");
            if (viewMode === "spread") {
                cardEl.style.transform = `rotate(${cardEl.style.getPropertyValue('--rotation')})`;
            } else {
                cardEl.style.transform = "";
            }

            // Remove flipped after animation
            setTimeout(() => {
                cardEl.classList.remove("flipped");
            }, 300);

            // Undim others
            document.querySelectorAll(".playing-card").forEach((c) => {
                c.classList.remove("dimmed");
            });

            // Hide actions
            document
                .getElementById("focus-actions")
                .classList.remove("visible");

            focusedCardIndex = -1;
        }

        function eliminateFocusedCard() {
            if (focusedCardIndex === -1) return;

            const index = focusedCardIndex;
            const cardEl = document.getElementById(`card-${index}`);

            // Animate removal from session
            cardEl.classList.add("removing");

            setTimeout(() => {
                eliminatedIndices.add(index);
                unfocusCard();
                renderCards();
                showToast("Eliminated from session", "info");
            }, 400);
        }

        // Sidebar Actions
        function addCard() {
            const input = document.getElementById("card-input");
            const val = input.value.trim();
            if (!val) return;

            cards.push(val);
            input.value = "";
            renderCards();
            renderCardList();
            showToast(`Item added to session`, "info");
        }

        function removeCard(index) {
            cards.splice(index, 1);
            renderCards();
            renderCardList();
            showToast(`Item removed from session`, "info");
        }

        function toggleBatch() {
            const container = document.getElementById("batch-container");
            const input = document.getElementById("batch-input");

            if (container.classList.contains("hidden")) {
                input.value = cards.join("\n");
                container.classList.remove("hidden");
            } else {
                container.classList.add("hidden");
            }
        }

        function saveBatch() {
            const input = document.getElementById("batch-input");
            cards = input.value
                .split(/[\n,]+/)
                .map((s) => s.trim())
                .filter((s) => s.length > 0);
            toggleBatch();
            renderCards();
            renderCardList();
            showToast(`Updated session list`, "success");
        }

        function clearAll() {
            if (!confirm("Clear all cards in session?")) return;
            cards = [];
            renderCards();
            renderCardList();
            showToast(`Session cleared`, "info");
        }

        async function saveToCloud() {
            try {
                const allDecks = await getAllDecks();
                await saveProgress('card_picker_data', { decks: allDecks, updatedAt: Date.now() });
            } catch (e) {
                console.error("Cloud save failed", e);
            }
        }

        async function loadFromCloud() {
            try {
                const data = await loadProgress('card_picker_data');
                if (data && data.decks) {
                    for (const deck of data.decks) {
                        const tx = idb.transaction("decks", "readwrite");
                        const store = tx.objectStore("decks");
                        store.put(deck);
                    }
                }
            } catch (e) {
                console.error("Cloud load failed", e);
            }
        }

        // Initialization
        async function init() {
            await requireAuth();
            loadTheme();
            await initDB();
            await loadFromCloud();
            await loadDecks();

            if (decks.length === 0) {
                cards = [
                    "Apple",
                    "Banana",
                    "Orange",
                    "Elephant",
                    "Tiger",
                    "Lion",
                    "Giraffe",
                    "Penguin",
                ];
                const id = await saveDeck({
                    name: "Default Deck",
                    cards: [...cards],
                    updatedAt: Date.now(),
                });
                await loadDecks();
                await switchDeck(id);
            }

            lucide.createIcons();

            if (window.innerWidth < 768) {
                panelOpen = false;
                document
                    .getElementById("controls")
                    .classList.remove("mobile-open");
            }
        }

        // Click outside to unfocus
        document.addEventListener("click", (e) => {
            if (
                focusedCardIndex !== -1 &&
                !e.target.closest(".playing-card") &&
                !e.target.closest("#focus-actions")
            ) {
                unfocusCard();
            }
        });

        // Resize handler
        window.addEventListener("resize", () => {
            const controls = document.getElementById("controls");
            if (window.innerWidth >= 768) {
                controls.classList.remove("hidden-panel-mobile");
            } else {
                controls.classList.remove("hidden-panel-desktop");
            }

            // Re-render to fix positions
            if (viewMode === "spread") {
                renderCards();
            }
        });

        // Start
        window.onload = init;
    </script>
</body>

</html>
