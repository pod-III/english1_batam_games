<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Library — KlassKit</title>
    <link rel="icon" type="image/x-icon" href="../../media/icon.ico" />
    <link rel="icon" type="image/webp" href="../../media/icon.webp" />
    
    <!-- Supabase Auth -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../../supabase.js"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        heading: ['Fredoka', 'sans-serif'],
                        body: ['Nunito', 'sans-serif'],
                    },
                    colors: {
                        pink: '#ff4785',
                        orange: '#ff7e33',
                        green: '#00d063',
                        blue: '#1ea7fd',
                        dark: '#0f172a',
                        chalk: '#f8fafc'
                    },
                    boxShadow: {
                        'neo': '4px 4px 0px 0px rgba(51,65,85,0.15)',
                        'neo-sm': '2px 2px 0px 0px rgba(51,65,85,0.15)',
                    }
                }
            }
        }
    </script>
    
    <!-- Global Styles -->
    <link rel="stylesheet" href="../../css/base.css">
    <link rel="stylesheet" href="../../css/components.css">
    
    <script>
        if (localStorage.getItem("theme_youtube") === "dark" || (!localStorage.getItem("theme_youtube") && window.matchMedia("(prefers-color-scheme:dark)").matches)) {
            document.documentElement.classList.add("dark")
        }
    </script>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background-color: var(--bg-primary);
            font-family: 'Nunito', sans-serif;
            overflow-x: hidden;
        }

        /* Views */
        .view {
            display: none;
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            animation: pop-in 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .view.active {
            display: flex;
            flex-direction: column;
        }

        /* Library View */
        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1.5rem;
        }

        .title-group h1 {
            font-family: 'Fredoka', sans-serif;
            font-weight: 700;
            font-size: 2.5rem;
            color: var(--color-pink);
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .title-group p {
            margin: 0.5rem 0 0 0;
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .action-group {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2rem;
        }

        .video-card {
            background: var(--surface-card);
            border: var(--border-width-thick) solid var(--border-primary);
            border-radius: var(--radius-2xl);
            overflow: hidden;
            cursor: pointer;
            transition: all var(--transition-fast);
            box-shadow: var(--shadow-md);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .video-card:hover {
            transform: translateY(-6px) scale(1.02);
            box-shadow: var(--shadow-xl);
            border-color: var(--color-blue);
        }

        .thumbnail-container {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            position: relative;
            border-bottom: var(--border-width-medium) solid var(--border-primary);
            overflow: hidden;
        }

        .thumbnail-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform var(--transition-base);
        }

        .video-card:hover .thumbnail-container img {
            transform: scale(1.05);
        }

        .play-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity var(--transition-fast);
        }

        .video-card:hover .play-overlay {
            opacity: 1;
        }

        .play-overlay i {
            width: 64px;
            height: 64px;
            color: white;
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.6));
            transform: scale(0.9);
            transition: transform var(--transition-fast);
        }

        .video-card:hover .play-overlay i {
            transform: scale(1);
        }

        .card-content {
            padding: 1.5rem;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            position: relative;
        }

        .card-title {
            font-family: 'Fredoka', sans-serif;
            font-weight: 700;
            font-size: 1.15rem;
            line-height: 1.3;
            color: var(--text-primary);
        }

        .card-meta {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-tertiary);
            margin-top: auto;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .card-actions {
            position: absolute;
            top: -1rem;
            right: 1.5rem;
            display: flex;
            gap: 0.5rem;
            z-index: 10;
        }

        .action-btn {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            border: var(--border-width-medium) solid var(--border-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--surface-card);
            box-shadow: var(--shadow-sm);
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .btn-delete:hover {
            background: #ef4444;
            border-color: #dc2626;
            color: white;
        }

        /* Player View */
        .player-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .player-container {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            border: var(--border-width-thick) solid var(--border-primary);
            border-radius: var(--radius-2xl);
            box-shadow: var(--shadow-xl);
            overflow: hidden;
        }

        #player {
            width: 100%;
            height: 100%;
        }

        /* Modal / Add View */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(2, 6, 23, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--surface-card);
            border: var(--border-width-thick) solid var(--border-primary);
            border-radius: var(--radius-2xl);
            width: 100%;
            max-width: 520px;
            padding: 2.5rem;
            box-shadow: var(--shadow-xl);
            animation: pop-in 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .form-label {
            font-family: 'Fredoka', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
        }

        .input-chunky {
            padding: 1rem;
            font-size: 1rem;
            border-width: var(--border-width-medium);
        }

        .empty-state {
            grid-column: 1 / -1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 6rem 2rem;
            text-align: center;
            background: var(--bg-secondary);
            border: var(--border-width-thick) dashed var(--border-primary);
            border-radius: var(--radius-2xl);
            opacity: 0.9;
        }

        .empty-state i {
            width: 96px;
            height: 96px;
            color: var(--color-blue);
            margin-bottom: 2rem;
        }

        .empty-state h2 {
            font-family: 'Fredoka', sans-serif;
            font-weight: 700;
            font-size: 2rem;
            color: var(--text-primary);
            margin: 0 0 1rem 0;
            text-transform: uppercase;
        }

        .empty-state p {
            font-weight: 600;
            color: var(--text-secondary);
            margin: 0 0 2rem 0;
            font-size: 1.1rem;
        }

        /* Auth Status Bar */
        .auth-bar {
            background: var(--bg-secondary);
            padding: 0.75rem 1.25rem;
            border-radius: var(--radius-xl);
            font-size: 0.8rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: var(--text-secondary);
            border: var(--border-width-medium) solid var(--border-primary);
            box-shadow: var(--shadow-sm);
        }

        .sync-spinner {
            animation: spin 2s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .view {
                padding: 1rem;
            }

            .title-group h1 {
                font-size: 1.75rem;
            }

            .video-grid {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }

            .modal-content {
                padding: 1.75rem;
            }

            .empty-state {
                padding: 4rem 1.5rem;
            }

            .empty-state i {
                width: 64px;
                height: 64px;
            }

            .empty-state h2 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body class="min-h-screen text-dark dark:text-white relative font-body pb-12 overflow-x-hidden">

    <!-- Header -->
    <header class="glass-panel sticky top-0 z-30 h-12 flex items-center justify-between px-4 md:px-6 border-b-[3px] border-[var(--border-primary)]" style="border-radius: 0;">
        <div class="flex items-center gap-2 md:gap-3">
            <div class="w-8 h-8 bg-pink rounded-xl border-[2px] border-white/40 flex items-center justify-center text-white shadow-neo-sm">
                <i data-lucide="youtube" class="w-5 h-5 stroke-[2.5px]"></i>
            </div>
            <div>
                <h1 class="font-heading font-bold text-lg md:text-xl tracking-tight leading-none text-dark dark:text-white">YouTube Library</h1>
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-[0.2em] leading-none mt-1">KlassKit Workspace</p>
            </div>
        </div>

        <!-- Right Actions -->
        <div class="flex items-center gap-1 md:gap-2">
            <div id="auth-status" class="hidden sm:flex items-center gap-1.5 px-2 py-1 rounded-xl border-[2px] border-[var(--border-primary)] bg-slate-100 dark:bg-slate-800 text-[9px] font-extrabold uppercase tracking-widest text-slate-500">
                <i data-lucide="cloud" class="w-3 h-3"></i>
                <span id="sync-text">Checking...</span>
            </div>
            <button onclick="Theme.toggle()" class="p-1.5 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors" title="Toggle Theme">
                <i data-lucide="sun" class="w-3.5 h-3.5 dark:hidden text-slate-500"></i>
                <i data-lucide="moon" class="w-3.5 h-3.5 hidden dark:block text-slate-400"></i>
            </button>
        </div>
    </header>

    <!-- 1. LIBRARY VIEW (Default) -->
    <div id="view-library" class="view active">
        <div class="header-section">
            <div class="title-group">
                <h1>Video Library</h1>
                <p>Curated learning videos for your class</p>
            </div>
            
            <div class="action-group">
                <div id="auth-status-mobile" class="sm:hidden auth-bar">
                    <i data-lucide="cloud"></i>
                    <span id="sync-text-mobile">Checking...</span>
                </div>
                <button onclick="toggleModal(true)" class="btn-chunky bg-green text-white px-6 py-3 rounded-xl flex items-center gap-2">
                    <i data-lucide="plus"></i>
                    <span>Add Video</span>
                </button>
            </div>
        </div>

        <div id="video-grid" class="video-grid">
            <!-- Videos injected here -->
        </div>
    </div>

    <!-- 2. PLAYER VIEW -->
    <div id="view-player" class="view">
        <div class="player-header">
            <button onclick="switchView('library')" class="btn-chunky bg-white dark:bg-slate-800 p-3 rounded-xl border-[var(--border-width-medium)] border-[var(--border-primary)] shadow-neo-sm">
                <i data-lucide="arrow-left"></i>
            </button>
            <div class="title-group">
                <h2 id="current-title" class="font-heading text-2xl font-black text-dark dark:text-white">Video Title</h2>
            </div>
        </div>

        <div class="player-container">
            <div id="player"></div>
        </div>
    </div>

    <!-- 3. ADD MODAL -->
    <div id="add-modal" class="modal">
        <div class="modal-content">
            <div class="form-group">
                <h3 class="font-heading text-2xl font-black text-pink uppercase flex items-center gap-2">
                    <i data-lucide="plus-circle" class="w-6 h-6"></i>
                    New Video
                </h3>
                <p class="font-bold opacity-60 text-sm">Paste a YouTube link to save it to your library.</p>
            </div>

            <div class="form-group">
                <label class="form-label">Video URL</label>
                <input type="text" id="video-url" class="input-chunky" placeholder="https://youtube.com/watch?v=..." autofocus>
            </div>

            <div class="form-group">
                <label class="form-label">Custom Title (Optional)</label>
                <input type="text" id="video-title" class="input-chunky" placeholder="E.g. Present Continuous Grammar">
            </div>

            <div class="action-group" style="margin-top: 1rem;">
                <button onclick="toggleModal(false)" class="btn-chunky bg-slate-200 dark:bg-slate-700 text-dark dark:text-white flex-1 py-3 rounded-xl border-[var(--border-width-medium)] border-[var(--border-primary)]">Cancel</button>
                <button onclick="addVideo()" class="btn-chunky bg-blue text-white flex-2 py-3 rounded-xl border-[var(--border-width-medium)] border-[var(--border-primary)]">Save Video</button>
            </div>
        </div>
    </div>

    <script>
        // --- CONSTANTS ---
        const TOOL_KEY = 'youtube-library';
        let library = [];
        let player = null;
        let currentUser = null;
        let apiReady = false;

        // --- THEME MANAGER ---
        const Theme = {
            toggle() {
                const html = document.documentElement;
                const isDark = html.classList.toggle('dark');
                localStorage.setItem('theme_youtube', isDark ? 'dark' : 'light');
            }
        };

        // --- AUTH & INITIALIZATION ---
        async function init() {
            try {
                // 1. Auth Check
                currentUser = await requireAuth();
                updateSyncStatus('Synced');
                
                // 2. Load Data (Cloud + Local Fallback)
                library = await loadProgress(TOOL_KEY) || [];
                renderLibrary();
                
                // 3. Setup Icons
                lucide.createIcons();
            } catch (err) {
                console.error('Init Error:', err);
                updateSyncStatus('Offline', 'cloud-off');
            }
        }

        // --- VIEWS ---
        function switchView(viewName) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(`view-${viewName}`).classList.add('active');
            
            if (viewName === 'library' && player) {
                player.stopVideo();
            }
        }

        function toggleModal(show) {
            const modal = document.getElementById('add-modal');
            if (show) {
                modal.classList.add('active');
                document.getElementById('video-url').focus();
            } else {
                modal.classList.remove('active');
                document.getElementById('video-url').value = '';
                document.getElementById('video-title').value = '';
            }
        }

        // --- LIBRARY LOGIC ---
        function renderLibrary() {
            const grid = document.getElementById('video-grid');
            grid.innerHTML = '';

            if (library.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <i data-lucide="tv-2"></i>
                        <h2 class="font-heading text-3xl font-black">Your Library is Empty</h2>
                        <p class="font-bold text-lg opacity-60">Save videos you use for teaching to find them instantly.</p>
                        <button onclick="toggleModal(true)" class="btn-chunky bg-blue text-white px-8 py-4 rounded-xl mt-6">
                            Add Your First Video
                        </button>
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            library.forEach((video, index) => {
                const card = document.createElement('div');
                card.className = 'video-card';
                card.onclick = () => playVideo(video.id, video.title);

                const thumbUrl = `https://img.youtube.com/vi/${video.id}/mqdefault.jpg`;

                card.innerHTML = `
                    <div class="thumbnail-container">
                        <img src="${thumbUrl}" alt="${video.title}" loading="lazy">
                        <div class="play-overlay">
                            <i data-lucide="play"></i>
                        </div>
                    </div>
                    <div class="card-content">
                        <div class="card-actions">
                            <button class="action-btn btn-delete" onclick="event.stopPropagation(); deleteVideo('${video.id}')" title="Remove">
                                <i data-lucide="trash-2"></i>
                            </button>
                        </div>
                        <div class="card-title">${video.title}</div>
                        <div class="card-meta">ID: ${video.id}</div>
                    </div>
                `;
                grid.appendChild(card);
            });

            lucide.createIcons();
        }

        function extractVideoId(url) {
            const regExp = /^.*(youtu\.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length == 11) ? match[2] : (url.length === 11 ? url : null);
        }

        async function addVideo() {
            const urlInput = document.getElementById('video-url');
            const titleInput = document.getElementById('video-title');
            
            const id = extractVideoId(urlInput.value.trim());
            const title = titleInput.value.trim() || `Untitled Video (${id})`;

            if (!id) {
                alert('Please enter a valid YouTube URL or ID.');
                return;
            }

            if (library.find(v => v.id === id)) {
                alert('This video is already in your library.');
                toggleModal(false);
                return;
            }

            const video = { id, title, added: new Date().toISOString() };
            library.unshift(video);
            
            await sync();
            renderLibrary();
            toggleModal(false);
        }

        async function deleteVideo(id) {
            if (!confirm('Remove this video from your library?')) return;
            library = library.filter(v => v.id !== id);
            await sync();
            renderLibrary();
        }

        async function sync() {
            updateSyncStatus('Syncing...', 'refresh-cw', true);
            await saveProgress(TOOL_KEY, library);
            updateSyncStatus('Synced', 'cloud');
        }

        function updateSyncStatus(text, icon = 'cloud', spin = false) {
            // Desktop version
            const status = document.getElementById('auth-status');
            if (status) {
                status.innerHTML = `
                    <i data-lucide="${icon}" class="${spin ? 'sync-spinner' : ''}"></i>
                    <span>${text}</span>
                `;
            }
            // Mobile version
            const statusMobile = document.getElementById('auth-status-mobile');
            if (statusMobile) {
                statusMobile.innerHTML = `
                    <i data-lucide="${icon}" class="${spin ? 'sync-spinner' : ''}"></i>
                    <span>${text}</span>
                `;
            }
            lucide.createIcons();
        }

        // --- PLAYER LOGIC ---
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        function onYouTubeIframeAPIReady() {
            apiReady = true;
            console.log('YouTube API Ready');
        }

        function playVideo(id, title) {
            if (!apiReady) {
                alert('YouTube Player is still loading. Please try again in a moment.');
                return;
            }
            document.getElementById('current-title').textContent = title;
            switchView('player');

            if (!player) {
                player = new YT.Player('player', {
                    height: '100%',
                    width: '100%',
                    videoId: id,
                    playerVars: {
                        'playsinline': 1,
                        'autoplay': 1,
                        'modestbranding': 1,
                        'rel': 0
                    }
                });
            } else {
                player.loadVideoById(id);
            }
        }

        // Start
        window.addEventListener('load', init);

    </script>
</body>
</html>
