<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Library - KlassKit</title>
    
    <!-- Supabase Auth -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../../supabase.js"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Global Styles -->
    <link rel="stylesheet" href="../../css/base.css">
    <link rel="stylesheet" href="../../css/components.css">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background-color: var(--bg-primary);
            font-family: 'Nunito', sans-serif;
            overflow-x: hidden;
        }

        /* Views */
        .view {
            display: none;
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            animation: pop-in 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .view.active {
            display: flex;
            flex-direction: column;
        }

        /* Library View */
        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1.5rem;
        }

        .title-group h1 {
            font-family: 'Fredoka', sans-serif;
            font-weight: 700;
            font-size: 2.5rem;
            color: var(--color-pink);
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .title-group p {
            margin: 0;
            font-weight: 700;
            opacity: 0.6;
        }

        .action-group {
            display: flex;
            gap: 1rem;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
        }

        .video-card {
            background: var(--surface-card);
            border: var(--border-width-thick) solid var(--border-primary);
            border-radius: var(--radius-xl);
            overflow: hidden;
            cursor: pointer;
            transition: all var(--transition-fast);
            box-shadow: var(--shadow-md);
            display: flex;
            flex-direction: column;
        }

        .video-card:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: var(--shadow-lg);
            border-color: var(--color-blue);
        }

        .thumbnail-container {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            position: relative;
            border-bottom: var(--border-width-medium) solid var(--border-primary);
        }

        .thumbnail-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .play-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .video-card:hover .play-overlay {
            opacity: 1;
        }

        .play-overlay i {
            width: 48px;
            height: 48px;
            color: white;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
        }

        .card-content {
            padding: 1.25rem;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            position: relative;
        }

        .card-title {
            font-family: 'Fredoka', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            line-height: 1.2;
            color: var(--text-primary);
        }

        .card-meta {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-tertiary);
            margin-top: auto;
        }

        .card-actions {
            position: absolute;
            top: -1rem;
            right: 1rem;
            display: flex;
            gap: 0.5rem;
        }

        .action-btn {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: var(--border-width-medium) solid var(--border-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            box-shadow: var(--shadow-sm);
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .btn-delete:hover {
            background: #ef4444;
            color: white;
        }

        /* Player View */
        .player-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .player-container {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            border: var(--border-width-thick) solid var(--border-primary);
            border-radius: var(--radius-2xl);
            box-shadow: var(--shadow-xl);
            overflow: hidden;
        }

        #player {
            width: 100%;
            height: 100%;
        }

        /* Modal / Add View */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(2, 6, 23, 0.85);
            backdrop-filter: blur(8px);
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--surface-card);
            border: var(--border-width-thick) solid var(--border-primary);
            border-radius: var(--radius-2xl);
            width: 100%;
            max-width: 500px;
            padding: 2.5rem;
            box-shadow: var(--shadow-xl);
            animation: pop-in 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-label {
            font-family: 'Fredoka', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 0.05em;
        }

        .input-chunky {
            padding: 1rem;
            font-size: 1rem;
            border-width: var(--border-width-medium);
        }

        .empty-state {
            grid-column: 1 / -1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 5rem 2rem;
            text-align: center;
            background: var(--bg-secondary);
            border: var(--border-width-medium) dashed var(--border-primary);
            border-radius: var(--radius-2xl);
            opacity: 0.8;
        }

        .empty-state i {
            width: 80px;
            height: 80px;
            color: var(--color-blue);
            margin-bottom: 1.5rem;
        }

        /* Auth Status Bar */
        .auth-bar {
            background: var(--bg-secondary);
            padding: 0.5rem 1rem;
            border-radius: var(--radius-md);
            font-size: 0.8rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
        }

        .sync-spinner {
            animation: spin 2s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

    </style>
</head>
<body class="selection:bg-pink selection:text-white">

    <!-- 1. LIBRARY VIEW (Default) -->
    <div id="view-library" class="view active">
        <div class="header-section">
            <div class="title-group">
                <h1>Video Library</h1>
                <p>Curated learning videos for your class</p>
            </div>
            
            <div class="action-group">
                <div id="auth-status" class="auth-bar">
                    <i data-lucide="cloud"></i>
                    <span id="sync-text">Checking Sync...</span>
                </div>
                <button onclick="toggleModal(true)" class="btn-chunky bg-green text-white px-6 py-3 rounded-xl flex items-center gap-2">
                    <i data-lucide="plus"></i>
                    <span>Add Video</span>
                </button>
            </div>
        </div>

        <div id="video-grid" class="video-grid">
            <!-- Videos injected here -->
        </div>
    </div>

    <!-- 2. PLAYER VIEW -->
    <div id="view-player" class="view">
        <div class="player-header">
            <button onclick="switchView('library')" class="btn-chunky bg-white dark:bg-slate-800 p-3 rounded-xl">
                <i data-lucide="arrow-left"></i>
            </button>
            <div class="title-group">
                <h2 id="current-title" class="font-heading text-2xl font-black text-dark dark:text-white">Video Title</h2>
            </div>
        </div>

        <div class="player-container">
            <div id="player"></div>
        </div>
    </div>

    <!-- 3. ADD MODAL -->
    <div id="add-modal" class="modal">
        <div class="modal-content">
            <div class="form-group">
                <h3 class="font-heading text-2xl font-black text-pink uppercase">New Video</h3>
                <p class="font-bold opacity-60">Paste a YouTube link to save it.</p>
            </div>

            <div class="form-group">
                <label class="form-label">Video URL</label>
                <input type="text" id="video-url" class="input-chunky" placeholder="https://youtube.com/watch?v=..." autofocus>
            </div>

            <div class="form-group">
                <label class="form-label">Custom Title (Optional)</label>
                <input type="text" id="video-title" class="input-chunky" placeholder="E.g. Present Continuous Grammar">
            </div>

            <div class="action-group" style="margin-top: 1rem;">
                <button onclick="toggleModal(false)" class="btn-chunky bg-slate-200 text-dark flex-1 py-3 rounded-xl">Cancel</button>
                <button onclick="addVideo()" class="btn-chunky bg-blue text-white flex-2 py-3 rounded-xl">Save Video</button>
            </div>
        </div>
    </div>

    <script>
        // --- CONSTANTS ---
        const TOOL_KEY = 'youtube-library';
        let library = [];
        let player = null;
        let currentUser = null;
        let apiReady = false;

        // --- AUTH & INITIALIZATION ---
        async function init() {
            try {
                // 1. Auth Check
                currentUser = await requireAuth();
                updateSyncStatus('Synced with Cloud');
                
                // 2. Load Data (Cloud + Local Fallback)
                library = await loadProgress(TOOL_KEY) || [];
                renderLibrary();
                
                // 3. Setup Icons
                lucide.createIcons();
            } catch (err) {
                console.error('Init Error:', err);
                updateSyncStatus('Offline Mode', 'cloud-off');
            }
        }

        // --- VIEWS ---
        function switchView(viewName) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(`view-${viewName}`).classList.add('active');
            
            if (viewName === 'library' && player) {
                player.stopVideo();
            }
        }

        function toggleModal(show) {
            const modal = document.getElementById('add-modal');
            if (show) {
                modal.classList.add('active');
                document.getElementById('video-url').focus();
            } else {
                modal.classList.remove('active');
                document.getElementById('video-url').value = '';
                document.getElementById('video-title').value = '';
            }
        }

        // --- LIBRARY LOGIC ---
        function renderLibrary() {
            const grid = document.getElementById('video-grid');
            grid.innerHTML = '';

            if (library.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <i data-lucide="tv-2"></i>
                        <h2 class="font-heading text-3xl font-black">Your Library is Empty</h2>
                        <p class="font-bold text-lg opacity-60">Save videos you use for teaching to find them instantly.</p>
                        <button onclick="toggleModal(true)" class="btn-chunky bg-blue text-white px-8 py-4 rounded-xl mt-6">
                            Add Your First Video
                        </button>
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            library.forEach((video, index) => {
                const card = document.createElement('div');
                card.className = 'video-card';
                card.onclick = () => playVideo(video.id, video.title);

                const thumbUrl = `https://img.youtube.com/vi/${video.id}/mqdefault.jpg`;

                card.innerHTML = `
                    <div class="thumbnail-container">
                        <img src="${thumbUrl}" alt="${video.title}" loading="lazy">
                        <div class="play-overlay">
                            <i data-lucide="play"></i>
                        </div>
                    </div>
                    <div class="card-content">
                        <div class="card-actions">
                            <button class="action-btn btn-delete" onclick="event.stopPropagation(); deleteVideo('${video.id}')" title="Remove">
                                <i data-lucide="trash-2"></i>
                            </button>
                        </div>
                        <div class="card-title">${video.title}</div>
                        <div class="card-meta">ID: ${video.id}</div>
                    </div>
                `;
                grid.appendChild(card);
            });

            lucide.createIcons();
        }

        function extractVideoId(url) {
            const regExp = /^.*(youtu\.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length == 11) ? match[2] : (url.length === 11 ? url : null);
        }

        async function addVideo() {
            const urlInput = document.getElementById('video-url');
            const titleInput = document.getElementById('video-title');
            
            const id = extractVideoId(urlInput.value.trim());
            const title = titleInput.value.trim() || `Untitled Video (${id})`;

            if (!id) {
                alert('Please enter a valid YouTube URL or ID.');
                return;
            }

            if (library.find(v => v.id === id)) {
                alert('This video is already in your library.');
                toggleModal(false);
                return;
            }

            const video = { id, title, added: new Date().toISOString() };
            library.unshift(video);
            
            await sync();
            renderLibrary();
            toggleModal(false);
        }

        async function deleteVideo(id) {
            if (!confirm('Remove this video from your library?')) return;
            library = library.filter(v => v.id !== id);
            await sync();
            renderLibrary();
        }

        async function sync() {
            updateSyncStatus('Syncing...', 'refresh-cw', true);
            await saveProgress(TOOL_KEY, library);
            updateSyncStatus('Synced with Cloud', 'cloud');
        }

        function updateSyncStatus(text, icon = 'cloud', spin = false) {
            const status = document.getElementById('auth-status');
            status.innerHTML = `
                <i data-lucide="${icon}" class="${spin ? 'sync-spinner' : ''}"></i>
                <span>${text}</span>
            `;
            lucide.createIcons();
        }

        // --- PLAYER LOGIC ---
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        function onYouTubeIframeAPIReady() {
            apiReady = true;
            console.log('YouTube API Ready');
        }

        function playVideo(id, title) {
            if (!apiReady) {
                alert('YouTube Player is still loading. Please try again in a moment.');
                return;
            }
            document.getElementById('current-title').textContent = title;
            switchView('player');

            if (!player) {
                player = new YT.Player('player', {
                    height: '100%',
                    width: '100%',
                    videoId: id,
                    playerVars: {
                        'playsinline': 1,
                        'autoplay': 1,
                        'modestbranding': 1,
                        'rel': 0
                    }
                });
            } else {
                player.loadVideoById(id);
            }
        }

        // Start
        window.addEventListener('load', init);

    </script>
</body>
</html>
