<!DOCTYPE html>
<html lang="en">

<head>
  <!-- Supabase Auth -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/supabase.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Tracker — KlassKit</title>
  <meta name="description" content="Track unit and lesson planning status across all scheduled classes.">
  <link rel="icon" type="image/x-icon" href="../../media/icon.ico" />
  <link rel="icon" type="image/webp" href="../../media/icon.webp" />
  <script>
    if (localStorage.getItem("theme_admin-tracker") === "dark" || (!localStorage.getItem("theme_admin-tracker") && window.matchMedia("(prefers-color-scheme:dark)").matches)) {
      document.documentElement.classList.add("dark")
    }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            pink: '#FF6B95',
            orange: '#FF8C42',
            green: '#00E676',
            blue: '#2979FF',
            dark: '#0f172a',
            chalk: '#f8fafc',
          },
          fontFamily: {
            heading: ['Fredoka', 'sans-serif'],
            body: ['Nunito', 'sans-serif'],
          },
          boxShadow: {
            'neo': '4px 4px 0px 0px rgba(51,65,85,0.15)',
            'neo-sm': '2px 2px 0px 0px rgba(51,65,85,0.15)',
          },
        }
      }
    }
  </script>

  <link rel="stylesheet" href="../../css/base.css" />
  <link rel="stylesheet" href="../../css/components.css" />
  <link rel="stylesheet" href="styles.css" />

  <!-- Vercel Web Analytics -->
  <script>
    window.va = window.va || function () {
      (window.vaq = window.vaq || []).push(arguments)
    };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
</head>

<body class="min-h-screen text-dark dark:text-white relative bg-chalk dark:bg-dark font-body">

  <!-- ====== HEADER ====== -->
  <header class="glass-panel sticky top-0 z-30 h-14 flex items-center justify-between px-4 md:px-6 border-b-[3px] border-[var(--border-primary)]" style="border-radius: 0;">
    <div class="flex items-center gap-3">
      <a href="/" class="p-1.5 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors" title="Home">
        <i data-lucide="arrow-left" class="w-5 h-5 text-slate-500 dark:text-slate-400"></i>
      </a>
      <div>
        <h1 class="font-heading font-bold text-lg md:text-xl tracking-tight leading-none">📋 Admin Tracker</h1>
        <p class="text-xs font-bold text-slate-400 uppercase tracking-widest hidden md:block">Lesson Plan Overview</p>
      </div>
    </div>
    <div class="flex items-center gap-2">
      <div id="sync-badge" class="flex items-center gap-1.5 px-3 py-1.5 rounded-xl border-[2px] border-[var(--border-primary)] bg-slate-100 dark:bg-slate-800 text-xs font-extrabold uppercase tracking-widest text-slate-500">
        <i data-lucide="hard-drive" class="w-3 h-3"></i> Local Storage
      </div>
      <button onclick="toggleTheme()" class="p-2 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors" title="Toggle Theme">
        <i data-lucide="sun" class="w-4 h-4 dark:hidden text-slate-500"></i>
        <i data-lucide="moon" class="w-4 h-4 hidden dark:block text-slate-400"></i>
      </button>
    </div>
  </header>

  <!-- ====== MAIN ====== -->
  <main class="max-w-7xl mx-auto p-4 md:p-6">

    <!-- ===== SUMMARY BAR ===== -->
    <div id="summary-bar" class="summary-bar mb-6">
      <div class="summary-ring-wrap">
        <svg id="summary-ring" class="summary-ring" viewBox="0 0 80 80">
          <circle cx="40" cy="40" r="34" stroke="var(--bg-tertiary)" stroke-width="7" fill="none" />
          <circle id="summary-ring-fill" cx="40" cy="40" r="34" stroke="var(--color-green)" stroke-width="7" fill="none"
            stroke-linecap="round" stroke-dasharray="213.6" stroke-dashoffset="213.6"
            transform="rotate(-90 40 40)" />
        </svg>
        <span id="summary-percent" class="summary-percent font-heading font-bold">0%</span>
      </div>
      <div class="summary-metrics">
        <div class="summary-metric">
          <span class="summary-metric-value font-heading" id="stat-classes">0</span>
          <span class="summary-metric-label">Classes</span>
        </div>
        <div class="summary-divider"></div>
        <div class="summary-metric">
          <span class="summary-metric-value font-heading text-green" id="stat-planned">0</span>
          <span class="summary-metric-label">Planned</span>
        </div>
        <div class="summary-divider"></div>
        <div class="summary-metric">
          <span class="summary-metric-value font-heading text-orange" id="stat-skipped">0</span>
          <span class="summary-metric-label">Skipped</span>
        </div>
        <div class="summary-divider"></div>
        <div class="summary-metric">
          <span class="summary-metric-value font-heading text-blue" id="stat-upcoming">0</span>
          <span class="summary-metric-label">Upcoming</span>
        </div>
      </div>
    </div>

    <!-- ===== TOOLBAR ===== -->
    <div class="toolbar mb-5">
      <div class="toolbar-group">
        <button onclick="setMode('lessons')" class="toolbar-btn active" id="mode-lessons">
          <i data-lucide="book-open" class="w-3.5 h-3.5"></i> Lessons
        </button>
        <button onclick="setMode('units')" class="toolbar-btn" id="mode-units">
          <i data-lucide="layers" class="w-3.5 h-3.5"></i> Units
        </button>
      </div>
      <div class="toolbar-right">
        <div class="toolbar-group">
          <button onclick="setFilter('today')" class="toolbar-btn" id="filter-today">Today</button>
          <button onclick="setFilter('week')" class="toolbar-btn active" id="filter-week">This Week</button>
          <button onclick="setFilter('month')" class="toolbar-btn" id="filter-month">This Month</button>
          <button onclick="setFilter('all')" class="toolbar-btn" id="filter-all">All</button>
        </div>
        <p id="filter-range-label" class="text-xs font-bold text-slate-400 whitespace-nowrap"></p>
      </div>
    </div>

    <!-- ===== SKIPPED ALERT ===== -->
    <div id="global-alert" class="alert-banner px-5 py-3 mb-5 flex items-center gap-3 hidden">
      <i data-lucide="alert-triangle" class="w-5 h-5 flex-shrink-0"></i>
      <span id="alert-text" class="text-base"></span>
    </div>

    <!-- ===== CLASS GRID ===== -->
    <div id="class-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5"></div>

    <!-- Empty state -->
    <div id="empty-state" class="hidden text-center py-16">
      <div class="text-6xl mb-4">📭</div>
      <h3 class="font-heading text-2xl font-bold mb-2">No Classes Found</h3>
      <p class="text-base text-slate-400 font-semibold max-w-sm mx-auto">Add events with the type "Class" in the Schedule tool to see them here.</p>
      <a href="../schedule/" class="inline-flex items-center gap-2 mt-4 px-4 py-2 rounded-xl border-[var(--border-width-thick)] border-[var(--border-primary)] bg-blue text-white text-base font-bold shadow-neo-sm hover:shadow-neo transition-all">
        <i data-lucide="calendar-plus" class="w-4 h-4"></i> Open Schedule
      </a>
    </div>
  </main>

  <!-- ===== DRAWER ===== -->
  <div id="drawer-overlay" class="drawer-overlay" onclick="closeDrawer()"></div>
  <div id="drawer-panel" class="drawer-panel">
    <div class="sticky top-0 bg-[var(--surface-card)] border-b-[3px] border-[var(--border-primary)] p-4 flex items-center justify-between z-10" style="border-radius: var(--radius-xl) 0 0 0;">
      <div>
        <h3 id="drawer-title" class="font-heading text-xl font-bold"></h3>
        <p id="drawer-subtitle" class="text-xs font-bold text-slate-400 uppercase tracking-widest"></p>
      </div>
      <button onclick="closeDrawer()" class="w-9 h-9 flex items-center justify-center rounded-xl border-[var(--border-width-thick)] border-[var(--border-primary)] bg-[var(--surface-card)] hover:bg-pink hover:text-white transition-colors font-bold text-base">
        <i data-lucide="x" class="w-4 h-4"></i>
      </button>
    </div>
    <div id="drawer-body" class="p-5"></div>
  </div>

  <script src="script.js"></script>
</body>

</html>
