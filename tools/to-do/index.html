<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Tasks - KlassKit</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Icons & Styling -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        heading: ['Fredoka', 'sans-serif'],
                        body: ['Nunito', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            pink: '#ff4785',
                            orange: '#ff7e33',
                            green: '#00d063',
                            blue: '#1ea7fd',
                            dark: '#111827',
                            chalk: '#f8fafc'
                        }
                    },
                    boxShadow: {
                        'brutal': '4px 4px 0px 0px rgba(17, 24, 39, 1)',
                        'brutal-sm': '2px 2px 0px 0px rgba(17, 24, 39, 1)',
                        'brutal-dark': '4px 4px 0px 0px rgba(100, 116, 139, 1)',
                        'brutal-sm-dark': '2px 2px 0px 0px rgba(100, 116, 139, 1)',
                        'brutal-hover': '6px 6px 0px 0px rgba(17, 24, 39, 1)',
                        'brutal-hover-dark': '6px 6px 0px 0px rgba(100, 116, 139, 1)',
                    },
                    animation: {
                        'blob': 'blob 7s infinite',
                    },
                    keyframes: {
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                            '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                            '100%': { transform: 'translate(0px, 0px) scale(1)' },
                        }
                    }
                }
            }
        }
    </script>

    <script>
        // Theme initialization
        const td = localStorage.getItem('theme_to-do');
        if (td === 'dark' || (!td && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>

    <style>
        /* Grid Background for Classroom feel */
        body {
            background-color: #f8fafc;
            background-image:
                linear-gradient(rgba(17, 24, 39, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(17, 24, 39, 0.05) 1px, transparent 1px);
            background-size: 24px 24px;
        }

        .dark body {
            background-color: #0f172a;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
        }

        /* Base Glass Panel Style */
        .glass-panel {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }

        .dark .glass-panel {
            background: rgba(15, 23, 42, 0.75);
        }

        /* Pill Interactions */
        .prio-pill,
        .cat-pill {
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .prio-pill:hover,
        .cat-pill:hover {
            transform: translateY(-2px);
        }

        /* Active Pill States - Soft Brutal */
        .active-pill-blue {
            background-color: #1ea7fd !important;
            color: white !important;
            border-color: #111827 !important;
            box-shadow: 2px 2px 0px #111827 !important;
            transform: translateY(-2px);
        }

        .active-pill-orange {
            background-color: #ff7e33 !important;
            color: #111827 !important;
            border-color: #111827 !important;
            box-shadow: 2px 2px 0px #111827 !important;
            transform: translateY(-2px);
        }

        .active-pill-pink {
            background-color: #ff4785 !important;
            color: white !important;
            border-color: #111827 !important;
            box-shadow: 2px 2px 0px #111827 !important;
            transform: translateY(-2px);
        }

        .active-pill-green {
            background-color: #00d063 !important;
            color: #111827 !important;
            border-color: #111827 !important;
            box-shadow: 2px 2px 0px #111827 !important;
            transform: translateY(-2px);
        }

        .active-pill-slate {
            background-color: #475569 !important;
            color: white !important;
            border-color: #111827 !important;
            box-shadow: 2px 2px 0px #111827 !important;
            transform: translateY(-2px);
        }

        .dark .active-pill-blue,
        .dark .active-pill-orange,
        .dark .active-pill-pink,
        .dark .active-pill-green,
        .dark .active-pill-slate {
            border-color: #94a3b8 !important;
            box-shadow: 2px 2px 0px #94a3b8 !important;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(148, 163, 184, 0.5);
            border-radius: 10px;
        }

        .dark ::-webkit-scrollbar-thumb {
            background: rgba(71, 85, 105, 0.5);
        }

        .animation-delay-2000 {
            animation-delay: 2s;
        }

        .animation-delay-4000 {
            animation-delay: 4s;
        }
    </style>
  <!-- Vercel Web Analytics -->
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
</head>

<body
    class="text-brand-dark dark:text-white font-body min-h-screen p-4 md:p-8 transition-colors duration-300 relative overflow-x-hidden">

    <!-- Ambient Background Blobs for Glassmorphism -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
        <div
            class="absolute top-[-10%] left-[-10%] w-[30rem] h-[30rem] bg-brand-blue/20 dark:bg-brand-blue/10 rounded-full filter blur-[100px] opacity-60 animate-blob">
        </div>
        <div
            class="absolute top-[20%] right-[-10%] w-[30rem] h-[30rem] bg-brand-blue/20 dark:bg-brand-blue/10 rounded-full filter blur-[100px] opacity-60 animate-blob animation-delay-2000">
        </div>
        <div
            class="absolute bottom-[-20%] left-[20%] w-[35rem] h-[35rem] bg-brand-blue/20 dark:bg-brand-blue/10 rounded-full filter blur-[100px] opacity-60 animate-blob animation-delay-4000">
        </div>
    </div>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8 items-start relative z-10">

        <!-- Left Column: Sticky Controls -->
        <div class="lg:col-span-4 space-y-6 lg:sticky lg:top-8">

            <!-- Header Panel -->
            <header
                class="glass-panel border-2 border-brand-dark dark:border-slate-500 rounded-3xl p-6 shadow-brutal dark:shadow-brutal-dark text-center relative overflow-hidden flex flex-col items-center transition-all">
                <h1 class="font-heading text-4xl font-bold tracking-tight text-brand-dark dark:text-white mb-1">
                    Focus Tasks
                </h1>
                <p class="font-body text-slate-600 dark:text-slate-300 font-semibold text-sm mb-6">
                    KlassKit &bull; Flow State
                </p>

                <!-- Progress Bar -->
                <div
                    class="w-full bg-white/50 dark:bg-slate-800/50 border-2 border-brand-dark dark:border-slate-500 rounded-full h-5 relative overflow-hidden backdrop-blur-sm shadow-inner">
                    <div id="progressBar"
                        class="bg-brand-blue border-r-2 border-brand-dark dark:border-slate-500 h-full transition-all duration-700 ease-out"
                        style="width: 0%"></div>
                </div>
                <div
                    class="w-full flex justify-between text-[11px] font-black uppercase tracking-widest mt-2 text-slate-500 dark:text-slate-400">
                    <span>Progress</span>
                    <span id="progressText">0%</span>
                </div>

                <button onclick="toggleTheme()"
                    class="absolute top-4 right-4 bg-white/80 dark:bg-slate-700/80 backdrop-blur-md p-2 rounded-xl border-2 border-brand-dark dark:border-slate-400 shadow-brutal-sm dark:shadow-brutal-sm-dark hover:-translate-y-1 hover:shadow-brutal dark:hover:shadow-brutal-dark transition-all text-brand-dark dark:text-white z-20">
                    <i data-lucide="moon" class="w-4 h-4 dark:hidden"></i>
                    <i data-lucide="sun" class="w-4 h-4 hidden dark:block"></i>
                </button>
            </header>

            <!-- Input Panel -->
            <div
                class="glass-panel border-2 border-brand-dark dark:border-slate-500 rounded-3xl shadow-brutal dark:shadow-brutal-dark p-6 flex flex-col gap-5 transition-all">

                <input type="text" id="todoInput" placeholder="What's the next big thing?"
                    class="w-full font-bold text-lg px-4 py-3 bg-white dark:bg-slate-800/90 border-2 border-brand-dark dark:border-slate-500 rounded-xl focus:outline-none focus:-translate-y-1 focus:shadow-brutal dark:focus:shadow-brutal-dark transition-all placeholder-slate-400 dark:placeholder-slate-500 dark:text-white shadow-sm">

                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div class="flex flex-col gap-2 h-full">
                        <label
                            class="text-[10px] font-black uppercase tracking-widest text-slate-500 dark:text-slate-400 ml-1">Priority</label>
                        <div id="prioritySelector" class="grid grid-cols-2 gap-2 h-full">
                            <button onclick="setPriority('low')" data-value="low"
                                class="prio-pill py-2.5 rounded-xl text-[11px] font-bold uppercase tracking-wider border-2 border-brand-dark/10 dark:border-slate-600 text-slate-500 dark:text-slate-400 bg-white/60 dark:bg-slate-800/60 hover:bg-white dark:hover:bg-slate-700 hover:border-brand-dark/30">Low</button>
                            <button onclick="setPriority('medium')" data-value="medium"
                                class="prio-pill py-2.5 rounded-xl text-[11px] font-bold uppercase tracking-wider border-2 border-brand-dark/10 dark:border-slate-600 text-slate-500 dark:text-slate-400 bg-white/60 dark:bg-slate-800/60 hover:bg-white dark:hover:bg-slate-700 hover:border-brand-dark/30 active-pill-orange">Med</button>
                            <button onclick="setPriority('high')" data-value="high"
                                class="prio-pill col-span-2 py-2.5 rounded-xl text-[11px] font-bold uppercase tracking-wider border-2 border-brand-dark/10 dark:border-slate-600 text-slate-500 dark:text-slate-400 bg-white/60 dark:bg-slate-800/60 hover:bg-white dark:hover:bg-slate-700 hover:border-brand-dark/30">High</button>
                        </div>
                    </div>

                    <div class="flex flex-col gap-2 h-full">
                        <label
                            class="text-[10px] font-black uppercase tracking-widest text-slate-500 dark:text-slate-400 ml-1">Category</label>
                        <div id="categorySelector" class="grid grid-cols-2 gap-2 h-full">
                            <button onclick="setCategory('work')" data-value="work"
                                class="cat-pill py-2.5 rounded-xl text-[11px] font-bold uppercase tracking-wider border-2 border-brand-dark/10 dark:border-slate-600 text-slate-500 dark:text-slate-400 bg-white/60 dark:bg-slate-800/60 hover:bg-white dark:hover:bg-slate-700 hover:border-brand-dark/30">Work</button>
                            <button onclick="setCategory('personal')" data-value="personal"
                                class="cat-pill py-2.5 rounded-xl text-[11px] font-bold uppercase tracking-wider border-2 border-brand-dark/10 dark:border-slate-600 text-slate-500 dark:text-slate-400 bg-white/60 dark:bg-slate-800/60 hover:bg-white dark:hover:bg-slate-700 hover:border-brand-dark/30">Pers.</button>
                            <button onclick="setCategory('urgent')" data-value="urgent"
                                class="cat-pill py-2.5 rounded-xl text-[11px] font-bold uppercase tracking-wider border-2 border-brand-dark/10 dark:border-slate-600 text-slate-500 dark:text-slate-400 bg-white/60 dark:bg-slate-800/60 hover:bg-white dark:hover:bg-slate-700 hover:border-brand-dark/30">Urgent</button>
                            <button onclick="setCategory('other')" data-value="other"
                                class="cat-pill py-2.5 rounded-xl text-[11px] font-bold uppercase tracking-wider border-2 border-brand-dark/10 dark:border-slate-600 text-slate-500 dark:text-slate-400 bg-white/60 dark:bg-slate-800/60 hover:bg-white dark:hover:bg-slate-700 hover:border-brand-dark/30 active-pill-slate">Other</button>
                        </div>
                    </div>
                </div>

                <button onclick="addTodo()"
                    class="w-full bg-brand-green text-brand-dark font-black uppercase tracking-widest border-2 border-brand-dark dark:border-slate-400 py-3 rounded-xl flex items-center justify-center gap-2 text-[15px] shadow-brutal dark:shadow-brutal-dark hover:-translate-y-1 hover:shadow-brutal-hover dark:hover:shadow-brutal-hover-dark transition-all mt-2">
                    <i data-lucide="plus-circle" class="w-5 h-5"></i> Add Task
                </button>
            </div>

            <!-- Management Tools Panel -->
            <div
                class="glass-panel border-2 border-brand-dark/20 dark:border-slate-600/50 rounded-3xl p-5 flex flex-col gap-4">

                <div class="flex flex-col gap-2">
                    <label
                        class="text-[10px] font-black uppercase tracking-widest text-slate-500 dark:text-slate-400 ml-1">Status
                        Filter</label>
                    <div class="grid grid-cols-3 gap-2">
                        <button onclick="filterTasks('all')" id="filter-all"
                            class="font-bold uppercase tracking-wider border-2 border-brand-dark dark:border-slate-400 py-1.5 rounded-xl text-[11px] bg-brand-dark dark:bg-slate-300 text-white dark:text-slate-900 shadow-brutal-sm dark:shadow-brutal-sm-dark translate-y-[-2px] transition-all">All</button>
                        <button onclick="filterTasks('active')" id="filter-active"
                            class="font-bold uppercase tracking-wider border-2 border-brand-dark dark:border-slate-400 py-1.5 rounded-xl text-[11px] bg-white/80 dark:bg-slate-800 text-brand-dark dark:text-white hover:-translate-y-1 hover:shadow-brutal-sm dark:hover:shadow-brutal-sm-dark transition-all">Active</button>
                        <button onclick="filterTasks('completed')" id="filter-completed"
                            class="font-bold uppercase tracking-wider border-2 border-brand-dark dark:border-slate-400 py-1.5 rounded-xl text-[11px] bg-white/80 dark:bg-slate-800 text-brand-dark dark:text-white hover:-translate-y-1 hover:shadow-brutal-sm dark:hover:shadow-brutal-sm-dark transition-all">Done</button>
                    </div>
                </div>

                <!-- Sort By Control -->
                <div class="flex flex-col gap-2 mt-1">
                    <label
                        class="text-[10px] font-black uppercase tracking-widest text-slate-500 dark:text-slate-400 ml-1">Sort
                        By</label>
                    <select id="sortSelector" onchange="changeSort(this.value)"
                        class="w-full font-bold uppercase tracking-wider border-2 border-brand-dark dark:border-slate-400 py-2 px-3 rounded-xl text-[11px] bg-white/80 dark:bg-slate-800 text-brand-dark dark:text-white hover:shadow-brutal-sm dark:hover:shadow-brutal-sm-dark outline-none cursor-pointer transition-all appearance-none">
                        <option value="date">Newest First</option>
                        <option value="priority">Highest Priority</option>
                        <option value="category">Category (A-Z)</option>
                    </select>
                </div>

                <div class="grid grid-cols-1 gap-2 mt-2">
                    <button onclick="clearCompleted()"
                        class="w-full bg-brand-pink text-white font-bold uppercase tracking-wider border-2 border-brand-dark dark:border-slate-400 py-2.5 rounded-xl text-[11px] flex items-center justify-center gap-2 shadow-brutal-sm dark:shadow-brutal-sm-dark hover:-translate-y-1 hover:shadow-brutal dark:hover:shadow-brutal-dark transition-all">
                        <i data-lucide="trash-2" class="w-4 h-4"></i> Clear Completed
                    </button>

                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="exportTasks()" title="Download JSON"
                            class="bg-brand-chalk dark:bg-slate-700 text-brand-dark dark:text-white font-bold uppercase tracking-wider border-2 border-brand-dark dark:border-slate-400 py-2.5 rounded-xl text-[11px] flex items-center justify-center gap-2 shadow-brutal-sm dark:shadow-brutal-sm-dark hover:-translate-y-1 hover:shadow-brutal dark:hover:shadow-brutal-dark transition-all">
                            <i data-lucide="download" class="w-4 h-4"></i> Export
                        </button>
                        <label
                            class="bg-brand-chalk dark:bg-slate-700 text-brand-dark dark:text-white font-bold uppercase tracking-wider border-2 border-brand-dark dark:border-slate-400 py-2.5 rounded-xl text-[11px] flex items-center justify-center gap-2 cursor-pointer text-center m-0 shadow-brutal-sm dark:shadow-brutal-sm-dark hover:-translate-y-1 hover:shadow-brutal dark:hover:shadow-brutal-dark transition-all">
                            <i data-lucide="upload" class="w-4 h-4"></i> Import
                            <input type="file" id="importFile" class="hidden" accept=".json"
                                onchange="importTasks(this)">
                        </label>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Column: Task List -->
        <div class="lg:col-span-8">
            <ul id="todoList" class="space-y-4">
                <!-- Dynamically populated by JS & AutoAnimate -->
            </ul>

            <div id="emptyState"
                class="hidden glass-panel text-center py-24 rounded-3xl border-2 border-dashed border-brand-dark/30 dark:border-slate-500/50 shadow-none mt-2">
                <div
                    class="inline-block p-4 rounded-2xl bg-white dark:bg-slate-700 border-2 border-brand-dark dark:border-slate-500 shadow-brutal-sm dark:shadow-brutal-sm-dark mb-4">
                    <i data-lucide="sparkles" class="w-10 h-10 text-brand-blue"></i>
                </div>
                <h3 class="font-heading tracking-tight text-2xl font-bold text-brand-dark dark:text-white">Clear Skies!
                </h3>
                <p class="text-slate-500 dark:text-slate-400 font-semibold mt-2 font-body text-base">Your task list is
                    empty. Take a deep breath.</p>
            </div>
        </div>

    </main>

    <!-- AutoAnimate Module Import -->
    <script type="module">
        import autoAnimate from 'https://cdn.jsdelivr.net/npm/@formkit/auto-animate@0.8.0/index.mjs';
        autoAnimate(document.getElementById('todoList'));
    </script>

    <script>
        let todos = JSON.parse(localStorage.getItem('klasskit_todos')) || [];
        let currentFilter = 'all';
        let currentSort = 'date';
        let editingId = null;
        let selectedPriority = 'medium';
        let selectedCategory = 'other';

        const listEl = document.getElementById('todoList');
        const inputEl = document.getElementById('todoInput');
        const emptyStateEl = document.getElementById('emptyState');

        function save() {
            localStorage.setItem('klasskit_todos', JSON.stringify(todos));
            render();
        }

        function setPriority(val) {
            selectedPriority = val;
            document.querySelectorAll('.prio-pill').forEach(btn => {
                btn.classList.remove('active-pill-blue', 'active-pill-orange', 'active-pill-pink');
                if (btn.dataset.value === val) {
                    if (val === 'low') btn.classList.add('active-pill-blue');
                    if (val === 'medium') btn.classList.add('active-pill-orange');
                    if (val === 'high') btn.classList.add('active-pill-pink');
                }
            });
        }

        function setCategory(val) {
            selectedCategory = val;
            document.querySelectorAll('.cat-pill').forEach(btn => {
                btn.classList.remove('active-pill-blue', 'active-pill-green', 'active-pill-pink', 'active-pill-slate');
                if (btn.dataset.value === val) {
                    if (val === 'work') btn.classList.add('active-pill-blue');
                    if (val === 'personal') btn.classList.add('active-pill-green');
                    if (val === 'urgent') btn.classList.add('active-pill-pink');
                    if (val === 'other') btn.classList.add('active-pill-slate');
                }
            });
        }

        function addTodo() {
            const text = inputEl.value.trim();
            if (!text) return;

            const newTodo = {
                id: Date.now(),
                text: text,
                priority: selectedPriority,
                category: selectedCategory,
                completed: false,
                createdAt: new Date().toISOString()
            };

            todos.unshift(newTodo);
            inputEl.value = '';
            setPriority('medium');
            setCategory('other');
            save();
        }

        function toggleTodo(id) {
            todos = todos.map(t => t.id === id ? { ...t, completed: !t.completed } : t);
            save();
        }

        function deleteTodo(id) {
            todos = todos.filter(t => t.id !== id);
            save();
        }

        function editTodo(id) {
            editingId = id;
            render();
            setTimeout(() => {
                const input = document.querySelector(`input[data-edit-id="${id}"]`);
                if (input) {
                    input.focus();
                    input.select();
                }
            }, 0);
        }

        function cancelEdit() {
            editingId = null;
            render();
        }

        function saveEdit(id) {
            const input = document.querySelector(`input[data-edit-id="${id}"]`);
            if (!input) return;

            const newText = input.value.trim();
            if (newText) {
                todos = todos.map(t => t.id === id ? { ...t, text: newText } : t);
                editingId = null;
                save();
            } else {
                cancelEdit();
            }
        }

        function clearCompleted() {
            todos = todos.filter(t => !t.completed);
            save();
        }

        function filterTasks(filterType) {
            currentFilter = filterType;
            const buttons = ['all', 'active', 'completed'];

            buttons.forEach(btn => {
                const el = document.getElementById(`filter-${btn}`);
                el.className = `font-bold uppercase tracking-wider border-2 border-brand-dark dark:border-slate-400 py-1.5 rounded-xl text-[11px] bg-white/80 dark:bg-slate-800 text-brand-dark dark:text-white hover:-translate-y-1 hover:shadow-brutal-sm dark:hover:shadow-brutal-sm-dark transition-all`;

                if (btn === filterType) {
                    el.className = `font-bold uppercase tracking-wider border-2 border-brand-dark dark:border-slate-400 py-1.5 rounded-xl text-[11px] bg-brand-dark dark:bg-slate-300 text-white dark:text-slate-900 shadow-brutal-sm dark:shadow-brutal-sm-dark translate-y-[-2px] transition-all`;
                }
            });
            render();
        }

        function changeSort(sortType) {
            currentSort = sortType;
            render();
        }

        function sortTasks(tasksArray) {
            return [...tasksArray].sort((a, b) => {
                if (currentSort === 'priority') {
                    const pMap = { high: 3, medium: 2, low: 1 };
                    const diff = pMap[b.priority] - pMap[a.priority];
                    if (diff !== 0) return diff;
                } else if (currentSort === 'category') {
                    const diff = (a.category || '').localeCompare(b.category || '');
                    if (diff !== 0) return diff;
                }
                // Fallback to date sorting
                return new Date(b.createdAt) - new Date(a.createdAt);
            });
        }

        function exportTasks() {
            const dataStr = JSON.stringify(todos, null, 2);
            const blob = new Blob([dataStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `tasks_backup_${new Date().toISOString().slice(0, 10)}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function importTasks(input) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function (e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (Array.isArray(imported)) {
                        const currentIds = new Set(todos.map(t => t.id));
                        const newTasks = imported.filter(t => !currentIds.has(t.id));
                        todos = [...newTasks, ...todos];
                        save();
                        alert(`Successfully imported ${newTasks.length} tasks!`);
                    } else {
                        alert("Invalid file format.");
                    }
                } catch (err) {
                    alert("Error reading file.");
                }
            };
            reader.readAsText(file);
            input.value = '';
        }

        function toggleTheme() {
            const html = document.documentElement;
            html.classList.toggle('dark');
            const isDark = html.classList.contains('dark');
        }

        function updateProgress() {
            const progressEl = document.getElementById('progressBar');
            const textEl = document.getElementById('progressText');
            if (!progressEl || !textEl) return;

            const total = todos.length;
            const completed = todos.filter(t => t.completed).length;
            const percentage = total === 0 ? 0 : Math.round((completed / total) * 100);

            progressEl.style.width = `${percentage}%`;

            // Dynamic color based on progress
            if (percentage === 100) {
                progressEl.className = 'bg-brand-green border-r-2 border-brand-dark dark:border-slate-500 h-full transition-all duration-700 ease-out';
            } else if (percentage > 50) {
                progressEl.className = 'bg-brand-blue border-r-2 border-brand-dark dark:border-slate-500 h-full transition-all duration-700 ease-out';
            } else {
                progressEl.className = 'bg-brand-orange border-r-2 border-brand-dark dark:border-slate-500 h-full transition-all duration-700 ease-out';
            }

            textEl.innerText = `${percentage}%`;
        }

        function render() {
            updateProgress();

            listEl.innerHTML = '';

            let itemsToRender = [];

            if (currentFilter === 'all') {
                const activeTasks = sortTasks(todos.filter(t => !t.completed));
                const completedTasks = sortTasks(todos.filter(t => t.completed));

                itemsToRender = [...activeTasks];

                // Add separator if there are both active and completed tasks
                if (activeTasks.length > 0 && completedTasks.length > 0) {
                    itemsToRender.push({ isSeparator: true });
                }

                itemsToRender = [...itemsToRender, ...completedTasks];
            } else if (currentFilter === 'active') {
                itemsToRender = sortTasks(todos.filter(t => !t.completed));
            } else {
                itemsToRender = sortTasks(todos.filter(t => t.completed));
            }

            if (itemsToRender.length === 0 && currentFilter !== 'all' || todos.length === 0) {
                emptyStateEl.classList.remove('hidden');
            } else {
                emptyStateEl.classList.add('hidden');
            }

            itemsToRender.forEach(item => {
                const li = document.createElement('li');

                if (item.isSeparator) {
                    li.className = "flex items-center gap-4 py-4 opacity-50";
                    li.innerHTML = `
                        <div class="flex-1 h-[2px] rounded-full bg-brand-dark/20 dark:bg-slate-500/50"></div>
                        <span class="text-[10px] font-black uppercase tracking-widest text-brand-dark dark:text-slate-400">Completed Tasks</span>
                        <div class="flex-1 h-[2px] rounded-full bg-brand-dark/20 dark:bg-slate-500/50"></div>
                    `;
                    listEl.appendChild(li);
                    return; // skip rest of loop for separator
                }

                const todo = item; // alias back to todo

                const baseStyles = 'glass-panel flex items-center gap-4 p-4 md:p-5 rounded-2xl border-2 transition-all duration-300';

                let prioColor = 'bg-brand-blue text-white';
                let prioText = 'Low';
                if (todo.priority === 'high') { prioColor = 'bg-brand-pink text-white'; prioText = 'High'; }
                if (todo.priority === 'medium') { prioColor = 'bg-brand-orange text-brand-dark'; prioText = 'Med'; }

                let catStyles = 'bg-slate-200 text-slate-700 dark:bg-slate-600 dark:text-slate-100';
                const cat = todo.category || 'other';
                if (cat === 'work') catStyles = 'bg-blue-100 text-brand-blue dark:bg-blue-900/50 dark:text-blue-200';
                if (cat === 'personal') catStyles = 'bg-green-100 text-brand-green dark:bg-green-900/50 dark:text-green-200';
                if (cat === 'urgent') catStyles = 'bg-pink-100 text-brand-pink dark:bg-pink-900/50 dark:text-pink-200';

                const dateObj = new Date(todo.createdAt || Date.now());
                const dateString = dateObj.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });

                if (todo.completed) {
                    li.className = `${baseStyles} border-slate-300 dark:border-slate-600 opacity-70 hover:opacity-100 shadow-none bg-white/40 dark:bg-slate-800/40`;

                    li.innerHTML = `
                        <button onclick="toggleTodo(${todo.id})" class="flex-shrink-0 w-10 h-10 md:w-12 md:h-12 rounded-xl border-2 border-brand-dark dark:border-slate-400 flex items-center justify-center bg-brand-green translate-y-[-2px] shadow-brutal-sm dark:shadow-brutal-sm-dark hover:translate-y-0 hover:shadow-none transition-all">
                            <i data-lucide="check" class="text-brand-dark w-6 h-6 stroke-[3]"></i>
                        </button>
                        
                        <div class="flex-1 flex flex-col justify-center overflow-hidden">
                            <span class="font-bold font-body text-lg md:text-xl line-through text-slate-400 dark:text-slate-500 truncate">${todo.text}</span>
                            <div class="flex items-center gap-2 mt-1 md:mt-2">
                                <span class="text-[9px] md:text-[10px] font-black uppercase tracking-widest px-2 py-0.5 rounded ${catStyles} border border-transparent">${cat}</span>
                                <span class="text-[9px] md:text-[10px] font-bold text-slate-400/80 uppercase">${dateString}</span>
                            </div>
                        </div>
                        
                        <div class="flex gap-1 ml-auto">
                            <button onclick="deleteTodo(${todo.id})" class="text-slate-400 hover:text-brand-pink p-2 hover:bg-brand-pink/10 rounded-xl border-2 border-transparent hover:border-brand-dark dark:hover:border-slate-400 transition-all">
                                <i data-lucide="trash-2" class="w-5 h-5"></i>
                            </button>
                        </div>
                    `;
                } else {
                    li.className = `${baseStyles} border-brand-dark dark:border-slate-500 shadow-brutal dark:shadow-brutal-dark hover:-translate-y-1 hover:shadow-brutal-hover dark:hover:shadow-brutal-hover-dark bg-white/80 dark:bg-slate-800/80`;

                    const isEditing = editingId === todo.id;

                    if (isEditing) {
                        li.innerHTML = `
                            <div class="flex-1 flex flex-col gap-3 w-full">
                                <input type="text" data-edit-id="${todo.id}" value="${todo.text}" 
                                    class="w-full px-4 py-2 font-bold text-lg border-2 border-brand-dark dark:border-slate-400 rounded-xl bg-white dark:bg-slate-700 dark:text-white focus:outline-none shadow-inner"
                                    onkeydown="if(event.key === 'Enter') saveEdit(${todo.id}); if(event.key === 'Escape') cancelEdit();">
                                <div class="flex gap-2">
                                    <button onclick="saveEdit(${todo.id})" class="bg-brand-green text-brand-dark font-black uppercase tracking-widest border-2 border-brand-dark dark:border-slate-400 text-xs px-5 py-2 rounded-xl shadow-brutal-sm dark:shadow-brutal-sm-dark hover:-translate-y-1 transition-all">Save</button>
                                    <button onclick="cancelEdit()" class="bg-slate-100 dark:bg-slate-600 text-brand-dark dark:text-white font-black uppercase tracking-widest border-2 border-brand-dark dark:border-slate-400 text-xs px-5 py-2 rounded-xl shadow-brutal-sm dark:shadow-brutal-sm-dark hover:-translate-y-1 transition-all">Cancel</button>
                                </div>
                            </div>
                        `;
                    } else {
                        li.innerHTML = `
                            <button onclick="toggleTodo(${todo.id})" class="flex-shrink-0 w-10 h-10 md:w-12 md:h-12 rounded-xl border-2 border-brand-dark dark:border-slate-400 flex items-center justify-center bg-white dark:bg-slate-700 hover:bg-brand-green/20 shadow-brutal-sm dark:shadow-brutal-sm-dark hover:-translate-y-1 transition-all">
                            </button>
                            
                            <div class="flex-1 flex flex-col justify-center overflow-hidden">
                                <span class="font-bold font-body text-lg md:text-xl text-brand-dark dark:text-white truncate">${todo.text}</span>
                                <div class="flex flex-wrap items-center gap-2 mt-1 md:mt-2">
                                    <span class="text-[9px] md:text-[10px] font-black uppercase tracking-widest px-2 py-0.5 rounded ${prioColor} border border-brand-dark dark:border-slate-600 shadow-[1px_1px_0px_0px_rgba(17,24,39,1)] dark:shadow-[1px_1px_0px_0px_rgba(100,116,139,1)]">${prioText}</span>
                                    <span class="text-[9px] md:text-[10px] font-black uppercase tracking-widest px-2 py-0.5 rounded ${catStyles} border border-brand-dark/10 dark:border-slate-500">${cat}</span>
                                    <span class="text-[9px] md:text-[10px] font-bold text-slate-400 uppercase ml-auto">${dateString}</span>
                                </div>
                            </div>
                            
                            <div class="flex gap-1 ml-auto">
                                <button onclick="editTodo(${todo.id})" class="text-brand-blue hover:text-brand-dark dark:hover:text-white p-2 hover:bg-brand-blue/10 rounded-xl border-2 border-transparent hover:border-brand-dark dark:hover:border-slate-400 transition-all">
                                    <i data-lucide="edit-2" class="w-5 h-5"></i>
                                </button>
                                <button onclick="deleteTodo(${todo.id})" class="text-slate-400 hover:text-brand-pink p-2 hover:bg-brand-pink/10 rounded-xl border-2 border-transparent hover:border-brand-dark dark:hover:border-slate-400 transition-all">
                                    <i data-lucide="trash-2" class="w-5 h-5"></i>
                                </button>
                            </div>
                        `;
                    }
                }

                listEl.appendChild(li);
            });

            lucide.createIcons();
        }

        inputEl.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') addTodo();
        });

        setPriority('medium');
        setCategory('other');

        // Sync select with currentSort variable initial state
        document.getElementById('sortSelector').value = currentSort;

        render();
    </script>
</body>

</html>
