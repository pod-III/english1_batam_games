<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Tasks - Flow State</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@400;600;700;800&display=swap"
        rel="stylesheet">

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- DO NOT REMOVE TAILWIND CONFIG. Need to resolve conflicts manually, preserving it for now based on previous user instruction -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        heading: ['Fredoka', 'sans-serif'],
                        body: ['Nunito', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            pink: '#ff4785',
                            orange: '#ff7e33',
                            green: '#00d063',
                            blue: '#1ea7fd',
                            dark: '#111827',
                            chalk: '#f8fafc'
                        }
                    },
                    boxShadow: {
                        'hard': '4px 4px 0px 0px var(--color-dark)',
                        'hard-sm': '2px 2px 0px 0px var(--color-dark)',
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="../../css/base.css" />
    <link rel="stylesheet" href="../../css/components.css" />

    <!-- Inline script to prevent theme flash -->
    <script>
        if (localStorage.getItem('english1_theme') === 'dark' || (!('english1_theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <style>
        .prio-pill, .cat-pill {
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .prio-pill:hover, .cat-pill:hover {
            transform: translateY(-1px);
        }
        .prio-pill.active-blue { background-color: #1ea7fd; color: white; border-color: #111827; box-shadow: 2px 2px 0px #111827; }
        .prio-pill.active-orange { background-color: #ff7e33; color: #111827; border-color: #111827; box-shadow: 2px 2px 0px #111827; }
        .prio-pill.active-pink { background-color: #ff4785; color: white; border-color: #111827; box-shadow: 2px 2px 0px #111827; }
        
        .cat-pill.active-blue { background-color: #1ea7fd; color: white; border-color: #111827; box-shadow: 2px 2px 0px #111827; }
        .cat-pill.active-green { background-color: #00d063; color: #111827; border-color: #111827; box-shadow: 2px 2px 0px #111827; }
        .cat-pill.active-pink { background-color: #ff4785; color: white; border-color: #111827; box-shadow: 2px 2px 0px #111827; }
        .cat-pill.active-slate { background-color: #64748b; color: white; border-color: #111827; box-shadow: 2px 2px 0px #111827; }
    </style>
</head>

<body class="text-brand-dark dark:text-white font-body min-h-screen p-4 md:p-8 transition-colors duration-300">

    <main class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">

        <!-- Left Column: Sticky Controls -->
        <div class="lg:col-span-4 space-y-6 lg:sticky lg:top-8">

            <header
                class="glass-panel border-4 border-brand-dark dark:border-slate-500 rounded-2xl p-6 shadow-hard text-center relative overflow-hidden flex flex-col items-center">
                <h1
                    class="font-heading text-4xl font-bold uppercase tracking-tight text-brand-dark dark:text-white drop-shadow-sm mb-2">
                    Focus Tasks</h1>
                <p
                    class="font-heading text-brand-dark/80 dark:text-white/80 opacity-90 uppercase tracking-tight text-sm mb-4">
                    Organize your workflow. Stay in the zone.</p>

                <!-- Progress Bar -->
                <div
                    class="w-full bg-brand-chalk dark:bg-slate-800 border-2 border-brand-dark dark:border-slate-500 rounded-full h-4 relative overflow-hidden shadow-inset">
                    <div id="progressBar" class="bg-brand-green h-full transition-all duration-500 ease-out"
                        style="width: 0%"></div>
                </div>
                <div
                    class="w-full flex justify-between text-xs font-bold uppercase tracking-widest mt-1 text-slate-500 dark:text-slate-400">
                    <span>Progress</span>
                    <span id="progressText">0%</span>
                </div>

                <button onclick="toggleTheme()"
                    class="absolute top-4 right-4 bg-white dark:bg-slate-800 p-2 rounded-xl border-2 border-brand-dark dark:border-slate-500 shadow-hard-sm hover:-translate-y-1 hover:shadow-hard transition-all text-brand-dark dark:text-white">
                    <i data-lucide="moon" class="w-5 h-5 dark:hidden"></i>
                    <i data-lucide="sun" class="w-5 h-5 hidden dark:block"></i>
                </button>
            </header>

            <!-- Add Task Input -->
            <div
                class="glass-panel rounded-2xl border-4 border-brand-dark dark:border-slate-500 shadow-hard p-6 flex flex-col gap-4">
                <input type="text" id="todoInput" placeholder="What's the next big thing?"
                    class="input-chunky text-lg px-4 py-2">

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="flex flex-col gap-2">
                        <label class="text-[10px] font-bold uppercase tracking-widest text-slate-500 ml-1">Priority</label>
                        <div id="prioritySelector" class="flex gap-2 p-1 bg-brand-chalk dark:bg-slate-800 border-2 border-brand-dark dark:border-slate-500 rounded-xl">
                            <button onclick="setPriority('low')" data-value="low" class="prio-pill flex-1 py-1 rounded-lg text-[10px] font-black uppercase tracking-widest transition-all border-2 border-transparent">Low</button>
                            <button onclick="setPriority('medium')" data-value="medium" class="prio-pill flex-1 py-1 rounded-lg text-[10px] font-black uppercase tracking-widest transition-all border-2 border-transparent active-orange">Med</button>
                            <button onclick="setPriority('high')" data-value="high" class="prio-pill flex-1 py-1 rounded-lg text-[10px] font-black uppercase tracking-widest transition-all border-2 border-transparent">High</button>
                        </div>
                    </div>
                    <div class="flex flex-col gap-2">
                        <label class="text-[10px] font-bold uppercase tracking-widest text-slate-500 ml-1">Category</label>
                        <div id="categorySelector" class="grid grid-cols-2 gap-2 p-1 bg-brand-chalk dark:bg-slate-800 border-2 border-brand-dark dark:border-slate-500 rounded-xl">
                            <button onclick="setCategory('work')" data-value="work" class="cat-pill py-1 rounded-lg text-[10px] font-black uppercase tracking-widest transition-all border-2 border-transparent">Work</button>
                            <button onclick="setCategory('personal')" data-value="personal" class="cat-pill py-1 rounded-lg text-[10px] font-black uppercase tracking-widest transition-all border-2 border-transparent">Personal</button>
                            <button onclick="setCategory('urgent')" data-value="urgent" class="cat-pill py-1 rounded-lg text-[10px] font-black uppercase tracking-widest transition-all border-2 border-transparent">Urgent</button>
                            <button onclick="setCategory('other')" data-value="other" class="cat-pill py-1 rounded-lg text-[10px] font-black uppercase tracking-widest transition-all border-2 border-transparent active-slate">Other</button>
                        </div>
                    </div>
                </div>

                <button onclick="addTodo()"
                    class="btn-chunky w-full bg-brand-green text-brand-dark py-3 rounded-xl flex items-center justify-center gap-2 text-lg">
                    <i data-lucide="plus-circle" class="w-5 h-5"></i> Add Task
                </button>
            </div>

            <!-- Management Tools -->
            <div class="flex flex-col gap-4">
                <!-- Filters -->
                <div class="flex flex-col gap-2">
                    <label class="text-[10px] font-bold uppercase tracking-widest text-slate-500 ml-1">Status Filter</label>
                    <div class="grid grid-cols-3 gap-2">
                        <button onclick="filterTasks('all')" id="filter-all"
                            class="btn-chunky py-2 rounded-xl text-xs bg-brand-dark text-white">All</button>
                        <button onclick="filterTasks('active')" id="filter-active"
                            class="btn-chunky py-2 rounded-xl text-xs bg-white dark:bg-slate-800 text-brand-dark dark:text-white">Active</button>
                        <button onclick="filterTasks('completed')" id="filter-completed"
                            class="btn-chunky py-2 rounded-xl text-xs bg-white dark:bg-slate-800 text-brand-dark dark:text-white">Done</button>
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="grid grid-cols-1 gap-2">
                    <button onclick="clearCompleted()"
                        class="btn-chunky w-full bg-brand-pink text-white py-2 rounded-xl text-sm flex items-center justify-center gap-2">
                        <i data-lucide="trash-2" class="w-4 h-4"></i> Clear Completed
                    </button>
                    
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="exportTasks()" title="Download JSON"
                            class="btn-chunky bg-brand-orange py-2 rounded-xl text-sm flex items-center justify-center gap-2 text-brand-dark">
                            <i data-lucide="download" class="w-4 h-4"></i> Export
                        </button>
                        <label
                            class="btn-chunky bg-brand-blue py-2 rounded-xl text-sm flex items-center justify-center gap-2 text-brand-dark cursor-pointer text-center m-0">
                            <i data-lucide="upload" class="w-4 h-4"></i> Import
                            <input type="file" id="importFile" class="hidden" accept=".json" onchange="importTasks(this)">
                        </label>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Column: Task List -->
        <div class="lg:col-span-8">
            <ul id="todoList" class="space-y-4">
                <!-- Dynamically populated -->
            </ul>

            <div id="emptyState"
                class="hidden overflow-hidden glass-panel text-center py-20 rounded-[2rem] border-4 border-dashed border-brand-dark/30 dark:border-slate-500/50 shadow-hard">
                <div
                    class="inline-block p-4 rounded-2xl bg-white dark:bg-slate-700 border-4 border-brand-dark dark:border-slate-500 shadow-hard-sm mb-4">
                    <i data-lucide="sparkles" class="w-12 h-12 text-brand-dark dark:text-white"></i>
                </div>
                <h3 class="font-heading uppercase tracking-tight text-3xl font-bold text-brand-dark dark:text-white">Clear
                    Skies!</h3>
                <p class="text-slate-500 font-bold mt-2 font-body text-lg">Your task list is empty. Take a deep breath.</p>
            </div>
        </div>

    </main>

    <script>
        // --- State Management ---
        let todos = JSON.parse(localStorage.getItem('english1_todos')) || [];
        let currentFilter = 'all';
        let editingId = null;
        let selectedPriority = 'medium';
        let selectedCategory = 'other';

        // --- DOM Elements ---
        const listEl = document.getElementById('todoList');
        const inputEl = document.getElementById('todoInput');
        const emptyStateEl = document.getElementById('emptyState');

        // --- Core Functions ---

        function save() {
            localStorage.setItem('english1_todos', JSON.stringify(todos));
            render();
        }

        function setPriority(val) {
            selectedPriority = val;
            document.querySelectorAll('.prio-pill').forEach(btn => {
                btn.classList.remove('active-blue', 'active-orange', 'active-pink');
                if (btn.dataset.value === val) {
                    if (val === 'low') btn.classList.add('active-blue');
                    if (val === 'medium') btn.classList.add('active-orange');
                    if (val === 'high') btn.classList.add('active-pink');
                }
            });
        }

        function setCategory(val) {
            selectedCategory = val;
            document.querySelectorAll('.cat-pill').forEach(btn => {
                btn.classList.remove('active-blue', 'active-green', 'active-pink', 'active-slate');
                if (btn.dataset.value === val) {
                    if (val === 'work') btn.classList.add('active-blue');
                    if (val === 'personal') btn.classList.add('active-green');
                    if (val === 'urgent') btn.classList.add('active-pink');
                    if (val === 'other') btn.classList.add('active-slate');
                }
            });
        }

        function addTodo() {
            const text = inputEl.value.trim();
            if (!text) return;

            const newTodo = {
                id: Date.now(),
                text: text,
                priority: selectedPriority,
                category: selectedCategory,
                completed: false,
                createdAt: new Date().toISOString()
            };

            todos.unshift(newTodo);
            inputEl.value = '';
            // Reset to defaults
            setPriority('medium');
            setCategory('other');
            save();
        }

        function toggleTodo(id) {
            todos = todos.map(t => t.id === id ? { ...t, completed: !t.completed } : t);
            save();
        }

        function deleteTodo(id) {
            todos = todos.filter(t => t.id !== id);
            save();
        }

        function editTodo(id) {
            editingId = id;
            render();
            // Focus the input
            setTimeout(() => {
                const input = document.querySelector(`input[data-edit-id="${id}"]`);
                if (input) {
                    input.focus();
                    input.select();
                }
            }, 0);
        }

        function cancelEdit() {
            editingId = null;
            render();
        }

        function saveEdit(id) {
            const input = document.querySelector(`input[data-edit-id="${id}"]`);
            if (!input) return;
            
            const newText = input.value.trim();
            if (newText) {
                todos = todos.map(t => t.id === id ? { ...t, text: newText } : t);
                editingId = null;
                save();
            } else {
                cancelEdit();
            }
        }

        function clearCompleted() {
            todos = todos.filter(t => !t.completed);
            save();
        }

        function filterTasks(filterType) {
            currentFilter = filterType;

            // Update UI
            const buttons = ['all', 'active', 'completed'];
            buttons.forEach(btn => {
                const el = document.getElementById(`filter-${btn}`);
                el.classList.remove('bg-brand-dark', 'text-white');
                el.classList.add('bg-white', 'text-brand-dark', 'dark:bg-slate-800', 'dark:text-white');
                if (btn === filterType) {
                    el.classList.remove('bg-white', 'text-brand-dark', 'dark:bg-slate-800', 'dark:text-white');
                    el.classList.add('bg-brand-dark', 'text-white');
                }
            });
            render();
        }

        // --- Import / Export ---

        function exportTasks() {
            const dataStr = JSON.stringify(todos, null, 2);
            const blob = new Blob([dataStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);

            const a = document.createElement('a');
            a.href = url;
            a.download = `tasks_backup_${new Date().toISOString().slice(0, 10)}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function importTasks(input) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function (e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (Array.isArray(imported)) {
                        // Merge strategy: Add imported tasks to top, remove duplicates by ID
                        const currentIds = new Set(todos.map(t => t.id));
                        const newTasks = imported.filter(t => !currentIds.has(t.id));
                        todos = [...newTasks, ...todos];
                        save();
                        alert(`Successfully imported ${newTasks.length} tasks!`);
                    } else {
                        alert("Invalid file format.");
                    }
                } catch (err) {
                    alert("Error reading file.");
                }
            };
            reader.readAsText(file);
            // Reset input so same file can be selected again if needed
            input.value = '';
        }

        // --- Dark Mode ---
        function toggleTheme() {
            const html = document.documentElement;
            html.classList.toggle('dark');
            const isDark = html.classList.contains('dark');
            localStorage.setItem('english1_theme', isDark ? 'dark' : 'light');
        }

        // --- Rendering ---

        function updateProgress() {
            const progressEl = document.getElementById('progressBar');
            const textEl = document.getElementById('progressText');
            if (!progressEl || !textEl) return;

            const total = todos.length;
            const completed = todos.filter(t => t.completed).length;
            const percentage = total === 0 ? 0 : Math.round((completed / total) * 100);

            progressEl.style.width = `${percentage}%`;
            textEl.innerText = `${percentage}%`;
        }

        function render() {
            updateProgress();
            listEl.innerHTML = '';

            let filteredTodos = todos;
            if (currentFilter === 'active') filteredTodos = todos.filter(t => !t.completed);
            if (currentFilter === 'completed') filteredTodos = todos.filter(t => t.completed);

            if (filteredTodos.length === 0) {
                emptyStateEl.classList.remove('hidden');
            } else {
                emptyStateEl.classList.add('hidden');
            }

            filteredTodos.forEach(todo => {
                const li = document.createElement('li');

                const baseStyles = 'flex items-center gap-4 p-5 rounded-2xl border-4 transition-all duration-200';

                // Priority styling
                let prioColor = 'bg-brand-blue'; // Low
                let prioText = 'Low';
                if (todo.priority === 'high') { prioColor = 'bg-brand-pink'; prioText = 'High'; }
                if (todo.priority === 'medium') { prioColor = 'bg-brand-orange text-brand-dark'; prioText = 'Med'; }

                // Category styling
                let catStyles = 'bg-slate-200 text-slate-600 dark:bg-slate-700 dark:text-slate-400';
                const cat = todo.category || 'other';
                if (cat === 'work') catStyles = 'bg-blue-100 text-brand-blue dark:bg-blue-900/30';
                if (cat === 'personal') catStyles = 'bg-green-100 text-brand-green dark:bg-green-900/30';
                if (cat === 'urgent') catStyles = 'bg-pink-100 text-brand-pink dark:bg-pink-900/30';

                // Date formatting
                const dateObj = new Date(todo.createdAt || Date.now());
                const dateString = dateObj.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });

                if (todo.completed) {
                    li.className = `${baseStyles} border-slate-300 dark:border-slate-700 glass-panel opacity-60 hover:opacity-100 grayscale-[0.5]`;

                    li.innerHTML = `
                        <button onclick="toggleTodo(${todo.id})" class="flex-shrink-0 w-10 h-10 rounded-xl border-[3px] border-brand-dark dark:border-slate-500 flex items-center justify-center bg-brand-green translate-y-[-2px] shadow-hard-sm hover:translate-y-0 hover:shadow-none transition-all">
                            <i data-lucide="check" class="text-brand-dark w-6 h-6"></i>
                        </button>
                        
                        <div class="flex-1 flex flex-col justify-center">
                            <span class="font-bold font-body text-xl line-through text-slate-400 dark:text-slate-500">${todo.text}</span>
                            <div class="flex items-center gap-2 mt-1">
                                <span class="text-[10px] font-black uppercase tracking-widest px-2 py-0.5 rounded ${catStyles} border border-black/5">${cat}</span>
                                <span class="text-[10px] font-bold text-slate-400/80 uppercase">${dateString}</span>
                            </div>
                        </div>
                        
                        <div class="flex gap-1">
                            <button onclick="deleteTodo(${todo.id})" class="text-red-400 hover:text-red-600 p-2 hover:bg-white dark:hover:bg-slate-800 rounded-xl border-2 border-transparent hover:border-brand-dark transition-all">
                                <i data-lucide="trash-2" class="w-5 h-5"></i>
                            </button>
                        </div>
                    `;
                } else {
                    li.className = `${baseStyles} border-brand-dark dark:border-slate-500 glass-panel shadow-hard hover:-translate-y-1 hover:shadow-hard-md animate-pop-in`;

                    const isEditing = editingId === todo.id;

                    if (isEditing) {
                        li.innerHTML = `
                            <div class="flex-1 flex flex-col gap-2">
                                <input type="text" data-edit-id="${todo.id}" value="${todo.text}" 
                                    class="input-chunky w-full px-3 py-1 font-bold text-lg"
                                    onkeydown="if(event.key === 'Enter') saveEdit(${todo.id}); if(event.key === 'Escape') cancelEdit();">
                                <div class="flex gap-2">
                                    <button onclick="saveEdit(${todo.id})" class="btn-chunky bg-brand-green text-xs px-3 py-1 rounded-lg">Save</button>
                                    <button onclick="cancelEdit()" class="btn-chunky bg-white text-xs px-3 py-1 rounded-lg">Cancel</button>
                                </div>
                            </div>
                        `;
                    } else {
                        li.innerHTML = `
                            <button onclick="toggleTodo(${todo.id})" class="flex-shrink-0 w-10 h-10 rounded-xl border-[3px] border-brand-dark dark:border-slate-500 flex items-center justify-center bg-white dark:bg-slate-700 hover:bg-brand-green/20 shadow-hard-sm hover:shadow-hard hover:-translate-y-1 transition-all">
                            </button>
                            
                            <div class="flex-1 flex flex-col justify-center">
                                <span class="font-bold font-body text-xl text-brand-dark dark:text-white">${todo.text}</span>
                                <div class="flex items-center gap-2 mt-1">
                                    <span class="text-[10px] font-black uppercase tracking-widest px-2 py-0.5 rounded ${prioColor} text-white border border-brand-dark dark:border-slate-600 shadow-[1px_1px_0px_0px_var(--color-dark)]">${prioText}</span>
                                    <span class="text-[10px] font-black uppercase tracking-widest px-2 py-0.5 rounded ${catStyles} border border-brand-dark/10">${cat}</span>
                                    <span class="text-[10px] font-bold text-slate-400 uppercase ml-auto">${dateString}</span>
                                </div>
                            </div>
                            
                            <div class="flex gap-1">
                                <button onclick="editTodo(${todo.id})" class="text-brand-blue hover:text-brand-dark dark:hover:text-white p-2 hover:bg-brand-blue/10 rounded-xl border-2 border-transparent hover:border-brand-dark transition-all">
                                    <i data-lucide="edit-2" class="w-5 h-5"></i>
                                </button>
                                <button onclick="deleteTodo(${todo.id})" class="text-slate-300 hover:text-red-500 p-2 hover:bg-red-50 rounded-xl border-2 border-transparent hover:border-brand-dark transition-all">
                                    <i data-lucide="trash-2" class="w-5 h-5"></i>
                                </button>
                            </div>
                        `;
                    }
                }

                listEl.appendChild(li);
            });

            // Re-initialize icons
            lucide.createIcons();
        }

        // --- Init ---
        // Handle Enter key in input
        inputEl.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') addTodo();
        });

        // Initialize selectors
        setPriority('medium');
        setCategory('other');
        
        render();
    </script>
</body>

</html>
