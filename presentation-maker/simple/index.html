<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rapid Presenter</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        pink: '#FF6B95',
                        orange: '#FF8C42',
                        green: '#00E676',
                        blue: '#2979FF',
                        dark: '#1e293b',
                        chalk: '#f8fafc',
                    },
                    fontFamily: {
                        fredoka: ['Fredoka', 'sans-serif'],
                        nunito: ['Nunito', 'sans-serif'],
                    },
                    boxShadow: {
                        'brutal': '4px 4px 0px 0px rgba(30, 41, 59, 1)',
                        'brutal-white': '4px 4px 0px 0px rgba(255, 255, 255, 1)',
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            transition: background-color 0.3s;
        }

        h1, h2, h3, .font-title {
            font-family: 'Fredoka', sans-serif;
        }

        /* Graph Paper Background */
        .bg-grid {
            background-color: #f8fafc;
            background-size: 40px 40px;
            background-image: 
                linear-gradient(to right, rgba(30, 41, 59, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(30, 41, 59, 0.05) 1px, transparent 1px);
        }

        /* Blackboard Mode Grid */
        .dark .bg-grid {
            background-color: #0f172a;
            background-image: 
                linear-gradient(to right, rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
        }

        /* Presentation Mode */
        #presentation-mode {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 50;
            display: none; 
            align-items: center;
            justify-content: center;
            outline: none;
        }

        .slide-text {
            animation: popIn 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-shadow: 4px 4px 0px rgba(30, 41, 59, 1);
        }

        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        /* Brutalist Button Interactions */
        .btn-brutal {
            transition: all 0.1s ease-in-out;
        }
        .btn-brutal:hover {
            transform: translateY(-2px);
        }
        .btn-brutal:active {
            transform: translateY(4px);
            box-shadow: 0px 0px 0px 0px rgba(30, 41, 59, 1) !important;
        }
        .dark .btn-brutal:active {
            box-shadow: 0px 0px 0px 0px rgba(255, 255, 255, 1) !important;
        }
    </style>
</head>
<body class="bg-grid min-h-screen flex flex-col items-center justify-center text-dark dark:text-chalk p-6">

    <div class="absolute top-6 right-6 flex gap-4">
        <button onclick="app.toggleDarkMode()" class="btn-brutal bg-orange text-dark border-4 border-dark rounded-xl p-3 shadow-brutal flex items-center justify-center">
            <i data-lucide="moon" class="w-6 h-6 dark:hidden"></i>
            <i data-lucide="sun" class="w-6 h-6 hidden dark:block"></i>
        </button>
    </div>

    <div class="max-w-3xl w-full bg-chalk dark:bg-slate-800 border-4 border-dark dark:border-slate-400 rounded-2xl shadow-brutal dark:shadow-brutal-white overflow-hidden">
        
        <div class="bg-pink border-b-4 border-dark dark:border-slate-400 p-6 flex items-center justify-between">
            <div class="flex items-center gap-3 text-dark">
                <i data-lucide="monitor-play" class="w-8 h-8"></i>
                <h1 class="text-3xl font-bold font-title tracking-wide">Rapid Presenter</h1>
            </div>
            <div class="bg-chalk dark:bg-slate-800 border-2 border-dark dark:border-slate-400 px-3 py-1 rounded-lg shadow-[2px_2px_0px_0px_rgba(30,41,59,1)] dark:shadow-[2px_2px_0px_0px_rgba(255,255,255,1)]">
                <span id="item-count" class="font-bold text-dark dark:text-chalk">0 items</span>
            </div>
        </div>

        <div class="p-8">
            <label class="block font-title font-bold mb-2 text-xl">
                Enter your content
            </label>
            <p class="text-dark/70 dark:text-chalk/70 text-base mb-4">
                Separate items with a <strong>newline</strong> (Enter) or a <strong>semicolon</strong> (;).
            </p>
            
            <textarea 
                id="word-input" 
                class="w-full h-56 p-4 bg-white dark:bg-slate-900 border-4 border-dark dark:border-slate-400 rounded-xl focus:outline-none focus:ring-4 focus:ring-blue/50 text-xl font-medium resize-none text-dark dark:text-chalk placeholder-dark/30 dark:placeholder-chalk/30 shadow-[inset_0px_4px_0px_0px_rgba(0,0,0,0.05)]"
                placeholder="Paste your list here..."
            ></textarea>

            <div class="mt-6 flex flex-wrap gap-4">
                <button onclick="app.startPresentation(false)" class="btn-brutal flex-1 bg-green text-dark font-title font-bold text-xl py-4 px-6 border-4 border-dark dark:border-slate-400 rounded-xl shadow-brutal dark:shadow-brutal-white flex items-center justify-center gap-2">
                    <i data-lucide="play" class="w-6 h-6"></i> Start
                </button>
                
                <button onclick="app.startPresentation(true)" class="btn-brutal flex-1 bg-blue text-dark font-title font-bold text-xl py-4 px-6 border-4 border-dark dark:border-slate-400 rounded-xl shadow-brutal dark:shadow-brutal-white flex items-center justify-center gap-2">
                    <i data-lucide="shuffle" class="w-6 h-6"></i> Shuffle & Start
                </button>

                <button onclick="app.openClearModal()" class="btn-brutal bg-chalk dark:bg-slate-700 text-dark dark:text-chalk font-title font-bold text-xl py-4 px-6 border-4 border-dark dark:border-slate-400 rounded-xl shadow-brutal dark:shadow-brutal-white flex items-center justify-center gap-2">
                    <i data-lucide="trash-2" class="w-6 h-6 text-pink"></i> Clear
                </button>
            </div>
        </div>
    </div>

    <div id="presentation-mode" tabindex="0">
        <div id="slide-content" class="text-center p-10 max-w-[90vw]">
            <h1 id="display-word" class="text-chalk font-title slide-text break-words" style="font-size: 10vw; line-height: 1.1;">
                Word
            </h1>
        </div>
        
        <div class="absolute bottom-8 left-0 w-full text-center pointer-events-none">
            <div class="inline-block bg-dark text-chalk border-4 border-dark px-6 py-3 rounded-2xl text-lg font-bold shadow-[4px_4px_0px_0px_rgba(0,0,0,0.5)]">
                <span>Slide <span id="slide-number">1</span> / <span id="total-slides">1</span></span>
                <span class="mx-3 opacity-50">|</span>
                <span><i data-lucide="arrow-left-right" class="inline w-5 h-5 mb-1"></i> Use Arrows or Click</span>
            </div>
        </div>
        
        <button onclick="app.stopPresentation()" class="btn-brutal absolute top-6 right-6 bg-pink text-dark border-4 border-dark rounded-xl p-3 shadow-brutal z-50 pointer-events-auto">
            <i data-lucide="x" class="w-8 h-8"></i>
        </button>
    </div>

    <div id="clear-modal" class="fixed inset-0 bg-dark/80 backdrop-blur-sm z-50 hidden items-center justify-center p-4">
        <div class="bg-chalk dark:bg-slate-800 border-4 border-dark dark:border-slate-400 rounded-2xl shadow-brutal dark:shadow-brutal-white max-w-sm w-full p-6 transform scale-100 transition-all">
            <div class="flex items-center gap-3 mb-4">
                <div class="bg-pink p-3 rounded-xl border-2 border-dark">
                    <i data-lucide="alert-triangle" class="w-6 h-6 text-dark"></i>
                </div>
                <h2 class="text-2xl font-title font-bold text-dark dark:text-chalk">Clear Text?</h2>
            </div>
            <p class="mb-8 text-dark/70 dark:text-chalk/70 font-medium">Are you sure you want to delete all entered content? This cannot be undone.</p>
            <div class="flex gap-4">
                <button onclick="app.closeClearModal()" class="btn-brutal flex-1 bg-chalk dark:bg-slate-700 text-dark dark:text-chalk font-title font-bold py-3 px-4 border-4 border-dark dark:border-slate-400 rounded-xl shadow-brutal">
                    Cancel
                </button>
                <button onclick="app.confirmClear()" class="btn-brutal flex-1 bg-pink text-dark font-title font-bold py-3 px-4 border-4 border-dark rounded-xl shadow-brutal">
                    Yes, Clear
                </button>
            </div>
        </div>
    </div>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        const app = {
            words: [],
            currentIndex: 0,
            colors: ['#FF6B95', '#FF8C42', '#00E676', '#2979FF'], // E1 Palette: Pink, Orange, Green, Blue
            
            init() {
                // Dark Mode initialization
                if (localStorage.getItem('e1_theme') === 'dark' || (!('e1_theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                    document.documentElement.classList.add('dark');
                }

                // Auto-load saved text
                const saved = localStorage.getItem('e1_rapid_text');
                const textarea = document.getElementById('word-input');
                if (saved) {
                    textarea.value = saved;
                }
                this.updateCount();

                // Keyboard listeners for presentation
                window.addEventListener('keydown', (e) => {
                    const overlay = document.getElementById('presentation-mode');
                    if (overlay.style.display === 'flex') {
                        if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'Enter') this.nextSlide();
                        if (e.key === 'ArrowLeft') this.prevSlide();
                        if (e.key === 'Escape') this.stopPresentation();
                    }
                });

                // Click to advance
                document.getElementById('presentation-mode').addEventListener('click', (e) => {
                    if(!e.target.closest('button')) {
                        this.nextSlide();
                    }
                });
                
                // Auto-save and count update on typing
                textarea.addEventListener('input', (e) => {
                    localStorage.setItem('e1_rapid_text', e.target.value);
                    this.updateCount();
                });
            },

            toggleDarkMode() {
                document.documentElement.classList.toggle('dark');
                if (document.documentElement.classList.contains('dark')) {
                    localStorage.setItem('e1_theme', 'dark');
                } else {
                    localStorage.setItem('e1_theme', 'light');
                }
            },

            parseInput() {
                const raw = document.getElementById('word-input').value;
                if (!raw.trim()) return [];
                
                // Split by newline OR semicolon, trim, remove empty
                return raw.split(/[;\n]+/)
                    .map(w => w.trim())
                    .filter(w => w.length > 0);
            },

            updateCount() {
                const words = this.parseInput();
                document.getElementById('item-count').innerText = `${words.length} item${words.length !== 1 ? 's' : ''}`;
            },

            shuffleArray(array) {
                for (let i = array.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [array[i], array[j]] = [array[j], array[i]];
                }
                return array;
            },

            startPresentation(shuffle = false) {
                this.words = this.parseInput();
                
                if (this.words.length === 0) {
                    this.words = ["Enter words first!"];
                } else if (shuffle) {
                    this.words = this.shuffleArray([...this.words]);
                }
                
                this.currentIndex = 0;
                const overlay = document.getElementById('presentation-mode');
                overlay.style.display = 'flex';
                overlay.focus();
                
                // Try Fullscreen safely
                try {
                    if (document.documentElement.requestFullscreen) {
                        document.documentElement.requestFullscreen().catch(() => {});
                    }
                } catch(e) {}

                this.renderSlide();
            },

            stopPresentation() {
                const overlay = document.getElementById('presentation-mode');
                overlay.style.display = 'none';
                
                try {
                    if (document.exitFullscreen && document.fullscreenElement) {
                        document.exitFullscreen().catch(() => {});
                    }
                } catch(e) {}
            },

            nextSlide() {
                if (this.currentIndex < this.words.length - 1) {
                    this.currentIndex++;
                } else {
                    this.currentIndex = 0; // Loop back
                }
                this.renderSlide();
            },

            prevSlide() {
                if (this.currentIndex > 0) {
                    this.currentIndex--;
                } else {
                    this.currentIndex = this.words.length - 1; // Loop to end
                }
                this.renderSlide();
            },

            renderSlide() {
                const display = document.getElementById('display-word');
                const overlay = document.getElementById('presentation-mode');
                
                display.innerText = this.words[this.currentIndex];
                
                // Re-trigger animation
                display.classList.remove('slide-text');
                void display.offsetWidth; // trigger reflow
                display.classList.add('slide-text');

                // Cycle through E1 palette colors based on index
                const colorIndex = this.currentIndex % this.colors.length;
                overlay.style.backgroundColor = this.colors[colorIndex];

                // Update counters
                document.getElementById('slide-number').innerText = this.currentIndex + 1;
                document.getElementById('total-slides').innerText = this.words.length;
            },

            // Modal Logic
            openClearModal() {
                const modal = document.getElementById('clear-modal');
                modal.classList.remove('hidden');
                modal.classList.add('flex');
            },

            closeClearModal() {
                const modal = document.getElementById('clear-modal');
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            },

            confirmClear() {
                document.getElementById('word-input').value = "";
                localStorage.removeItem('e1_rapid_text');
                this.updateCount();
                this.closeClearModal();
            }
        };

        window.onload = () => app.init();
    </script>
</body>
</html>
