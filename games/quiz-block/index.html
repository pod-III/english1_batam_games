<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Supabase Auth -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/supabase.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Block</title>
    <link rel="icon" type="image/x-icon" href="../../media/icon.ico" />
    <link rel="icon" type="image/webp" href="../../media/icon.webp" />
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="../../css/base.css" />
    <link rel="stylesheet" href="../../css/components.css" />

    <!-- Vercel Web Analytics -->
    <script>
        window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
    <script src="script.js" defer></script>
</head>
<body class="text-brand-dark min-h-screen flex flex-col font-sans transition-colors duration-300">

    <!-- Landing Page -->
    <div id="landing-page" class="fixed inset-0 bg-brand-chalk/80 dark:bg-slate-900/80 backdrop-blur-md z-50 flex items-center justify-center p-4 transition-opacity duration-300">
        <div class="bg-white dark:bg-slate-800 w-full max-w-4xl rounded-3xl border-[6px] border-brand-dark shadow-neo-lg p-8 md:p-12 flex flex-col relative overflow-hidden animate-pop-in">
            
            <div class="text-center mb-8 relative z-10">
                <div class="inline-flex items-center justify-center p-3 bg-brand-pink rounded-2xl border-4 border-brand-dark text-white transform -rotate-2 mb-4 shadow-neo">
                    <i data-lucide="layout-grid" class="w-8 h-8"></i>
                </div>
                <h2 class="font-heading text-4xl sm:text-5xl font-black dark:text-white tracking-tighter mb-2">QUIZ BLOCK</h2>
                <p class="text-brand-dark/60 dark:text-brand-chalk/60 font-medium">Choose a mode to start playing</p>
            </div>

            <!-- New Game Hero -->
            <div class="mb-8 relative z-10">
                <button onclick="Jeopardy.startNewBlankGame()" class="btn-chunky w-full group flex items-center justify-between p-6 bg-brand-orange text-white rounded-2xl border-4 border-brand-dark shadow-neo-lg transition-all">
                    <div class="flex items-center gap-5">
                        <div class="p-4 bg-white/20 rounded-xl border-2 border-white/30">
                            <i data-lucide="plus" class="w-8 h-8"></i>
                        </div>
                        <div class="text-left">
                            <h3 class="font-heading text-2xl font-black leading-tight">START NEW GAME</h3>
                            <p class="text-sm text-white/80 font-medium">Create a blank quiz and build it in Design Mode</p>
                        </div>
                    </div>
                    <i data-lucide="chevron-right" class="w-8 h-8 transform group-hover:translate-x-1 transition-transform"></i>
                </button>
            </div>

            <div class="grid md:grid-cols-2 gap-8 relative z-10">
                <!-- Presets -->
                <div class="flex flex-col">
                    <h3 class="font-heading text-sm font-black uppercase tracking-widest mb-4 flex items-center gap-2 text-brand-blue dark:text-brand-blue">
                        <i data-lucide="library" class="w-4 h-4"></i>
                        Built-in Presets
                    </h3>
                    <div id="presets-list" class="grid gap-3 max-h-[250px] overflow-y-auto pr-2 custom-scrollbar">
                        <!-- Dynamic content -->
                    </div>
                </div>

                <!-- My Games -->
                <div class="flex flex-col">
                    <h3 class="font-heading text-sm font-black uppercase tracking-widest mb-4 flex items-center gap-2 text-brand-green dark:text-brand-green">
                        <i data-lucide="history" class="w-4 h-4"></i>
                        My Saved Games
                    </h3>
                    <div id="saved-games-list" class="grid gap-3 max-h-[250px] overflow-y-auto pr-2 custom-scrollbar">
                        <!-- Dynamic content -->
                    </div>
                </div>
            </div>

            <div class="absolute -top-10 -right-10 w-40 h-40 bg-brand-orange/10 rounded-full blur-3xl z-0"></div>
            <div class="absolute -bottom-10 -left-10 w-40 h-40 bg-brand-blue/10 rounded-full blur-3xl z-0"></div>
        </div>
    </div>

    <header id="game-header" class="hidden w-full max-w-full mx-auto p-2 sm:p-3 flex flex-col md:flex-row gap-2 justify-between items-center z-20">
        <div class="flex items-center gap-2 bg-white dark:bg-slate-800 border-4 border-brand-dark shadow-neo rounded-xl px-4 py-2 select-none w-full md:w-auto">
            <div class="p-1.5 bg-brand-pink rounded-lg border-2 border-brand-dark text-white transform rotate-3">
                <i data-lucide="layout-grid" class="w-6 h-6"></i>
            </div>
            <div>
                <h1 class="font-heading text-2xl font-bold dark:text-brand-chalk leading-none tracking-tight">QUIZ BLOCK</h1>
                <div id="status-indicator" class="text-[10px] font-bold text-brand-blue uppercase tracking-widest mt-0.5">Classroom Edition</div>
            </div>
        </div>
        
        <div class="flex gap-1.5 items-center bg-white dark:bg-slate-800 p-1.5 rounded-xl border-4 border-brand-dark shadow-neo overflow-x-auto w-full md:w-auto justify-center md:justify-end">
            <button onclick="Jeopardy.toggleEditMode()" id="btn-edit-toggle" class="btn-chunky flex items-center gap-2 px-3 py-1.5 rounded-lg font-bold border-2 border-brand-dark bg-brand-chalk hover:bg-slate-100 dark:bg-slate-700 transition-colors whitespace-nowrap mr-1">
                <div class="w-8 h-5 bg-slate-300 rounded-full relative transition-colors border-2 border-brand-dark" id="toggle-track">
                    <div class="absolute top-0.5 left-0.5 w-3 h-3 bg-white rounded-full border-2 border-brand-dark transition-transform" id="toggle-dot"></div>
                </div>
                <span class="font-heading text-brand-dark dark:text-white text-xs">DESIGN MODE</span>
            </button>

            <button onclick="Jeopardy.resetBoardState()" class="btn-chunky p-2 bg-brand-orange text-white rounded-lg border-2 border-brand-dark" title="Reset Visited Tiles">
                <i data-lucide="rotate-ccw" class="w-4 h-4"></i>
            </button>
            <button onclick="Jeopardy.saveToCustomGames()" class="btn-chunky p-2 bg-brand-green text-white rounded-lg border-2 border-brand-dark" title="Save to My Games">
                <i data-lucide="bookmark" class="w-4 h-4"></i>
            </button>
            <button onclick="Jeopardy.exportData()" class="btn-chunky p-2 bg-brand-blue text-white rounded-lg border-2 border-brand-dark" title="Export/Import JSON">
                <i data-lucide="download" class="w-4 h-4"></i>
            </button>
            <button onclick="Jeopardy.toggleTheme()" class="btn-chunky p-2 bg-brand-dark text-white rounded-lg border-2 border-brand-dark" title="Dark Mode">
                <i data-lucide="moon" class="w-4 h-4"></i>
            </button>
            <button onclick="Jeopardy.showLandingPage()" class="btn-chunky p-2 bg-brand-pink text-white rounded-lg border-2 border-brand-dark" title="Exit to Menu">
                <i data-lucide="log-out" class="w-4 h-4"></i>
            </button>
        </div>
    </header>

    <main id="game-main" class="hidden flex-grow w-full max-w-full mx-auto p-2 sm:p-4 flex-col justify-center min-h-0">
        <div class="w-full h-full overflow-x-auto pb-2 custom-scrollbar">
            <div class="w-full h-full mx-auto flex flex-col">
                <div id="category-row" class="grid grid-cols-5 gap-2 mb-2 shrink-0"></div>
                <div id="game-board" class="flex-grow grid grid-cols-5 grid-rows-5 gap-2 min-h-0"></div>
            </div>
        </div>
    </main>

    <footer id="game-footer" class="hidden w-full max-w-full mx-auto p-1.5 sticky bottom-0 z-30 pointer-events-none">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-2 pointer-events-auto" id="scoreboard-container">
        </div>
    </footer>

    <div id="modal-play" class="fixed inset-0 bg-brand-dark/95 hidden z-50 flex items-center justify-center p-2 backdrop-blur-md">
        <div class="bg-white dark:bg-slate-800 w-full max-w-[95vw] lg:max-w-6xl h-[95vh] max-h-[900px] rounded-3xl border-[6px] border-brand-dark shadow-neo-lg flex flex-col relative overflow-hidden">
            
            <div class="bg-brand-dark p-3 sm:p-4 flex justify-between items-center text-white border-b-4 border-brand-dark shrink-0">
                <h2 id="play-cat" class="font-heading text-2xl font-bold uppercase tracking-widest text-brand-chalk opacity-90">Category</h2>
                <div class="flex items-center gap-4">
                    <div id="play-points" class="font-mono text-3xl text-brand-orange font-black bg-brand-dark px-3 py-1 rounded border-2 border-brand-orange">$100</div>
                    <button onclick="Jeopardy.closePlayModal()" class="hover:text-brand-pink transition transform hover:rotate-90 duration-300"><i data-lucide="x" class="w-8 h-8"></i></button>
                </div>
            </div>

            <div class="w-full h-3 bg-slate-200 border-b-4 border-brand-dark">
                <div id="timer-bar" class="h-full bg-brand-orange w-full transition-all duration-1000 ease-linear"></div>
            </div>

            <div class="flex-grow flex flex-col items-center justify-center p-2 sm:p-6 text-center relative overflow-hidden">
                
                <div id="view-question" class="w-full h-full flex flex-col justify-between items-center">
                    <div class="flex-grow flex items-center justify-center w-full overflow-y-auto custom-scrollbar px-2 py-4">
                        <div id="play-text" class="font-heading font-bold text-brand-dark dark:text-white leading-[1.1] animate-in zoom-in-95 duration-300 drop-shadow-sm max-w-5xl mx-auto break-words" style="font-size: clamp(1.5rem, min(3.5vw, 6vh), 4.5rem);">
                            ...
                        </div>
                    </div>
                    
                    <div class="pt-2 sm:pt-4 flex flex-wrap justify-center gap-3 sm:gap-4 shrink-0 w-full bg-white dark:bg-slate-800 z-10 pb-2">
                        <button onclick="Jeopardy.startTimer()" id="btn-timer" class="btn-chunky bg-white text-brand-dark font-heading font-bold text-base sm:text-xl px-4 sm:px-8 py-2 sm:py-3 rounded-xl border-4 border-brand-dark shadow-neo flex items-center gap-2">
                            <i data-lucide="timer" class="text-brand-pink w-5 h-5 sm:w-6 sm:h-6"></i> Start Timer
                        </button>
                        <button onclick="Jeopardy.revealAnswer()" class="btn-chunky bg-brand-blue text-white font-heading font-bold text-lg sm:text-2xl px-6 sm:px-12 py-2 sm:py-3 rounded-xl border-4 border-brand-dark shadow-neo">
                            Reveal Answer
                        </button>
                    </div>
                </div>

                <div id="view-answer" class="hidden absolute inset-0 bg-brand-chalk/95 dark:bg-slate-900/95 backdrop-blur-md flex flex-col justify-between items-center animate-in fade-in duration-300 z-10 p-4 sm:p-6">
                    
                    <div class="shrink-0 bg-brand-green text-white font-heading font-bold text-base sm:text-xl px-4 sm:px-8 py-1.5 sm:py-2 rounded-full mb-2 border-4 border-brand-dark shadow-neo transform -rotate-2">
                        CORRECT ANSWER
                    </div>
                    
                    <div class="flex-grow flex items-center justify-center w-full overflow-y-auto custom-scrollbar">
                        <div id="play-answer" class="font-heading font-bold text-brand-dark dark:text-brand-green drop-shadow-md text-center max-w-5xl mx-auto break-words p-2" style="font-size: clamp(1.75rem, min(4.5vw, 7vh), 5.5rem); line-height: 1.1;">
                            ...
                        </div>
                    </div>

                    <button onclick="Jeopardy.closePlayModal()" class="mt-4 shrink-0 btn-chunky bg-brand-dark text-white font-heading font-bold text-lg sm:text-2xl px-8 sm:px-16 py-2 sm:py-3 rounded-xl border-4 border-slate-600 shadow-neo hover:bg-slate-800">
                        Close
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-edit" class="fixed inset-0 bg-brand-dark/60 hidden z-50 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white dark:bg-slate-800 w-full max-w-lg rounded-2xl border-4 border-brand-dark shadow-neo-lg p-6 animate-in zoom-in-95 duration-200">
            <h2 class="font-heading text-2xl font-bold mb-4 flex items-center gap-2 text-brand-dark dark:text-white">
                <div class="bg-brand-pink text-white p-2 rounded-lg border-2 border-brand-dark"><i data-lucide="edit-3"></i></div>
                Edit Tile Content
            </h2>
            <div class="space-y-4">
                <div>
                    <label class="text-sm font-bold text-brand-dark dark:text-slate-300 uppercase tracking-wider">Question (Prompt)</label>
                    <textarea id="edit-q" class="w-full border-4 border-brand-dark rounded-xl p-3 font-sans text-lg focus:ring-4 ring-brand-blue/20 outline-none dark:bg-slate-900 dark:text-white transition-all" rows="3"></textarea>
                </div>
                <div>
                    <label class="text-sm font-bold text-brand-dark dark:text-slate-300 uppercase tracking-wider">Answer (Reveal)</label>
                    <textarea id="edit-a" class="w-full border-4 border-brand-dark rounded-xl p-3 font-sans text-lg focus:ring-4 ring-brand-green/20 outline-none dark:bg-slate-900 dark:text-white transition-all" rows="2"></textarea>
                </div>
                <div class="flex gap-3 pt-4">
                    <button onclick="Jeopardy.saveEdit()" class="flex-1 btn-neo bg-brand-green text-white font-bold py-3 rounded-xl border-4 border-brand-dark shadow-neo font-heading text-lg">Save</button>
                    <button onclick="Jeopardy.closeEditModal()" class="flex-1 btn-neo bg-slate-200 text-brand-dark font-bold py-3 rounded-xl border-4 border-brand-dark shadow-neo font-heading text-lg">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-data" class="fixed inset-0 bg-brand-dark/60 hidden z-50 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white dark:bg-slate-800 w-full max-w-2xl rounded-2xl border-4 border-brand-dark shadow-neo-lg p-6">
            <h2 class="font-heading text-2xl font-bold mb-2 text-brand-dark dark:text-white">Game Data (JSON)</h2>
            <p class="text-slate-500 mb-2 text-sm">Copy this code to save your game, or paste code here to load a game.</p>
            <textarea id="data-json" class="w-full border-4 border-brand-dark rounded-xl p-4 font-mono text-xs h-64 mb-4 dark:bg-slate-900 dark:text-brand-green focus:outline-none"></textarea>
            <div class="flex gap-3">
                <button onclick="Jeopardy.importData()" class="flex-1 btn-neo bg-brand-blue text-white font-bold py-3 rounded-xl border-4 border-brand-dark shadow-neo">Load JSON</button>
                <button onclick="Jeopardy.closeDataModal()" class="flex-1 btn-neo bg-slate-200 text-brand-dark font-bold py-3 rounded-xl border-4 border-brand-dark shadow-neo">Close</button>
            </div>
        </div>
    </div>

    <div id="modal-system" class="fixed inset-0 bg-brand-dark/80 hidden z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white dark:bg-slate-800 w-full max-w-md rounded-2xl border-4 border-brand-dark shadow-neo-lg p-0 overflow-hidden animate-in zoom-in-95 duration-200">
            <div id="sys-header" class="bg-brand-blue p-4 border-b-4 border-brand-dark">
                <h3 id="sys-title" class="font-heading font-bold text-white text-xl">System Message</h3>
            </div>
            <div class="p-6">
                <p id="sys-msg" class="text-brand-dark dark:text-white font-sans text-lg font-bold mb-4">Message goes here...</p>
                
                <input type="text" id="sys-input" class="hidden w-full border-4 border-brand-dark rounded-xl p-3 font-sans text-lg mb-4 dark:bg-slate-900 dark:text-white focus:outline-none focus:border-brand-pink" autocomplete="off">

                <div class="flex gap-3 justify-end mt-2" id="sys-actions">
                </div>
            </div>
        </div>
    </div>

</body>
</html>
