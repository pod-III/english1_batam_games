<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KlassKit: Quiz Maker</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@700&family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <!-- Supabase Auth -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/supabase.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            pink: '#FF6B95',
                            orange: '#FF8C42',
                            green: '#00E676',
                            blue: '#2979FF',
                            dark: '#1e293b',
                            chalk: '#f8fafc',
                        }
                    },
                    fontFamily: {
                        sans: ['Nunito', 'sans-serif'],
                        heading: ['Fredoka', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --bg-primary: #f8fafc;
            --text-primary: #1e293b;
            --border-primary: #1e293b;
        }

        .dark {
            --bg-primary: #0f172a;
            --text-primary: #f8fafc;
            --border-primary: #334155;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            margin: 0;
            min-height: 100vh;
            background-image:
                linear-gradient(rgba(30, 41, 59, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(30, 41, 59, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .dark body {
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
        }

        .font-heading { font-family: 'Fredoka', sans-serif; font-weight: 700; }
        
        .shadow-neo { box-shadow: 6px 6px 0px 0px rgba(30, 41, 59, 1); }
        .shadow-neo-lg { box-shadow: 10px 10px 0px 0px rgba(30, 41, 59, 1); }
        .shadow-neo-sm { box-shadow: 3px 3px 0px 0px rgba(30, 41, 59, 1); }
        
        .dark .shadow-neo { box-shadow: 6px 6px 0px 0px rgba(0, 0, 0, 0.5); }
        .dark .shadow-neo-lg { box-shadow: 10px 10px 0px 0px rgba(0, 0, 0, 0.5); }
        
        .btn-chunky {
            transition: all 0.1s;
            cursor: pointer;
            user-select: none;
        }
        .btn-chunky:hover { transform: translate(-2px, -2px); box-shadow: 8px 8px 0px 0px rgba(30, 41, 59, 1); }
        .btn-chunky:active { transform: translate(2px, 2px); box-shadow: 0px 0px 0px 0px rgba(30, 41, 59, 1); }

        .dark .btn-chunky:hover { box-shadow: 8px 8px 0px 0px rgba(0, 0, 0, 0.5); }

        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(16px);
            border: 4px solid var(--border-primary);
        }
        .dark .glass-panel {
            background: rgba(30, 41, 59, 0.9);
            border: 4px solid #334155;
        }

        .animate-pop-in { animation: pop-in 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes pop-in {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Option Feedback */
        .option-btn {
            position: relative;
            overflow: hidden;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .option-btn.correct { background-color: #00E676 !important; border-color: var(--border-primary); color: white; transform: scale(1.05); z-index: 10; }
        .option-btn.wrong { background-color: #FF6B95 !important; border-color: var(--border-primary); color: white; opacity: 0.8; }
        .option-btn.dimmed { opacity: 0.3; filter: grayscale(0.5); pointer-events: none; }

        .custom-scrollbar::-webkit-scrollbar { width: 10px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.05); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #2979FF; border-radius: 10px; border: 2px solid transparent; background-clip: content-box; }

        .artsy-border {
            position: relative;
        }
        .artsy-border::before {
            content: '';
            position: absolute;
            inset: -8px;
            border: 4px solid var(--brand-pink);
            border-radius: 2.5rem;
            z-index: -1;
            opacity: 0.2;
            transform: rotate(-1deg);
        }
    </style>
</head>
<body class="selection:bg-brand-blue selection:text-white">

    <!-- Header -->
    <header class="max-w-7xl mx-auto w-full mt-8 px-4 z-50">
        <div class="glass-panel rounded-[2rem] p-5 shadow-neo flex justify-between items-center gap-4">
            <div class="flex items-center gap-4">
                <div class="w-16 h-16 rounded-2xl bg-brand-blue border-4 border-brand-dark flex items-center justify-center shadow-neo-sm transform rotate-[-3deg]">
                    <i data-lucide="help-circle" class="w-10 h-10 text-white"></i>
                </div>
                <div>
                    <h1 class="text-4xl font-heading text-brand-dark dark:text-brand-chalk leading-none tracking-tight uppercase">QUIZ MAKER</h1>
                    <p class="text-[12px] font-black text-brand-orange dark:text-brand-green tracking-[0.2em] uppercase mt-1">Classroom Battle Edition</p>
                </div>
            </div>

            <div class="flex items-center gap-3">
                <button onclick="toggleTheme()" class="btn-chunky bg-white dark:bg-slate-800 w-14 h-14 flex items-center justify-center rounded-2xl border-4 border-brand-dark shadow-neo text-brand-dark dark:text-white">
                    <i data-lucide="moon" id="theme-icon" class="w-7 h-7"></i>
                </button>
                <button id="setup-toggle" onclick="toggleMode()" class="btn-chunky bg-brand-blue text-white px-8 py-4 rounded-2xl border-4 border-brand-dark shadow-neo font-heading text-xl flex items-center gap-3">
                    <i data-lucide="settings" class="w-6 h-6"></i>
                    <span>SETUP</span>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto w-full mt-16 px-4 pb-20">
        
        <!-- Setup Mode -->
        <div id="setup-mode" class="hidden animate-pop-in grid lg:grid-cols-12 gap-10">
            
            <!-- Collections Sidebar -->
            <div class="lg:col-span-4 space-y-8">
                <div class="glass-panel rounded-[2.5rem] p-8 shadow-neo-lg bg-white dark:bg-slate-800">
                    <h3 class="text-2xl font-heading uppercase mb-6 flex items-center gap-3 text-brand-pink">
                        <i data-lucide="library" class="w-7 h-7"></i>
                        Saved Quizzes
                    </h3>
                    <div id="collections-list" class="space-y-4 max-h-[400px] overflow-y-auto pr-3 custom-scrollbar">
                        <!-- Collections injected here -->
                    </div>
                    <div class="mt-8 pt-6 border-t-4 border-dashed border-slate-200 dark:border-slate-700">
                        <button onclick="createNewCollection()" class="btn-chunky w-full bg-brand-green text-white py-4 rounded-2xl border-4 border-brand-dark shadow-neo font-black text-xl flex items-center justify-center gap-2">
                            <i data-lucide="plus-circle" class="w-6 h-6"></i> CREATE NEW
                        </button>
                    </div>
                </div>

                <div class="glass-panel rounded-[2.5rem] p-8 shadow-neo bg-brand-orange/5 border-brand-orange">
                    <h3 class="text-xl font-heading uppercase mb-6 flex items-center gap-2 text-brand-orange">
                        <i data-lucide="sparkles" class="w-6 h-6"></i>
                        Ready-to-use
                    </h3>
                    <div class="grid grid-cols-1 gap-3">
                        <button onclick="loadPreset('b1_english')" class="btn-chunky bg-white dark:bg-slate-800 p-4 rounded-2xl border-4 border-brand-dark text-left font-black hover:bg-brand-orange hover:text-white transition-all shadow-neo-sm">B1 English Mastery</button>
                        <button onclick="loadPreset('math_basics')" class="btn-chunky bg-white dark:bg-slate-800 p-4 rounded-2xl border-4 border-brand-dark text-left font-black hover:bg-brand-orange hover:text-white transition-all shadow-neo-sm">Math Foundations</button>
                    </div>
                </div>
            </div>

            <!-- Editor -->
            <div class="lg:col-span-8">
                <div class="glass-panel rounded-[3rem] p-10 shadow-neo-lg relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-full h-8 bg-brand-blue border-b-4 border-brand-dark"></div>
                    
                    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-6 mb-12 mt-4">
                        <div class="flex-1 w-full">
                            <label class="text-xs font-black text-slate-400 uppercase tracking-[0.3em] mb-2 block ml-1">Quiz Title</label>
                            <input type="text" id="quiz-name-input" oninput="updateCollectionName(this.value)" class="text-4xl font-heading uppercase tracking-tighter bg-transparent border-b-4 border-slate-200 dark:border-slate-700 focus:border-brand-blue outline-none w-full pb-2 text-brand-dark dark:text-white" placeholder="UNTITLED QUIZ">
                        </div>
                        <button onclick="deleteCurrentCollection()" class="btn-chunky bg-brand-pink text-white w-16 h-16 rounded-2xl border-4 border-brand-dark shadow-neo flex items-center justify-center shrink-0" title="Delete Quiz">
                            <i data-lucide="trash-2" class="w-8 h-8"></i>
                        </button>
                    </div>

                    <div id="questions-editor" class="space-y-8 max-h-[700px] overflow-y-auto pr-6 custom-scrollbar">
                        <!-- Question editors will be injected here -->
                    </div>

                    <div class="mt-12 pt-10 border-t-8 border-brand-dark border-dotted flex justify-center">
                        <button onclick="saveAndPlay()" class="btn-chunky bg-brand-green text-white px-20 py-8 rounded-[2.5rem] border-4 border-brand-dark shadow-neo-lg font-heading text-4xl tracking-tight uppercase hover:scale-105">
                            START BATTLE!
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Play Mode -->
        <div id="play-mode" class="animate-pop-in max-w-5xl mx-auto">
            <div id="landing-screen" class="glass-panel rounded-[4rem] p-16 shadow-neo-lg text-center relative overflow-hidden">
                <div class="absolute -top-10 -right-10 w-40 h-40 bg-brand-orange/20 rounded-full blur-3xl"></div>
                <div class="absolute -bottom-10 -left-10 w-40 h-40 bg-brand-blue/20 rounded-full blur-3xl"></div>
                
                <div class="w-32 h-32 bg-brand-blue text-white rounded-[2.5rem] border-4 border-brand-dark shadow-neo flex items-center justify-center mx-auto mb-10 transform rotate-6 hover:rotate-12 transition-transform">
                    <i data-lucide="play" class="w-16 h-16 fill-current"></i>
                </div>
                <h2 id="landing-title" class="text-6xl font-heading uppercase tracking-tighter mb-6 text-brand-dark dark:text-white">QUIZ READY</h2>
                <p id="landing-desc" class="text-2xl text-slate-500 font-bold mb-12 max-w-lg mx-auto">Prepare your brains! The classroom challenge is about to begin.</p>
                <button id="start-btn" onclick="startQuiz()" class="btn-chunky bg-brand-green text-white px-20 py-8 rounded-[3rem] border-4 border-brand-dark shadow-neo-lg font-heading text-5xl tracking-tight uppercase disabled:grayscale disabled:opacity-50">
                    LET'S GO!
                </button>
            </div>

            <!-- Quiz Screen -->
            <div id="quiz-screen" class="hidden space-y-10">
                <!-- Progress Header -->
                <div class="flex justify-between items-center px-6">
                    <div class="flex items-center gap-6">
                        <div class="bg-white dark:bg-slate-800 border-4 border-brand-dark rounded-3xl px-8 py-3 shadow-neo font-heading text-3xl" id="progress-text">1/10</div>
                        <div class="w-64 h-8 bg-white dark:bg-slate-800 border-4 border-brand-dark rounded-full shadow-neo overflow-hidden">
                            <div id="progress-bar" class="h-full bg-brand-blue transition-all duration-500" style="width: 10%;"></div>
                        </div>
                    </div>
                    <div class="bg-white dark:bg-slate-800 border-4 border-brand-dark rounded-3xl px-8 py-3 shadow-neo font-heading text-3xl flex items-center gap-3">
                        <i data-lucide="trophy" class="w-8 h-8 text-brand-orange"></i>
                        <span id="score-text">0</span>
                    </div>
                </div>

                <!-- Question Card -->
                <div class="glass-panel rounded-[4rem] p-12 md:p-20 shadow-neo-lg text-center relative artsy-border">
                    <div class="absolute top-0 left-0 w-full h-10 bg-brand-pink border-b-4 border-brand-dark"></div>
                    <h3 id="question-text" class="text-4xl md:text-6xl font-heading leading-tight tracking-tight mb-16 mt-6 text-brand-dark dark:text-white">Loading question...</h3>
                    
                    <div id="options-container" class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-12">
                        <!-- Options injected here -->
                    </div>

                    <div id="feedback-controls" class="hidden flex justify-center animate-pop-in">
                        <button onclick="nextQuestion()" class="btn-chunky bg-brand-dark text-white px-16 py-6 rounded-[2rem] border-4 border-brand-dark shadow-neo font-heading text-3xl flex items-center gap-4 uppercase">
                            NEXT ROUND <i data-lucide="arrow-right" class="w-8 h-8"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Result Screen -->
            <div id="result-screen" class="hidden glass-panel rounded-[4rem] p-16 shadow-neo-lg text-center relative overflow-hidden">
                <div class="w-32 h-32 bg-brand-green text-white rounded-[2.5rem] border-4 border-brand-dark shadow-neo flex items-center justify-center mx-auto mb-10 transform -rotate-6">
                    <i data-lucide="award" class="w-20 h-20"></i>
                </div>
                <h2 class="text-7xl font-heading uppercase tracking-tighter mb-4 text-brand-dark dark:text-white">VICTORY!</h2>
                <p id="final-message" class="text-3xl text-slate-500 font-bold mb-12">Epic classroom session!</p>
                
                <div class="grid grid-cols-2 gap-10 max-w-2xl mx-auto mb-16">
                    <div class="bg-white dark:bg-slate-800 border-4 border-brand-dark rounded-[2.5rem] p-10 shadow-neo">
                        <p class="text-xs font-black text-slate-400 uppercase tracking-widest mb-2">Final Score</p>
                        <p id="final-score" class="text-7xl font-heading">0/10</p>
                    </div>
                    <div class="bg-white dark:bg-slate-800 border-4 border-brand-dark rounded-[2.5rem] p-10 shadow-neo">
                        <p class="text-xs font-black text-slate-400 uppercase tracking-widest mb-2">Grade</p>
                        <p id="final-rank" class="text-7xl font-heading text-brand-blue">A+</p>
                    </div>
                </div>

                <div class="flex flex-col sm:flex-row gap-6 justify-center">
                    <button onclick="startQuiz()" class="btn-chunky bg-brand-green text-white px-14 py-6 rounded-3xl border-4 border-brand-dark shadow-neo font-heading text-3xl uppercase">PLAY AGAIN</button>
                    <button onclick="toggleMode('setup')" class="btn-chunky bg-white dark:bg-slate-800 text-brand-dark dark:text-white px-14 py-6 rounded-3xl border-4 border-brand-dark shadow-neo font-heading text-3xl uppercase">EDIT QUESTIONS</button>
                </div>
            </div>
        </div>

    </main>

    <!-- Footer -->
    <footer class="mt-auto text-center text-slate-400 dark:text-slate-500 font-bold text-sm py-12">
        <p class="uppercase tracking-widest opacity-50">KlassKit Quiz Battle • Powered by Antigravity</p>
    </footer>

    <script>
        // --- DATA & STATE ---
        const PRESETS = {
            b1_english: [
                { q: "If I _____ you, I would go to the doctor.", o: ["am", "was", "were", "be"], a: 2 },
                { q: "She has been working here _____ 2015.", o: ["for", "since", "from", "during"], a: 1 },
                { q: "Which of these is NOT a past participle?", o: ["Gone", "Done", "Been", "Going"], a: 3 },
                { q: "By the time we arrived, the film _____.", o: ["started", "was starting", "had started", "has started"], a: 2 },
                { q: "I'm looking forward _____ you next week.", o: ["to see", "to seeing", "seeing", "for seeing"], a: 1 },
                { q: "He suggested _____ to the park.", o: ["go", "to go", "going", "goes"], a: 2 },
                { q: "That is the man _____ car was stolen.", o: ["who", "whom", "whose", "which"], a: 2 },
                { q: "You _____ better hurry or you'll be late.", o: ["would", "had", "should", "will"], a: 1 },
                { q: "I wish I _____ more time to study.", o: ["have", "had", "would have", "was having"], a: 1 },
                { q: "The bridge _____ by next Christmas.", o: ["will build", "will be building", "will have been built", "is built"], a: 2 }
            ],
            math_basics: [
                { q: "What is 15 x 6?", o: ["80", "90", "75", "95"], a: 1 },
                { q: "Square root of 144?", o: ["10", "11", "12", "14"], a: 2 },
                { q: "What is 25% of 200?", o: ["40", "50", "60", "25"], a: 1 },
                { q: "Sum of angles in a triangle?", o: ["90°", "180°", "270°", "360°"], a: 1 },
                { q: "Which is a prime number?", o: ["9", "15", "21", "17"], a: 3 },
                { q: "Value of Pi (approx)?", o: ["3.12", "3.14", "3.16", "3.18"], a: 1 },
                { q: "1/2 + 1/4 = ?", o: ["1/6", "2/6", "3/4", "2/4"], a: 2 },
                { q: "What is 7 squared?", o: ["14", "47", "49", "56"], a: 2 },
                { q: "Sides in a hexagon?", o: ["5", "6", "7", "8"], a: 1 },
                { q: "100 / 4 x 2 = ?", o: ["12.5", "50", "25", "200"], a: 1 }
            ]
        };

        let collections = [];
        let currentCollectionId = null;
        let isAnswering = false;
        
        let currentQuestions = [];
        let currentStep = 0;
        let score = 0;
        let isSetupMode = false;

        // --- THEME SYNC ---
        function initTheme() {
            const saved = localStorage.getItem('theme_hub');
            if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            }
            updateThemeUI();
        }

        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme_hub', isDark ? 'dark' : 'light');
            updateThemeUI();
        }

        function updateThemeUI() {
            const isDark = document.documentElement.classList.contains('dark');
            const icon = document.getElementById('theme-icon');
            if (icon) {
                icon.setAttribute('data-lucide', isDark ? 'sun' : 'moon');
                lucide.createIcons();
            }
        }

        // --- MODE TOGGLE ---
        function toggleMode(target) {
            isSetupMode = target === 'setup' ? true : (target === 'play' ? false : !isSetupMode);
            
            const setup = document.getElementById('setup-mode');
            const play = document.getElementById('play-mode');
            const toggleBtn = document.getElementById('setup-toggle');
            const icon = toggleBtn.querySelector('[data-lucide]');

            if (isSetupMode) {
                setup.classList.remove('hidden');
                setup.classList.add('grid');
                play.classList.add('hidden');
                toggleBtn.querySelector('span').textContent = 'PLAY';
                if (icon) icon.setAttribute('data-lucide', 'play');
                renderCollections();
                renderEditor();
            } else {
                setup.classList.add('hidden');
                setup.classList.remove('grid');
                play.classList.remove('hidden');
                toggleBtn.querySelector('span').textContent = 'SETUP';
                if (icon) icon.setAttribute('data-lucide', 'settings');
                resetQuizState();
            }
            lucide.createIcons();
        }

        // --- COLLECTIONS LOGIC ---
        function createNewCollection() {
            const id = 'quiz_' + Date.now();
            const newQuiz = {
                id,
                name: "New Classroom Battle",
                questions: Array(10).fill().map(() => ({ q: "", o: ["", "", "", ""], a: 0 })),
                timestamp: Date.now()
            };
            collections.push(newQuiz);
            currentCollectionId = id;
            currentQuestions = newQuiz.questions;
            saveData();
            renderCollections();
            renderEditor();
        }

        function selectCollection(id) {
            const quiz = collections.find(c => c.id === id);
            if (quiz) {
                currentCollectionId = id;
                currentQuestions = quiz.questions;
                renderCollections();
                renderEditor();
                AudioEngine.playTone(600, 'sine', 0.1);
            }
        }

        function deleteCurrentCollection() {
            if (collections.length <= 1) {
                alert("You must have at least one quiz!");
                return;
            }
            if (confirm("Permanently delete this battle set?")) {
                collections = collections.filter(c => c.id !== currentCollectionId);
                currentCollectionId = collections[0].id;
                currentQuestions = collections[0].questions;
                saveData();
                renderCollections();
                renderEditor();
            }
        }

        function updateCollectionName(name) {
            const quiz = collections.find(c => c.id === currentCollectionId);
            if (quiz) {
                quiz.name = name;
                saveData();
                renderCollections();
            }
        }

        function renderCollections() {
            const list = document.getElementById('collections-list');
            list.innerHTML = '';
            
            collections.sort((a, b) => b.timestamp - a.timestamp).forEach(quiz => {
                const isActive = quiz.id === currentCollectionId;
                const btn = document.createElement('button');
                btn.className = `collection-item w-full p-5 rounded-2xl border-4 font-black text-left flex items-center gap-4 shadow-neo transition-all ${isActive ? 'bg-brand-pink text-white border-brand-dark scale-[1.05] z-10' : 'bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-700 text-slate-400 hover:border-brand-pink hover:text-brand-pink'}`;
                btn.innerHTML = `
                    <div class="w-10 h-10 rounded-xl bg-black/10 flex items-center justify-center shrink-0">
                        <i data-lucide="scroll-text" class="w-5 h-5"></i>
                    </div>
                    <span class="truncate text-lg">${quiz.name || 'Untitled Battle'}</span>
                `;
                btn.onclick = () => selectCollection(quiz.id);
                list.appendChild(btn);
            });
            
            const activeQuiz = collections.find(c => c.id === currentCollectionId);
            document.getElementById('quiz-name-input').value = activeQuiz ? activeQuiz.name : "";
            
            // Update Play Mode Landing
            const landingTitle = document.getElementById('landing-title');
            const landingDesc = document.getElementById('landing-desc');
            const startBtn = document.getElementById('start-btn');
            
            if (activeQuiz) {
                landingTitle.textContent = activeQuiz.name.toUpperCase();
                landingDesc.textContent = `${activeQuiz.questions.filter(q => q.q).length} classroom questions are ready for the battle.`;
                startBtn.disabled = false;
            } else {
                landingTitle.textContent = "NO BATTLE LOADED";
                landingDesc.textContent = "Please create or select a quiz in SETUP.";
                startBtn.disabled = true;
            }
            
            lucide.createIcons();
        }

        // --- EDITOR LOGIC ---
        function renderEditor() {
            const container = document.getElementById('questions-editor');
            container.innerHTML = '';

            currentQuestions.forEach((q, idx) => {
                const card = document.createElement('div');
                card.className = 'bg-white dark:bg-slate-800 border-4 border-brand-dark rounded-[2rem] p-8 shadow-neo-sm space-y-6 transform hover:rotate-[0.5deg] transition-transform';
                card.innerHTML = `
                    <div class="flex items-start gap-6">
                        <span class="w-14 h-14 shrink-0 rounded-2xl bg-brand-blue text-white flex items-center justify-center font-black text-2xl border-4 border-brand-dark shadow-neo-sm">${idx + 1}</span>
                        <div class="flex-1 space-y-3">
                            <label class="text-xs font-black text-slate-400 uppercase tracking-widest">Battle Prompt</label>
                            <textarea oninput="updateQuestion(${idx}, 'q', this.value)" placeholder="Enter question..." class="w-full bg-slate-50 dark:bg-slate-900 border-4 border-brand-dark rounded-2xl px-5 py-4 font-black text-xl text-brand-dark dark:text-white focus:outline-none focus:border-brand-pink shadow-[inset_0_4px_8px_rgba(0,0,0,0.05)] resize-none" rows="2">${q.q}</textarea>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 pl-20">
                        ${q.o.map((opt, oIdx) => `
                            <div class="space-y-2">
                                <div class="flex items-center gap-3">
                                    <input type="radio" name="correct-${idx}" ${q.a === oIdx ? 'checked' : ''} onchange="updateQuestion(${idx}, 'a', ${oIdx})" class="w-7 h-7 accent-brand-green cursor-pointer">
                                    <input type="text" value="${opt}" oninput="updateOption(${idx}, ${oIdx}, this.value)" placeholder="Choice ${oIdx + 1}" class="flex-1 bg-slate-50 dark:bg-slate-900 border-4 border-brand-dark rounded-xl px-4 py-3 font-bold text-brand-dark dark:text-slate-200 focus:outline-none focus:border-brand-green shadow-neo-sm">
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function updateQuestion(idx, field, val) {
            currentQuestions[idx][field] = val;
            saveData();
        }

        function updateOption(qIdx, oIdx, val) {
            currentQuestions[qIdx].o[oIdx] = val;
            saveData();
        }

        // --- PERSISTENCE ---
        let syncTimeout = null;
        async function saveData() {
            localStorage.setItem('quiz_maker_collections', JSON.stringify(collections));
            localStorage.setItem('quiz_maker_last_id', currentCollectionId);
            
            if (syncTimeout) clearTimeout(syncTimeout);
            syncTimeout = setTimeout(async () => {
                try {
                    await saveProgress('quiz_maker', { collections, lastId: currentCollectionId });
                } catch (e) {}
            }, 2000);
        }

        async function loadData() {
            const local = localStorage.getItem('quiz_maker_collections');
            const lastId = localStorage.getItem('quiz_maker_last_id');
            
            if (local) {
                collections = JSON.parse(local);
                currentCollectionId = lastId || (collections[0] ? collections[0].id : null);
                if (currentCollectionId) {
                    currentQuestions = collections.find(c => c.id === currentCollectionId)?.questions || [];
                }
            }

            try {
                const cloud = await loadProgress('quiz_maker');
                if (cloud && cloud.collections) {
                    collections = cloud.collections;
                    currentCollectionId = cloud.lastId || collections[0].id;
                    currentQuestions = collections.find(c => c.id === currentCollectionId).questions;
                    localStorage.setItem('quiz_maker_collections', JSON.stringify(collections));
                    if (isSetupMode) { renderCollections(); renderEditor(); }
                }
            } catch (e) {}

            if (collections.length === 0) {
                createNewCollection();
            }
        }

        function loadPreset(key) {
            if (PRESETS[key]) {
                const id = 'quiz_preset_' + key + '_' + Date.now();
                const newQuiz = {
                    id,
                    name: key === 'b1_english' ? "B1 English Mastery" : "Math Foundations",
                    questions: JSON.parse(JSON.stringify(PRESETS[key])),
                    timestamp: Date.now()
                };
                collections.push(newQuiz);
                currentCollectionId = id;
                currentQuestions = newQuiz.questions;
                saveData();
                renderCollections();
                renderEditor();
                AudioEngine.playTone(800, 'sine', 0.1);
            }
        }

        function saveAndPlay() {
            saveData();
            toggleMode('play');
        }

        // --- GAME LOGIC ---
        function resetQuizState() {
            currentStep = 0;
            score = 0;
            isAnswering = false;
            document.getElementById('landing-screen').classList.remove('hidden');
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.add('hidden');
            document.getElementById('feedback-controls').classList.add('hidden');
        }

        function startQuiz() {
            currentStep = 0;
            score = 0;
            isAnswering = false;
            document.getElementById('landing-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            showQuestion();
        }

        function showQuestion() {
            isAnswering = false;
            const q = currentQuestions[currentStep];
            document.getElementById('question-text').textContent = q.q || "Battle Ready?";
            document.getElementById('progress-text').textContent = `${currentStep + 1}/${currentQuestions.length}`;
            document.getElementById('progress-bar').style.width = `${((currentStep + 1) / currentQuestions.length) * 100}%`;
            document.getElementById('score-text').textContent = score;
            document.getElementById('feedback-controls').classList.add('hidden');

            const container = document.getElementById('options-container');
            container.innerHTML = '';

            const colors = ['bg-brand-pink', 'bg-brand-orange', 'bg-brand-blue', 'bg-brand-green'];
            q.o.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = `option-btn btn-chunky ${colors[idx % 4]} text-white px-10 py-8 rounded-[2rem] border-4 border-brand-dark shadow-neo font-heading text-2xl md:text-3xl transition-all`;
                btn.textContent = opt || `Choice ${idx + 1}`;
                btn.onclick = () => selectOption(idx);
                container.appendChild(btn);
            });
        }

        function selectOption(idx) {
            if (isAnswering) return;
            isAnswering = true;
            
            const q = currentQuestions[currentStep];
            const correct = q.a;
            const btns = document.querySelectorAll('.option-btn');
            
            btns.forEach((btn, bIdx) => {
                btn.classList.add('dimmed');
                if (bIdx === correct) {
                    btn.classList.remove('dimmed');
                    btn.classList.add('correct');
                } else if (bIdx === idx) {
                    btn.classList.remove('dimmed');
                    btn.classList.add('wrong');
                }
            });

            if (idx === correct) {
                score++;
                AudioEngine.correct();
                confetti({ particleCount: 50, spread: 60, origin: { y: 0.8 }, colors: ['#00E676', '#2979FF'] });
            } else {
                AudioEngine.wrong();
            }

            document.getElementById('score-text').textContent = score;
            document.getElementById('feedback-controls').classList.remove('hidden');
            lucide.createIcons();
        }

        function nextQuestion() {
            currentStep++;
            if (currentStep < currentQuestions.length) {
                showQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            
            document.getElementById('final-score').textContent = `${score}/${currentQuestions.length}`;
            
            let rank = "F";
            let msg = "Keep Training!";
            const ratio = score / (currentQuestions.length || 1);
            
            if (ratio >= 0.9) { rank = "S"; msg = "LEGENDARY VICTORY!"; }
            else if (ratio >= 0.8) { rank = "A"; msg = "EXCELLENT BATTLE!"; }
            else if (ratio >= 0.6) { rank = "B"; msg = "GREAT JOB!"; }
            else if (ratio >= 0.4) { rank = "C"; msg = "NOT BAD!"; }

            document.getElementById('final-rank').textContent = rank;
            document.getElementById('final-message').textContent = msg;
            
            if (ratio >= 0.8) {
                confetti({ particleCount: 200, spread: 80, origin: { y: 0.6 } });
            }
        }

        // --- AUDIO ENGINE ---
        const AudioEngine = {
            playTone: function(freq, type, duration, vol=0.1) {
                try {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, ctx.currentTime);
                    gain.gain.setValueAtTime(vol, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start();
                    osc.stop(ctx.currentTime + duration);
                } catch (e) {}
            },
            correct: function() {
                this.playTone(600, 'sine', 0.2);
                setTimeout(() => this.playTone(900, 'sine', 0.3), 100);
            },
            wrong: function() {
                this.playTone(300, 'sawtooth', 0.3);
            }
        };

        // Initialize
        window.onload = async () => {
            await requireAuth();
            initTheme();
            await loadData();
            lucide.createIcons();
        };
    </script>
</body>
</html>
