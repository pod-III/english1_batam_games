    <script>
        // --- IndexedDB Wrapper ---
        const DB_NAME = "E1ThisOrThatDB";
        const DB_VERSION = 1;
        const STORE_NAME = "gameData";

        function openDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        db.createObjectStore(STORE_NAME, { keyPath: "id" });
                    }
                };
                request.onsuccess = (e) => resolve(e.target.result);
                request.onerror = (e) => reject(e.target.error);
            });
        }

        async function saveGameData(data) {
            const db = await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, "readwrite");
                const store = tx.objectStore(STORE_NAME);
                const request = store.put({ id: "savedGame", questions: data });
                request.onsuccess = () => resolve();
                request.onerror = (e) => reject(e.target.error);
            });
        }

        async function loadGameData() {
            const db = await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, "readonly");
                const store = tx.objectStore(STORE_NAME);
                const request = store.get("savedGame");
                request.onsuccess = (e) => resolve(e.target.result ? e.target.result.questions : null);
                request.onerror = (e) => reject(e.target.error);
            });
        }
        // --- End IndexedDB Wrapper ---

                { question: "Dinosaur?", options: ["T-Rex", "Triceratops", "Pterodactyl", "Stegosaurus"], images: [] },
                { question: "Space?", options: ["Earth", "Mars", "Jupiter", "Saturn"], images: [] },
                { question: "Transport?", options: ["Bus", "Train", "Plane", "Car"], images: [] }
            ]
        };

        let questions = [];
        let editorData = [];
        let currentIndex = 0;
        let isMuted = localStorage.getItem("e1_mute") === "true";

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(type) {
            if (isMuted) return;
            if (audioCtx.state === "suspended") audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            const t = audioCtx.currentTime;

            if (type === "click") {
                osc.type = "sine";
                osc.frequency.setValueAtTime(400, t);
                osc.frequency.exponentialRampToValueAtTime(100, t + 0.1);
                gain.gain.setValueAtTime(0.1, t);
                gain.gain.linearRampToValueAtTime(0, t + 0.1);
                osc.start(t); osc.stop(t + 0.1);
            } else if (type === "pop") {
                osc.type = "triangle";
                osc.frequency.setValueAtTime(200, t);
                osc.frequency.linearRampToValueAtTime(400, t + 0.1);
                gain.gain.setValueAtTime(0.1, t);
                gain.gain.linearRampToValueAtTime(0, t + 0.15);
                osc.start(t); osc.stop(t + 0.15);
            }
        }

        function toggleSound() {
            isMuted = !isMuted;
            localStorage.setItem("e1_mute", isMuted);
            updateSoundIcon();
            if (!isMuted) playSound("click");
        }

        function updateSoundIcon() {
            const btn = document.getElementById("soundBtn");
            if (isMuted) {
                btn.innerHTML = '<i data-lucide="volume-x" class="w-6 h-6 text-gray-400"></i>';
                btn.classList.add("bg-gray-100");
            } else {
                btn.innerHTML = '<i data-lucide="volume-2" class="w-6 h-6 text-e1dark"></i>';
                btn.classList.remove("bg-gray-100");
            }
            lucide.createIcons();
        }

        function customAlert(msg) {
            playSound("click");
            document.getElementById("customAlertMessage").innerText = msg;
            document.getElementById("customAlertModal").classList.remove("hidden");
        }
        function closeCustomAlert() {
            playSound("click");
            document.getElementById("customAlertModal").classList.add("hidden");
        }

        let confirmCallback = null;
        function customConfirm(msg, callback) {
            playSound("click");
            document.getElementById("customConfirmMessage").innerText = msg;
            confirmCallback = callback;
            document.getElementById("customConfirmModal").classList.remove("hidden");
        }
        function closeCustomConfirm(result) {
            playSound("click");
            document.getElementById("customConfirmModal").classList.add("hidden");
            if (result && confirmCallback) confirmCallback();
            confirmCallback = null;
        }

        async function init() {
            updateSoundIcon();
            lucide.createIcons();

            try {
                const savedData = await loadGameData();
                if (savedData) {
                    questions = savedData;
                } else {
                    questions = [];
                }
            } catch (error) {
                console.error("Failed to load from IndexedDB:", error);
                questions = [];
            }
        }

        function getIcon(text) {
            const lower = text.toLowerCase();
            for (const key in ICON_MAP) {
                if (lower.includes(key)) return ICON_MAP[key];
            }
            return "circle";
        }

        function openSetupModal() {
            playSound("click");
            if (questions.length === 0) {
                editorData = [{ question: "", options: ["", ""], images: [] }];
            } else {
                editorData = JSON.parse(JSON.stringify(questions));
                editorData.forEach(slide => {
                    if (!slide.images) slide.images = [];
                });
            }
            renderBuilder();
            document.getElementById("setupModal").classList.remove("hidden");
        }

        function closeSetupModal() {
            playSound("click");
            document.getElementById("setupModal").classList.add("hidden");
        }

        function loadPreset(key) {
            playSound("click");
            editorData = JSON.parse(JSON.stringify(PRESETS[key]));
            renderBuilder();
        }

        function loadBlank() {
            playSound("click");
            editorData = [{ question: "", options: ["", ""], images: [] }];
            renderBuilder();
        }

        // --- EXPORT / IMPORT FUNCTIONS ---
        function exportGameData() {
            playSound("click");
            if (editorData.length === 0) {
                customAlert("There is no data to export!");
                return;
            }

            const dataStr = JSON.stringify(editorData);
            const blob = new Blob([dataStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);

            const a = document.createElement("a");
            a.href = url;
            a.download = "this-or-that-batam.json";
            document.body.appendChild(a);
            a.click();

            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function handleImport(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function (e) {
                try {
                    const importedData = JSON.parse(e.target.result);

                    if (Array.isArray(importedData) && importedData[0].hasOwnProperty("options")) {
                        editorData = importedData;

                        editorData.forEach(slide => {
                            if (!slide.images) slide.images = [];
                        });

                        renderBuilder();
                        customAlert("Game imported successfully!");
                    } else {
                        customAlert("Invalid game file. Please select a correct This or That .json file.");
                    }
                } catch (err) {
                    customAlert("Error reading the file. Make sure it is a valid JSON game file.");
                }
                event.target.value = '';
            };
            reader.readAsText(file);
        }
        // --- END EXPORT / IMPORT ---

        function handleImageUpload(event, sIdx, oIdx) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function (e) {
                const img = new Image();
                img.onload = function () {
                    const canvas = document.createElement('canvas');
                    const MAX_SIZE = 600;
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > MAX_SIZE) {
                            height *= MAX_SIZE / width;
                            width = MAX_SIZE;
                        }
                    } else {
                        if (height > MAX_SIZE) {
                            width *= MAX_SIZE / height;
                            height = MAX_SIZE;
                        }
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);

                    const dataUrl = canvas.toDataURL('image/jpeg', 0.85);

                    if (!editorData[sIdx].images) editorData[sIdx].images = [];
                    editorData[sIdx].images[oIdx] = dataUrl;
                    renderBuilder();
                }
                img.src = e.target.result;
            }
            reader.readAsDataURL(file);
        }

        function renderBuilder() {
            const container = document.getElementById("builderContainer");
            container.innerHTML = "";

            editorData.forEach((slide, sIdx) => {
                if (!slide.images) slide.images = [];
                const card = document.createElement("div");
                card.className = "bg-white p-5 rounded-2xl border-4 border-e1dark shadow-[4px_4px_0_#1e293b] relative group";

                let html = `
                    <div class="flex justify-between items-center mb-4">
                        <div class="flex items-center gap-2 w-full">
                            <span class="bg-e1dark text-white font-display text-xs w-6 h-6 rounded flex items-center justify-center shrink-0">${sIdx + 1}</span>
                            <input type="text" value="${slide.question}" onchange="updateQuestion(${sIdx}, this.value)" placeholder="Enter Question or Category..." class="font-display text-lg w-full bg-transparent border-b-2 border-dashed border-gray-300 focus:border-e1blue outline-none px-2 py-1 text-e1dark">
                        </div>
                        <div class="flex gap-2 shrink-0 ml-4">
                            <button onclick="deleteSlide(${sIdx})" title="Delete" class="btn-push w-8 h-8 rounded-lg bg-red-50 text-red-500 border-2 border-red-200 hover:border-red-500 hover:bg-red-500 hover:text-white flex items-center justify-center transition-colors">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                    `;

                slide.options.forEach((opt, oIdx) => {
                    const hasImg = slide.images[oIdx];
                    html += `
                        <div class="flex items-center relative">
                            <div class="absolute left-3 w-3 h-3 rounded-full ${COLORS[oIdx % COLORS.length]} border-2 border-e1dark z-10"></div>
                            
                            <input type="text" value="${opt}" onchange="updateOption(${sIdx}, ${oIdx}, this.value)" placeholder="Option ${oIdx + 1}" class="w-full bg-gray-50 border-2 border-e1dark rounded-xl pl-8 pr-[100px] py-2 font-bold text-sm focus:bg-white focus:border-e1blue outline-none text-gray-700">
                            
                            <div class="absolute right-8 flex items-center gap-2">
                                ${hasImg ? `<img src="${hasImg}" class="w-6 h-6 rounded border border-e1dark object-cover shadow-sm">` : ''}
                                <label class="cursor-pointer text-gray-400 hover:text-e1blue transition-colors" title="Upload Image">
                                    <i data-lucide="image" class="w-5 h-5"></i>
                                    <input type="file" accept="image/*" class="hidden" onchange="handleImageUpload(event, ${sIdx}, ${oIdx})">
                                </label>
                            </div>

                            ${slide.options.length > 2 ? `<button onclick="deleteOption(${sIdx}, ${oIdx})" class="absolute right-2 text-gray-400 hover:text-red-500"><i data-lucide="x" class="w-4 h-4"></i></button>` : ""}
                        </div>
                    `;
                });

                if (slide.options.length < 5) {
                    html += `
                        <button onclick="addOption(${sIdx})" class="btn-push flex items-center justify-center gap-2 border-2 border-dashed border-gray-300 rounded-xl py-2 text-gray-400 font-bold text-sm hover:border-e1blue hover:text-e1blue bg-gray-50 hover:bg-blue-50">
                            <i data-lucide="plus" class="w-4 h-4"></i> Add Option
                        </button>
                    `;
                }

                html += `</div>`;
                card.innerHTML = html;
                container.appendChild(card);
            });

            if (editorData.length === 0) {
                container.innerHTML = `<div class="text-center py-10 text-gray-400 font-bold"><i data-lucide="folder-open" class="w-12 h-12 mx-auto mb-2 opacity-50"></i>No slides added yet.</div>`;
            }
            lucide.createIcons();
        }

        function updateQuestion(sIdx, val) { editorData[sIdx].question = val; }
        function updateOption(sIdx, oIdx, val) { editorData[sIdx].options[oIdx] = val; }

        function addOption(sIdx) {
            if (editorData[sIdx].options.length < 5) {
                editorData[sIdx].options.push("");
                renderBuilder();
            }
        }

        function deleteOption(sIdx, oIdx) {
            if (editorData[sIdx].options.length > 2) {
                editorData[sIdx].options.splice(oIdx, 1);
                editorData[sIdx].images.splice(oIdx, 1);
                renderBuilder();
            }
        }

        function addNewSlide() {
            editorData.push({ question: "", options: ["", ""], images: [] });
            renderBuilder();
            const scrollContainer = document.getElementById("builderScrollArea");
            setTimeout(() => { scrollContainer.scrollTo({ top: scrollContainer.scrollHeight, behavior: "smooth" }); }, 50);
        }

        function deleteSlide(sIdx) {
            customConfirm("Are you sure you want to delete this slide?", () => {
                editorData.splice(sIdx, 1);
                renderBuilder();
            });
        }

        async function saveAndStart() {
            const validData = editorData.filter(
                (s) => s.question.trim() !== "" && s.options.every((o) => o.trim() !== "")
            );
            if (validData.length === 0) {
                customAlert("Please add at least one valid slide with completed options before saving.");
                return;
            }
            questions = validData;

            try {
                await saveGameData(questions);
                closeSetupModal();
                startGame();
            } catch (error) {
                customAlert("Failed to save to browser database. Try clearing some data.");
                console.error("IndexedDB Save Error:", error);
            }
        }

        function startGame() {
            if (questions.length === 0) {
                customAlert("Your game is empty! Let's build one first.");
                openSetupModal();
                return;
            }
            currentIndex = 0;
            document.getElementById("startScreen").classList.add("hidden");
            document.getElementById("endScreen").classList.add("hidden");
            document.getElementById("gameScreen").classList.remove("hidden");
            renderSlide();
        }

        function renderSlide() {
            const container = document.getElementById("optionsContainer");
            container.innerHTML = "";
            const data = questions[currentIndex];
            if (!data) { endGame(); return; }

            document.getElementById("questionText").innerText = data.question;
            document.getElementById("slideCounter").innerText = `${currentIndex + 1}/${questions.length}`;

            data.options.forEach((optText, idx) => {
                const colorClass = COLORS[idx % COLORS.length];
                const iconClass = getIcon(optText);
                const imgSrc = data.images && data.images[idx];

                const panel = document.createElement("div");
                let borderClass = "border-b-4 md:border-b-0 md:border-r-4 border-e1dark";
                if (idx === data.options.length - 1) borderClass = "";

                panel.className = `${colorClass} ${borderClass} option-panel flex-1 relative flex flex-col items-center justify-center p-2 md:p-6 overflow-hidden cursor-pointer`;
                panel.style.animation = `slideUp 0.6s cubic-bezier(0.2, 1, 0.3, 1) forwards`;
                panel.style.animationDelay = `${idx * 0.1}s`;
                panel.style.opacity = "0";

                let backgroundLayer = '';
                let contentLayer = '';

                if (imgSrc) {
                    // IMAGE MODE: Duotone Background (Gray Image + Color Mix Blend)
                    backgroundLayer = `
                            <div class="absolute inset-0 z-0 overflow-hidden">
                                <img src="${imgSrc}" class="bg-image-layer w-full h-full object-cover opacity-60 mix-blend-multiply grayscale transition-transform duration-700 pointer-events-none">
                            </div>
                            <div class="absolute inset-0 bg-gradient-to-t from-black/40 via-transparent to-black/10 z-0 pointer-events-none"></div> 
                        `;

                    // Text Only (No Circle)
                    contentLayer = `
                            <div class="relative z-10 flex flex-col items-center justify-center h-full px-4">
                                <h2 class="font-display font-bold text-4xl md:text-7xl text-white drop-shadow-[4px_4px_0_rgba(30,41,59,1)] uppercase tracking-wide text-center leading-tight">
                                    ${optText}
                                </h2>
                            </div>
                        `;
                } else {
                    // ICON MODE: Classic Circle Design
                    backgroundLayer = `<div class="absolute inset-0 bg-dots opacity-20 pointer-events-none"></div>`;
                    contentLayer = `
                            <div class="relative z-10 flex flex-row md:flex-col items-center gap-4 md:gap-6 panel-icon transition-transform duration-300">
                                <div class="w-24 h-24 md:w-32 md:h-32 bg-white/20 rounded-full border-4 border-white/40 shadow-lg flex items-center justify-center backdrop-blur-sm flex-shrink-0 overflow-hidden">
                                    <i data-lucide="${iconClass}" class="w-12 h-12 md:w-16 md:h-16 text-white drop-shadow-md"></i>
                                </div>
                                <h2 class="font-display font-bold text-2xl md:text-5xl text-white drop-shadow-[4px_4px_0_rgba(0,0,0,0.3)] uppercase tracking-wide text-center leading-tight">
                                    ${optText}
                                </h2>
                            </div>
                        `;
                }

                panel.innerHTML = backgroundLayer + contentLayer;
                panel.onclick = () => { playSound("pop"); };
                container.appendChild(panel);
            });

            lucide.createIcons();
            playSound("pop");
        }

        function nextSlide() {
            if (currentIndex < questions.length - 1) { currentIndex++; renderSlide(); }
            else { endGame(); }
        }

        function prevSlide() {
            if (currentIndex > 0) { currentIndex--; renderSlide(); }
            else { playSound("click"); }
        }

        function endGame() {
            playSound("pop");
            document.getElementById("gameScreen").classList.add("hidden");
            document.getElementById("endScreen").classList.remove("hidden");
        }

        function resetGame() {
            playSound("click");
            document.getElementById("endScreen").classList.add("hidden");
            startGame();
        }

        document.addEventListener("keydown", (e) => {
            if (document.getElementById("gameScreen").classList.contains("hidden")) return;
            if (e.key === "ArrowRight" || e.key === " " || e.key === "Enter") nextSlide();
            if (e.key === "ArrowLeft") prevSlide();
        });

        init();
    </script>
</body>

</html>
