<!DOCTYPE html>
<html lang="en" class="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fill in the Blanks Game - Teacher Edition</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        pink: 'var(--color-pink)',
                        orange: 'var(--color-orange)',
                        green: 'var(--color-green)',
                        blue: 'var(--color-blue)',
                        dark: 'var(--color-dark)',
                        chalk: 'var(--color-chalk)',
                    },
                    fontFamily: {
                        fredoka: ['Fredoka', 'sans-serif'],
                        nunito: ['Nunito', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <link
        href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Nunito:wght@400;600;700&display=swap"
        rel="stylesheet">

    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* Input styling for the game board */
        .blank-input {
            width: 140px;
            text-align: center;
            border-bottom-width: var(--border-width-thick);
            border-color: var(--border-primary);
            background: transparent;
            outline: none;
            font-weight: 800;
            color: var(--color-blue);
            margin: 0 10px;
            transition: border-color var(--transition-fast), color var(--transition-fast);
        }

        .blank-input:focus {
            border-color: var(--color-pink);
            color: var(--color-pink);
        }

        .dark .blank-input {
            border-color: var(--text-primary);
            color: var(--color-pink);
        }

        .dark .blank-input:focus {
            border-color: var(--color-green);
            color: var(--color-green);
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            10%,
            30%,
            50%,
            70%,
            90% {
                transform: translateX(-5px);
            }

            20%,
            40%,
            60%,
            80% {
                transform: translateX(5px);
            }
        }

        .animate-shake {
            animation: shake 0.5s ease-in-out;
        }

        .correct-feedback {
            border-color: var(--color-green) !important;
            color: var(--color-green) !important;
            box-shadow: 0 0 15px var(--color-green) !important;
            transform: scale(1.05);
            transition: all 0.3s ease;
        }

        .wrong-feedback {
            border-color: var(--color-pink) !important;
            color: var(--color-pink) !important;
            box-shadow: 0 0 15px var(--color-pink) !important;
            transition: all 0.3s ease;
        }

        /* Scrollbar styling for the editor */
        .editor-scroll::-webkit-scrollbar {
            width: 12px;
        }

        .editor-scroll::-webkit-scrollbar-track {
            background: var(--bg-primary);
            border-left: var(--border-width-thick) solid var(--border-primary);
        }

        .editor-scroll::-webkit-scrollbar-thumb {
            background-color: var(--color-orange);
            border: var(--border-width-thick) solid var(--border-primary);
            border-radius: 10px;
        }
    </style>
    <link rel="stylesheet" href="../../css/base.css" />
    <link rel="stylesheet" href="../../css/components.css" />
</head>

<body class="min-h-screen flex flex-col items-center py-10 px-4">

    <input type="file" id="import-file" accept=".json" class="hidden" onchange="importJSON(event)">

    <div class="w-full max-w-5xl flex justify-between items-center mb-10">
        <button id="theme-btn" onclick="toggleDarkMode()"
            class="btn-chunky bg-blue text-white rounded-[var(--radius-xl)] px-5 py-3 gap-2">
            <i data-lucide="moon" class="w-5 h-5"></i> <span id="theme-text">Blackboard Role</span>
        </button>
        <div
            class="glass-panel flex-1 max-w-[200px] justify-center text-center rounded-[var(--radius-xl)] px-6 py-3 font-fredoka text-2xl flex items-center gap-3">
            <i data-lucide="star" class="text-orange w-6 h-6 fill-current animate-[pulse_2s_infinite]"></i>
            Score: <span id="score-display">0</span>
        </div>
        <button onclick="openManageModal()"
            class="btn-chunky bg-orange text-dark rounded-[var(--radius-xl)] px-5 py-3 gap-2">
            <i data-lucide="settings" class="w-5 h-5"></i> Manage Questions
        </button>
    </div>

    <main class="w-full max-w-3xl hub-card p-10 text-center relative mt-8">
        <h1 class="font-fredoka text-5xl mb-4 text-pink drop-shadow-sm uppercase tracking-tight">Fill in the Blanks!
        </h1>
        <p class="text-xl mb-10 font-nunito text-[var(--text-secondary)] font-bold">Read carefully and type the missing
            word.</p>

        <div
            class="bg-[var(--bg-tertiary)] border-[var(--border-width-thick)] border-[var(--border-primary)] rounded-[var(--radius-2xl)] p-8 mb-10 shadow-[var(--shadow-md)] min-h-[160px] flex items-center justify-center">
            <p id="sentence-container" class="text-3xl font-nunito leading-loose font-bold"></p>
        </div>

        <div class="flex gap-6">
            <button onclick="skipQuestion()"
                class="btn-chunky bg-chalk text-dark text-xl px-6 py-4 rounded-[var(--radius-xl)] gap-2">
                <i data-lucide="skip-forward"></i> Skip
            </button>
            <button onclick="checkAnswer()"
                class="btn-chunky flex-1 bg-green text-dark text-3xl px-8 py-4 rounded-[var(--radius-xl)] w-full">
                Submit Answer
            </button>
        </div>
    </main>

    <div id="manage-modal"
        class="fixed inset-0 bg-[var(--bg-secondary)] backdrop-blur-[16px] hidden flex items-center justify-center z-[var(--z-modal)] p-4">
        <div
            class="bg-[var(--surface-card)] border-[var(--border-width-thick)] border-[var(--border-primary)] rounded-[var(--radius-2xl)] w-full max-w-6xl h-[85vh] flex flex-col shadow-[var(--shadow-xl)] animate-[pop-in_0.3s_ease-out]">

            <div
                class="border-b-[var(--border-width-thick)] border-[var(--border-primary)] p-6 flex justify-between items-center bg-[var(--bg-tertiary)] rounded-t-[calc(var(--radius-2xl)-var(--border-width-thick))]">
                <div>
                    <h2 class="font-fredoka text-3xl text-blue flex items-center gap-3">
                        <i data-lucide="edit-3" class="w-8 h-8"></i> Question Editor
                    </h2>
                    <p class="font-nunito text-sm mt-1">Use an underscore (_) in the sentence to create a blank. Edit
                        directly below.</p>
                </div>
                <div class="flex gap-4">
                    <button onclick="exportJSON()"
                        class="btn-chunky bg-blue text-white px-4 py-2 rounded-[var(--radius-lg)] gap-2">
                        <i data-lucide="download" class="w-5 h-5"></i> Export JSON
                    </button>
                    <button onclick="document.getElementById('import-file').click()"
                        class="btn-chunky bg-pink text-dark px-4 py-2 rounded-[var(--radius-lg)] gap-2">
                        <i data-lucide="upload" class="w-5 h-5"></i> Import JSON
                    </button>
                    <button onclick="closeManageModal()" class="stick-btn ml-4">
                        <i data-lucide="x"></i>
                    </button>
                </div>
            </div>

            <div id="editor-list" class="flex-1 overflow-y-auto editor-scroll p-6 space-y-4 bg-[var(--bg-primary)]">
            </div>

            <div
                class="border-t-[var(--border-width-thick)] border-[var(--border-primary)] p-6 flex gap-4 bg-[var(--bg-tertiary)] rounded-b-[calc(var(--radius-2xl)-var(--border-width-thick))]">
                <button onclick="addNewRow()"
                    class="btn-chunky bg-orange text-dark text-lg px-6 py-3 rounded-[var(--radius-xl)] gap-2">
                    <i data-lucide="plus"></i> Add New Row
                </button>
                <div class="flex-1"></div>
                <button onclick="resetData()"
                    class="btn-chunky bg-pink text-dark text-lg px-6 py-3 rounded-[var(--radius-xl)] gap-2">
                    <i data-lucide="trash-2"></i> Reset Data
                </button>
                <button onclick="closeManageModal()"
                    class="btn-chunky bg-[var(--bg-primary)] text-[var(--text-primary)] text-lg px-6 py-3 rounded-[var(--radius-xl)]">
                    Cancel
                </button>
                <button onclick="saveAllQuestions()"
                    class="btn-chunky bg-green text-dark text-lg px-8 py-3 rounded-[var(--radius-xl)] gap-2">
                    <i data-lucide="save"></i> Save Changes
                </button>
            </div>
        </div>
    </div>

    <div id="alert-modal"
        class="fixed inset-0 bg-[var(--bg-secondary)] backdrop-blur-[16px] hidden flex items-center justify-center z-[var(--z-modal)] p-4">
        <div
            class="glass-panel p-8 w-full max-w-md text-center transform transition-all rounded-[var(--radius-2xl)] animate-[pop-in_0.3s_ease-out]">
            <div id="alert-icon" class="flex justify-center mb-6"></div>
            <h2 id="alert-title" class="font-fredoka text-4xl mb-3"></h2>
            <p id="alert-message" class="font-nunito text-xl mb-8 leading-relaxed"></p>
            <button onclick="closeAlertAndNext()"
                class="btn-chunky bg-pink text-dark text-2xl w-full px-4 py-4 rounded-[var(--radius-xl)]">
                Got it!
            </button>
        </div>
    </div>

    <script>
        // Initialize Icons
        lucide.createIcons();

        // Default Curriculum
        const defaultQuestions = [
            { sentence: "The cat sat on the _.", answer: "mat" },
            { sentence: "She likes to _ a book every night.", answer: "read" },
            { sentence: "An apple a day keeps the _ away.", answer: "doctor" }
        ];

        let questions = [];
        let currentQuestionIndex = 0;
        let score = 0;
        let alertCallback = null;

        // --- Game Logic ---

        function initGame() {
            // Apply saved theme
            const savedTheme = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
            updateThemeButtonText(document.documentElement.classList.contains('dark'));

            const savedQuestions = localStorage.getItem('englishGameQuestions');
            const savedScore = localStorage.getItem('englishGameScore');

            if (savedQuestions) {
                questions = JSON.parse(savedQuestions);
            } else {
                questions = [...defaultQuestions];
                localStorage.setItem('englishGameQuestions', JSON.stringify(questions));
            }

            if (savedScore) {
                score = parseInt(savedScore);
                document.getElementById('score-display').innerText = score;
            }

            loadQuestion();
        }

        function loadQuestion() {
            if (questions.length === 0) {
                document.getElementById('sentence-container').innerHTML = `<span class="text-orange">No questions available! Please add or import some via 'Manage Questions'.</span>`;
                return;
            }

            currentQuestionIndex = Math.floor(Math.random() * questions.length);
            const currentQ = questions[currentQuestionIndex];

            const parts = currentQ.sentence.split('_');
            if (parts.length === 1) parts.push('');

            const formattedHTML = parts[0] + '<input type="text" id="answer-input" class="blank-input" autocomplete="off">' + (parts[1] || '');

            document.getElementById('sentence-container').innerHTML = formattedHTML;

            setTimeout(() => {
                const input = document.getElementById('answer-input');
                if (input) input.focus();
            }, 100);
        }

        function checkAnswer() {
            if (questions.length === 0) return;

            const inputEl = document.getElementById('answer-input');
            if (!inputEl) return;

            const userAnswer = inputEl.value.trim().toLowerCase();
            const correctAnswer = questions[currentQuestionIndex].answer.toLowerCase();

            if (userAnswer === correctAnswer) {
                score += 10;
                updateScore();
                inputEl.classList.add('correct-feedback');
                setTimeout(() => {
                    showAlert("Correct!", "Awesome job! Keep going.", "text-green", "check-circle", loadQuestion);
                }, 300);
            } else {
                inputEl.classList.add('wrong-feedback', 'animate-shake');
                setTimeout(() => {
                    inputEl.classList.remove('wrong-feedback', 'animate-shake');
                    showAlert("Not Quite!", `The correct word was "${correctAnswer}".`, "text-pink", "x-circle", loadQuestion);
                }, 600);
            }
        }

        // --- Data Reset ---
        function resetData() {
            if (confirm("Are you sure you want to reset to default questions and wipe your score? This cannot be undone.")) {
                localStorage.removeItem('englishGameQuestions');
                localStorage.removeItem('englishGameScore');
                questions = [...defaultQuestions];
                score = 0;
                document.getElementById('score-display').innerText = score;
                renderEditorList();
                loadQuestion();
                closeManageModal();
            }
        }

        function skipQuestion() {
            loadQuestion();
        }

        function updateScore() {
            localStorage.setItem('englishGameScore', score);
            document.getElementById('score-display').innerText = score;
        }

        // --- Question Manager Logic ---

        function openManageModal() {
            renderEditorList();
            document.getElementById('manage-modal').classList.remove('hidden');
        }

        function closeManageModal() {
            document.getElementById('manage-modal').classList.add('hidden');
        }

        function renderEditorList() {
            const listContainer = document.getElementById('editor-list');
            listContainer.innerHTML = '';

            if (questions.length === 0) {
                listContainer.innerHTML = `<div class="text-center font-nunito text-lg p-6">No questions found. Add a new row below!</div>`;
                return;
            }

            questions.forEach((q, index) => {
                const row = document.createElement('div');
                row.className = "flex gap-4 items-center bg-chalk dark:bg-slate-800 p-4 border-3 border-dark dark:border-slate-400 rounded-xl brutal-shadow editor-row";

                row.innerHTML = `
                    <div class="flex-1 flex gap-4">
                        <div class="flex-1">
                            <label class="block text-xs font-bold mb-1 opacity-70">Sentence (use _ for blank)</label>
                            <input type="text" value="${q.sentence.replace(/"/g, '&quot;')}" class="input-chunky w-full p-3 font-nunito outline-none row-sentence">
                        </div>
                        <div class="w-1/3">
                            <label class="block text-xs font-bold mb-1 opacity-70">Answer</label>
                            <input type="text" value="${q.answer.replace(/"/g, '&quot;')}" class="input-chunky w-full p-3 font-nunito outline-none row-answer">
                        </div>
                    </div>
                    <button onclick="deleteRow(this)" class="stick-btn bg-pink text-dark self-end mb-[2px]">
                        <i data-lucide="trash-2" class="w-5 h-5"></i>
                    </button>
                `;
                listContainer.appendChild(row);
            });
            lucide.createIcons();
        }

        function addNewRow() {
            const listContainer = document.getElementById('editor-list');

            if (listContainer.querySelector('.text-center')) {
                listContainer.innerHTML = '';
            }

            const row = document.createElement('div');
            row.className = "flex gap-4 items-center bg-chalk dark:bg-slate-800 p-4 border-3 border-dark dark:border-slate-400 rounded-xl brutal-shadow editor-row";
            row.innerHTML = `
                <div class="flex-1 flex gap-4">
                    <div class="flex-1">
                        <label class="block text-xs font-bold mb-1 opacity-70">Sentence (use _ for blank)</label>
                        <input type="text" placeholder="The sky is _ today." class="input-chunky w-full p-3 font-nunito outline-none row-sentence">
                    </div>
                    <div class="w-1/3">
                        <label class="block text-xs font-bold mb-1 opacity-70">Answer</label>
                        <input type="text" placeholder="blue" class="input-chunky w-full p-3 font-nunito outline-none row-answer">
                    </div>
                </div>
                <button onclick="deleteRow(this)" class="stick-btn bg-pink text-dark self-end mb-[2px]">
                    <i data-lucide="trash-2" class="w-5 h-5"></i>
                </button>
            `;
            listContainer.appendChild(row);
            lucide.createIcons();

            listContainer.scrollTop = listContainer.scrollHeight;
        }

        function deleteRow(btn) {
            btn.closest('.editor-row').remove();
        }

        function saveAllQuestions() {
            const rows = document.querySelectorAll('.editor-row');
            const newQuestions = [];
            let hasError = false;

            rows.forEach((row, index) => {
                const sentence = row.querySelector('.row-sentence').value.trim();
                const answer = row.querySelector('.row-answer').value.trim();

                if (sentence === '' && answer === '') return;

                if (sentence === '' || answer === '') {
                    hasError = true;
                    return;
                }

                if (!sentence.includes('_')) {
                    hasError = true;
                    return;
                }

                newQuestions.push({ sentence, answer });
            });

            if (hasError) {
                showAlert("Formatting Error", "Make sure all filled rows have both a sentence and an answer, and every sentence includes an underscore (_).", "text-orange", "alert-triangle");
                return;
            }

            questions = newQuestions;
            localStorage.setItem('englishGameQuestions', JSON.stringify(questions));
            closeManageModal();
            showAlert("Saved!", "Your questions have been successfully updated.", "text-blue", "save", loadQuestion);
        }

        // --- JSON Export / Import ---

        function exportJSON() {
            if (questions.length === 0) {
                showAlert("No Data", "There are no questions to export.", "text-orange", "alert-circle");
                return;
            }

            const dataStr = JSON.stringify(questions, null, 2);
            const blob = new Blob([dataStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);

            const a = document.createElement('a');
            a.href = url;
            a.download = "english_blanks_questions.json";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            showAlert("Exported!", "Your question set has been downloaded successfully.", "text-blue", "download");
        }

        function importJSON(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function (e) {
                try {
                    const importedData = JSON.parse(e.target.result);

                    if (Array.isArray(importedData)) {
                        const isValid = importedData.every(q => q.sentence && q.answer && typeof q.sentence === 'string' && q.sentence.includes('_'));

                        if (isValid) {
                            questions = importedData;
                            localStorage.setItem('englishGameQuestions', JSON.stringify(questions));
                            renderEditorList();
                            showAlert("Imported!", "Questions successfully loaded from the JSON file.", "text-green", "check-circle", loadQuestion);
                        } else {
                            showAlert("Invalid Data", "The JSON file must contain valid sentences with an underscore (_) and an answer.", "text-pink", "alert-triangle");
                        }
                    } else {
                        showAlert("Invalid Format", "The JSON file must be an array of questions.", "text-pink", "alert-triangle");
                    }
                } catch (err) {
                    showAlert("Error", "Could not parse the JSON file. Ensure it is formatted correctly.", "text-pink", "x-octagon");
                }

                // Reset input to allow re-uploading the same file if needed
                event.target.value = '';
            };
            reader.readAsText(file);
        }

        // --- Custom Alert Logic ---

        function showAlert(title, message, colorClass, iconName, callback = null) {
            alertCallback = callback;

            document.getElementById('alert-title').innerText = title;
            document.getElementById('alert-title').className = `font-fredoka text-4xl mb-3 ${colorClass}`;
            document.getElementById('alert-message').innerText = message;

            const iconHtml = `<i data-lucide="${iconName}" class="w-16 h-16 ${colorClass}"></i>`;
            document.getElementById('alert-icon').innerHTML = iconHtml;
            lucide.createIcons();

            document.getElementById('alert-modal').classList.remove('hidden');
        }

        function closeAlertAndNext() {
            document.getElementById('alert-modal').classList.add('hidden');
            if (alertCallback) {
                alertCallback();
                alertCallback = null;
            }
        }

        // --- Utilities ---

        function toggleDarkMode() {
            const html = document.documentElement;
            html.classList.toggle('dark');
            const isDark = html.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeButtonText(isDark);
        }

        function updateThemeButtonText(isDark) {
            const btnText = document.getElementById('theme-text');
            const btnIcon = document.querySelector('button[onclick="toggleDarkMode()"] i');
            if (btnText) btnText.innerText = isDark ? 'Light Mode' : 'Blackboard Role';
            if (btnIcon) btnIcon.setAttribute('data-lucide', isDark ? 'sun' : 'moon');
            lucide.createIcons();
        }

        // Initialize on load
        window.onload = initGame;

        // Listen for "Enter" key on game input
        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                const gameInput = document.getElementById('answer-input');
                if (document.activeElement === gameInput) {
                    checkAnswer();
                }
            }
        });
    </script>
</body>

</html>
