<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reveal Picture: English 1 Batam</title>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@400;700;900&family=JetBrains+Mono:wght@500;700&display=swap"
        rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        // Brand Palette
                        pink: '#FF6B95',   // Playful
                        orange: '#FF8C42', // Energy
                        green: '#00E676',  // Success
                        blue: '#2979FF',   // Logic

                        // UI Neutrals
                        dark: '#0f172a',   // OLED Navy Dark Mode Basis
                        chalk: '#f8fafc',  // Backgrounds
                        surface: 'rgba(255, 255, 255, 0.85)',
                        border: 'rgba(203, 213, 225, 0.6)',
                    },
                    fontFamily: {
                        heading: ['Fredoka', 'sans-serif'],
                        body: ['Nunito', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    boxShadow: {
                        'neo': '4px 4px 0px 0px rgba(51, 65, 85, 0.15)',
                        'neo-sm': '2px 2px 0px 0px rgba(51, 65, 85, 0.15)',
                        'neo-lg': '8px 8px 0px 0px rgba(51, 65, 85, 0.15)',
                        'inner-neo': 'inset 3px 3px 0px 0px rgba(203, 213, 225, 0.3)',
                    },
                    animation: {
                        'float-1': 'float-icon-1 20s infinite linear',
                        'float-2': 'float-icon-2 25s infinite linear reverse',
                        'float-3': 'float-icon-3 15s infinite linear',
                    },
                    keyframes: {
                        'float-icon-1': {
                            '0%': { transform: 'translate(0, 0) rotate(0deg)' },
                            '33%': { transform: 'translate(30px, -50px) rotate(120deg)' },
                            '66%': { transform: 'translate(-20px, 20px) rotate(240deg)' },
                            '100%': { transform: 'translate(0, 0) rotate(360deg)' },
                        },
                        'float-icon-2': {
                            '0%': { transform: 'translate(0, 0) rotate(0deg)' },
                            '50%': { transform: 'translate(-40px, -30px) rotate(-180deg)' },
                            '100%': { transform: 'translate(0, 0) rotate(-360deg)' },
                        },
                        'float-icon-3': {
                            '0%': { transform: 'translate(0, 0) scale(1)' },
                            '50%': { transform: 'translate(20px, 40px) scale(1.2)' },
                            '100%': { transform: 'translate(0, 0) scale(1)' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        .bg-float-icon {
            color: rgba(203, 213, 225, 0.4);
            opacity: 0.3;
            position: fixed;
            z-index: 0;
            pointer-events: none;
        }

        html.dark .bg-float-icon {
            opacity: 0.15;
            color: white;
        }

        body {
            font-family: 'Nunito', sans-serif;
            overflow: hidden;
            background-color: #f8fafc;
            /* Chalk */
            background-image:
                linear-gradient(#e2e8f0 1.5px, transparent 1.5px),
                linear-gradient(90deg, #e2e8f0 1.5px, transparent 1.5px);
            background-size: 30px 30px;
            color: #1e293b;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.3s, color 0.3s;
        }

        /* --- DARK MODE BASE --- */
        html.dark body {
            background-color: #020617;
            /* OLED Navy */
            background-image:
                linear-gradient(#0f172a 1.5px, transparent 1.5px),
                linear-gradient(90deg, #0f172a 1.5px, transparent 1.5px);
            color: #e2e8f0;
        }

        /* --- UI COMPONENTS --- */
        .glass-panel {
            background: var(--tw-color-surface, rgba(255, 255, 255, 0.85));
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }

        html.dark .glass-panel {
            background: rgba(15, 23, 42, 0.8);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .console-frame {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(203, 213, 225, 0.6);
            border-radius: 1.5rem;
            box-shadow: 8px 8px 0px rgba(51, 65, 85, 0.15);
            display: flex;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        html.dark .console-frame {
            background: rgba(15, 23, 42, 0.8);
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: 8px 8px 0px rgba(0, 0, 0, 0.4);
        }

        /* Chunky Button Style -> Neo Button Style */
        .btn-chunky {
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: translateY(0);
            position: relative;
            border: 1px solid rgba(203, 213, 225, 0.6);
            box-shadow: 4px 4px 0 rgba(51, 65, 85, 0.15);
            font-family: 'Fredoka', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        html.dark .btn-chunky {
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: 4px 4px 0 rgba(0, 0, 0, 0.4);
            background-color: rgba(30, 41, 59, 0.8);
            color: #e2e8f0;
        }

        html.dark .btn-chunky.bg-white {
            background-color: rgba(30, 41, 59, 0.8);
            color: #e2e8f0;
        }

        .btn-chunky:hover:not(:disabled) {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0 rgba(51, 65, 85, 0.15);
            filter: brightness(105%);
        }

        html.dark .btn-chunky:hover:not(:disabled) {
            box-shadow: 6px 6px 0 rgba(0, 0, 0, 0.4);
        }

        .btn-chunky:active:not(:disabled) {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0 rgba(51, 65, 85, 0.15) !important;
        }

        html.dark .btn-chunky:active:not(:disabled) {
            box-shadow: 2px 2px 0 rgba(0, 0, 0, 0.4) !important;
        }

        .btn-chunky:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: translateY(2px);
            box-shadow: 0 0 0 rgba(51, 65, 85, 0.15);
            filter: grayscale(100%);
        }

        /* Range Slider Styling */
        input[type=range] {
            -webkit-appearance: none;
            appearance: none;
            background: transparent;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: white;
            border: 2px solid #FF8C42;
            margin-top: -8px;
            cursor: pointer;
            box-shadow: 2px 2px 0px rgba(51, 65, 85, 0.15);
            transition: transform 0.1s;
        }

        html.dark input[type=range]::-webkit-slider-thumb {
            background: #0f172a;
            border-color: #FF8C42;
            box-shadow: 2px 2px 0px rgba(0, 0, 0, 0.4);
        }

        input[type=range]::-webkit-slider-thumb:hover {
            transform: scale(1.1);
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 8px;
            background: rgba(203, 213, 225, 0.6);
            border: 1px solid rgba(203, 213, 225, 0.8);
            border-radius: 99px;
        }

        html.dark input[type=range]::-webkit-slider-runnable-track {
            background: rgba(30, 41, 59, 0.8);
            border-color: rgba(255, 255, 255, 0.1);
        }

        /* --- GAME BOARD --- */
        .retro-window {
            border: 1px solid rgba(203, 213, 225, 0.6);
            border-radius: 1.5rem;
            box-shadow: 8px 8px 0px rgba(51, 65, 85, 0.15);
            overflow: hidden;
            background: #000;
            display: flex;
            flex-direction: column;
            width: 100%;
            aspect-ratio: 16/9;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        html.dark .retro-window {
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: 8px 8px 0px rgba(0, 0, 0, 0.4);
        }

        .window-header {
            height: 48px;
            background: rgba(248, 250, 252, 0.6);
            border-bottom: 1px solid rgba(203, 213, 225, 0.6);
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 8px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        html.dark .window-header {
            background: rgba(15, 23, 42, 0.8);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .window-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 1px solid rgba(203, 213, 225, 0.6);
        }

        html.dark .window-dot {
            border-color: rgba(255, 255, 255, 0.1);
        }

        .game-viewport {
            flex: 1;
            position: relative;
            background: #f8fafc;
            overflow: hidden;
        }

        /* --- TILES --- */
        .tile {
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position: relative;
            z-index: 20;
            background-color: #FFFFFF;
            border: 1px solid rgba(203, 213, 225, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: -0.5px;
        }

        html.dark .tile {
            background-color: #1e293b;
            border-color: rgba(255, 255, 255, 0.1);
        }

        .tile::after {
            content: '';
            position: absolute;
            inset: 4px;
            border: 1px dashed rgba(203, 213, 225, 0.6);
            border-radius: 8px;
            transition: border-color 0.2s;
        }

        html.dark .tile::after {
            border-color: rgba(255, 255, 255, 0.2);
        }

        .tile:hover {
            background-color: #F0F9FF;
            z-index: 30;
            border-color: rgba(41, 121, 255, 0.5);
            box-shadow: 0 0 20px rgba(41, 121, 255, 0.1);
        }

        html.dark .tile:hover {
            background-color: #334155;
            border-color: rgba(41, 121, 255, 0.5);
        }

        .tile:hover::after {
            border-color: rgba(147, 197, 253, 0.8);
        }

        .tile.revealed {
            animation: popOut 0.4s forwards cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }

        @keyframes popOut {
            0% {
                transform: scale(1) rotate(0deg);
                opacity: 1;
            }

            40% {
                transform: scale(1.1) rotate(5deg);
                opacity: 0.9;
            }

            100% {
                transform: scale(0) rotate(-10deg);
                opacity: 0;
            }
        }

        #drag-overlay {
            background-image: repeating-linear-gradient(45deg, #2979FF 0, #2979FF 20px, #ffffff 20px, #ffffff 40px);
            opacity: 0.1;
            pointer-events: none;
        }

        .dragging #drag-overlay {
            opacity: 0.2;
        }

        .dragging .console-frame {
            transform: scale(0.98);
            border-color: #2979FF;
        }

        .hidden-panel-mobile {
            transform: translateY(100%);
        }

        .hidden-panel-desktop {
            margin-left: -24rem;
        }

        /* Loader Overlay */
        #db-loader {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }

        html.dark #db-loader {
            background: rgba(2, 6, 23, 0.8);
        }
    </style>
    <link rel="stylesheet" href="../../css/base.css" />
    <link rel="stylesheet" href="../../css/components.css" />
</head>

<body
    class="h-screen w-screen flex flex-col items-center justify-center p-2 md:p-6 overflow-hidden transition-colors duration-300">

    <!-- FLOATING BACKGROUND ICONS -->
    <i data-lucide="sparkles" class="bg-float-icon w-32 h-32 top-10 left-10"></i>
    <i data-lucide="circle-dashed" class="bg-float-icon w-40 h-40 bottom-20 right-20"></i>
    <i data-lucide="hexagon" class="bg-float-icon w-24 h-24 top-1/2 left-1/2 -ml-12 -mt-12"></i>

    <div id="drag-overlay" class="fixed inset-0 z-0 transition-opacity duration-300"></div>

    <div id="db-loader" class="fixed inset-0 z-[60] flex flex-col items-center justify-center hidden">
        <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-blue"></div>
        <span class="mt-4 font-heading font-bold text-dark dark:text-slate-200 text-lg animate-pulse">SAVING
            DATA...</span>
    </div>

    <div
        class="console-frame w-full h-full relative flex-col md:flex-row max-w-[1600px] mx-auto z-10 transition-colors duration-300">

        <aside id="controls"
            class="w-full md:w-96 glass-panel border-b-[1px] md:border-b-0 md:border-r-[1px] border-slate-300 dark:border-white/10 flex flex-col z-50 transition-all duration-300 shadow-xl md:shadow-none h-[45%] md:h-full relative shrink-0">

            <div
                class="p-6 border-b-[1px] border-slate-300 dark:border-white/10 bg-slate-50/50 dark:bg-slate-800/50 flex justify-between items-center shrink-0">
                <div>
                    <h1
                        class="text-3xl font-heading text-dark dark:text-slate-100 tracking-wide leading-none drop-shadow-sm transition-colors duration-300">
                        REVEAL<span class="text-pink">PICTURE</span>
                    </h1>
                    <div class="flex items-center gap-2 mt-2">
                        <button onclick="UI.toggleTheme()"
                            class="px-2 py-1 bg-slate-200 dark:bg-slate-700 text-slate-700 dark:text-slate-200 text-[10px] font-bold rounded flex items-center gap-1 hover:bg-slate-300 dark:hover:bg-slate-600 transition-colors">
                            <i data-lucide="moon" class="w-3 h-3 hidden dark:block"></i>
                            <i data-lucide="sun" class="w-3 h-3 block dark:hidden"></i>
                            <span class="hidden dark:inline">DARK</span>
                            <span class="inline dark:hidden">LIGHT</span>
                        </button>
                    </div>
                </div>
                <button onclick="UI.togglePanel(true)"
                    class="md:hidden p-2 bg-pink/10 text-pink border-[1px] border-slate-300 dark:border-white/20 rounded-lg shadow-neo-sm active:translate-y-1 active:shadow-none transition-all">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>

            <div class="flex-1 p-6 overflow-y-auto custom-scrollbar space-y-8 bg-transparent relative">

                <!-- PRESET MANAGEMENT -->
                <div class="space-y-3 relative z-20">
                    <div class="flex justify-between items-center mb-1">
                        <label class="text-xs font-black text-slate-400 uppercase tracking-widest flex items-center gap-2">
                            <i data-lucide="folder-code" class="w-4 h-4 text-pink"></i> CURRENT PRESET
                        </label>
                        <button onclick="app.createNewPreset()"
                            class="text-[10px] font-bold bg-pink text-white px-2 py-1 rounded shadow-neo-sm hover:translate-y-[-1px] active:translate-y-[1px]  active:shadow-none transition-all uppercase tracking-wider">
                            + New
                        </button>
                    </div>
                    
                    <div class="relative group">
                        <select id="preset-selector" onchange="app.switchPreset(this.value)"
                            class="w-full appearance-none bg-white dark:bg-slate-700 border-2 border-slate-300 dark:border-slate-600 text-dark dark:text-slate-200 py-3 px-4 pr-10 rounded-xl font-body font-bold text-sm shadow-neo focus:outline-none focus:border-pink focus:ring-2 focus:ring-pink/20 transition-all cursor-pointer">
                            <option value="default">Default Images</option>
                        </select>
                        <i data-lucide="chevron-down" class="absolute right-3 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400 pointer-events-none group-hover:text-pink transition-colors"></i>
                    </div>

                    <div class="flex gap-2">
                        <input type="text" id="preset-title" 
                            class="w-full bg-white dark:bg-slate-700 border-2 border-slate-300 dark:border-slate-600 text-dark dark:text-slate-200 py-2 px-4 rounded-xl font-body font-bold text-sm focus:outline-none focus:border-pink focus:ring-2 focus:ring-pink/20 transition-all placeholder:text-slate-400"
                            placeholder="Preset Title"
                            onblur="app.updatePresetTitle(this.value)"
                            onkeydown="if(event.key === 'Enter') this.blur();">
                        <button onclick="app.deleteCurrentPreset()" id="delete-preset-btn"
                            class="shrink-0 aspect-square p-2 bg-white dark:bg-slate-700 border-2 border-slate-300 dark:border-slate-600 rounded-xl text-slate-400 hover:text-red-500 hover:border-red-500 hover:bg-red-50 dark:hover:bg-slate-600 transition-all flex items-center justify-center group shadow-neo-sm active:translate-y-[2px] active:shadow-none"
                            title="Delete Preset">
                            <i data-lucide="trash-2" class="w-4 h-4 group-hover:scale-110 transition-transform"></i>
                        </button>
                    </div>
                </div>

                <div class="space-y-3">
                    <label class="text-xs font-black text-slate-400 uppercase tracking-widest flex items-center gap-2">
                        <i data-lucide="database" class="w-4 h-4 text-blue"></i> Add to Active Preset
                    </label>
                    <div
                        class="relative w-full h-24 border-4 border-dashed border-slate-200 rounded-2xl hover:border-blue hover:bg-blue/5 transition-all cursor-pointer group flex flex-col items-center justify-center gap-2">
                        <input type="file" id="file-input" accept="image/*" multiple
                            class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">
                        <div
                            class="p-2 bg-white rounded-full border-2 border-slate-200 group-hover:border-blue group-hover:scale-110 transition-transform">
                            <i data-lucide="upload-cloud" class="w-5 h-5 text-slate-400 group-hover:text-blue"></i>
                        </div>
                        <span class="text-[10px] text-slate-400 font-bold group-hover:text-blue uppercase tracking-wide"
                            id="file-label">
                            Append Images
                        </span>
                    </div>
                </div>

                <div
                    class="space-y-4 p-4 bg-slate-50/50 dark:bg-slate-800/50 border-[1px] border-slate-300 dark:border-white/10 rounded-xl shadow-sm transition-colors duration-300">
                    <div
                        class="flex justify-between items-end border-b-[1px] border-slate-200 dark:border-white/10 pb-2 border-dashed">
                        <label class="text-xs font-black text-slate-400 uppercase tracking-widest">Grid Size</label>
                        <span id="grid-val" class="font-mono text-orange font-black text-lg">4 x 4</span>
                    </div>
                    <div class="px-1 pt-2">
                        <input type="range" id="grid-slider" min="2" max="10" value="4" class="w-full">
                    </div>

                    <div class="flex items-center justify-between pt-2">
                        <label class="text-xs font-black text-slate-400 uppercase tracking-widest">Audio FX</label>
                        <button id="sound-toggle"
                            class="p-2 bg-white dark:bg-slate-700 rounded-lg border-[1px] border-slate-200 dark:border-white/10 hover:border-slate-400 transition-all text-slate-400 hover:text-dark dark:hover:text-slate-200">
                            <i data-lucide="volume-2" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>

                <div
                    class="space-y-4 p-4 bg-blue/5 border-[1px] border-blue/30 rounded-xl relative overflow-hidden transition-colors duration-300">
                    <div class="absolute top-0 right-0 p-1 bg-blue text-white rounded-bl-lg">
                        <i data-lucide="sparkles" class="w-3 h-3"></i>
                    </div>
                    <div class="flex justify-between items-center">
                        <label class="text-xs font-black text-blue uppercase tracking-widest">Auto Speed</label>
                        <div class="flex items-center gap-2">
                            <span id="speed-label" class="text-[10px] font-bold text-blue font-mono">1.5s</span>
                        </div>
                    </div>
                    <div class="flex items-center gap-2 mb-2">
                        <i data-lucide="rabbit" class="w-4 h-4 text-blue/50"></i>
                        <input type="range" id="speed-slider" min="100" max="3000" step="100" value="1500"
                            class="w-full accent-blue">
                        <i data-lucide="turtle" class="w-4 h-4 text-blue/50"></i>
                    </div>
                </div>

                <button onclick="Game.resetLevel()"
                    class="w-full btn-chunky bg-white dark:bg-slate-700 text-dark py-3 rounded-xl text-sm tracking-wider flex items-center justify-center gap-2 hover:bg-pink/5 hover:text-pink hover:border-pink transition-colors">
                    <i data-lucide="rotate-ccw" class="w-5 h-5"></i> RESET PUZZLE
                </button>
                 
                 <button onclick="app.openImageManager()"
                    class="w-full btn-chunky bg-white dark:bg-slate-700 text-slate-400 py-3 rounded-xl text-sm tracking-wider flex items-center justify-center gap-2 hover:bg-blue-50 dark:hover:bg-slate-600 hover:text-blue hover:border-blue group transition-colors shadow-neo-sm active:shadow-none active:translate-y-[2px]">
                    <i data-lucide="images" class="w-5 h-5 group-hover:scale-110 transition-transform"></i> MANAGE IMAGES
                </button>

            </div>

            <div
                class="p-4 border-t-[1px] border-slate-300 dark:border-white/10 bg-slate-50/50 dark:bg-slate-800/50 flex justify-between items-center shrink-0 transition-colors duration-300">
                <div class="font-heading text-slate-400 text-sm tracking-wide">
                    TILES LEFT
                </div>
                <div
                    class="bg-dark text-green px-4 py-1 rounded-lg font-mono font-bold text-xl shadow-sm border-[1px] border-slate-600">
                    <span id="tiles-count">0</span>
                </div>
            </div>
        </aside>

        <main
            class="flex-1 relative h-[55%] md:h-full bg-slate-50/50 dark:bg-slate-900/50 flex flex-col overflow-hidden transition-colors duration-300">

            <div
                class="h-16 md:h-20 border-b-[1px] border-slate-300 dark:border-white/10 glass-panel flex items-center px-4 md:px-6 justify-between shrink-0 z-20 shadow-sm transition-colors duration-300">
                <div class="flex items-center gap-4">
                    <button onclick="UI.togglePanel(false)"
                        class="p-2 bg-white dark:bg-slate-700 border-[1px] border-slate-300 dark:border-white/10 rounded-xl shadow-neo-sm hover:translate-y-[-2px] transition-transform text-slate-400 hover:text-dark dark:hover:text-slate-200 group">
                        <i data-lucide="settings-2" class="w-5 h-5 group-hover:rotate-45 transition-transform"></i>
                    </button>
                    <div class="hidden md:flex flex-col border-l-[1px] border-slate-300 dark:border-white/10 pl-4">
                        <span class="text-[10px] uppercase font-black text-slate-400 tracking-wider">Progress</span>
                        <span id="round-display"
                            class="font-mono text-lg font-bold text-dark dark:text-slate-200 transition-colors">0 /
                            0</span>
                    </div>
                </div>

                <div class="flex items-center gap-2 md:gap-3">

                    <div class="bg-white dark:bg-slate-800 border-4 border-slate-900 dark:border-slate-500 rounded-2xl p-6 md:p-8 max-w-sm w-full mx-4 relative z-10 shadow-hard transform scale-95 opacity-0 transition-all duration-200" id="delete-modal-content">
                        <div class="w-16 h-16 bg-red-100 dark:bg-red-900/30 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4 border-2 border-red-200 dark:border-red-800">
                            <i data-lucide="alert-triangle" class="w-8 h-8"></i>

                        </p>
                        <div class="flex gap-3">
                            <button onclick="app.closeDeleteModal()" class="flex-1 btn-chunky bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 py-3 rounded-xl font-bold">
                                CANCEL
                            </button>

                <div id="toast"
                    class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-900 dark:bg-slate-800 text-white px-6 py-3 rounded-xl font-bold font-heading shadow-hard-sm transform translate-y-20 transition-transform opacity-0 z-50 flex items-center gap-3 border-2 border-slate-700 dark:border-slate-600">
                    <i id="toast-icon" data-lucide="check-circle" class="w-5 h-5 text-green"></i>
                    <span id="toast-msg">Action Completed</span>
                </div>

            </div>
        </main>
    </div>

    <script>
        /**
         * INDEXED DB MANAGER
         * Handles persistence of Presets (contains images, state, etc.)
         * Migrates from V1 MysteryBoxDB to V2 English1RevealDB
         */
        const DB = {
            dbName: 'English1RevealDB',
            dbVersion: 1,
            db: null,

            init() {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(this.dbName, this.dbVersion);

                    request.onupgradeneeded = (event) => {
                        const db = event.target.result;
                        if (!db.objectStoreNames.contains('Presets')) {
                            const store = db.createObjectStore('Presets', { keyPath: 'id' });
                            store.createIndex('lastAccessed', 'lastAccessed', { unique: false });
                        }
                    };

                    request.onsuccess = (event) => {
                        this.db = event.target.result;
                        resolve(this.db);
                    };

                    request.onerror = (event) => {
                        console.error("IDB Error:", event.target.error);
                        reject(event.target.error);
                    };
                });
            },

            async getAllPresets() {
                if (!this.db) await this.init();
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction(['Presets'], 'readonly');
                    const store = transaction.objectStore('Presets');
                    const request = store.getAll();

                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            },

            async savePreset(preset) {
                if (!this.db) await this.init();
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction(['Presets'], 'readwrite');
                    const store = transaction.objectStore('Presets');
                    const request = store.put(preset);

                    request.onsuccess = () => resolve();
                    request.onerror = () => reject(request.error);
                });
            },

            async deletePreset(id) {
                if (!this.db) await this.init();
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction(['Presets'], 'readwrite');
                    const store = transaction.objectStore('Presets');
                    const request = store.delete(id);

                    request.onsuccess = () => resolve();
                    request.onerror = () => reject(request.error);
                });
            },

            // Legacy Migration Helper
            migrateLegacyDB() {
                return new Promise((resolve) => {
                    const request = indexedDB.open('MysteryBoxDB', 1);

                    request.onsuccess = (event) => {
                        const legacyDb = event.target.result;
                        if (!legacyDb.objectStoreNames.contains('images')) {
                            legacyDb.close();
                            resolve(null);
                            return;
                        }

                        const transaction = legacyDb.transaction(['images'], 'readonly');
                        const store = transaction.objectStore('images');
                        const getAllRequest = store.getAll();

                        getAllRequest.onsuccess = () => {
                            const results = getAllRequest.result;
                            legacyDb.close();
                            if (results && results.length > 0) {
                                resolve(results.map(item => item.data));
                            } else {
                                resolve(null);
                            }
                        };
                        
                        getAllRequest.onerror = () => {
                            legacyDb.close();
                            resolve(null);
                        };
                    };

                    request.onerror = () => resolve(null);
                    
                    // If it doesn't exist, it will trigger upgradeneeded, meaning no legacy data
                    request.onupgradeneeded = (event) => {
                        event.target.transaction.abort();
                        resolve(null);
                    }
                });
            }
        };

        /**
         * APP STATE & PRESET MANAGER
         */
         const app = {
            presets: [],
            activePresetId: null,

            async init() {
                try {
                    await DB.init();
                    let storedPresets = await DB.getAllPresets();

                    if (!storedPresets || storedPresets.length === 0) {
                        // Attempt Legacy Migration
                        const legacyImages = await DB.migrateLegacyDB();
                        let defaultImages = [];
                        let title = "Default Game";
                        
                        if (legacyImages && legacyImages.length > 0) {
                            defaultImages = legacyImages;
                            title = "Migrated Offline DB";
                            UI.showToast("Migrated legacy images!", "info");
                        }

                        const defaultPreset = {
                            id: 'preset_' + Date.now(),
                            title: title,
                            images: defaultImages,
                            currentIndex: 0,
                            gridSize: 4,
                            lastAccessed: Date.now()
                        };
                        
                        await DB.savePreset(defaultPreset);
                        storedPresets = [defaultPreset];
                    }

                    // Sort by last accessed
                    this.presets = storedPresets.sort((a, b) => b.lastAccessed - a.lastAccessed);
                    
                    // Recover last active if exists
                    const savedActiveId = localStorage.getItem('mb_active_preset_id');
                    let targetPreset = this.presets.find(p => p.id === savedActiveId);
                    
                    if (!targetPreset) targetPreset = this.presets[0];
                    
                    this.activePresetId = targetPreset.id;
                    
                    this.renderPresetDropdown();
                    this.loadPresetData(targetPreset);

                } catch (e) {
                    console.error("App Init Error:", e);
                    UI.showToast("Failed to initialize database", "error");
                }
            },

            renderPresetDropdown() {
                const selector = document.getElementById('preset-selector');
                selector.innerHTML = this.presets.map(p => 
                    `<option value="${p.id}" ${p.id === this.activePresetId ? 'selected' : ''}>${p.title}</option>`
                ).join('');
            },

            loadPresetData(preset) {
                this.activePresetId = preset.id;
                document.getElementById('preset-title').value = preset.title;
                
                // Update timestamp
                preset.lastAccessed = Date.now();
                DB.savePreset(preset);
                
                localStorage.setItem('mb_active_preset_id', preset.id);

                // Load Game State
                Game.gridSize = preset.gridSize || 4;
                document.getElementById('grid-slider').value = Game.gridSize;
                document.getElementById('grid-val').textContent = `${Game.gridSize} x ${Game.gridSize}`;
                
                Game.images = preset.images || [];
                Game.currentIndex = preset.currentIndex || 0;

                if (Game.images.length > 0) {
                    // Bounds check
                    if (Game.currentIndex >= Game.images.length) Game.currentIndex = 0;
                    document.getElementById('empty-state').style.display = 'none';
                    Game.loadLevel();
                } else {
                    document.getElementById('empty-state').style.display = 'flex';
                    document.getElementById('target-image').src = "";
                    document.getElementById('tile-grid').innerHTML = '';
                    document.getElementById('round-display').textContent = "0 / 0";
                    document.getElementById('next-round-btn').disabled = true;
                    UI.updateCount(0);
                }
            },

            async saveCurrentState() {
                if (!this.activePresetId) return;
                const presetIndex = this.presets.findIndex(p => p.id === this.activePresetId);
                if (presetIndex === -1) return;

                const preset = this.presets[presetIndex];
                preset.images = Game.images;
                preset.currentIndex = Game.currentIndex;
                preset.gridSize = Game.gridSize;
                preset.lastAccessed = Date.now();

                await DB.savePreset(preset);
            },

            async switchPreset(id) {
                const preset = this.presets.find(p => p.id === id);
                if (preset) {
                    this.loadPresetData(preset);
                }
            },

            async createNewPreset() {
                const newPreset = {
                    id: 'preset_' + Date.now(),
                    title: `New Session ${this.presets.length + 1}`,
                    images: [],
                    currentIndex: 0,
                    gridSize: 4,
                    lastAccessed: Date.now()
                };

                this.presets.unshift(newPreset); // Add to top
                await DB.savePreset(newPreset);
                
                this.renderPresetDropdown();
                document.getElementById('preset-selector').value = newPreset.id;
                this.loadPresetData(newPreset);
                UI.showToast("New preset created!", "success");
            },

            async updatePresetTitle(newTitle) {
                if (!newTitle.trim() || !this.activePresetId) return;
                
                const presetIndex = this.presets.findIndex(p => p.id === this.activePresetId);
                if (presetIndex !== -1 && this.presets[presetIndex].title !== newTitle) {
                    this.presets[presetIndex].title = newTitle;
                    await this.saveCurrentState();
                    this.renderPresetDropdown();
                    UI.showToast("Title saved", "success");
                }
            },

            // --- DELETION LOGIC ---
            presetToDelete: null,
            deleteCurrentPreset() {
                if (this.presets.length <= 1) {
                    UI.showToast("Cannot delete the last remaining preset.", "error");
                    return;
                }
                const preset = this.presets.find(p => p.id === this.activePresetId);
                if (!preset) return;

                this.presetToDelete = preset;
                document.getElementById('delete-preset-name').textContent = preset.title;
                const modal = document.getElementById('delete-modal');
                const content = document.getElementById('delete-modal-content');
                
                modal.classList.remove('hidden');
                modal.classList.add('flex');
                
                requestAnimationFrame(() => {
                    content.classList.remove('scale-95', 'opacity-0');
                    content.classList.add('scale-100', 'opacity-100');
                });
            },

            closeDeleteModal() {
                this.presetToDelete = null;
                const modal = document.getElementById('delete-modal');
                const content = document.getElementById('delete-modal-content');
                
                content.classList.remove('scale-100', 'opacity-100');
                content.classList.add('scale-95', 'opacity-0');
                
                setTimeout(() => {
                    modal.classList.add('hidden');
                    modal.classList.remove('flex');
                }, 200);
            },

            async confirmDeletePreset() {
                if (!this.presetToDelete) return;
                
                const idToDelete = this.presetToDelete.id;
                await DB.deletePreset(idToDelete);
                
                this.presets = this.presets.filter(p => p.id !== idToDelete);
                
                this.closeDeleteModal();
                UI.showToast("Preset deleted", "success");
                
                // Load the first available
                this.loadPresetData(this.presets[0]);
                this.renderPresetDropdown();
            },
            
            openImageManager() {
                const modal = document.getElementById('image-manager-modal');
                const content = document.getElementById('image-manager-content');
                
                this.renderImageManagerList();
                
                modal.classList.remove('hidden');
                modal.classList.add('flex');
                
                requestAnimationFrame(() => {
                    content.classList.remove('scale-95', 'opacity-0');
                    content.classList.add('scale-100', 'opacity-100');
                });
            },

            closeImageManager() {
                const modal = document.getElementById('image-manager-modal');
                const content = document.getElementById('image-manager-content');
                
                content.classList.remove('scale-100', 'opacity-100');
                content.classList.add('scale-95', 'opacity-0');
                
                setTimeout(() => {
                    modal.classList.add('hidden');
                    modal.classList.remove('flex');
                }, 200);
            },

            renderImageManagerList() {
                const list = document.getElementById('image-manager-list');
                document.getElementById('image-manager-count').textContent = `${Game.images.length} Image${Game.images.length === 1 ? '' : 's'}`;
                
                if (Game.images.length === 0) {
                    list.innerHTML = `<div class="col-span-full h-32 flex flex-col items-center justify-center text-slate-400 font-bold font-body"><i data-lucide="image-minus" class="w-8 h-8 mb-3 opacity-50"></i>No images in this preset.</div>`;
                    lucide.createIcons();
                    return;
                }

                list.innerHTML = Game.images.map((imgSrc, index) => `
                    <div class="relative group aspect-square rounded-xl overflow-hidden border-2 border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-900 shadow-sm">
                        <img src="${imgSrc}" class="w-full h-full object-cover">
                        <div class="absolute inset-0 bg-slate-900/60 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center backdrop-blur-sm">
                            <button onclick="app.deleteImage(${index})" class="p-3 bg-red-500 text-white rounded-xl hover:scale-110 hover:bg-red-600 transition-all shadow-hard-sm active:scale-95 active:shadow-none translate-y-2 group-hover:translate-y-0" title="Delete Image">
                                <i data-lucide="trash-2" class="w-5 h-5"></i>
                            </button>
                        </div>
                        <div class="absolute top-2 left-2 bg-slate-900/70 text-white text-[10px] font-bold px-2 py-1 rounded backdrop-blur-md border-[1px] border-white/20">
                            #${index + 1}
                        </div>
                    </div>
                `).join('');
                lucide.createIcons();
            },

            async deleteImage(index) {
                if (index < 0 || index >= Game.images.length) return;
                
                Game.images.splice(index, 1);
                
                // Keep current index bounded
                if (Game.currentIndex >= Game.images.length) {
                    Game.currentIndex = Math.max(0, Game.images.length - 1);
                }
                
                await this.saveCurrentState();
                this.renderImageManagerList();
                
                // Update game view
                this.loadPresetData(this.presets.find(p => p.id === this.activePresetId));
                UI.showToast("Image removed", "success");
            },
            
            async clearActiveImages() {
                if (!confirm("Are you sure you want to remove ALL images from this preset?")) return;
                Game.images = [];
                Game.currentIndex = 0;
                await this.saveCurrentState();
                this.renderImageManagerList();
                this.loadPresetData(this.presets.find(p => p.id === this.activePresetId));
                this.closeImageManager();
                UI.showToast("All images cleared", "success");
            }
        };

        /**
         * AUDIO CONTROLLER
         */
        const Audio = {
            enabled: true,
            init: async () => { await Tone.start(); },

            toggle: () => {
                Audio.enabled = !Audio.enabled;
                const btn = document.getElementById('sound-toggle');
                const icon = Audio.enabled ? 'volume-2' : 'volume-x';
                btn.innerHTML = `<i data-lucide="${icon}" class="w-4 h-4"></i>`;
                if (!Audio.enabled) btn.classList.add('text-pink');
                else btn.classList.remove('text-pink');
                lucide.createIcons();
                localStorage.setItem('mb_audio', Audio.enabled);
            },

            playPop: () => {
                if (!Audio.enabled) return;
                const notes = ["C3", "E3", "G3", "A3"];
                const note = notes[Math.floor(Math.random() * notes.length)];
                const synth = new Tone.MembraneSynth({
                    pitchDecay: 0.05,
                    octaves: 2,
                    oscillator: { type: "sine" },
                    envelope: { attack: 0.001, decay: 0.2, sustain: 0.01, release: 0.4 }
                }).toDestination();
                synth.triggerAttackRelease(note, "32n");
            },

            playWin: () => {
                if (!Audio.enabled) return;
                const synth = new Tone.PolySynth(Tone.Synth).toDestination();
                const now = Tone.now();
                synth.triggerAttackRelease(["C4", "E4", "G4"], "8n", now);
                synth.triggerAttackRelease(["E4", "G4", "C5"], "8n", now + 0.1);
                synth.triggerAttackRelease(["G4", "C5", "E5"], "4n", now + 0.2);
            }
        };

        /**
         * AUTO REVEAL CONTROLLER
         */
        const AutoReveal = {
            intervalId: null,
            speed: 1500,
            isPlaying: false,

            init() {
                const slider = document.getElementById('speed-slider');
                const label = document.getElementById('speed-label');

                slider.addEventListener('input', (e) => {
                    AutoReveal.speed = parseInt(e.target.value);
                    label.innerText = (AutoReveal.speed / 1000).toFixed(1) + 's';

                    if (AutoReveal.isPlaying) {
                        AutoReveal.stop();
                        AutoReveal.start();
                    }
                });
            },

            toggle() {
                if (this.isPlaying) this.stop();
                else this.start();
            },

            start() {
                if (Game.tilesRemaining <= 0) return;

                this.isPlaying = true;
                const btn = document.getElementById('auto-reveal-btn');

                btn.innerHTML = `<i data-lucide="pause" class="w-4 h-4 md:w-5 md:h-5 fill-current"></i> <span class="hidden md:inline">PAUSE</span>`;
                btn.classList.replace('bg-blue', 'bg-white');
                btn.classList.replace('text-white', 'text-blue');
                btn.classList.add('border-blue');
                lucide.createIcons();

                this.intervalId = setInterval(() => {
                    const tiles = Array.from(document.querySelectorAll('.tile:not(.revealed)'));
                    if (tiles.length === 0) {
                        this.stop();
                        return;
                    }
                    const randomTile = tiles[Math.floor(Math.random() * tiles.length)];
                    Game.revealTile(randomTile);
                }, this.speed);
            },

            stop() {
                this.isPlaying = false;
                clearInterval(this.intervalId);

                const btn = document.getElementById('auto-reveal-btn');

                btn.innerHTML = `<i data-lucide="play" class="w-4 h-4 md:w-5 md:h-5 fill-current"></i> <span class="hidden md:inline">AUTO</span>`;
                btn.classList.replace('bg-white', 'bg-blue');
                btn.classList.replace('text-blue', 'text-white');
                btn.classList.remove('border-blue');
                lucide.createIcons();
            }
        };

        /**
         * CORE GAME ENGINE
         */
        const Game = {
            images: [], // Array of strings (DataURLs)
            currentIndex: 0,
            gridSize: 4,
            tilesRemaining: 0,

            async init() {
                // Restore Theme
                const savedTheme = localStorage.getItem('mb_theme');
                if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }

                const savedAudio = localStorage.getItem('mb_audio');
                if (savedAudio === 'false') Audio.toggle();

                // Init modules
                AutoReveal.init();
            },

            start(fileList, restoring = false) {
                if (!fileList || fileList.length === 0) return;

                // Merge new files into existing if not restoring
                if (!restoring) {
                    this.images = [...this.images, ...fileList];
                } else {
                    this.images = fileList;
                }

                document.getElementById('empty-state').style.display = 'none';

                // If not restoring, jump to the first new image (or stay if just appending)
                if (!restoring && this.images.length === fileList.length) {
                    this.currentIndex = 0;
                }

                this.loadLevel();

                if (window.innerWidth < 768) UI.togglePanel(true);
            },

            loadLevel() {
                // Bounds check
                if (this.currentIndex >= this.images.length) this.currentIndex = 0;

                // Update Image
                document.getElementById('target-image').src = this.images[this.currentIndex];
                document.getElementById('round-display').textContent = `${this.currentIndex + 1} / ${this.images.length}`;
                
                // Save Persistence
                app.saveCurrentState();

                // Reset State
                document.getElementById('next-round-btn').disabled = true;
                AutoReveal.stop();
                this.buildGrid();
            },

            buildGrid() {
                const grid = document.getElementById('tile-grid');
                grid.innerHTML = '';
                grid.style.gridTemplateColumns = `repeat(${this.gridSize}, 1fr)`;

                this.tilesRemaining = this.gridSize * this.gridSize;
                UI.updateCount(this.tilesRemaining);

                for (let i = 0; i < this.tilesRemaining; i++) {
                    const tile = document.createElement('div');
                    tile.className = 'tile';
                    const numColor = (i % 2 === 0) ? 'text-slate-200' : 'text-slate-300';
                    tile.innerHTML = `<span class="text-3xl font-heading ${numColor} pointer-events-none select-none">${i + 1}</span>`;

                    tile.onmousedown = () => this.revealTile(tile);
                    grid.appendChild(tile);
                }
            },

            revealTile(tile) {
                if (tile.classList.contains('revealed')) return;
                if (Tone.context.state !== 'running') Tone.start();

                tile.classList.add('revealed');
                this.tilesRemaining--;
                UI.updateCount(this.tilesRemaining);
                Audio.playPop();

                if (this.tilesRemaining <= 0) this.win();
            },

            revealAll() {
                if (this.tilesRemaining === 0) return;

                AutoReveal.stop();
                const tiles = document.querySelectorAll('.tile:not(.revealed)');

                tiles.forEach((t, i) => {
                    setTimeout(() => {
                        t.classList.add('revealed');
                        if (i % 3 === 0) Audio.playPop();
                    }, i * 30);
                });

                setTimeout(() => {
                    this.tilesRemaining = 0;
                    UI.updateCount(0);
                    this.win();
                }, tiles.length * 30 + 100);
            },

            win() {
                Audio.playWin();
                UI.fireConfetti();
                AutoReveal.stop();

                const btn = document.getElementById('next-round-btn');
                btn.disabled = false;
                btn.classList.add('animate-bounce');
                setTimeout(() => btn.classList.remove('animate-bounce'), 1000);
            },

            resetLevel() {
                this.buildGrid();
                AutoReveal.stop();
            },

            nextLevel() {
                this.currentIndex++;
                if (this.currentIndex >= this.images.length) this.currentIndex = 0;
                this.loadLevel();
            },

            updateGridSize(val) {
                this.gridSize = parseInt(val);
                document.getElementById('grid-val').textContent = `${val} x ${val}`;
                if (this.images.length > 0) this.buildGrid();
                app.saveCurrentState();
            }
        };

        /**
         * UI MANAGER
         */
        const UI = {
            toggleTheme() {
                const isDark = document.documentElement.classList.toggle('dark');
                localStorage.setItem('mb_theme', isDark ? 'dark' : 'light');
            },

            togglePanel(forceHide) {
                const panel = document.getElementById('controls');
                const isHidden = window.innerWidth >= 768
                    ? panel.classList.contains('hidden-panel-desktop')
                    : panel.classList.contains('hidden-panel-mobile');

                if (forceHide || !isHidden) {
                    panel.classList.add('hidden-panel-mobile', 'hidden-panel-desktop');
                } else {
                    panel.classList.remove('hidden-panel-mobile', 'hidden-panel-desktop');
                }
                setTimeout(() => window.dispatchEvent(new Event('resize')), 300);
            },

            updateCount(num) {
                document.getElementById('tiles-count').innerText = num;
            },

            fireConfetti() {
                const end = Date.now() + 1000;
                const colors = ['#FF6B95', '#FF8C42', '#00E676', '#2979FF'];

                (function frame() {
                    confetti({ particleCount: 4, angle: 60, spread: 55, origin: { x: 0 }, colors });
                    confetti({ particleCount: 4, angle: 120, spread: 55, origin: { x: 1 }, colors });
                    if (Date.now() < end) requestAnimationFrame(frame);
                }());
            },

            showToast(msg, type = 'info') {
                const t = document.getElementById('toast');
                const tMsg = document.getElementById('toast-msg');
                const tIcon = document.getElementById('toast-icon');

                t.classList.remove('border-green-500', 'border-red-500', 'border-blue-500');
                
                if (type === 'success') {
                    t.classList.add('border-green-500');
                    tIcon.outerHTML = `<i id="toast-icon" data-lucide="check-circle" class="w-5 h-5 text-green-500"></i>`;
                } else if (type === 'error') {
                    t.classList.add('border-red-500');
                    tIcon.outerHTML = `<i id="toast-icon" data-lucide="alert-circle" class="w-5 h-5 text-red-500"></i>`;
                } else {
                    t.classList.add('border-blue-500');
                    tIcon.outerHTML = `<i id="toast-icon" data-lucide="info" class="w-5 h-5 text-blue-500"></i>`;
                }

                lucide.createIcons();
                tMsg.innerText = msg;
                
                t.classList.remove('opacity-0', 'translate-y-20');
                setTimeout(() => t.classList.add('opacity-0', 'translate-y-20'), 3000);
            },

            toggleLoader(show) {
                const l = document.getElementById('db-loader');
                if (show) l.classList.remove('hidden');
                else l.classList.add('hidden');
            }
        };

        // --- EVENT BINDINGS ---

        document.getElementById('grid-slider').addEventListener('input', (e) => Game.updateGridSize(e.target.value));
        document.getElementById('sound-toggle').addEventListener('click', Audio.toggle);

        // 2. File Loading & Persistence
        const handleFiles = (files) => {
            const list = [];
            let loaded = 0;

            // Show loader immediately
            UI.toggleLoader(true);

            Array.from(files).forEach(f => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    list.push(e.target.result);
                    loaded++;
                    if (loaded === files.length) {
                            // SAVE TO APP STATE INSTEAD OF DB DIRECTLY
                            Game.start(list);
                            app.saveCurrentState();
                            UI.toggleLoader(false);
                            UI.showToast(`Saved ${files.length} Images to Preset!`, "success");
                    }
                };
                reader.readAsDataURL(f);
            });
        };

        document.getElementById('file-input').addEventListener('change', (e) => handleFiles(e.target.files));

        // 3. Drag & Drop
        window.addEventListener('dragover', (e) => {
            e.preventDefault();
            document.body.classList.add('dragging');
        });
        window.addEventListener('dragleave', (e) => {
            if (e.clientX === 0 && e.clientY === 0) document.body.classList.remove('dragging');
        });
        window.addEventListener('drop', (e) => {
            e.preventDefault();
            document.body.classList.remove('dragging');
            if (e.dataTransfer.files.length > 0) handleFiles(e.dataTransfer.files);
        });

        // 4. Keyboard Shortcuts
        document.addEventListener('keydown', (e) => {
            if (Game.images.length === 0) return;
            switch (e.code) {
                case 'Space':
                    e.preventDefault();
                    AutoReveal.toggle();
                    break;
                case 'KeyR': Game.resetLevel(); break;
                case 'KeyN': if (Game.tilesRemaining <= 0) Game.nextLevel(); break;
            }
        });

        window.addEventListener('resize', () => {
            const panel = document.getElementById('controls');
            if (window.innerWidth >= 768) panel.classList.remove('hidden-panel-mobile');
            else panel.classList.remove('hidden-panel-desktop');
        });

        // Init
        window.onload = async () => {
            await Game.init();
            await app.init();
            lucide.createIcons();
            if (window.innerWidth < 768) UI.togglePanel(true);
        };

    </script>
</body>
