<!doctype html>
<html lang="en" class="light">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Can You Listen and Guess? - Quiz Challenge</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <script src="https://unpkg.com/lucide@latest"></script>
        <link
            href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Nunito:wght@400;600;800&display=swap"
            rel="stylesheet"
        />
        <script>
            tailwind.config = {
                darkMode: "class",
                theme: {
                    extend: {
                        colors: {
                            brand: {
                                pink: "#FF6B95",
                                orange: "#FF8C42",
                                green: "#00E676",
                                blue: "#2979FF",
                                dark: "#1e293b",
                                chalk: "#f8fafc",
                            },
                        },
                        fontFamily: {
                            fredoka: ["Fredoka", "sans-serif"],
                            nunito: ["Nunito", "sans-serif"],
                        },
                    },
                },
            };
        </script>
        <style>
            .bg-grid {
                background-size: 40px 40px;
                background-image:
                    linear-gradient(to right, #cbd5e1 2px, transparent 2px),
                    linear-gradient(to bottom, #cbd5e1 2px, transparent 2px);
            }
            .dark .bg-grid {
                background-image:
                    linear-gradient(to right, #334155 2px, transparent 2px),
                    linear-gradient(to bottom, #334155 2px, transparent 2px);
            }

            /* Neo-Brutalism Utilities */
            .neo-border {
                border-width: 4px;
                border-color: #1e293b;
            }
            .dark .neo-border {
                border-color: #94a3b8;
            }

            .neo-shadow {
                box-shadow: 4px 4px 0px 0px rgba(30, 41, 59, 1);
            }
            .dark .neo-shadow {
                box-shadow: 4px 4px 0px 0px rgba(148, 163, 184, 1);
            }

            .neo-btn {
                transition: all 0.1s ease-in-out;
            }
            .neo-btn:hover {
                transform: translate(-2px, -2px) rotate(1deg);
                box-shadow: 6px 6px 0px 0px rgba(30, 41, 59, 1);
            }
            .dark .neo-btn:hover {
                box-shadow: 6px 6px 0px 0px rgba(148, 163, 184, 1);
            }
            .neo-btn:active {
                transform: translate(2px, 2px);
                box-shadow: 2px 2px 0px 0px rgba(30, 41, 59, 1);
            }
            .dark .neo-btn:active {
                box-shadow: 2px 2px 0px 0px rgba(148, 163, 184, 1);
            }

            .no-select {
                user-select: none;
            }
        </style>
    </head>
    <body
        class="font-nunito bg-brand-chalk dark:bg-slate-900 text-brand-dark dark:text-white bg-grid min-h-screen flex flex-col items-center p-4 transition-colors duration-300"
    >
        <div class="w-full max-w-5xl flex justify-between items-center mb-8">
            <h1
                class="font-fredoka text-3xl font-bold bg-brand-pink text-white px-6 py-2 rounded-xl neo-border neo-shadow"
            >
                Listen & Guess Quiz
            </h1>
            <button
                id="themeToggle"
                class="neo-btn bg-brand-orange text-white p-3 rounded-xl neo-border neo-shadow flex items-center justify-center"
            >
                <i data-lucide="moon" class="w-6 h-6"></i>
            </button>
        </div>

        <div
            id="startModal"
            class="fixed inset-0 bg-brand-dark/80 flex items-center justify-center z-50"
        >
            <div
                class="bg-brand-chalk dark:bg-slate-900 p-8 rounded-2xl neo-border neo-shadow max-w-md w-full text-center"
            >
                <h2 class="font-fredoka text-4xl mb-4 text-brand-blue">
                    Welcome, Student!
                </h2>
                <p class="mb-6 text-lg">
                    Enter your name to join the quiz rumble.
                </p>
                <input
                    type="text"
                    id="playerName"
                    placeholder="Your Name"
                    class="w-full text-xl p-4 mb-6 rounded-xl neo-border bg-white dark:bg-slate-800 focus:outline-none focus:ring-4 focus:ring-brand-green text-brand-dark dark:text-white text-center font-bold"
                />
                <button
                    onclick="startGame()"
                    class="neo-btn w-full bg-brand-green text-white font-fredoka text-2xl py-4 rounded-xl neo-border neo-shadow"
                >
                    Let's Go!
                </button>
            </div>
        </div>

        <div
            id="quizContainer"
            class="w-full max-w-5xl hidden flex-col items-center"
        >
            <div
                class="w-full flex justify-between items-center mb-6 text-xl font-bold bg-white dark:bg-slate-800 p-4 rounded-xl neo-border neo-shadow"
            >
                <div class="flex items-center gap-2 text-brand-blue">
                    <i data-lucide="user"></i>
                    <span id="displayPlayerName">Player</span>
                </div>
                <div
                    class="flex items-center gap-2 text-brand-dark dark:text-white font-fredoka"
                >
                    Question: <span id="questionCountDisplay">1</span> / 16
                </div>
                <div class="flex items-center gap-2 text-brand-green">
                    <i data-lucide="star"></i> Score:
                    <span id="scoreDisplay">0</span>
                </div>
            </div>

            <div
                class="w-full bg-white dark:bg-slate-800 p-8 rounded-2xl neo-border neo-shadow mb-8 text-center min-h-[150px] flex items-center justify-center"
            >
                <h2
                    id="questionText"
                    class="font-fredoka text-3xl md:text-4xl leading-tight"
                >
                    Question goes here?
                </h2>
            </div>

            <div
                class="w-full grid grid-cols-1 md:grid-cols-2 gap-6"
                id="optionsGrid"
            >
                <button
                    onclick="checkAnswer(0)"
                    class="neo-btn bg-brand-pink text-white font-fredoka text-2xl md:text-3xl p-6 rounded-2xl neo-border neo-shadow flex items-center gap-4 no-select text-left"
                >
                    <div
                        class="bg-white/30 rounded-xl px-4 py-2 font-black border-2 border-white/50"
                    >
                        A
                    </div>
                    <span
                        id="opt0"
                        class="flex-1 text-xl md:text-2xl font-nunito font-bold"
                        >Option A</span
                    >
                </button>
                <button
                    onclick="checkAnswer(1)"
                    class="neo-btn bg-brand-blue text-white font-fredoka text-2xl md:text-3xl p-6 rounded-2xl neo-border neo-shadow flex items-center gap-4 no-select text-left"
                >
                    <div
                        class="bg-white/30 rounded-xl px-4 py-2 font-black border-2 border-white/50"
                    >
                        B
                    </div>
                    <span
                        id="opt1"
                        class="flex-1 text-xl md:text-2xl font-nunito font-bold"
                        >Option B</span
                    >
                </button>
                <button
                    onclick="checkAnswer(2)"
                    class="neo-btn bg-brand-orange text-white font-fredoka text-2xl md:text-3xl p-6 rounded-2xl neo-border neo-shadow flex items-center gap-4 no-select text-left"
                >
                    <div
                        class="bg-white/30 rounded-xl px-4 py-2 font-black border-2 border-white/50"
                    >
                        C
                    </div>
                    <span
                        id="opt2"
                        class="flex-1 text-xl md:text-2xl font-nunito font-bold"
                        >Option C</span
                    >
                </button>
                <button
                    onclick="checkAnswer(3)"
                    class="neo-btn bg-brand-green text-white font-fredoka text-2xl md:text-3xl p-6 rounded-2xl neo-border neo-shadow flex items-center gap-4 no-select text-left"
                >
                    <div
                        class="bg-white/30 rounded-xl px-4 py-2 font-black border-2 border-white/50"
                    >
                        D
                    </div>
                    <span
                        id="opt3"
                        class="flex-1 text-xl md:text-2xl font-nunito font-bold"
                        >Option D</span
                    >
                </button>
            </div>
        </div>

        <div
            id="resultsContainer"
            class="w-full max-w-2xl hidden flex-col items-center mt-12 bg-white dark:bg-slate-800 p-10 rounded-2xl neo-border neo-shadow text-center"
        >
            <i
                data-lucide="trophy"
                class="w-32 h-32 text-brand-orange mb-6"
            ></i>
            <h2 class="font-fredoka text-5xl mb-4">Quiz Complete!</h2>
            <p class="text-2xl mb-8">
                Great job listening,
                <span id="finalName" class="font-bold text-brand-blue"></span>!
            </p>
            <div
                class="text-4xl font-fredoka bg-brand-chalk dark:bg-slate-900 py-6 px-12 rounded-xl neo-border mb-8"
            >
                Final Score:
                <span id="finalScore" class="text-brand-green">0</span> / 16
            </div>
            <button
                onclick="location.reload()"
                class="neo-btn bg-brand-blue text-white font-fredoka text-2xl py-4 px-10 rounded-xl neo-border neo-shadow"
            >
                Play Again
            </button>
        </div>

        <script>
            // Initialize Icons
            lucide.createIcons();

            // Dark Mode Toggle
            const themeToggle = document.getElementById("themeToggle");
            const html = document.documentElement;

            themeToggle.addEventListener("click", () => {
                html.classList.toggle("dark");
                const isDark = html.classList.contains("dark");
                themeToggle.innerHTML = isDark
                    ? '<i data-lucide="sun" class="w-6 h-6"></i>'
                    : '<i data-lucide="moon" class="w-6 h-6"></i>';
                lucide.createIcons();
            });

            // Combined Questions Data (Story 1 & Story 2)
            const questions = [
                // Story 1: The Mystery of the Missing Trophy
                {
                    q: "What item was stolen from the school?",
                    options: [
                        "A silver basketball",
                        "The golden football trophy",
                        "A library book",
                        "The principal's laptop",
                    ],
                    ans: 1,
                },
                {
                    q: "What time did Detective Sarah arrive at the school?",
                    options: ["8:00 AM", "8:15 AM", "8:30 AM", "10:00 AM"],
                    ans: 1,
                },
                {
                    q: "Who was the cleaner?",
                    options: [
                        "Mr. Thomas",
                        "Principal Davis",
                        "Detective Sarah",
                        "Leo",
                    ],
                    ans: 0,
                },
                {
                    q: "What time did the cleaner finish working in the library?",
                    options: ["5:30 PM", "6:00 PM", "6:30 PM", "8:15 AM"],
                    ans: 2,
                },
                {
                    q: "What color was the torn fabric found on the window?",
                    options: ["Blue", "Green", "Yellow", "Red"],
                    ans: 3,
                },
                {
                    q: "Why did Leo take the trophy?",
                    options: [
                        "To sell it",
                        "As a prank",
                        "To clean it",
                        "By mistake",
                    ],
                    ans: 1,
                },

                // Story 2: The Great Camping Trip Mix-Up
                {
                    q: "What date did the camping trip start?",
                    options: [
                        "13th of October",
                        "15th of October",
                        "15th of November",
                        "30th of October",
                    ],
                    ans: 1,
                },
                {
                    q: "Where did Class 8B go for their trip?",
                    options: [
                        "Whispering River National Park",
                        "Green Pines Campsite",
                        "Whispering Pines National Park",
                        "The City Science Fair",
                    ],
                    ans: 2,
                },
                {
                    q: "How many students were on the bus?",
                    options: ["20", "23", "24", "34"],
                    ans: 2,
                },
                {
                    q: "What time did the bus leave the school?",
                    options: ["7:00 AM", "7:30 AM", "8:30 AM", "9:30 AM"],
                    ans: 1,
                },
                {
                    q: "What did they find instead of their green tents?",
                    options: [
                        "Five blue tarps and cooking pots",
                        "Three blue tarps and sleeping bags",
                        "Five red tarps and cooking pots",
                        "Twenty blue tents",
                    ],
                    ans: 0,
                },
                {
                    q: "What did the other school bus look like?",
                    options: [
                        "Blue with a yellow stripe",
                        "Yellow with a green stripe",
                        "All yellow",
                        "Yellow with a bright red stripe",
                    ],
                    ans: 3,
                },
                {
                    q: "Who checked the security cameras?",
                    options: [
                        "Mr. Harrison",
                        "Chloe",
                        "Mrs. Higgins",
                        "Ranger Smith",
                    ],
                    ans: 2,
                },
                {
                    q: "Where was the other school bus originally heading?",
                    options: [
                        "To a sports tournament",
                        "To a science fair in the city",
                        "To a different national park",
                        "To a museum",
                    ],
                    ans: 1,
                },
                {
                    q: "What color were the tents they borrowed from Ranger Smith?",
                    options: ["Green", "Blue", "Bright orange", "Yellow"],
                    ans: 2,
                },
                {
                    q: "What time did the other bus arrive to return the tents the next morning?",
                    options: ["8:15 AM", "9:30 AM", "10:00 AM", "10:15 AM"],
                    ans: 3,
                },
            ];

            let currentQuestion = 0;
            let score = 0;
            let isAnswering = false;

            function startGame() {
                const nameInput = document
                    .getElementById("playerName")
                    .value.trim();
                if (!nameInput) {
                    alert("Please enter your name!");
                    return;
                }

                document.getElementById("displayPlayerName").innerText =
                    nameInput;
                document.getElementById("finalName").innerText = nameInput;

                document.getElementById("startModal").classList.add("hidden");
                document
                    .getElementById("quizContainer")
                    .classList.remove("hidden");
                document.getElementById("quizContainer").classList.add("flex");

                loadQuestion();
            }

            function loadQuestion() {
                isAnswering = false;
                document.getElementById("questionCountDisplay").innerText =
                    currentQuestion + 1;

                const q = questions[currentQuestion];
                document.getElementById("questionText").innerText = q.q;
                document.getElementById("opt0").innerText = q.options[0];
                document.getElementById("opt1").innerText = q.options[1];
                document.getElementById("opt2").innerText = q.options[2];
                document.getElementById("opt3").innerText = q.options[3];

                // Reset option opacity
                const buttons = document.getElementById("optionsGrid").children;
                for (let btn of buttons) {
                    btn.style.opacity = "1";
                    btn.classList.remove("scale-95");
                }
            }

            function checkAnswer(selectedIndex) {
                if (isAnswering) return;
                isAnswering = true;

                const correctIndex = questions[currentQuestion].ans;
                const buttons = document.getElementById("optionsGrid").children;

                if (selectedIndex === correctIndex) {
                    score++;
                    document.getElementById("scoreDisplay").innerText = score;
                }

                // Visual feedback: dim incorrect answers
                for (let i = 0; i < buttons.length; i++) {
                    if (i !== correctIndex) {
                        buttons[i].style.opacity = "0.3";
                        buttons[i].classList.add("scale-95");
                    }
                }

                // Advance to next question after 2 seconds
                setTimeout(() => {
                    currentQuestion++;
                    if (currentQuestion < questions.length) {
                        loadQuestion();
                    } else {
                        showResults();
                    }
                }, 2000);
            }

            function showResults() {
                document
                    .getElementById("quizContainer")
                    .classList.add("hidden");
                document
                    .getElementById("quizContainer")
                    .classList.remove("flex");
                document
                    .getElementById("resultsContainer")
                    .classList.remove("hidden");
                document
                    .getElementById("resultsContainer")
                    .classList.add("flex");
                document.getElementById("finalScore").innerText = score;
            }
        </script>
    </body>
</html>
