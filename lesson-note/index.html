<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lesson Notes | English 1 Batam</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap"
        rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        pink: '#FF6B95',
                        orange: '#FF8C42',
                        green: '#00E676',
                        blue: '#2979FF',
                        dark: '#1e293b',
                        chalk: '#f8fafc',
                    },
                    fontFamily: {
                        heading: ['Fredoka', 'sans-serif'],
                        body: ['Nunito', 'sans-serif'],
                    },
                    borderWidth: { '3': '3px' },
                    boxShadow: {
                        'hard': '4px 4px 0px 0px rgba(30, 41, 59, 1)',
                        'hard-sm': '2px 2px 0px 0px rgba(30, 41, 59, 1)',
                    },
                    animation: { 'pop': 'pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275)' },
                    keyframes: { pop: { '0%': { transform: 'scale(0.8)', opacity: '0.8' }, '100%': { transform: 'scale(1)', opacity: '1' } } }
                }
            }
        }
    </script>

    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #f8fafc;
            background-image: linear-gradient(#e2e8f0 1px, transparent 1px), linear-gradient(90deg, #e2e8f0 1px, transparent 1px);
            background-size: 20px 20px;
            color: #1e293b;
            overflow: hidden;
            transition: background-color 0.3s, color 0.3s;
        }

        .neo-card {
            background: white;
            border: 3px solid #1e293b;
            border-radius: 1rem;
            box-shadow: 4px 4px 0px 0px rgba(30, 41, 59, 1);
            transition: background-color 0.3s, border-color 0.3s, box-shadow 0.3s;
        }

        .neo-btn {
            border: 3px solid #1e293b;
            box-shadow: 4px 4px 0px 0px rgba(30, 41, 59, 1);
            transition: all 0.15s ease;
            transform: translate(0, 0);
            font-family: 'Fredoka', sans-serif;
            font-weight: 600;
        }

        .neo-btn:hover {
            transform: translate(-1px, -1px);
            box-shadow: 6px 6px 0px 0px rgba(30, 41, 59, 1);
        }

        .neo-btn:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px 0px rgba(30, 41, 59, 1);
        }

        .neo-btn-sm {
            border: 2px solid #1e293b;
            box-shadow: 2px 2px 0px 0px rgba(30, 41, 59, 1);
        }

        .neo-btn-sm:active {
            box-shadow: 0px 0px 0px 0px rgba(30, 41, 59, 1);
            transform: translate(2px, 2px);
        }

        .note-item {
            transition: all 0.2s ease;
            border: 2px solid transparent;
        }

        .note-item:hover {
            background-color: white;
            border: 2px solid #1e293b;
            box-shadow: 2px 2px 0px 0px rgba(30, 41, 59, 1);
            transform: translate(-1px, -1px);
        }

        .note-item.active {
            background-color: white;
            border: 3px solid #1e293b;
            box-shadow: 4px 4px 0px 0px #2979FF;
        }

        .note-item.active-trash {
            background-color: #fff1f2;
            border: 3px solid #1e293b;
            box-shadow: 4px 4px 0px 0px #FF6B95;
        }

        .ql-toolbar.ql-snow {
            border: none;
            border-bottom: 3px solid #1e293b;
            border-radius: 1rem 1rem 0 0;
            background: #f1f5f9;
            padding: 12px;
            transition: background-color 0.3s, border-color 0.3s;
        }

        .ql-container.ql-snow {
            border: none;
            font-family: 'Nunito', sans-serif;
            font-size: 1.1rem;
            background-color: #ffffff;
            border-radius: 0 0 1rem 1rem;
            transition: background-color 0.3s;
        }

        .ql-editor {
            padding: 32px;
            min-height: 500px;
        }

        .ql-editor h1 {
            font-family: 'Fredoka', sans-serif;
            font-size: 2.2em;
            font-weight: 700;
            color: #1e293b;
            border-bottom: 3px solid #f1f5f9;
            padding-bottom: 0.2em;
            margin-top: 0.5em;
        }

        .ql-editor h2 {
            font-family: 'Fredoka', sans-serif;
            font-size: 1.6em;
            font-weight: 600;
            color: #334155;
            margin-top: 1em;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
            border: 1px solid #94a3b8;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        .outline-link {
            transition: all 0.2s;
            border: 2px solid transparent;
        }

        .outline-link:hover {
            background-color: #fff7ed;
            border: 2px solid #FF8C42;
            box-shadow: 2px 2px 0px 0px #1e293b;
            transform: translate(-1px, -1px);
        }

        .neo-input {
            border: 3px solid #1e293b;
            border-radius: 0.75rem;
            background: white;
            transition: all 0.2s;
        }

        .neo-input:focus {
            outline: none;
            box-shadow: 4px 4px 0px 0px rgba(30, 41, 59, 1);
        }

        .bg-pattern-trash {
            background-color: #fff1f2;
            background-image: radial-gradient(#FF6B95 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* ===== DARK MODE ===== */
        html.dark body {
            background-color: #0f172a;
            background-image: linear-gradient(#1e293b 1px, transparent 1px), linear-gradient(90deg, #1e293b 1px, transparent 1px);
            color: #e2e8f0;
        }

        html.dark .neo-card {
            background: #1e293b;
            border-color: #475569;
            box-shadow: 4px 4px 0px 0px #475569;
        }

        html.dark .neo-btn {
            border-color: #475569;
            box-shadow: 4px 4px 0px 0px #475569;
        }

        html.dark .neo-btn:hover {
            box-shadow: 6px 6px 0px 0px #475569;
        }

        html.dark .neo-btn.bg-white {
            background: #334155 !important;
            color: #e2e8f0 !important;
        }

        html.dark .neo-btn-sm {
            border-color: #475569;
            box-shadow: 2px 2px 0px 0px #475569;
        }

        html.dark .note-item:hover {
            background-color: #334155;
            border-color: #475569;
            box-shadow: 2px 2px 0px 0px #475569;
        }

        html.dark .note-item.active {
            background-color: #1e3a5f;
            border-color: #475569;
            box-shadow: 4px 4px 0px 0px #2979FF;
        }

        /* ===== QUILL 2.0 NATIVE ELEMENTS ===== */
        .ql-editor li[data-list="checked"] {
            text-decoration: line-through;
            color: #94a3b8;
        }

        /* Native Tables Styling */
        .ql-editor table {
            border-collapse: collapse;
            margin-bottom: 2rem;
            width: 100%;
            border: 2.5px solid #000;
            background: #fff;
        }

        .ql-editor td {
            border: 2px solid #000;
            padding: 12px 14px;
            font-size: 1rem;
            min-height: 2.5em;
        }

        .ql-editor tr:nth-child(even) {
            background-color: #f8fafc;
        }

        /* Dark Mode for Native Tables */
        html.dark .ql-editor table {
            border-color: #475569 !important;
            background: #1e293b !important;
        }

        html.dark .ql-editor td {
            border-color: #475569 !important;
            color: #e2e8f0 !important;
        }

        html.dark .ql-editor tr:nth-child(even) {
            background-color: #334155 !important;
        }

        /* Native Checkbox styling (Quill 2.0 uses pseudo-elements) */
        .ql-editor li[data-list="checked"]::before,
        .ql-editor li[data-list="unchecked"]::before {
            font-family: inherit !important;
            font-weight: bold;
            color: #000;
        }

        html.dark .ql-editor li[data-list="checked"]::before,
        html.dark .ql-editor li[data-list="unchecked"]::before {
            color: #e2e8f0 !important;
        }

        /* End Quill 2.0 Styles */

        html.dark .note-item.active-trash {
            background-color: #3b1929;
            border-color: #475569;
            box-shadow: 4px 4px 0px 0px #FF6B95;
        }

        html.dark header,
        html.dark .dark-header {
            background-color: #1e293b !important;
            border-color: #475569 !important;
        }

        /* Header title and subtitle */
        html.dark header h1 {
            color: #f1f5f9 !important;
        }

        html.dark header p {
            color: #64748b !important;
        }

        html.dark aside {
            background-color: #0f172a !important;
            border-color: #475569 !important;
        }

        /* Sidebar header (new note, search area) */
        html.dark #sidebarHeader {
            background-color: #1e293b !important;
            border-color: #475569 !important;
        }

        /* Search input container and input */
        html.dark #sidebarHeader .relative.group {
            background-color: #1e293b !important;
        }

        html.dark #searchInput {
            background-color: #0f172a !important;
            color: #e2e8f0 !important;
            border-color: #475569 !important;
        }


        /* Trash toggle button in normal state */
        html.dark #trashToggleBtn.bg-gray-200 {
            background-color: #334155 !important;
            color: #e2e8f0 !important;
        }

        /* Search icon and search input text */
        html.dark #sidebarHeader .text-dark {
            color: #94a3b8 !important;
        }

        html.dark #searchInput {
            color: #e2e8f0 !important;
        }

        /* Note title container and input */
        html.dark .flex.items-center.gap-4.bg-white {
            background-color: #1e293b !important;
            border-color: #475569 !important;
            box-shadow: 4px 4px 0px 0px #475569 !important;
        }

        html.dark #noteTitle {
            background-color: transparent !important;
            color: #f1f5f9 !important;
        }

        html.dark #noteTitle::placeholder {
            color: #64748b !important;
        }

        /* Note title divider */
        html.dark .h-10.w-px.bg-dark {
            background-color: #475569 !important;
        }


        /* Outline sidebar header */
        html.dark .bg-gray-50 {
            background-color: #1e293b !important;
        }

        /* Status bar text */
        html.dark #statusText {
            color: #64748b !important;
        }

        /* General text overrides in dark mode */
        html.dark .text-dark {
            color: #e2e8f0 !important;
        }

        html.dark .text-gray-400 {
            color: #64748b !important;
        }

        html.dark .text-gray-500 {
            color: #64748b !important;
        }

        html.dark .text-gray-600 {
            color: #94a3b8 !important;
        }

        html.dark .bg-gray-200 {
            background-color: #334155 !important;
        }

        html.dark .bg-gray-100 {
            background-color: #1e293b !important;
        }

        /* Mobile hamburger button */
        html.dark .neo-btn-sm.bg-white {
            background-color: #334155 !important;
        }

        html.dark .ql-toolbar.ql-snow {
            background: #1e293b;
            border-color: #475569 !important;
        }

        html.dark .ql-toolbar .ql-stroke {
            stroke: #94a3b8 !important;
        }

        html.dark .ql-toolbar .ql-fill {
            fill: #94a3b8 !important;
        }

        html.dark .ql-toolbar .ql-picker-label {
            color: #94a3b8 !important;
        }

        html.dark .ql-toolbar button:hover .ql-stroke {
            stroke: #e2e8f0 !important;
        }

        html.dark .ql-toolbar button:hover .ql-fill {
            fill: #e2e8f0 !important;
        }

        html.dark .ql-toolbar .ql-active .ql-stroke {
            stroke: #2979FF !important;
        }

        html.dark .ql-toolbar .ql-active .ql-fill {
            fill: #2979FF !important;
        }

        html.dark .ql-toolbar .ql-picker-options {
            background: #334155 !important;
            border-color: #475569 !important;
        }

        html.dark .ql-container.ql-snow {
            background-color: #1e293b;
        }

        html.dark .ql-editor {
            color: #e2e8f0;
        }

        html.dark .ql-editor.ql-blank::before {
            color: #64748b !important;
        }

        html.dark .ql-editor h1 {
            color: #f1f5f9 !important;
            border-color: #334155 !important;
        }

        html.dark .ql-editor h2 {
            color: #cbd5e1 !important;
        }

        html.dark .neo-input {
            background: #1e293b;
            border-color: #475569;
            color: #e2e8f0;
        }

        html.dark .neo-input:focus {
            box-shadow: 4px 4px 0px 0px #475569;
        }

        html.dark .neo-input::placeholder {
            color: #64748b;
        }

        html.dark .outline-link:hover {
            background-color: #334155;
            border-color: #FF8C42;
            box-shadow: 2px 2px 0px 0px #475569;
        }

        html.dark .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #475569;
            border-color: #334155;
        }

        html.dark .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }

        html.dark #noteTitle {
            color: #f1f5f9 !important;
        }

        html.dark #noteTitle::placeholder {
            color: #475569 !important;
        }

        html.dark .bg-pattern-trash {
            background-color: #1a0a10;
            background-image: radial-gradient(#FF6B95 0.5px, transparent 0.5px);
        }

        html.dark #customModal>div,
        html.dark #tableDialog>div {
            background: #1e293b !important;
            border-color: #475569 !important;
        }

        html.dark #customModal h3,
        html.dark #tableDialog h3 {
            color: #f1f5f9 !important;
        }

        html.dark #customModal p,
        html.dark #tableDialog p,
        html.dark #tableDialog label {
            color: #94a3b8 !important;
        }

        /* ===== CHECKLIST STYLES ===== */
        .ql-editor li[data-list="checked"]::before,
        .ql-editor li[data-list="unchecked"]::before {
            font-size: 1.35em;
            line-height: 1;
            cursor: pointer;
            margin-right: 0.2em;
        }

        .ql-editor li[data-list="unchecked"]::before {
            content: '☐';
            color: #94a3b8;
        }

        .ql-editor li[data-list="checked"]::before {
            content: '☑';
            color: #2979FF;
        }

        .ql-editor li[data-list="checked"] {
            color: #94a3b8;
            text-decoration: line-through;
        }

        html.dark .ql-editor li[data-list="unchecked"]::before {
            color: #64748b;
        }

        html.dark .ql-editor li[data-list="checked"]::before {
            color: #60a5fa;
        }

        html.dark .ql-editor li[data-list="checked"] {
            color: #475569;
        }

        .ql-check-btn {
            cursor: pointer;
            padding: 3px 5px;
            border: none;
            background: none;
        }

        .ql-check-btn svg {
            width: 18px;
            height: 18px;
        }

        /* ===== TABLE STYLES ===== */
        .ql-editor table {
            border-collapse: collapse;
            width: 100%;
            margin: 1em 0;
            border: 2px solid #1e293b;
            border-radius: 0.5rem;
            overflow: hidden;
        }

        .ql-editor td,
        .ql-editor th {
            border: 1.5px solid #cbd5e1;
            padding: 8px 12px;
            min-width: 60px;
            text-align: left;
        }

        .ql-editor th {
            background: #f1f5f9;
            font-weight: 700;
            font-family: 'Fredoka', sans-serif;
        }

        .ql-editor tr:nth-child(even) td {
            background: #f8fafc;
        }

        html.dark .ql-editor table {
            border-color: #475569;
        }

        html.dark .ql-editor td,
        html.dark .ql-editor th {
            border-color: #334155;
        }

        html.dark .ql-editor th {
            background: #0f172a;
        }

        html.dark .ql-editor tr:nth-child(even) td {
            background: #0f172a;
        }

        .ql-table-btn {
            cursor: pointer;
            padding: 3px 5px;
            border: none;
            background: none;
        }

        .ql-table-btn svg {
            width: 18px;
            height: 18px;
        }

        /* ===== IMAGE STYLES ===== */
        .ql-editor img {
            max-width: 100%;
            height: auto;
            border-radius: 0.75rem;
            border: 3px solid #1e293b;
            margin: 1em auto;
            display: block;
            box-shadow: 4px 4px 0px 0px rgba(30, 41, 59, 0.2);
        }

        html.dark .ql-editor img {
            border-color: #475569;
            box-shadow: 4px 4px 0px 0px rgba(71, 85, 105, 0.3);
        }

        /* ===== TABLE DIALOG ===== */
        .table-dialog-input {
            width: 80px;
            padding: 8px 12px;
            border: 3px solid #1e293b;
            border-radius: 0.75rem;
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            text-align: center;
            background: white;
        }

        .table-dialog-input:focus {
            outline: none;
            box-shadow: 3px 3px 0px 0px #2979FF;
        }

        html.dark .table-dialog-input {
            background: #334155;
            border-color: #475569;
            color: #e2e8f0;
        }

        html.dark .table-dialog-input:focus {
            box-shadow: 3px 3px 0px 0px #2979FF;
        }
    </style>
</head>

<body class="h-screen flex flex-col text-dark">

    <input type="file" id="importInput" accept=".json" class="hidden" onchange="processImport(this)">
    <input type="file" id="imageInput" accept="image/*" class="hidden" onchange="processImageInput(this)">

    <header class="bg-white border-b-3 border-dark z-40 flex-none sticky top-0">
        <div class="max-w-screen-2xl mx-auto px-6 h-20 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div
                    class="w-12 h-12 bg-orange rounded-xl border-3 border-dark flex items-center justify-center text-white shadow-hard-sm">
                    <i data-lucide="book-open" class="w-7 h-7 stroke-[2.5px]"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-heading font-bold text-dark leading-none">Lesson Notes</h1>
                    <p class="text-[11px] text-gray-500 font-extrabold tracking-widest uppercase mt-1">English 1 Batam
                    </p>
                </div>
            </div>

            <div class="flex items-center gap-3">
                <button onclick="toggleDarkMode()"
                    class="neo-btn bg-white text-dark px-3 py-2 rounded-xl text-sm flex items-center gap-2"
                    title="Toggle Dark Mode">
                    <i id="darkModeIcon" data-lucide="moon" class="w-4 h-4"></i>
                    <span id="darkModeText" class="hidden xl:inline">Dark</span>
                </button>
                <button onclick="toggleZenMode()"
                    class="neo-btn bg-white text-dark px-3 py-2 rounded-xl text-sm flex items-center gap-2"
                    title="Toggle Zen Mode">
                    <i id="zenModeIcon" data-lucide="maximize-2" class="w-4 h-4"></i>
                    <span id="zenModeText" class="hidden xl:inline">Zen</span>
                </button>
                <button onclick="toggleOutline()"
                    class="neo-btn bg-white text-dark px-3 py-2 rounded-xl text-sm flex items-center gap-2"
                    title="Toggle Outline">
                    <i data-lucide="list-tree" class="w-4 h-4"></i>
                    <span class="hidden xl:inline">Outline</span>
                </button>

                <button onclick="exportJSON()"
                    class="neo-btn bg-blue text-white px-3 py-2 rounded-xl text-sm flex items-center gap-2"
                    title="Backup Notes">
                    <i data-lucide="save" class="w-4 h-4"></i>
                    <span class="hidden lg:inline">Backup</span>
                </button>
                <button onclick="triggerImport()"
                    class="neo-btn bg-orange text-white px-3 py-2 rounded-xl text-sm flex items-center gap-2"
                    title="Restore Notes">
                    <i data-lucide="upload-cloud" class="w-4 h-4"></i>
                    <span class="hidden lg:inline">Restore</span>
                </button>

                <button onclick="exportPDF()"
                    class="neo-btn bg-pink text-white px-3 py-2 rounded-xl text-sm flex items-center gap-2">
                    <i data-lucide="download" class="w-4 h-4"></i>
                    <span class="hidden lg:inline">PDF</span>
                </button>
            </div>
        </div>
    </header>

    <div class="flex-grow flex overflow-hidden max-w-screen-2xl mx-auto w-full">

        <aside id="sidebar"
            class="w-80 bg-chalk border-r-3 border-dark flex flex-col transition-all duration-300 absolute z-30 h-full md:relative transform md:transform-none -translate-x-full md:translate-x-0 overflow-hidden">

            <div class="min-w-[20rem] h-full flex flex-col">
                <div class="p-5 border-b-3 border-dark bg-white" id="sidebarHeader">
                    <div class="flex gap-2 mb-4">
                        <button id="newNoteBtn" onclick="createNewNote()"
                            class="flex-grow neo-btn bg-blue text-white py-3 rounded-xl font-heading text-lg flex items-center justify-center gap-2">
                            <i data-lucide="plus" class="w-5 h-5"></i>
                            NEW NOTE
                        </button>
                        <button id="trashToggleBtn" onclick="toggleTrashMode()"
                            class="w-14 neo-btn bg-gray-200 text-dark py-3 rounded-xl flex items-center justify-center transition-colors"
                            title="View Trash">
                            <i data-lucide="trash" class="w-5 h-5"></i>
                        </button>
                    </div>

                    <div class="relative group">
                        <i data-lucide="search"
                            class="absolute left-3 top-1/2 transform -translate-y-1/2 text-dark w-4 h-4"></i>
                        <input type="text" id="searchInput" placeholder="Search notes..."
                            class="neo-input w-full pl-10 pr-4 py-2 text-sm font-bold text-dark">
                    </div>
                </div>

                <div id="trashHeader"
                    class="hidden bg-pink text-white p-3 text-center font-heading font-bold text-sm border-b-3 border-dark flex items-center justify-center gap-2">
                    <i data-lucide="trash-2" class="w-4 h-4"></i> TRASH BIN MODE
                </div>

        <aside id="outlineSidebar"

    <div id="customModal"
        class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/80 backdrop-blur-sm animate-pop">
        <div class="neo-card max-w-md w-full p-8 flex flex-col items-center text-center border-pink">

                class="w-20 h-20 rounded-full flex items-center justify-center mb-6 bg-pink/20 text-pink border-3 border-pink">

                <button id="modalCancel" class="flex-1 neo-btn bg-white text-dark py-3 rounded-xl text-lg">
                    Cancel
                </button>
                <button id="modalConfirm" class="flex-1 neo-btn bg-pink text-white py-3 rounded-xl text-lg">
                    Trash It

    <!-- Table Insert Dialog -->
    <div id="tableDialog"
        class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/80 backdrop-blur-sm animate-pop">
        <div class="neo-card max-w-sm w-full p-8 flex flex-col items-center text-center">
            <div
                class="w-16 h-16 rounded-full flex items-center justify-center mb-5 bg-blue/20 text-blue border-3 border-blue">
                <i data-lucide="table" class="w-8 h-8"></i>
            </div>
            <h3 class="text-2xl font-heading font-bold text-dark mb-5">Insert Table</h3>
            <div class="flex gap-6 mb-6">
                <div class="text-center">
                    <label class="block text-xs font-bold text-gray-500 mb-2 uppercase tracking-wider">Rows</label>
                    <input type="number" id="tableRows" value="3" min="1" max="20" class="table-dialog-input">
                </div>
                <div class="text-center">
                    <label class="block text-xs font-bold text-gray-500 mb-2 uppercase tracking-wider">Columns</label>
                    <input type="number" id="tableCols" value="3" min="1" max="10" class="table-dialog-input">
                </div>
            </div>
            <div class="flex gap-4 w-full">
                <button onclick="closeTableDialog()"
                    class="flex-1 neo-btn bg-white text-dark py-3 rounded-xl text-lg">Cancel</button>
                <button onclick="confirmInsertTable()"
                    class="flex-1 neo-btn bg-blue text-white py-3 rounded-xl text-lg">Insert</button>
            </div>
        </div>
    </div>

    <script>
        // ===== GLOBAL STATE =====
        let notes = JSON.parse(localStorage.getItem('e1_lesson_notes')) || [];
        notes = notes.map(n => ({ ...n, deleted: n.deleted || false }));

        let currentNoteId = null;
        let quill;
        let isZenMode = false;
        let isOutlineOpen = false;
        let isTrashMode = false;
        let isDarkMode = false;
        let imageDB = null;
        let blobUrlMap = {}; // blobUrl -> idbKey

        // ===== INDEXEDDB FOR IMAGES =====
        function openImageDB() {
            return new Promise((resolve, reject) => {
                const req = indexedDB.open('LessonNotesImageDB', 1);
                req.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains('images')) {
                        db.createObjectStore('images', { keyPath: 'id' });
                    }
                };
                req.onsuccess = (e) => resolve(e.target.result);
                req.onerror = (e) => reject(e.target.error);
            });
        }

        function storeImage(id, arrayBuffer, mimeType) {
            return new Promise((resolve, reject) => {
                const tx = imageDB.transaction('images', 'readwrite');
                tx.objectStore('images').put({ id, data: arrayBuffer, type: mimeType });
                tx.oncomplete = () => resolve();
                tx.onerror = (e) => reject(e.target.error);
            });
        }

        function getImage(id) {
            return new Promise((resolve, reject) => {
                const tx = imageDB.transaction('images', 'readonly');
                const req = tx.objectStore('images').get(id);
                req.onsuccess = () => resolve(req.result);
                req.onerror = (e) => reject(e.target.error);
            });
        }

        function deleteImage(id) {
            return new Promise((resolve, reject) => {
                const tx = imageDB.transaction('images', 'readwrite');
                tx.objectStore('images').delete(id);
                tx.oncomplete = () => resolve();
                tx.onerror = (e) => reject(e.target.error);
            });
        }

        async function deleteImagesInContent(html) {
            const regex = /idb:\/\/([\w_-]+)/g;
            let m;
            while ((m = regex.exec(html)) !== null) {
                try { await deleteImage(m[1]); } catch (e) { console.warn('Failed to delete image', m[1]); }
            }
        }

        function arrayBufferToBase64(buf) {
            const bytes = new Uint8Array(buf);
            let bin = '';
            for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
            return btoa(bin);
        }

        function base64ToArrayBuffer(b64) {
            const bin = atob(b64);
            const bytes = new Uint8Array(bin.length);
            for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
            return bytes.buffer;
        }

        // ===== DARK MODE =====
        function initDarkMode() {
            const saved = localStorage.getItem('e1_theme');
            if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                isDarkMode = true;
                document.documentElement.classList.add('dark');
            }
            updateDarkModeUI();
        }

        function toggleDarkMode() {
            isDarkMode = !isDarkMode;
            document.documentElement.classList.toggle('dark', isDarkMode);
            localStorage.setItem('e1_theme', isDarkMode ? 'dark' : 'light');
            updateDarkModeUI();
        }

        function updateDarkModeUI() {
            const icon = document.getElementById('darkModeIcon');
            const text = document.getElementById('darkModeText');
            if (icon) icon.setAttribute('data-lucide', isDarkMode ? 'sun' : 'moon');
            if (text) text.textContent = isDarkMode ? 'Light' : 'Dark';
            lucide.createIcons();
        }

        // ===== INIT =====
        document.addEventListener('DOMContentLoaded', async () => {
            initDarkMode();
            imageDB = await openImageDB();
            initQuill();

            if (notes.filter(n => !n.deleted).length === 0) {
                createNewNote();
            } else {
                const lastActiveId = localStorage.getItem('e1_last_active_note');
                const noteToLoad = notes.find(n => n.id === lastActiveId && !n.deleted) || notes.find(n => !n.deleted);
                if (noteToLoad) await loadNote(noteToLoad.id);
                else createNewNote();
            }

            renderNotesList();

            document.getElementById('noteTitle').addEventListener('input', saveCurrentNote);
            quill.on('text-change', (delta, oldDelta, source) => {
                if (source === 'user') {
                    const hasImage = delta.ops.some(op => op.insert && op.insert.image);
                    if (hasImage) convertBase64ImagesToIDB();
                }
                saveCurrentNote();
                updateOutline();
            });
            document.getElementById('searchInput').addEventListener('input', renderNotesList);

            // Native checklists in 2.0 handle clicks automatically.


            lucide.createIcons();
        });

        // ===== QUILL 2.0 SETUP =====
        function initQuill() {
            quill = new Quill('#editor-container', {
                theme: 'snow',
                placeholder: 'Start typing your amazing lesson plan...',
                modules: {
                    table: true,
                    toolbar: [
                        [{ 'header': [1, 2, false] }],
                        ['bold', 'italic', 'underline', 'strike'],
                        [{ 'list': 'ordered' }, { 'list': 'bullet' }, { 'list': 'check' }],
                        [{ 'color': [] }, { 'background': [] }],
                        ['link', 'image', 'table'],
                        ['clean']
                    ]
                }
            });

            // Handle the native table button click
            const toolbar = quill.getModule('toolbar');
            toolbar.addHandler('table', function () {
                openTableDialog();
            });
        }

        // ===== IMAGE HANDLING =====
        function handleImageInsert() {
            document.getElementById('imageInput').click();
        }

        async function processImageInput(inputEl) {
            const file = inputEl.files[0];
            if (!file) return;
            try {
                const id = `img_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`;
                const arrayBuffer = await file.arrayBuffer();
                await storeImage(id, arrayBuffer, file.type);

                const blob = new Blob([arrayBuffer], { type: file.type });
                const blobUrl = URL.createObjectURL(blob);
                blobUrlMap[blobUrl] = id;

                const range = quill.getSelection(true);
                quill.insertEmbed(range.index, 'image', blobUrl);
                quill.setSelection(range.index + 1);
            } catch (err) {
                console.error('Failed to insert image:', err);
                alert('Failed to insert image. Please try again.');
            }
            inputEl.value = '';
        }

        async function convertBase64ImagesToIDB() {
            const images = quill.root.querySelectorAll('img[src^="data:"]');
            for (const img of images) {
                const src = img.getAttribute('src');
                const match = src.match(/^data:([^;]+);base64,(.+)$/);
                if (match) {
                    try {
                        const id = `img_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`;
                        const arrayBuffer = base64ToArrayBuffer(match[2]);
                        await storeImage(id, arrayBuffer, match[1]);
                        const blob = new Blob([arrayBuffer], { type: match[1] });
                        const blobUrl = URL.createObjectURL(blob);
                        blobUrlMap[blobUrl] = id;
                        img.setAttribute('src', blobUrl);
                    } catch (e) { console.warn('Failed to convert pasted image', e); }
                }
            }
        }

        function getContentForSave() {
            let html = quill.root.innerHTML;
            for (const [blobUrl, idbKey] of Object.entries(blobUrlMap)) {
                html = html.split(blobUrl).join(`idb://${idbKey}`);
            }
            return html;
        }

        async function resolveImagesInHtml(html) {
            // Revoke old blob URLs
            for (const url of Object.keys(blobUrlMap)) {
                URL.revokeObjectURL(url);
            }
            blobUrlMap = {};

            const regex = /idb:\/\/([\w_-]+)/g;
            let m;
            const replacements = [];
            while ((m = regex.exec(html)) !== null) {
                try {
                    const data = await getImage(m[1]);
                    if (data) {
                        const blob = new Blob([data.data], { type: data.type });
                        const blobUrl = URL.createObjectURL(blob);
                        blobUrlMap[blobUrl] = m[1];
                        replacements.push({ from: `idb://${m[1]}`, to: blobUrl });
                    }
                } catch (e) { console.warn('Failed to load image', m[1]); }
            }
            for (const { from, to } of replacements) {
                html = html.split(from).join(to);
            }
            return html;
        }

        // ===== TABLE HANDLING =====
        function openTableDialog() {
            document.getElementById('tableDialog').classList.remove('hidden');
            document.getElementById('tableRows').value = 3;
            document.getElementById('tableCols').value = 3;
            lucide.createIcons();
        }

        function closeTableDialog() {
            document.getElementById('tableDialog').classList.add('hidden');
        }

        function confirmInsertTable() {
            const rows = parseInt(document.getElementById('tableRows').value) || 3;
            const cols = parseInt(document.getElementById('tableCols').value) || 3;
            closeTableDialog();
            insertTable(Math.min(rows, 20), Math.min(cols, 10));
        }

        function insertTable(rows, cols) {
            const tableModule = quill.getModule('table');
            // Ensure editor is focused and has a valid selection
            quill.focus();
            let range = quill.getSelection();
            if (!range) {
                quill.setSelection(quill.getLength(), 0);
                range = quill.getSelection();
            }
            tableModule.insertTable(rows, cols);
        }

        // ===== OUTLINE =====
        function updateOutline() {
            const outlineList = document.getElementById('outlineList');
            const editor = quill.root;
            const headings = editor.querySelectorAll('h1, h2');

            if (headings.length === 0) {
                outlineList.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-40 text-center px-6 mt-10">
                        <div class="w-12 h-12 bg-gray-100 border-2 border-dashed border-gray-300 rounded-xl flex items-center justify-center mb-3 text-gray-400">
                            <i data-lucide="heading" class="w-6 h-6"></i>
                        </div>
                        <p class="text-gray-400 text-sm font-bold">Use H1 or H2 headings to generate an outline.</p>
                    </div>`;
                lucide.createIcons();
                return;
            }

            outlineList.innerHTML = '';
            headings.forEach((heading, index) => {
                const text = heading.innerText.trim();
                if (!text) return;
                const type = heading.tagName.toLowerCase();
                heading.id = `heading-${index}`;
                const item = document.createElement('div');
                item.className = `outline-link py-2 px-3 rounded-lg cursor-pointer mb-1 ${type === 'h1' ? 'font-heading font-bold text-sm text-dark' : 'font-body font-bold text-xs text-gray-500 pl-6'}`;
                item.innerText = text;
                item.onclick = () => {
                    heading.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    const orig = heading.style.backgroundColor;
                    heading.style.backgroundColor = isDarkMode ? '#334155' : '#fff7ed';
                    setTimeout(() => heading.style.backgroundColor = orig, 1500);
                    if (window.innerWidth < 768) toggleOutline();
                };
                outlineList.appendChild(item);
            });
        }

        function toggleOutline() {
            const sidebar = document.getElementById('outlineSidebar');
            isOutlineOpen = !isOutlineOpen;
            if (isOutlineOpen) {
                sidebar.classList.remove('w-0', 'opacity-0');
                sidebar.classList.add('w-80', 'opacity-100');
                updateOutline();
            } else {
                sidebar.classList.remove('w-80', 'opacity-100');
                sidebar.classList.add('w-0', 'opacity-0');
            }
        }

        // ===== EXPORT / IMPORT =====
        async function exportJSON() {
            const exportData = JSON.parse(JSON.stringify(notes));

            // Convert idb:// refs to base64 data URIs for portability
            for (const note of exportData) {
                const regex = /idb:\/\/([\w_-]+)/g;
                let m;
                const reps = [];
                while ((m = regex.exec(note.content)) !== null) {
                    try {
                        const data = await getImage(m[1]);
                        if (data) {
                            const b64 = arrayBufferToBase64(data.data);
                            reps.push({ from: `idb://${m[1]}`, to: `data:${data.type};base64,${b64}` });
                        }
                    } catch (e) { console.warn('Export image failed', m[1]); }
                }
                for (const { from, to } of reps) note.content = note.content.split(from).join(to);
            }

            const dataStr = JSON.stringify(exportData, null, 2);
            const dataUri = 'data:application/json;charset=utf-8,' + encodeURIComponent(dataStr);
            const link = document.createElement('a');
            link.setAttribute('href', dataUri);
            link.setAttribute('download', `english1_backup_${new Date().toISOString().split('T')[0]}.json`);
            link.click();
        }

        function triggerImport() { document.getElementById('importInput').click(); }

        async function processImport(inputElement) {
            const file = inputElement.files[0];
            if (!file) return;

            const confirmed = await showModal('Import Backup?', 'WARNING: This will REPLACE all current notes with the backup file. This cannot be undone.', 'Yes, Replace All', 'alert-triangle');
            if (!confirmed) { inputElement.value = ''; return; }

            const reader = new FileReader();
            reader.onload = async function (e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (!Array.isArray(imported)) { alert('Invalid backup file format.'); return; }

                    // Convert base64 data URIs in imported notes to IndexedDB
                    for (const note of imported) {
                        const regex = /data:([^;]+);base64,([A-Za-z0-9+\/=]+)/g;
                        let m;
                        const reps = [];
                        while ((m = regex.exec(note.content)) !== null) {
                            try {
                                const id = `img_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`;
                                await storeImage(id, base64ToArrayBuffer(m[2]), m[1]);
                                reps.push({ from: m[0], to: `idb://${id}` });
                            } catch (err) { console.warn('Import image failed', err); }
                        }
                        for (const { from, to } of reps) note.content = note.content.split(from).join(to);
                    }

                    notes = imported;
                    saveToStorage();
                    if (isTrashMode) toggleTrashMode();
                    const first = notes.find(n => !n.deleted);
                    if (first) await loadNote(first.id);
                    else createNewNote();
                    renderNotesList();
                    alert('Backup restored successfully!');
                } catch (err) {
                    alert('Error parsing JSON file.');
                    console.error(err);
                }
            };
            reader.readAsText(file);
            inputElement.value = '';
        }

        // ===== TRASH MODE =====
        function toggleTrashMode() {
            isTrashMode = !isTrashMode;
            const trashBtn = document.getElementById('trashToggleBtn');
            const trashHeader = document.getElementById('trashHeader');
            const newNoteBtn = document.getElementById('newNoteBtn');

            if (isTrashMode) {
                trashBtn.classList.replace('bg-gray-200', 'bg-pink');
                trashBtn.classList.replace('text-dark', 'text-white');
                trashHeader.classList.remove('hidden');
                newNoteBtn.classList.add('opacity-50', 'pointer-events-none');
                const firstTrash = notes.find(n => n.deleted);
                if (firstTrash) { loadNote(firstTrash.id); }
                else {
                    currentNoteId = null;
                    document.getElementById('noteTitle').value = "";
                    quill.root.innerHTML = "<p>Trash is empty.</p>";
                    quill.disable();
                    renderNotesList();
                }
            } else {
                trashBtn.classList.replace('bg-pink', 'bg-gray-200');
                trashBtn.classList.replace('text-white', 'text-dark');
                trashHeader.classList.add('hidden');
                newNoteBtn.classList.remove('opacity-50', 'pointer-events-none');
                quill.enable();
                const firstActive = notes.find(n => !n.deleted);
                if (firstActive) loadNote(firstActive.id);
                else createNewNote();
            }
            renderNotesList();
            updateUIState();
        }

        function updateUIState() {
            const softDelBtn = document.getElementById('softDeleteBtn');
            const trashButtons = document.getElementById('trashButtons');
            const statusIndicator = document.getElementById('statusIndicator');
            const statusText = document.getElementById('statusText');
            if (isTrashMode) {
                softDelBtn.classList.add('hidden');
                trashButtons.classList.remove('hidden');
                statusIndicator.className = "w-3 h-3 rounded-full bg-pink border-2 border-dark";
                statusText.innerText = "Deleted Note";
                document.getElementById('noteTitle').disabled = true;
                quill.disable();
            } else {
                softDelBtn.classList.remove('hidden');
                trashButtons.classList.add('hidden');
                statusIndicator.className = "w-3 h-3 rounded-full bg-green border-2 border-dark";
                statusText.innerText = "Auto-saved";
                document.getElementById('noteTitle').disabled = false;
                quill.enable();
            }
        }

        // ===== NOTE CRUD =====
        function createNewNote() {
            if (isTrashMode) return;
            const newNote = { id: Date.now().toString(), title: '', content: '', updatedAt: Date.now(), deleted: false };
            notes.unshift(newNote);
            saveToStorage();
            loadNote(newNote.id);
            if (window.innerWidth < 768) toggleSidebar();
        }

        async function loadNote(id) {
            currentNoteId = id;
            if (!isTrashMode) localStorage.setItem('e1_last_active_note', id);
            const note = notes.find(n => n.id === id);
            if (!note) return;

            document.getElementById('noteTitle').value = note.title;

            // Resolve idb:// image URLs
            const resolvedHtml = await resolveImagesInHtml(note.content);
            quill.root.innerHTML = resolvedHtml;

            renderNotesList();
            updateOutline();
            updateUIState();
        }

        function saveCurrentNote() {
            if (!currentNoteId || isTrashMode) return;
            const noteIndex = notes.findIndex(n => n.id === currentNoteId);
            if (noteIndex !== -1) {
                const note = notes[noteIndex];
                note.title = document.getElementById('noteTitle').value;
                note.content = getContentForSave();
                note.updatedAt = Date.now();
                notes.splice(noteIndex, 1);
                notes.unshift(note);
                saveToStorage();
                renderNotesList();
            }
        }

        async function softDeleteCurrentNote() {
            if (!currentNoteId) return;
            const confirmed = await showModal('Move to Trash?', 'You can restore this note later from the Trash bin.', 'Trash It');
            if (confirmed) {
                const noteIndex = notes.findIndex(n => n.id === currentNoteId);
                if (noteIndex !== -1) {
                    notes[noteIndex].deleted = true;
                    notes[noteIndex].updatedAt = Date.now();
                    saveToStorage();
                    const nextNote = notes.find(n => !n.deleted);
                    if (nextNote) await loadNote(nextNote.id);
                    else createNewNote();
                }
            }
        }

        async function permanentDeleteCurrentNote() {
            if (!currentNoteId) return;
            const confirmed = await showModal('Delete Forever?', 'This action cannot be undone. The note will be gone.', 'Delete Forever');
            if (confirmed) {
                const note = notes.find(n => n.id === currentNoteId);
                if (note) await deleteImagesInContent(note.content);
                notes = notes.filter(n => n.id !== currentNoteId);
                saveToStorage();
                const nextTrash = notes.find(n => n.deleted);
                if (nextTrash) { await loadNote(nextTrash.id); }
                else {
                    currentNoteId = null;
                    document.getElementById('noteTitle').value = "";
                    quill.root.innerHTML = "<p>Trash is empty.</p>";
                    renderNotesList();
                }
            }
        }

        function restoreCurrentNote() {
            if (!currentNoteId) return;
            const noteIndex = notes.findIndex(n => n.id === currentNoteId);
            if (noteIndex !== -1) {
                notes[noteIndex].deleted = false;
                notes[noteIndex].updatedAt = Date.now();
                saveToStorage();
                const nextTrash = notes.find(n => n.deleted);
                if (nextTrash) loadNote(nextTrash.id);
                else {
                    toggleTrashMode();
                    loadNote(notes[noteIndex].id);
                    return;
                }
                renderNotesList();
            }
        }

        // ===== RENDER NOTES LIST =====
        function renderNotesList() {
            const list = document.getElementById('notesList');
            const search = document.getElementById('searchInput').value.toLowerCase();
            list.innerHTML = '';
            const filtered = notes.filter(n => {
                const matchesSearch = (n.title || 'Untitled').toLowerCase().includes(search) || stripHtml(n.content).toLowerCase().includes(search);
                const matchesMode = isTrashMode ? n.deleted === true : n.deleted !== true;
                return matchesSearch && matchesMode;
            });
            if (filtered.length === 0) {
                list.innerHTML = `<div class="text-center py-8 text-gray-400 font-bold text-sm">${isTrashMode ? 'Trash is empty.' : 'No notes found.'}</div>`;
                return;
            }
            filtered.forEach(note => {
                const el = document.createElement('div');
                const title = note.title || 'Untitled Lesson';
                const date = new Date(note.updatedAt).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                const isActive = note.id === currentNoteId;
                let baseClasses = "note-item p-4 rounded-xl cursor-pointer mb-2 relative overflow-hidden";
                if (isActive) baseClasses += isTrashMode ? " active-trash" : " active";
                el.className = baseClasses;
                el.onclick = () => { loadNote(note.id); if (window.innerWidth < 768) toggleSidebar(); };
                const rawText = stripHtml(note.content).substring(0, 60);
                const titleColor = isActive ? (isTrashMode ? 'text-pink text-lg' : 'text-blue text-lg') : 'text-dark text-base';
                const badgeColor = isActive ? (isTrashMode ? 'bg-pink text-white border-2 border-dark' : 'bg-blue text-white border-2 border-dark') : 'bg-gray-200 text-gray-500';
                el.innerHTML = `
                    <div class="flex justify-between items-start mb-1.5 relative z-10">
                        <h4 class="font-heading font-bold truncate pr-2 ${titleColor}">${title}</h4>
                        <span class="text-[10px] font-bold ${badgeColor} px-2 py-1 rounded-md">${date}</span>
                    </div>
                    <p class="text-xs ${isActive ? 'text-dark' : 'text-gray-400'} truncate font-bold relative z-10">${rawText || 'Empty note...'}</p>`;
                list.appendChild(el);
            });
        }

        // ===== UTILITY =====
        function saveToStorage() { localStorage.setItem('e1_lesson_notes', JSON.stringify(notes)); }
        function stripHtml(html) { const t = document.createElement("DIV"); t.innerHTML = html; return t.textContent || t.innerText || ""; }
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('-translate-x-full'); }

        function toggleZenMode() {
            const sidebar = document.getElementById('sidebar');
            const btnIcon = document.getElementById('zenModeIcon');
            const btnText = document.getElementById('zenModeText');
            isZenMode = !isZenMode;
            if (isZenMode) {
                sidebar.classList.add('md:w-0', 'md:opacity-0', 'md:border-none');
                sidebar.classList.remove('md:w-80', 'border-r-3');
                if (btnIcon) btnIcon.setAttribute('data-lucide', 'minimize-2');
                if (btnText) btnText.textContent = 'Exit Zen';
                if (isOutlineOpen) toggleOutline();
            } else {
                sidebar.classList.remove('md:w-0', 'md:opacity-0', 'md:border-none');
                sidebar.classList.add('md:w-80', 'border-r-3');
                if (btnIcon) btnIcon.setAttribute('data-lucide', 'maximize-2');
                if (btnText) btnText.textContent = 'Zen Mode';
            }
            lucide.createIcons();
        }

        function exportPDF() {
            const note = notes.find(n => n.id === currentNoteId);
            if (!note) return;
            const printEl = document.getElementById('print-container');
            document.getElementById('print-title').textContent = note.title || 'Untitled Lesson';
            document.getElementById('print-date').textContent = new Date().toLocaleDateString();
            document.getElementById('print-body').innerHTML = note.content;
            printEl.classList.remove('hidden');
            const opt = { margin: 0.5, filename: `${(note.title || 'lesson-note').replace(/\s+/g, '_')}.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' } };
            html2pdf().set(opt).from(printEl).save().then(() => { printEl.classList.add('hidden'); });
        }

        function showModal(title, desc, confirmText, iconName) {
            return new Promise((resolve) => {
                const modal = document.getElementById('customModal');
                const titleEl = document.getElementById('modalTitle');
                const descEl = document.getElementById('modalDesc');
                const confirmBtn = document.getElementById('modalConfirm');
                const cancelBtn = document.getElementById('modalCancel');
                const iconEl = document.getElementById('modalIcon');
                if (title) titleEl.innerText = title;
                if (desc) descEl.innerText = desc;
                if (confirmText) confirmBtn.innerText = confirmText;
                if (iconName) { iconEl.setAttribute('data-lucide', iconName); lucide.createIcons(); }
                modal.classList.remove('hidden');
                const cleanup = (value) => {
                    modal.classList.add('hidden');
                    confirmBtn.onclick = null;
                    cancelBtn.onclick = null;
                    iconEl.setAttribute('data-lucide', 'trash-2');
                    lucide.createIcons();
                    resolve(value);
                };
                confirmBtn.onclick = () => cleanup(true);
                cancelBtn.onclick = () => cleanup(false);
            });
        }
    </script>
</body>
