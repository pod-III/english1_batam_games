<!DOCTYPE html>
<html lang="en">

<head>
  <!-- Supabase Auth -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/supabase.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Task — KlassKit</title>
  <link rel="icon" type="image/x-icon" href="../../media/icon.ico" />
  <link rel="icon" type="image/webp" href="../../media/icon.webp" />

  <script>
    if (localStorage.getItem("theme_tasks") === "dark" || (!localStorage.getItem("theme_tasks") && window.matchMedia("(prefers-color-scheme:dark)").matches)) {
      document.documentElement.classList.add("dark")
    }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap"
    rel="stylesheet">

  <!-- Icons & Styling -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            heading: ['Fredoka', 'sans-serif'],
            body: ['Nunito', 'sans-serif'],
          },
          colors: {
            pink: '#ff4785',
            orange: '#ff7e33',
            green: '#00d063',
            blue: '#1ea7fd',
            dark: '#111827',
            chalk: '#f8fafc'
          },
          boxShadow: {
            'hard': '4px 4px 0px 0px rgba(17, 24, 39, 1)',
            'hard-sm': '2px 2px 0px 0px rgba(17, 24, 39, 1)',
            'hard-dark': '4px 4px 0px 0px rgba(100, 116, 139, 1)',
            'hard-sm-dark': '2px 2px 0px 0px rgba(100, 116, 139, 1)',
            'hard-hover': '6px 6px 0px 0px rgba(17, 24, 39, 1)',
            'neo': '4px 4px 0px 0px rgba(51,65,85,0.15)',
            'neo-sm': '2px 2px 0px 0px rgba(51,65,85,0.15)',
          }
        }
      }
    }
  </script>

  <link rel="stylesheet" href="../../css/base.css" />
  <link rel="stylesheet" href="../../css/components.css" />

  <style>
    /* Custom styles for Task Manager */
    .prio-pill, .cat-pill {
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .prio-pill:hover, .cat-pill:hover {
      transform: translateY(-2px);
    }
    
    .active-pill-blue { background-color: var(--color-blue) !important; color: white !important; border-color: var(--border-primary) !important; box-shadow: var(--shadow-sm) !important; transform: translateY(-2px); }
    .active-pill-orange { background-color: var(--color-orange) !important; color: var(--color-dark) !important; border-color: var(--border-primary) !important; box-shadow: var(--shadow-sm) !important; transform: translateY(-2px); }
    .active-pill-pink { background-color: var(--color-pink) !important; color: white !important; border-color: var(--border-primary) !important; box-shadow: var(--shadow-sm) !important; transform: translateY(-2px); }
    .active-pill-green { background-color: var(--color-green) !important; color: var(--color-dark) !important; border-color: var(--border-primary) !important; box-shadow: var(--shadow-sm) !important; transform: translateY(-2px); }
    .active-pill-slate { background-color: #475569 !important; color: white !important; border-color: var(--border-primary) !important; box-shadow: var(--shadow-sm) !important; transform: translateY(-2px); }

    .dark .active-pill-blue, .dark .active-pill-orange, .dark .active-pill-pink, .dark .active-pill-green, .dark .active-pill-slate {
      border-color: #94a3b8 !important;
      box-shadow: 2px 2px 0px #94a3b8 !important;
    }

    .todo-item {
      transition: all var(--transition-base);
    }
    .todo-item:hover {
      transform: translateY(-2px);
    }
  </style>
</head>

<body class="min-h-screen pb-12">
  <!-- Unified Header -->
  <header class="glass-panel sticky top-0 z-40 h-14 flex items-center justify-between px-4 md:px-6 border-b-[3px] border-[var(--border-primary)]" style="border-radius: 0;">
    <div class="flex items-center gap-2 md:gap-3">
      <div class="w-8 h-8 bg-orange rounded-xl border-[2px] border-white/40 flex items-center justify-center text-white shadow-neo-sm">
        <i data-lucide="check-square" class="w-5 h-5 stroke-[2.5px]"></i>
      </div>
      <div>
        <h1 class="font-heading font-bold text-lg md:text-xl tracking-tight leading-none text-dark dark:text-white">My Task</h1>
        <p class="text-[9px] font-black text-slate-400 uppercase tracking-[0.2em] leading-none mt-1">KlassKit Workspace</p>
      </div>
    </div>

    <!-- Actions -->
    <div class="flex items-center gap-2">
      <button onclick="toggleTheme()"
        class="p-2 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors" title="Toggle Theme">
        <i data-lucide="sun" class="w-4 h-4 dark:hidden text-slate-500"></i>
        <i data-lucide="moon" class="w-4 h-4 hidden dark:block text-slate-400"></i>
      </button>
    </div>
  </header>

  <!-- Main Content -->
  <main class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8 items-start p-4 md:p-8 relative z-10">
    
    <!-- Left Column: Controls -->
    <div class="lg:col-span-4 space-y-6 lg:sticky lg:top-20">
      
      <!-- Progress Panel -->
      <div class="glass-panel border-[3px] border-[var(--border-primary)] rounded-[2rem] p-6 shadow-hard dark:shadow-hard-dark">
        <div class="flex items-center justify-between mb-4">
          <h3 class="font-heading font-bold text-xl text-dark dark:text-white">Status</h3>
          <div id="progressText" class="text-xs font-black bg-orange/10 text-orange px-3 py-1 rounded-full uppercase">0% Done</div>
        </div>
        <div class="w-full bg-slate-100 dark:bg-slate-800 border-2 border-[var(--border-primary)] rounded-full h-4 overflow-hidden shadow-inner">
          <div id="progressBar" class="bg-orange h-full transition-all duration-700 ease-out" style="width: 0%"></div>
        </div>
      </div>

      <!-- Input Panel -->
      <div class="glass-panel border-[3px] border-[var(--border-primary)] rounded-[2rem] shadow-hard dark:shadow-hard-dark p-6 flex flex-col gap-5">
        <div class="space-y-2">
          <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1">New Task</label>
          <input type="text" id="todoInput" placeholder="What needs to be done?"
            class="w-full font-bold text-base px-4 py-3 bg-white dark:bg-slate-800/90 border-2 border-[var(--border-primary)] rounded-xl focus:outline-none focus:-translate-y-1 focus:shadow-hard dark:focus:shadow-hard-dark transition-all placeholder-slate-400 dark:text-white">
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div class="space-y-2">
            <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1">Priority</label>
            <div id="prioritySelector" class="grid grid-cols-1 gap-2">
              <button onclick="setPriority('low')" data-value="low" class="prio-pill py-2 rounded-lg text-[10px] font-bold uppercase tracking-wider border-2 border-slate-200 dark:border-slate-700 text-slate-400 bg-white dark:bg-slate-800">Low</button>
              <button onclick="setPriority('medium')" data-value="medium" class="prio-pill py-2 rounded-lg text-[10px] font-bold uppercase tracking-wider border-2 border-slate-200 dark:border-slate-700 text-slate-400 bg-white dark:bg-slate-800 active-pill-orange">Medium</button>
              <button onclick="setPriority('high')" data-value="high" class="prio-pill py-2 rounded-lg text-[10px] font-bold uppercase tracking-wider border-2 border-slate-200 dark:border-slate-700 text-slate-400 bg-white dark:bg-slate-800">High</button>
            </div>
          </div>
          <div class="space-y-2">
            <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1">Category</label>
            <div id="categorySelector" class="grid grid-cols-1 gap-2">
              <button onclick="setCategory('work')" data-value="work" class="cat-pill py-2 rounded-lg text-[10px] font-bold uppercase tracking-wider border-2 border-slate-200 dark:border-slate-700 text-slate-400 bg-white dark:bg-slate-800">Work</button>
              <button onclick="setCategory('personal')" data-value="personal" class="cat-pill py-2 rounded-lg text-[10px] font-bold uppercase tracking-wider border-2 border-slate-200 dark:border-slate-700 text-slate-400 bg-white dark:bg-slate-800">Personal</button>
              <button onclick="setCategory('urgent')" data-value="urgent" class="cat-pill py-2 rounded-lg text-[10px] font-bold uppercase tracking-wider border-2 border-slate-200 dark:border-slate-700 text-slate-400 bg-white dark:bg-slate-800">Urgent</button>
            </div>
          </div>
        </div>

        <button onclick="addTodo()" class="btn-chunky w-full bg-orange text-white font-black uppercase tracking-widest py-3 rounded-xl flex items-center justify-center gap-2 text-sm shadow-hard transition-all mt-2">
          <i data-lucide="plus-circle" class="w-5 h-5"></i> Add Task
        </button>
      </div>

      <!-- Filters & Actions -->
      <div class="glass-panel border-[3px] border-[var(--border-primary)] rounded-[2rem] p-6 space-y-4">
        <div class="grid grid-cols-3 gap-2">
          <button onclick="filterTasks('all')" id="filter-all" class="filter-btn py-2 rounded-lg text-[10px] font-bold uppercase border-2 border-[var(--border-primary)] bg-dark text-white shadow-hard-sm">All</button>
          <button onclick="filterTasks('active')" id="filter-active" class="filter-btn py-2 rounded-lg text-[10px] font-bold uppercase border-2 border-[var(--border-primary)] bg-white dark:bg-slate-800">Active</button>
          <button onclick="filterTasks('completed')" id="filter-completed" class="filter-btn py-2 rounded-lg text-[10px] font-bold uppercase border-2 border-[var(--border-primary)] bg-white dark:bg-slate-800">Done</button>
        </div>
        
        <select id="sortSelector" onchange="changeSort(this.value)" class="w-full font-bold uppercase text-[10px] border-2 border-[var(--border-primary)] py-2 px-3 rounded-xl bg-white dark:bg-slate-800 text-dark dark:text-white outline-none cursor-pointer shadow-hard-sm">
          <option value="date">Newest First</option>
          <option value="priority">Highest Priority</option>
          <option value="category">Category (A-Z)</option>
        </select>

        <div class="grid grid-cols-2 gap-2">
          <button onclick="exportTasks()" class="flex items-center justify-center gap-2 py-2 rounded-lg text-[9px] font-black uppercase border-2 border-slate-200 dark:border-slate-700 hover:border-dark transition-all">
            <i data-lucide="download" class="w-3 h-3"></i> Export
          </button>
          <label class="flex items-center justify-center gap-2 py-2 rounded-lg text-[9px] font-black uppercase border-2 border-slate-200 dark:border-slate-700 hover:border-dark transition-all cursor-pointer">
            <i data-lucide="upload" class="w-3 h-3"></i> Import
            <input type="file" id="importFile" class="hidden" accept=".json" onchange="importTasks(this)">
          </label>
        </div>
        
        <button onclick="clearCompleted()" class="w-full py-2 bg-pink/10 text-pink border-2 border-pink/30 hover:bg-pink hover:text-white transition-all rounded-xl text-[10px] font-black uppercase tracking-widest">
          Clear Completed
        </button>
      </div>
    </div>

    <!-- Right Column: List -->
    <div class="lg:col-span-8">
      <ul id="todoList" class="space-y-4"></ul>

      <div id="emptyState" class="hidden glass-panel text-center py-24 rounded-[2rem] border-3 border-dashed border-slate-300 dark:border-slate-700 shadow-none mt-2">
        <div class="inline-block p-4 rounded-2xl bg-white dark:bg-slate-800 border-2 border-[var(--border-primary)] shadow-hard-sm mb-4">
          <i data-lucide="sparkles" class="w-10 h-10 text-blue"></i>
        </div>
        <h3 class="font-heading text-2xl font-bold text-dark dark:text-white">All Caught Up!</h3>
        <p class="text-slate-400 font-semibold mt-2 font-body text-base">Your task list is empty. Enjoy the peace.</p>
      </div>
    </div>

  </main>

  <script type="module">
    import autoAnimate from 'https://cdn.jsdelivr.net/npm/@formkit/auto-animate@0.8.0/index.mjs';
    autoAnimate(document.getElementById('todoList'));
  </script>

  <script>
    let todos = JSON.parse(localStorage.getItem('klasskit_todos')) || [];
    let currentFilter = 'all';
    let currentSort = 'date';
    let editingId = null;
    let selectedPriority = 'medium';
    let selectedCategory = 'work';

    const listEl = document.getElementById('todoList');
    const inputEl = document.getElementById('todoInput');
    const emptyStateEl = document.getElementById('emptyState');

    function save() {
      localStorage.setItem('klasskit_todos', JSON.stringify(todos));
      render();
      saveToCloud();
    }

    async function saveToCloud() {
      try {
        if (window.saveProgress) {
          await saveProgress('todo_list_data', { todos, updatedAt: Date.now() });
        }
      } catch (e) {
        console.error("Cloud save failed", e);
      }
    }

    async function loadFromCloud() {
      try {
        if (window.loadProgress) {
          const data = await loadProgress('todo_list_data');
          if (data && data.todos) {
            todos = data.todos;
            save();
          }
        }
      } catch (e) {
        console.error("Cloud load failed", e);
      }
    }

    function setPriority(val) {
      selectedPriority = val;
      document.querySelectorAll('.prio-pill').forEach(btn => {
        btn.classList.remove('active-pill-blue', 'active-pill-orange', 'active-pill-pink');
        if (btn.dataset.value === val) {
          if (val === 'low') btn.classList.add('active-pill-blue');
          if (val === 'medium') btn.classList.add('active-pill-orange');
          if (val === 'high') btn.classList.add('active-pill-pink');
        }
      });
    }

    function setCategory(val) {
      selectedCategory = val;
      document.querySelectorAll('.cat-pill').forEach(btn => {
        btn.classList.remove('active-pill-blue', 'active-pill-green', 'active-pill-pink', 'active-pill-slate');
        if (btn.dataset.value === val) {
          if (val === 'work') btn.classList.add('active-pill-blue');
          if (val === 'personal') btn.classList.add('active-pill-green');
          if (val === 'urgent') btn.classList.add('active-pill-pink');
        }
      });
    }

    function addTodo() {
      const text = inputEl.value.trim();
      if (!text) return;

      const newTodo = {
        id: Date.now(),
        text: text,
        priority: selectedPriority,
        category: selectedCategory,
        completed: false,
        createdAt: new Date().toISOString()
      };

      todos.unshift(newTodo);
      inputEl.value = '';
      save();
    }

    function toggleTodo(id) {
      todos = todos.map(t => t.id === id ? { ...t, completed: !t.completed } : t);
      save();
    }

    function deleteTodo(id) {
      todos = todos.filter(t => t.id !== id);
      save();
    }

    function editTodo(id) {
      editingId = id;
      render();
      setTimeout(() => {
        const input = document.querySelector(`input[data-edit-id="${id}"]`);
        if (input) { input.focus(); input.select(); }
      }, 0);
    }

    function saveEdit(id) {
      const input = document.querySelector(`input[data-edit-id="${id}"]`);
      if (!input) return;
      const newText = input.value.trim();
      if (newText) {
        todos = todos.map(t => t.id === id ? { ...t, text: newText } : t);
        editingId = null;
        save();
      } else {
        editingId = null;
        render();
      }
    }

    function cancelEdit() {
      editingId = null;
      render();
    }

    function clearCompleted() {
      todos = todos.filter(t => !t.completed);
      save();
    }

    function filterTasks(filterType) {
      currentFilter = filterType;
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.className = 'filter-btn py-2 rounded-lg text-[10px] font-bold uppercase border-2 border-[var(--border-primary)] bg-white dark:bg-slate-800';
        if (btn.id === `filter-${filterType}`) {
          btn.className = 'filter-btn py-2 rounded-lg text-[10px] font-bold uppercase border-2 border-[var(--border-primary)] bg-dark text-white shadow-hard-sm';
        }
      });
      render();
    }

    function changeSort(sortType) {
      currentSort = sortType;
      render();
    }

    function sortTasks(tasksArray) {
      return [...tasksArray].sort((a, b) => {
        if (currentSort === 'priority') {
          const pMap = { high: 3, medium: 2, low: 1 };
          if (pMap[b.priority] !== pMap[a.priority]) return pMap[b.priority] - pMap[a.priority];
        } else if (currentSort === 'category') {
          if (a.category !== b.category) return a.category.localeCompare(b.category);
        }
        return new Date(b.createdAt) - new Date(a.createdAt);
      });
    }

    function exportTasks() {
      const dataStr = JSON.stringify(todos, null, 2);
      const blob = new Blob([dataStr], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `klasskit_tasks_${new Date().toISOString().slice(0, 10)}.json`;
      a.click();
    }

    function importTasks(input) {
      const file = input.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const imported = JSON.parse(e.target.result);
          if (Array.isArray(imported)) {
            const existingIds = new Set(todos.map(t => t.id));
            const newOnes = imported.filter(t => !existingIds.has(t.id));
            todos = [...newOnes, ...todos];
            save();
          }
        } catch (err) { alert("Invalid file"); }
      };
      reader.readAsText(file);
    }

    function toggleTheme() {
      const isDark = document.documentElement.classList.toggle('dark');
      localStorage.setItem("theme_tasks", isDark ? "dark" : "light");
    }

    function updateProgress() {
      const total = todos.length;
      const completed = todos.filter(t => t.completed).length;
      const percentage = total === 0 ? 0 : Math.round((completed / total) * 100);
      document.getElementById('progressBar').style.width = `${percentage}%`;
      document.getElementById('progressText').innerText = `${percentage}% Done`;
    }

    function render() {
      updateProgress();
      listEl.innerHTML = '';

      let filtered = todos;
      if (currentFilter === 'active') filtered = todos.filter(t => !t.completed);
      if (currentFilter === 'completed') filtered = todos.filter(t => t.completed);

      const items = sortTasks(filtered);

      if (items.length === 0) {
        emptyStateEl.classList.remove('hidden');
      } else {
        emptyStateEl.classList.add('hidden');
      }

      items.forEach(todo => {
        const li = document.createElement('li');
        li.className = 'todo-item glass-panel border-[3px] border-[var(--border-primary)] p-4 rounded-2xl flex items-center gap-4 bg-white/80 dark:bg-slate-800/80 shadow-hard-sm';
        
        if (todo.completed) li.classList.add('opacity-60', 'grayscale-[0.5]');

        if (editingId === todo.id) {
          li.innerHTML = `
            <div class="flex-1 flex flex-col gap-2">
              <input type="text" data-edit-id="${todo.id}" value="${todo.text}" class="w-full px-3 py-2 border-2 border-dark rounded-lg bg-white dark:bg-slate-700">
              <div class="flex gap-2">
                <button onclick="saveEdit(${todo.id})" class="text-[10px] font-black uppercase px-4 py-1.5 bg-green rounded-lg border-2 border-dark">Save</button>
                <button onclick="cancelEdit()" class="text-[10px] font-black uppercase px-4 py-1.5 bg-slate-200 rounded-lg border-2 border-dark">Cancel</button>
              </div>
            </div>
          `;
        } else {
          let prioTag = `<span class="px-2 py-0.5 rounded text-[8px] font-black uppercase bg-slate-100 dark:bg-slate-700 text-slate-500 border border-slate-200 dark:border-slate-600">Low</span>`;
          if (todo.priority === 'high') prioTag = `<span class="px-2 py-0.5 rounded text-[8px] font-black uppercase bg-pink/10 text-pink border border-pink/30">High</span>`;
          if (todo.priority === 'medium') prioTag = `<span class="px-2 py-0.5 rounded text-[8px] font-black uppercase bg-orange/10 text-orange border border-orange/30">Medium</span>`;

          const catTag = `<span class="px-2 py-0.5 rounded text-[8px] font-black uppercase bg-blue/10 text-blue border border-blue/20">${todo.category}</span>`;

          li.innerHTML = `
            <button onclick="toggleTodo(${todo.id})" class="w-10 h-10 rounded-xl border-2 border-dark flex items-center justify-center transition-all ${todo.completed ? 'bg-green' : 'bg-white dark:bg-slate-700'}">
              ${todo.completed ? '<i data-lucide="check" class="w-6 h-6 text-dark"></i>' : ''}
            </button>
            <div class="flex-1 min-w-0">
              <p class="font-bold text-base md:text-lg dark:text-white truncate ${todo.completed ? 'line-through text-slate-400' : ''}">${todo.text}</p>
              <div class="flex gap-2 mt-1">
                ${prioTag}
                ${catTag}
              </div>
            </div>
            <div class="flex gap-1">
              <button onclick="editTodo(${todo.id})" class="p-2 text-slate-400 hover:text-blue"><i data-lucide="edit-3" class="w-4 h-4"></i></button>
              <button onclick="deleteTodo(${todo.id})" class="p-2 text-slate-400 hover:text-pink"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
            </div>
          `;
        }
        listEl.appendChild(li);
      });
      lucide.createIcons();
    }

    inputEl.addEventListener('keypress', (e) => { if (e.key === 'Enter') addTodo(); });

    async function init() {
      if (window.requireAuth) await requireAuth();
      render();
      await loadFromCloud();
    }
    init();
  </script>
</body>
</html>
