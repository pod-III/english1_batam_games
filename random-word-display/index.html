<!DOCTYPE html>
<html lang="en" class="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Word Animator: English 1 Batam</title>

    <!-- External Libraries -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@400;600;800&family=JetBrains+Mono:wght@500;700&display=swap"
        rel="stylesheet">

    <!-- Theme Configuration -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        pink: '#FF6B95',
                        orange: '#FF8C42',
                        green: '#00E676',
                        blue: '#2979FF',
                        dark: '#0f172a',
                        chalk: '#f8fafc',
                        surface: 'rgba(255, 255, 255, 0.85)',
                        border: 'rgba(203, 213, 225, 0.6)',
                    },
                    fontFamily: {
                        heading: ['Fredoka', 'sans-serif'],
                        body: ['Nunito', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    boxShadow: {
                        'neo': '4px 4px 0px 0px rgba(51, 65, 85, 0.15)',
                        'neo-sm': '2px 2px 0px 0px rgba(51, 65, 85, 0.15)',
                        'neo-lg': '8px 8px 0px 0px rgba(51, 65, 85, 0.15)',
                    },
                    animation: {
                        'float-1': 'float-icon-1 20s infinite linear',
                        'float-2': 'float-icon-2 25s infinite linear reverse',
                        'float-3': 'float-icon-3 15s infinite linear',
                    },
                    keyframes: {
                        'float-icon-1': {
                            '0%': { transform: 'translate(0, 0) rotate(0deg)' },
                            '33%': { transform: 'translate(30px, -50px) rotate(120deg)' },
                            '66%': { transform: 'translate(-20px, 20px) rotate(240deg)' },
                            '100%': { transform: 'translate(0, 0) rotate(360deg)' },
                        },
                        'float-icon-2': {
                            '0%': { transform: 'translate(0, 0) rotate(0deg)' },
                            '50%': { transform: 'translate(-40px, -30px) rotate(-180deg)' },
                            '100%': { transform: 'translate(0, 0) rotate(-360deg)' },
                        },
                        'float-icon-3': {
                            '0%': { transform: 'translate(0, 0) scale(1)' },
                            '50%': { transform: 'translate(20px, 40px) scale(1.2)' },
                            '100%': { transform: 'translate(0, 0) scale(1)' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        .bg-float-icon {
            color: rgba(203, 213, 225, 0.4);
            opacity: 0.3;
            position: fixed;
            z-index: 0;
            pointer-events: none;
        }

        html.dark .bg-float-icon {
            opacity: 0.15;
            color: white;
        }

        body {
            font-family: 'Nunito', sans-serif;
            overflow: hidden;
            background-color: #f8fafc;
            background-image:
                linear-gradient(#e2e8f0 1.5px, transparent 1.5px),
                linear-gradient(90deg, #e2e8f0 1.5px, transparent 1.5px);
            background-size: 30px 30px;
            color: #1e293b;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.3s, color 0.3s;
        }

        html.dark body {
            background-color: #020617;
            background-image:
                linear-gradient(#0f172a 1.5px, transparent 1.5px),
                linear-gradient(90deg, #0f172a 1.5px, transparent 1.5px);
            color: #e2e8f0;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }

        html.dark .glass-panel {
            background: rgba(15, 23, 42, 0.8);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .console-frame {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(203, 213, 225, 0.6);
            border-radius: 1.5rem;
            box-shadow: 8px 8px 0px rgba(51, 65, 85, 0.15);
            display: flex;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        html.dark .console-frame {
            background: rgba(15, 23, 42, 0.8);
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: 8px 8px 0px rgba(0, 0, 0, 0.4);
        }

        .btn-chunky {
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: translateY(0);
            position: relative;
            border: 1px solid rgba(203, 213, 225, 0.6);
            box-shadow: 4px 4px 0 rgba(51, 65, 85, 0.15);
            font-family: 'Fredoka', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        html.dark .btn-chunky {
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: 4px 4px 0 rgba(0, 0, 0, 0.4);
            background-color: rgba(30, 41, 59, 0.8);
            color: #e2e8f0;
        }

        .btn-chunky:hover:not(:disabled) {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0 rgba(51, 65, 85, 0.15);
            filter: brightness(105%);
        }

        html.dark .btn-chunky:hover:not(:disabled) {
            box-shadow: 6px 6px 0 rgba(0, 0, 0, 0.4);
        }

        .btn-chunky:active:not(:disabled) {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0 rgba(51, 65, 85, 0.15) !important;
        }

        html.dark .btn-chunky:active:not(:disabled) {
            box-shadow: 2px 2px 0 rgba(0, 0, 0, 0.4) !important;
        }

        .btn-chunky:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: translateY(2px);
            box-shadow: 0 0 0 rgba(51, 65, 85, 0.15);
            filter: grayscale(100%);
        }

        .custom-scrollbar::-webkit-scrollbar {
            height: 8px;
            width: 8px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(203, 213, 225, 0.6);
            border-radius: 10px;
            border: 2px solid transparent;
            background-clip: content-box;
        }

        html.dark .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(148, 163, 184, 0.8);
        }

        input[type=range] {
            -webkit-appearance: none;
            appearance: none;
            background: transparent;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: white;
            border: 2px solid #2979FF;
            margin-top: -8px;
            cursor: pointer;
            box-shadow: 2px 2px 0px rgba(51, 65, 85, 0.15);
            transition: transform 0.1s;
        }

        html.dark input[type=range]::-webkit-slider-thumb {
            background: #0f172a;
            border-color: #2979FF;
            box-shadow: 2px 2px 0px rgba(0, 0, 0, 0.4);
        }

        input[type=range]::-webkit-slider-thumb:hover {
            transform: scale(1.1);
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 8px;
            background: rgba(203, 213, 225, 0.6);
            border: 1px solid rgba(203, 213, 225, 0.8);
            border-radius: 99px;
        }

        html.dark input[type=range]::-webkit-slider-runnable-track {
            background: rgba(30, 41, 59, 0.8);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .moving-word {
            position: absolute;
            cursor: default;
            user-select: none;
            transition: opacity 0.5s;
            white-space: nowrap;
            will-change: transform;
            top: 0;
            left: 0;
            -webkit-text-stroke: 2px #1e293b;
            paint-order: stroke fill;
            filter: drop-shadow(4px 4px 0px rgba(51, 65, 85, 0.25));
            z-index: 10;
        }

        html.dark .moving-word {
            -webkit-text-stroke: 1.5px rgba(255, 255, 255, 0.8);
            filter: drop-shadow(4px 4px 0px rgba(0, 0, 0, 0.8));
        }

        /* Toggle Switch Styling */
        .switch {
            position: relative;
            display: inline-block;
            width: 48px;
            height: 24px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(203, 213, 225, 0.6);
            border: 1px solid rgba(203, 213, 225, 0.8);
            transition: .3s;
            border-radius: 34px;
        }

        html.dark .slider {
            background-color: rgba(30, 41, 59, 0.8);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            box-shadow: 2px 2px 0px rgba(51, 65, 85, 0.15);
            transition: .3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-radius: 50%;
        }

        html.dark .slider:before {
            background-color: #94a3b8;
            box-shadow: 2px 2px 0px rgba(0, 0, 0, 0.4);
        }

        input:checked+.slider {
            background-color: rgba(0, 230, 118, 0.3);
            border-color: #00E676;
        }

        html.dark input:checked+.slider {
            background-color: rgba(0, 230, 118, 0.2);
            border-color: #00E676;
        }

        input:checked+.slider:before {
            transform: translateX(24px);
            background-color: #00E676;
        }

        textarea.input-styled {
            background-image: radial-gradient(rgba(203, 213, 225, 0.6) 1px, transparent 1px);
            background-size: 10px 10px;
        }

        html.dark textarea.input-styled {
            background-image: radial-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px);
        }

        .hidden-panel-mobile {
            transform: translateY(100%);
        }

        @media (min-width: 768px) {
            .hidden-panel-desktop {
                margin-left: -24rem;
            }
        }
    </style>
</head>

<body
    class="h-screen w-screen flex flex-col items-center justify-center p-2 md:p-6 overflow-hidden transition-colors duration-300">

    <!-- FLOATING BACKGROUND ICONS -->
    <i data-lucide="message-circle" class="bg-float-icon w-32 h-32 top-10 left-10 animate-float-1"></i>
    <i data-lucide="alphabet" class="bg-float-icon w-40 h-40 bottom-20 right-20 animate-float-2"></i>
    <i data-lucide="book-open" class="bg-float-icon w-24 h-24 top-1/2 left-1/2 -ml-12 -mt-12 animate-float-3"></i>

    <div class="console-frame w-full h-full relative flex-col md:flex-row z-10">

        <aside id="controls"
            class="w-full md:w-96 glass-panel border-b-[1px] md:border-b-0 md:border-r-[1px] border-slate-300 dark:border-white/10 flex flex-col z-50 transition-all duration-300 shadow-xl md:shadow-none h-[45%] md:h-full relative shrink-0">

            <div
                class="p-6 border-b-[1px] border-slate-300 dark:border-white/10 bg-slate-50/50 dark:bg-slate-800/50 flex justify-between items-center shrink-0">
                <div>
                    <h1
                        class="text-3xl font-heading text-dark dark:text-slate-100 tracking-wide leading-none drop-shadow-sm transition-colors duration-300">
                        WORD<span class="text-blue">ANIMATOR</span>
                    </h1>
                    <div class="flex items-center gap-2 mt-2">
                        <button onclick="toggleTheme()"
                            class="px-2 py-1 bg-slate-200 dark:bg-slate-700 text-slate-700 dark:text-slate-200 text-[10px] font-bold rounded flex items-center gap-1 hover:bg-slate-300 dark:hover:bg-slate-600 transition-colors">
                            <i data-lucide="moon" class="w-3 h-3 hidden dark:block"></i>
                            <i data-lucide="sun" class="w-3 h-3 block dark:hidden"></i>
                            <span class="hidden dark:inline">DARK</span>
                            <span class="inline dark:hidden">LIGHT</span>
                        </button>
                        <span class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Saved</span>
                    </div>
                </div>
                <button onclick="toggleControlPanel(true)"
                    class="md:hidden p-2 bg-pink/10 text-pink border-[1px] border-slate-300 dark:border-white/20 rounded-lg shadow-neo-sm active:translate-y-1 active:shadow-none transition-all">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>

            <div class="flex-1 p-6 overflow-y-auto custom-scrollbar space-y-8 bg-transparent relative">

                <!-- PHYSICS SETTINGS -->
                <div
                    class="p-4 bg-slate-50/50 dark:bg-slate-800/50 border-[1px] border-slate-300 dark:border-white/10 rounded-xl shadow-sm transition-colors duration-300 space-y-3">
                    <div
                        class="flex justify-between items-center border-b-[1px] border-slate-200 dark:border-white/10 pb-2">
                        <label
                            class="text-xs font-black text-slate-400 uppercase tracking-widest flex items-center gap-2">
                            <i data-lucide="zap" class="w-4 h-4 text-orange"></i> Physics Engine
                        </label>
                    </div>

                    <div class="flex items-center justify-between pt-1">
                        <span class="text-sm font-bold text-dark dark:text-slate-200">Bump Mode (Collision)</span>
                        <label class="switch">
                            <input type="checkbox" id="collision-toggle" checked onchange="updatePhysicsSetting()">
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>

                <!-- CSV FORMATTER -->
                <div class="space-y-3 pb-6 border-b-[1px] border-slate-200 dark:border-white/10 border-dashed">
                    <div class="flex justify-between items-end">
                        <label
                            class="text-xs font-black text-slate-400 uppercase tracking-widest flex items-center gap-2">
                            <i data-lucide="split" class="w-4 h-4 text-pink"></i> CSV Formatter
                        </label>
                    </div>
                    <textarea id="csv-input" spellcheck="false" rows="2"
                        class="input-styled w-full p-3 bg-white/50 dark:bg-slate-900/50 text-dark dark:text-slate-200 font-mono text-sm border-[1px] border-slate-300 dark:border-white/10 rounded-xl focus:border-orange focus:ring-1 focus:ring-orange outline-none resize-none shadow-inner transition-colors duration-300"
                        placeholder="e.g. word1, word2, word3">apple, banana, cherry</textarea>

                    <button onclick="formatList()"
                        class="w-full btn-chunky bg-white dark:bg-slate-700 !text-orange dark:!text-orange py-3 rounded-xl text-sm font-bold tracking-wider flex items-center justify-center gap-2 hover:bg-orange/5 hover:border-orange transition-colors">
                        <i data-lucide="rotate-ccw" class="w-4 h-4"></i> FORMAT TO ANIMATOR INPUT
                    </button>
                </div>

                <!-- WORD LIST -->
                <div class="space-y-3 flex-1 flex flex-col">
                    <div class="flex justify-between items-end">
                        <label
                            class="text-xs font-black text-slate-400 uppercase tracking-widest flex items-center gap-2">
                            <i data-lucide="list-video" class="w-4 h-4 text-green"></i> Word List (Rounds)
                        </label>
                    </div>
                    <textarea id="word-input" spellcheck="false"
                        class="input-styled w-full h-40 md:h-56 p-4 bg-white/50 dark:bg-slate-900/50 text-dark dark:text-slate-200 font-mono text-sm border-[1px] border-slate-300 dark:border-white/10 rounded-xl focus:border-blue focus:ring-1 focus:ring-blue outline-none resize-none shadow-inner transition-colors duration-300"
                        placeholder="Line 1: Words, for, round, 1&#10;Line 2: Words, for, round, 2">A,P,P,L,E
B,A,N,A,N,A
C,A,T</textarea>
                </div>

                <button onclick="parseAndLoadRounds()"
                    class="w-full btn-chunky bg-green text-dark dark:text-dark py-4 rounded-xl text-lg font-bold tracking-wide flex items-center justify-center gap-2 hover:scale-[1.02] transition-all">
                    <i data-lucide="play" class="w-6 h-6 fill-current"></i> LOAD & START

            </div>

            <div
                class="p-4 border-t-[1px] border-slate-300 dark:border-white/10 bg-slate-50/50 dark:bg-slate-800/50 flex justify-center items-center shrink-0 transition-colors duration-300">
                <div id="round-counter" class="font-heading font-black text-slate-400 text-lg uppercase tracking-wider">
                    STATUS: <span class="text-slate-500 dark:text-slate-300">READY</span>
                </div>
            </div>
        </aside>

        <main
            class="flex-1 relative h-[55%] md:h-full bg-slate-50/50 dark:bg-slate-900/50 flex flex-col overflow-hidden transition-colors duration-300 group">

            <div class="absolute inset-0 opacity-10 pointer-events-none transition-opacity duration-300"
                style="background-image: radial-gradient(currentColor 2px, transparent 2px); background-size: 24px 24px;">
            </div>

            <div id="word-display" class="w-full h-full relative overflow-hidden z-0">
                <div id="initial-message"
                    class="absolute inset-0 flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 space-y-4">
                    <div
                        class="w-24 h-24 rounded-full border-4 border-dashed border-slate-300 dark:border-slate-700 flex items-center justify-center animate-bounce">
                        <i data-lucide="move" class="w-12 h-12"></i>
                    </div>
                    <p class="font-heading font-black text-2xl tracking-widest opacity-80">WAITING FOR DATA...</p>
                </div>
            </div>

            <div class="absolute top-4 left-4 z-20 flex flex-col md:flex-row gap-3">
                <button onclick="toggleControlPanel(false)"
                    class="p-2 glass-panel border-[1px] border-slate-300 dark:border-white/10 rounded-xl shadow-neo-sm hover:translate-y-[-2px] transition-transform text-slate-400 hover:text-dark dark:hover:text-slate-200">
                    <i data-lucide="settings" class="w-5 h-5"></i>
                </button>

                <div id="speed-control-display"
                    class="glass-panel p-3 rounded-xl border-[1px] border-slate-300 dark:border-white/10 shadow-neo-sm w-48 md:w-56 transition-all flex items-center justify-between gap-3">
                    <span class="text-lg">🐢</span>
                    <input type="range" id="speed-slider" min="0.5" max="20" step="0.5" value="1.5"
                        oninput="updateSpeed(this.value)" class="flex-1 accent-blue">
                    <span class="text-lg">🐇</span>
                    <div class="bg-blue/10 dark:bg-blue/20 text-blue font-mono font-bold text-xs px-2 py-1 rounded w-12 text-center"
                        id="speed-display">1.5x</div>
                </div>
            </div>

            <div class="absolute bottom-6 right-6 z-20 flex gap-3 items-end">
                <button id="reveal-btn" onclick="revealWord()"
                    class="hidden btn-chunky bg-blue text-white dark:text-white px-6 py-4 rounded-2xl text-xl font-black tracking-wide flex items-center gap-3 hover:scale-105 active:scale-95 shadow-neo">
                    <i data-lucide="eye" class="w-6 h-6"></i> REVEAL
                </button>

                <!-- Hidden by default until played -->
                <button id="next-round-btn" onclick="loadNextRound()"
                    class="hidden btn-chunky bg-pink text-white dark:text-white px-8 py-4 rounded-2xl text-xl font-black tracking-wide flex items-center gap-3 hover:scale-105 active:scale-95 shadow-neo">
                    NEXT <i data-lucide="arrow-right" class="w-6 h-6"></i>
                </button>
            </div>
        </main>
    </div>

    <script>
        const LS_KEY_WORDS = 'wordAnimatorData_v3';
        const LS_KEY_PHYSICS = 'wordAnimatorPhysics_v3';
        const LS_KEY_THEME = 'wordAnimatorTheme';

        let roundsData = [];
        let currentRoundIndex = -1;
        let activeBouncingWords = [];
        let animationFrameId;
        let globalSpeedMultiplier = 1.5;
        let isRevealed = false;
        let collisionsEnabled = true;

        const colors = ['text-pink', 'text-orange', 'text-green', 'text-blue', 'text-slate-800 dark:text-white'];
        const fontSizes = ["text-5xl md:text-6xl", "text-6xl md:text-7xl", "text-7xl md:text-8xl", "text-8xl md:text-9xl"];
        const UNIFIED_SIZE_CLASS = "text-6xl md:text-8xl";

        const wordInput = document.getElementById("word-input");

        function toggleTheme() {
            const html = document.documentElement;
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.setItem(LS_KEY_THEME, 'light');
            } else {
                html.classList.add('dark');
                localStorage.setItem(LS_KEY_THEME, 'dark');
            }
        }

        function loadTheme() {
            const savedTheme = localStorage.getItem(LS_KEY_THEME) || 'light';
            if (savedTheme === 'dark') document.documentElement.classList.add('dark');
        }

        function saveWords(wordsString) {
            try { localStorage.setItem(LS_KEY_WORDS, wordsString); } catch (e) { }
        }

        function loadWords() {
            try {
                const savedWords = localStorage.getItem(LS_KEY_WORDS);
                if (savedWords) wordInput.value = savedWords;

                const savedPhysics = localStorage.getItem(LS_KEY_PHYSICS);
                if (savedPhysics !== null) {
                    collisionsEnabled = savedPhysics === 'true';
                    document.getElementById('collision-toggle').checked = collisionsEnabled;
                }
            } catch (e) { console.warn('Could not load words from LS'); }
        }

        function updatePhysicsSetting() {
            collisionsEnabled = document.getElementById('collision-toggle').checked;
            localStorage.setItem(LS_KEY_PHYSICS, collisionsEnabled);
        }

        function updateSpeed(val) {
            globalSpeedMultiplier = parseFloat(val);
            document.getElementById('speed-display').innerText = globalSpeedMultiplier.toFixed(1) + 'x';
        }

        function formatList() {
            const csvInput = document.getElementById('csv-input').value;
            if (!csvInput.trim()) return;
            const words = csvInput.split(',').map(word => word.trim()).filter(word => word.length > 0);
            const formattedText = words.map(word => word.replace(/\s/g, '').toUpperCase().split('').join(',')).join('\n');
            wordInput.value = formattedText;
            saveWords(formattedText);
        }

        class BouncingWord {
            constructor(text, containerWidth, containerHeight) {
                this.element = document.createElement("div");
                this.element.textContent = text;

                const colorClass = colors[Math.floor(Math.random() * colors.length)];

                const initialRotate = Math.floor(Math.random() * 20) - 10;
                const sizeClass = fontSizes[Math.floor(Math.random() * fontSizes.length)];

                this.element.className = `moving-word font-heading font-black ${colorClass} ${sizeClass}`;
                this.element.style.opacity = '0';

                document.getElementById("word-display").appendChild(this.element);

                this.width = this.element.offsetWidth;
                this.height = this.element.offsetHeight;

                this.radius = (Math.max(this.width, this.height) / 2) * 0.85;
                this.mass = (this.width * this.height) / 500;

                this.x = Math.random() * (containerWidth - this.width);
                this.y = Math.random() * (containerHeight - this.height);
                this.targetX = 0;
                this.targetY = 0;

                const angle = Math.random() * Math.PI * 2;
                this.vx = Math.cos(angle);
                this.vy = Math.sin(angle);

                this.currentRotation = initialRotate;
                this.angularVelocity = (Math.random() - 0.5) * 2;
                this.scale = 1;
                this.targetScale = 1;

                this.updatePosition();

                requestAnimationFrame(() => {
                    this.element.style.opacity = '1';
                });
            }

            get center() {
                return {
                    x: this.x + this.width / 2,
                    y: this.y + this.height / 2
                };
            }

            update(containerWidth, containerHeight) {
                if (isRevealed) {
                    const ease = 0.1;
                    this.x += (this.targetX - this.x) * ease;
                    this.y += (this.targetY - this.y) * ease;
                    this.currentRotation += (0 - this.currentRotation) * ease;
                    this.scale += (1 - this.scale) * ease;
                } else {
                    this.x += this.vx * globalSpeedMultiplier;
                    this.y += this.vy * globalSpeedMultiplier;
                    this.currentRotation += this.angularVelocity * (globalSpeedMultiplier * 0.5);
                    this.angularVelocity *= 0.99;

                    if (this.x <= 0) {
                        this.x = 0; this.vx *= -1;
                        this.onBounce('wall-x');
                    } else if (this.x + this.width >= containerWidth) {
                        this.x = containerWidth - this.width; this.vx *= -1;
                        this.onBounce('wall-x');
                    }

                    if (this.y <= 0) {
                        this.y = 0; this.vy *= -1;
                        this.onBounce('wall-y');
                    } else if (this.y + this.height >= containerHeight) {
                        this.y = containerHeight - this.height; this.vy *= -1;
                        this.onBounce('wall-y');
                    }

                    this.scale += (this.targetScale - this.scale) * 0.15;
                }
                this.updatePosition();
            }

            onBounce(type) {
                this.scale = 0.85;
                this.angularVelocity += (Math.random() - 0.5) * 5;
            }

            updatePosition() {
                this.element.style.transform = `translate(${this.x}px, ${this.y}px) rotate(${this.currentRotation}deg) scale(${this.scale})`;
            }
        }

        function handleCollisions() {
            if (isRevealed || !collisionsEnabled) return;

            for (let i = 0; i < activeBouncingWords.length; i++) {
                for (let j = i + 1; j < activeBouncingWords.length; j++) {
                    const b1 = activeBouncingWords[i];
                    const b2 = activeBouncingWords[j];

                    const c1 = b1.center;
                    const c2 = b2.center;

                    const dx = c2.x - c1.x;
                    const dy = c2.y - c1.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    const minDistance = b1.radius + b2.radius;

                    if (distance < minDistance) {
                        const overlap = minDistance - distance;
                        const nx = dx / distance;
                        const ny = dy / distance;

                        const totalMass = b1.mass + b2.mass;
                        const m1Ratio = b2.mass / totalMass;
                        const m2Ratio = b1.mass / totalMass;

                        b1.x -= nx * overlap * m1Ratio;
                        b1.y -= ny * overlap * m1Ratio;
                        b2.x += nx * overlap * m2Ratio;
                        b2.y += ny * overlap * m2Ratio;

                        const rvx = b2.vx - b1.vx;
                        const rvy = b2.vy - b1.vy;
                        const velAlongNormal = rvx * nx + rvy * ny;

                        if (velAlongNormal > 0) continue;

                        const e = 0.95;
                        let jImpulse = -(1 + e) * velAlongNormal;
                        jImpulse /= (1 / b1.mass + 1 / b2.mass);

                        const impulseX = jImpulse * nx;
                        const impulseY = jImpulse * ny;

                        b1.vx -= (1 / b1.mass) * impulseX;
                        b1.vy -= (1 / b1.mass) * impulseY;
                        b2.vx += (1 / b2.mass) * impulseX;
                        b2.vy += (1 / b2.mass) * impulseY;

                        const tangentX = -ny;
                        const tangentY = nx;
                        const tanVel = rvx * tangentX + rvy * tangentY;

                        b1.angularVelocity -= tanVel * 0.1;
                        b2.angularVelocity += tanVel * 0.1;

                        b1.onBounce('word');
                        b2.onBounce('word');
                    }
                }
            }
        }

        function calculateRevealPositions() {
            const container = document.getElementById("word-display");
            const containerW = container.clientWidth;
            const containerH = container.clientHeight;
            const gap = 16; // Add a bit more gap

            let currentLine = [];
            let allLines = [];
            let currentLineWidth = 0;
            const maxLineWidth = containerW * 0.85;

            activeBouncingWords.forEach(wordObj => {
                if (currentLineWidth + wordObj.width > maxLineWidth && currentLine.length > 0) {
                    allLines.push({ words: currentLine, width: currentLineWidth - gap });
                    currentLine = [];
                    currentLineWidth = 0;
                }
                currentLine.push(wordObj);
                currentLineWidth += wordObj.width + gap;
            });
            if (currentLine.length > 0) allLines.push({ words: currentLine, width: currentLineWidth - gap });

            const maxLineHeight = activeBouncingWords.reduce((max, w) => Math.max(max, w.height), 0);
            const totalBlockHeight = (allLines.length * maxLineHeight) + ((allLines.length - 1) * gap);
            let startY = (containerH - totalBlockHeight) / 2;

            allLines.forEach(line => {
                let startX = (containerW - line.width) / 2;
                line.words.forEach(wordObj => {
                    wordObj.targetX = startX;
                    wordObj.targetY = startY;
                    startX += wordObj.width + gap;
                });
                startY += maxLineHeight + gap;
            });
        }

        function revealWord() {
            if (activeBouncingWords.length === 0) return;

            // Remove all custom sizing and add unified size before computing target positions
            const measureGhost = (text) => {
                const span = document.createElement('div');
                span.textContent = text;
                span.className = `moving-word font-heading font-black ${UNIFIED_SIZE_CLASS}`;
                span.style.visibility = 'hidden';
                span.style.position = 'absolute';
                document.body.appendChild(span);
                const w = span.offsetWidth;
                const h = span.offsetHeight;
                document.body.removeChild(span);
                return { w, h };
            };

            activeBouncingWords.forEach(word => {
                const dim = measureGhost(word.element.textContent);
                word.width = dim.w;
                word.height = dim.h;

                // Clear any layout size classes and inject unified class size
                word.element.className = word.element.className.replace(/text-\w+( md:text-\w+)?/g, '').trim() + ' ' + UNIFIED_SIZE_CLASS;
            });

            isRevealed = true;
            calculateRevealPositions();

            document.getElementById('reveal-btn').classList.add('hidden');
            document.getElementById('next-round-btn').classList.remove('hidden');
            document.getElementById('speed-control-display').classList.add('opacity-50', 'pointer-events-none');
        }

        function gameLoop() {
            const container = document.getElementById("word-display");
            if (!container) return;
            const w = container.clientWidth;
            const h = container.clientHeight;

            handleCollisions();
            activeBouncingWords.forEach(word => word.update(w, h));
            animationFrameId = requestAnimationFrame(gameLoop);
        }

        function loadRound(index) {
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            const display = document.getElementById("word-display");
            display.querySelectorAll('.moving-word').forEach(el => el.remove());
            const initialMsg = document.getElementById("initial-message");
            if (initialMsg) initialMsg.style.display = 'none';
            activeBouncingWords = [];
            if (!roundsData.length) return;

            let nextIndex = index;
            if (nextIndex >= roundsData.length) nextIndex = 0;
            currentRoundIndex = nextIndex;

            const words = roundsData[currentRoundIndex];
            isRevealed = false;

            document.getElementById('reveal-btn').classList.remove('hidden');
            document.getElementById('next-round-btn').classList.add('hidden');
            document.getElementById('speed-control-display').classList.remove('opacity-50', 'pointer-events-none');

            const status = document.getElementById("round-counter");
            status.innerHTML = `ROUND <span class="text-blue font-black text-xl md:text-2xl ml-1 px-2 py-0.5 bg-blue/10 rounded-lg">${currentRoundIndex + 1}</span> / ${roundsData.length}`;

            words.forEach((text) => {
                activeBouncingWords.push(new BouncingWord(text, display.clientWidth, display.clientHeight));
            });
            gameLoop();
        }

        function parseAndLoadRounds() {
            const input = wordInput.value;
            const lines = input.split("\n").map((l) => l.trim()).filter((l) => l.length > 0);
            roundsData = lines.map((line) => line.split(",").map((w) => w.trim()).filter((w) => w.length > 0)).filter((r) => r.length > 0);
            if (!roundsData.length) return;

            if (window.innerWidth < 768) toggleControlPanel(true);
            currentRoundIndex = -1;
            loadNextRound();
        }

        function loadNextRound() {
            if (!roundsData.length) return;
            loadRound(currentRoundIndex + 1);
        }

        function toggleControlPanel(forceHide = false) {
            const controls = document.getElementById('controls');
            const isCurrentlyHidden = window.innerWidth >= 768
                ? controls.classList.contains('hidden-panel-desktop')
                : controls.classList.contains('hidden-panel-mobile');
            if (forceHide || !isCurrentlyHidden) {
                controls.classList.add('hidden-panel-mobile', 'hidden-panel-desktop');
            } else {
                controls.classList.remove('hidden-panel-mobile', 'hidden-panel-desktop');
            }
            setTimeout(() => window.dispatchEvent(new Event('resize')), 350);
        }

        window.addEventListener('resize', () => {
            const controls = document.getElementById('controls');
            if (window.innerWidth >= 768) controls.classList.remove('hidden-panel-mobile');
            else controls.classList.remove('hidden-panel-desktop');
            if (isRevealed) calculateRevealPositions();
        });

        function init() {
            loadTheme();
            loadWords();
            wordInput.addEventListener('input', (e) => saveWords(e.target.value));
            updateSpeed(document.getElementById('speed-slider').value);
            lucide.createIcons();
            if (window.innerWidth < 768) toggleControlPanel(true);
        }

        init();
    </script>
</body>
